apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-job-queue
  namespace: platform
  labels:
    app: worker-job-queue
    domain: platform
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-job-queue
  template:
    metadata:
      labels:
        app: worker-job-queue
        domain: platform
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50057"
    spec:
      serviceAccountName: worker-job-queue
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker-job-queue
          image: shopos/worker-job-queue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50057
              protocol: TCP
          envFrom:
            - configMapRef:
                name: worker-job-queue
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: worker-job-queue
