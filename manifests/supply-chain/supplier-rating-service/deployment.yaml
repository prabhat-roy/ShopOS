apiVersion: apps/v1
kind: Deployment
metadata:
  name: supplier-rating-service
  namespace: supply-chain
  labels:
    app: supplier-rating-service
    domain: supply-chain
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supplier-rating-service
  template:
    metadata:
      labels:
        app: supplier-rating-service
        domain: supply-chain
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50194"
    spec:
      serviceAccountName: supplier-rating-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: supplier-rating-service
          image: shopos/supplier-rating-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50194
              protocol: TCP
          envFrom:
            - configMapRef:
                name: supplier-rating-service
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 50194
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50194
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: supplier-rating-service
