apiVersion: v1
kind: Service
metadata:
  name: fulfillment-service
  namespace: supply-chain
  labels:
    app: fulfillment-service
    domain: supply-chain
spec:
  selector:
    app: fulfillment-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50103
      targetPort: grpc
      protocol: TCP
