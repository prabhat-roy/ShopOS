apiVersion: v1
kind: ConfigMap
metadata:
  name: fulfillment-service
  namespace: supply-chain
  labels:
    app: fulfillment-service
    domain: supply-chain
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: fulfillment-service
  SERVICE_DOMAIN: supply-chain
  GRPC_PORT: "50103"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50103"
  OTEL_SERVICE_NAME: fulfillment-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
