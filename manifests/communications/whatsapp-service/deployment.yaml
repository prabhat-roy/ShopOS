apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-service
  namespace: communications
  labels:
    app: whatsapp-service
    domain: communications
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whatsapp-service
  template:
    metadata:
      labels:
        app: whatsapp-service
        domain: communications
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3020"
    spec:
      serviceAccountName: whatsapp-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: whatsapp-service
          image: shopos/whatsapp-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3020
              protocol: TCP
          envFrom:
            - configMapRef:
                name: whatsapp-service
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3020
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3020
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: whatsapp-service
