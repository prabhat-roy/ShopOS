apiVersion: v1
kind: ConfigMap
metadata:
  name: whatsapp-service
  namespace: communications
  labels:
    app: whatsapp-service
    domain: communications
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: whatsapp-service
  SERVICE_DOMAIN: communications
  HTTP_PORT: "3020"
  METRICS_PORT: "9090"
  HEALTH_PORT: "3020"
  OTEL_SERVICE_NAME: whatsapp-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
