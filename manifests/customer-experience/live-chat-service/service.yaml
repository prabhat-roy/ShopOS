apiVersion: v1
kind: Service
metadata:
  name: live-chat-service
  namespace: customer-experience
  labels:
    app: live-chat-service
    domain: customer-experience
spec:
  selector:
    app: live-chat-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50126
      targetPort: grpc
      protocol: TCP
