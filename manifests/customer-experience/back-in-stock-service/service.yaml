apiVersion: v1
kind: Service
metadata:
  name: back-in-stock-service
  namespace: customer-experience
  labels:
    app: back-in-stock-service
    domain: customer-experience
spec:
  selector:
    app: back-in-stock-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50187
      targetPort: grpc
      protocol: TCP
