apiVersion: v1
kind: Service
metadata:
  name: gift-registry-service
  namespace: customer-experience
  labels:
    app: gift-registry-service
    domain: customer-experience
spec:
  selector:
    app: gift-registry-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50188
      targetPort: grpc
      protocol: TCP
