apiVersion: v1
kind: Service
metadata:
  name: wishlist-service
  namespace: customer-experience
  labels:
    app: wishlist-service
    domain: customer-experience
spec:
  selector:
    app: wishlist-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50122
      targetPort: grpc
      protocol: TCP
