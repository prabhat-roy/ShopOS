apiVersion: apps/v1
kind: Deployment
metadata:
  name: compare-service
  namespace: customer-experience
  labels:
    app: compare-service
    domain: customer-experience
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compare-service
  template:
    metadata:
      labels:
        app: compare-service
        domain: customer-experience
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50123"
    spec:
      serviceAccountName: compare-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: compare-service
          image: shopos/compare-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50123
              protocol: TCP
          envFrom:
            - configMapRef:
                name: compare-service
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 50123
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50123
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: compare-service
