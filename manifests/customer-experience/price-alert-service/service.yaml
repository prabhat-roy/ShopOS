apiVersion: v1
kind: Service
metadata:
  name: price-alert-service
  namespace: customer-experience
  labels:
    app: price-alert-service
    domain: customer-experience
spec:
  selector:
    app: price-alert-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50186
      targetPort: grpc
      protocol: TCP
