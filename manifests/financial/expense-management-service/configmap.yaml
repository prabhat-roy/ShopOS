apiVersion: v1
kind: ConfigMap
metadata:
  name: expense-management-service
  namespace: financial
  labels:
    app: expense-management-service
    domain: financial
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: expense-management-service
  SERVICE_DOMAIN: financial
  GRPC_PORT: "50114"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50114"
  OTEL_SERVICE_NAME: expense-management-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
