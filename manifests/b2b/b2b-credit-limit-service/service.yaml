apiVersion: v1
kind: Service
metadata:
  name: b2b-credit-limit-service
  namespace: b2b
  labels:
    app: b2b-credit-limit-service
    domain: b2b
spec:
  selector:
    app: b2b-credit-limit-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50164
      targetPort: grpc
      protocol: TCP
