apiVersion: v1
kind: Service
metadata:
  name: return-refund-service
  namespace: commerce
  labels:
    app: return-refund-service
    domain: commerce
spec:
  selector:
    app: return-refund-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50089
      targetPort: grpc
      protocol: TCP
