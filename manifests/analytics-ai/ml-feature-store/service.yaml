apiVersion: v1
kind: Service
metadata:
  name: ml-feature-store
  namespace: analytics-ai
  labels:
    app: ml-feature-store
    domain: analytics-ai
spec:
  selector:
    app: ml-feature-store
  type: ClusterIP
  ports:
    - name: grpc
      port: 50152
      targetPort: grpc
      protocol: TCP
