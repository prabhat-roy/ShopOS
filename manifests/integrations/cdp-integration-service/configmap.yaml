apiVersion: v1
kind: ConfigMap
metadata:
  name: cdp-integration-service
  namespace: integrations
  labels:
    app: cdp-integration-service
    domain: integrations
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: cdp-integration-service
  SERVICE_DOMAIN: integrations
  HTTP_PORT: "8080"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8080"
  OTEL_SERVICE_NAME: cdp-integration-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
