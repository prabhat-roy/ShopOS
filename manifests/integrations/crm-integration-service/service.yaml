apiVersion: v1
kind: Service
metadata:
  name: crm-integration-service
  namespace: integrations
  labels:
    app: crm-integration-service
    domain: integrations
spec:
  selector:
    app: crm-integration-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50172
      targetPort: grpc
      protocol: TCP
