apiVersion: v1
kind: ConfigMap
metadata:
  name: logistics-provider-integration
  namespace: integrations
  labels:
    app: logistics-provider-integration
    domain: integrations
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: logistics-provider-integration
  SERVICE_DOMAIN: integrations
  GRPC_PORT: "50174"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50174"
  OTEL_SERVICE_NAME: logistics-provider-integration
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
