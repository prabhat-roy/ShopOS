apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-commerce-service
  namespace: integrations
  labels:
    app: social-commerce-service
    domain: integrations
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: social-commerce-service
  template:
    metadata:
      labels:
        app: social-commerce-service
        domain: integrations
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50171"
    spec:
      serviceAccountName: social-commerce-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: social-commerce-service
          image: shopos/social-commerce-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50171
              protocol: TCP
          envFrom:
            - configMapRef:
                name: social-commerce-service
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 50171
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50171
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: social-commerce-service
