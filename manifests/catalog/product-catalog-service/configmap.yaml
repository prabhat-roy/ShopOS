apiVersion: v1
kind: ConfigMap
metadata:
  name: product-catalog-service
  namespace: catalog
  labels:
    app: product-catalog-service
    domain: catalog
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: product-catalog-service
  SERVICE_DOMAIN: catalog
  GRPC_PORT: "50070"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50070"
  OTEL_SERVICE_NAME: product-catalog-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
