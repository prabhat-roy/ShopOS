apiVersion: apps/v1
kind: Deployment
metadata:
  name: seo-service
  namespace: catalog
  labels:
    app: seo-service
    domain: catalog
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seo-service
  template:
    metadata:
      labels:
        app: seo-service
        domain: catalog
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50079"
    spec:
      serviceAccountName: seo-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: seo-service
          image: shopos/seo-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50079
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seo-service
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 50079
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50079
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: seo-service
