upstream api_backend {
    server admin-dashboard-backend:8080;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=admin-dashboard_limit:10m rate=30r/s;

server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "DENY"                      always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.shopos.io; font-src 'self'; frame-ancestors 'none';"
        always;

    location /healthz {
        limit_req zone=admin-dashboard_limit burst=5;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location /api/ {
        limit_req zone=admin-dashboard_limit burst=20 nodelay;
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        limit_req zone=admin-dashboard_limit burst=50 nodelay;
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
