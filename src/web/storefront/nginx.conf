# Storefront is served by Next.js Node.js — this nginx proxies in Kubernetes
# when using a sidecar or separate ingress; not used in Docker directly.
upstream nextjs {
    server localhost:3000;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=storefront_limit:10m rate=60r/s;

server {
    listen 80;
    server_tokens off;

    add_header X-Frame-Options           "SAMEORIGIN"               always;
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.shopos.io; font-src 'self' data:;"
        always;

    location / {
        limit_req zone=storefront_limit burst=100 nodelay;
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
