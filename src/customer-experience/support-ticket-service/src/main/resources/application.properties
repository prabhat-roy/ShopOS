spring.application.name=support-ticket-service
server.port=${HTTP_PORT:8405}

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/support_tickets}
spring.datasource.username=${DATABASE_USER:shopos}
spring.datasource.password=${DATABASE_PASSWORD:shopos}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.shopos=INFO
logging.level.org.flywaydb=INFO
