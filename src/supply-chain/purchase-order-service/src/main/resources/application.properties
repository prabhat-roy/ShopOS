server.port=${HTTP_PORT:8201}

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/purchase_order_db}
spring.datasource.username=${DB_USER:po_user}
spring.datasource.password=${DB_PASSWORD:po_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Logging
logging.level.com.shopos.purchaseorderservice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Application
spring.application.name=purchase-order-service
