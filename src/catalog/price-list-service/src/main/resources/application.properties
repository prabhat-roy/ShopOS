server.port=${HTTP_PORT:8114}

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pricelist}
spring.datasource.username=${DB_USER:pricelist}
spring.datasource.password=${DB_PASSWORD:pricelist}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator / Health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Application
spring.application.name=price-list-service
