server.port=8806

spring.application.name=marketplace-seller-service

# PostgreSQL datasource (override via environment variables in production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/marketplace_seller}
spring.datasource.username=${DB_USERNAME:shopos}
spring.datasource.password=${DB_PASSWORD:shopos}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.shopos.marketplacesellerservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
