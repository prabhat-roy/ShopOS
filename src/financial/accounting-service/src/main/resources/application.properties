spring.application.name=accounting-service
server.port=8301

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/accounting_db}
spring.datasource.username=${DB_USERNAME:accounting_user}
spring.datasource.password=${DB_PASSWORD:accounting_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.shopos=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
