# ============================================================
# ShopOS — payout-service application configuration
# ============================================================

spring.application.name=payout-service

# HTTP port
server.port=8302

# ---- DataSource ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/payout_db}
spring.datasource.username=${DB_USER:payout_user}
spring.datasource.password=${DB_PASSWORD:payout_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ---- Logging ----
logging.level.root=INFO
logging.level.com.shopos.payoutservice=DEBUG
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ---- Spring MVC ----
spring.mvc.problem-details.enabled=true
