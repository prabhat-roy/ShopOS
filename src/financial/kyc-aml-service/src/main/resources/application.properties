spring.application.name=kyc-aml-service
server.port=8307

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kycamldb}
spring.datasource.username=${DB_USERNAME:kycaml}
spring.datasource.password=${DB_PASSWORD:kycaml}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Logging
logging.level.com.shopos.kycamlservice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
