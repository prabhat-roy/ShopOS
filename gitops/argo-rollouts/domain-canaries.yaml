# Argo Rollouts — Per-domain canary Rollout templates
# Applied to critical gateway/entry-point services per domain.
# Each domain's primary service uses a canary strategy with analysis.
---
# Platform — api-gateway canary
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-gateway
  namespace: shopos-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: shopos/api-gateway:latest
          ports:
            - containerPort: 8080
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: {duration: 2m}
        - setWeight: 30
        - pause: {duration: 2m}
        - setWeight: 60
        - pause: {duration: 2m}
        - setWeight: 100
      analysis:
        templates:
          - templateName: error-rate-check
        startingStep: 2
        args:
          - name: service-name
            value: api-gateway
