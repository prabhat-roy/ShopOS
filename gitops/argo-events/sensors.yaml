# Argo Events Sensors — subscribe to EventSources, trigger Argo Workflows
---
# CI Build sensor — triggered on GitHub push to main
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: github-push-sensor
  namespace: shopos-platform
spec:
  dependencies:
    - name: push-event
      eventSourceName: github
      eventName: push
      filters:
        data:
          - path: body.ref
            type: string
            value:
              - refs/heads/main
              - refs/heads/release/*

  triggers:
    - template:
        name: ci-build-trigger
        argoWorkflow:
          group: argoproj.io
          version: v1alpha1
          resource: workflows
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: ci-build-
                namespace: shopos-platform
              spec:
                workflowTemplateRef:
                  name: ci-build-workflow
          parameters:
            - src:
                dependencyName: push-event
                dataKey: body.repository.name
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: push-event
                dataKey: body.after
              dest: spec.arguments.parameters.1.value
      retryStrategy:
        steps: 3
        duration: 10s
---
# Fraud alert sensor — triggered on fraud detected Kafka event
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: fraud-alert-sensor
  namespace: shopos-platform
spec:
  dependencies:
    - name: fraud-event
      eventSourceName: kafka-commerce
      eventName: fraud_detected

  triggers:
    - template:
        name: fraud-notification
        http:
          url: http://notification-orchestrator.communications.svc.cluster.local/notify
          method: POST
          payload:
            - src:
                dependencyName: fraud-event
                dataKey: body
              dest: event
          headers:
            Content-Type: application/json
---
