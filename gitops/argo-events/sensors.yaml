---
# Deploy trigger sensor — webhook triggered deployment
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: deploy-trigger-sensor
  namespace: shopos-platform
spec:
  dependencies:
    - name: deploy-webhook
      eventSourceName: webhooks
      eventName: deploy_trigger

  triggers:
    - template:
        name: domain-deploy-trigger
        argoWorkflow:
          group: argoproj.io
          version: v1alpha1
          resource: workflows
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: deploy-
                namespace: shopos-platform
              spec:
                workflowTemplateRef:
                  name: domain-deploy
          parameters:
            - src:
                dependencyName: deploy-webhook
                dataKey: body.service
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: deploy-webhook
                dataKey: body.domain
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: deploy-webhook
                dataKey: body.image
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: deploy-webhook
                dataKey: body.version
              dest: spec.arguments.parameters.3.value
