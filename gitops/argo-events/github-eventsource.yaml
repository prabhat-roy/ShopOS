apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-eventsource
  namespace: argo-events
spec:
  github:
    shopos-push:
      repositories:
        - owner: your-org
          names:
            - shopos
      webhook:
        endpoint: /push
        port: "12000"
        method: POST
      events:
        - push
        - pull_request
      apiToken:
        name: github-access
        key: token
      webhookSecret:
        name: github-webhook
        key: secret
      insecure: false
      active: true
      contentType: json
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: github-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: push-dep
      eventSourceName: github-eventsource
      eventName: shopos-push
  triggers:
    - template:
        name: trigger-tekton-pipeline
        k8s:
          operation: create
          source:
            resource:
              apiVersion: tekton.dev/v1beta1
              kind: PipelineRun
              metadata:
                generateName: shopos-triggered-run-
                namespace: tekton-pipelines
              spec:
                pipelineRef:
                  name: shopos-build-pipeline
                params:
                  - name: repo-url
                    value: "https://github.com/your-org/shopos.git"
                  - name: revision
                    value: "main"
                workspaces:
                  - name: source
                    volumeClaimTemplate:
                      spec:
                        accessModes: [ReadWriteOnce]
                        resources:
                          requests:
                            storage: 1Gi
