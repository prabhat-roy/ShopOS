replicaCount: 1

image:
  repository: quay.io/argoproj/argo-rollouts
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3100
  targetPort: 3100

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
