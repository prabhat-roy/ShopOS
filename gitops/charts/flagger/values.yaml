replicaCount: 1

image:
  repository: ghcr.io/fluxcd/flagger
  tag: "1.38.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 10080
  targetPort: 10080

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: "1"
    memory: 256Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
