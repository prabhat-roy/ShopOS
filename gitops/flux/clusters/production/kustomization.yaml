apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - namespaces.yaml
  - helm-releases.yaml
patches:
  - target:
      kind: HelmRelease
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 3
      - op: replace
        path: /spec/values/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/values/resources/requests/memory
        value: 256Mi
