  namespace: shopos-integrations
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/charts/social-commerce-service
      sourceRef:
        kind: GitRepository
        name: shopos
        namespace: flux-system
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
