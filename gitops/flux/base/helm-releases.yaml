---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ab-content-service
  namespace: shopos-content
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/services/ab-content-service
      sourceRef:
        kind: GitRepository
        name: shopos
        namespace: flux-system
  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
    cleanupOnFail: true
  values:
    image:
      repository: ghcr.io/shopos/ab-content-service
      tag: latest
    namespaceOverride: shopos-content
    domain: content
