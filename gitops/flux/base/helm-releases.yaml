---
# Platform
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api-gateway
  namespace: shopos-platform
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/charts/api-gateway
      sourceRef:
        kind: GitRepository
        name: shopos
        namespace: flux-system
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
