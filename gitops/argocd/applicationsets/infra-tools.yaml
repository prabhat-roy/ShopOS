          - { tool: goproxy, category: registry, namespace: registry }
          - { tool: harbor, category: registry, namespace: registry }
          - { tool: kellnr, category: registry, namespace: registry }
          - { tool: kraken, category: registry, namespace: registry }
          - { tool: nexus, category: registry, namespace: registry }
          - { tool: onedev, category: registry, namespace: registry }
          - { tool: pulp, category: registry, namespace: registry }
          - { tool: pypiserver, category: registry, namespace: registry }
          - { tool: quay, category: registry, namespace: registry }
          - { tool: quetz, category: registry, namespace: registry }
          - { tool: reposilite, category: registry, namespace: registry }
          - { tool: sonarqube, category: registry, namespace: registry }
          - { tool: terrareg, category: registry, namespace: registry }
          - { tool: verdaccio, category: registry, namespace: registry }
          - { tool: zot, category: registry, namespace: registry }
          - { tool: defectdojo, category: security, namespace: infra }
          - { tool: dependency-track, category: security, namespace: infra }
          - { tool: external-secrets, category: security, namespace: infra }
          - { tool: pomerium, category: security, namespace: infra }
          - { tool: sealed-secrets, category: security, namespace: infra }
          - { tool: teleport, category: security, namespace: infra }
          - { tool: wazuh, category: security, namespace: infra }
          - { tool: k6-operator, category: testing, namespace: developer-platform }
          - { tool: pact-broker, category: testing, namespace: developer-platform }
          - { tool: toxiproxy, category: testing, namespace: developer-platform }
          - { tool: wiremock, category: testing, namespace: developer-platform }
  template:
    metadata: { name: 'infra-{{tool}}', namespace: argocd, labels: { kind: infra-tool, category: '{{category}}' } }
    spec:
      project: shopos-infra
      source:
        repoURL: https://github.com/prabhat-roy/ShopOS.git
        targetRevision: HEAD
        path: 'helm/infra/{{category}}/{{tool}}'
      destination: { server: https://kubernetes.default.svc, namespace: '{{namespace}}' }
      syncPolicy:
        automated: { prune: false, selfHeal: true }   # prune disabled — infra is precious
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
        retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
