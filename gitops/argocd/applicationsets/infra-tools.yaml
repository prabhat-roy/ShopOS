# One ArgoCD Application per chart under helm/infra/<category>/<tool>/.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata: { name: shopos-infra-tools, namespace: argocd }
spec:
  generators:
    - list:
        elements:
          - { tool: apache-atlas, category: data, namespace: analytics-ai }
          - { tool: apisix, category: data, namespace: analytics-ai }
          - { tool: apisix-dashboard, category: data, namespace: analytics-ai }
          - { tool: great-expectations, category: data, namespace: analytics-ai }
