apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-commerce
  namespace: argocd
spec:
  description: ShopOS Commerce domain services
  sourceRepos:
    - 'https://github.com/your-org/shopos.git'
    - 'https://charts.shopos.io'
  destinations:
    - namespace: shopos-commerce
      server: https://kubernetes.default.svc
    - namespace: shopos-catalog
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: commerce-admin
      description: Commerce team full access
      policies:
        - p, proj:shopos-commerce:commerce-admin, applications, *, shopos-commerce/*, allow
      groups:
        - commerce-team
