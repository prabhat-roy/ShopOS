apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-communications
  namespace: argocd
spec:
  description: ShopOS communications domain services
  sourceRepos:
    - 'https://github.com/your-org/shopos.git'
  destinations:
    - namespace: shopos-communications
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: communications-admin
      description: communications team full access
      policies:
        - p, proj:shopos-communications:communications-admin, applications, *, shopos-communications/*, allow
      groups:
        - communications-team
