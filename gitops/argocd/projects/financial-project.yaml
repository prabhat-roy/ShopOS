apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-financial
  namespace: argocd
spec:
  description: ShopOS financial domain services
  sourceRepos:
    - 'https://github.com/prabhat-roy/ShopOS.git'
  destinations:
    - namespace: shopos-financial
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: financial-admin
      description: financial team full access
      policies:
        - p, proj:shopos-financial:financial-admin, applications, *, shopos-financial/*, allow
      groups:
        - financial-team
