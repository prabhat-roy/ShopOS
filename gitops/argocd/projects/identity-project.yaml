apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-identity
  namespace: argocd
spec:
  description: ShopOS identity domain services
  sourceRepos:
    - 'https://github.com/prabhat-roy/ShopOS.git'
  destinations:
    - namespace: shopos-identity
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: identity-admin
      description: identity team full access
      policies:
        - p, proj:shopos-identity:identity-admin, applications, *, shopos-identity/*, allow
      groups:
        - identity-team
