apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-integrations
  namespace: argocd
spec:
  description: ShopOS integrations domain services
  sourceRepos:
    - 'https://github.com/prabhat-roy/ShopOS.git'
  destinations:
    - namespace: shopos-integrations
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: integrations-admin
      description: integrations team full access
      policies:
        - p, proj:shopos-integrations:integrations-admin, applications, *, shopos-integrations/*, allow
      groups:
        - integrations-team
