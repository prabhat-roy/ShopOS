apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopos-affiliate
  namespace: argocd
spec:
  description: ShopOS affiliate domain services
  sourceRepos:
    - 'https://github.com/your-org/shopos.git'
  destinations:
    - namespace: shopos-affiliate
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
  roles:
    - name: affiliate-admin
      description: affiliate team full access
      policies:
        - p, proj:shopos-affiliate:affiliate-admin, applications, *, shopos-affiliate/*, allow
      groups:
        - affiliate-team
