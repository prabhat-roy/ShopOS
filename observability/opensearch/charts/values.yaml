replicaCount: 1

image:
  repository: opensearchproject/opensearch
  tag: "2.17.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 9200
  transportPort: 9300

env:
  - name: discovery.type
    value: single-node
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
  - name: OPENSEARCH_JAVA_OPTS
    value: "-Xms1g -Xmx1g"

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

persistence:
  enabled: true
  size: 50Gi
  storageClass: ""

ingress:
  enabled: false
