apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opensearch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "opensearch.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "opensearch.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels: {{ include "opensearch.labels" . | nindent 6 }}
  template:
    metadata:
      labels: {{ include "opensearch.labels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: fix-data-dir
          image: busybox:1.36
          command: ['sh', '-c', 'rm -rf /usr/share/opensearch/data/lost+found && chown -R 1000:1000 /usr/share/opensearch/data']
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
      containers:
        - name: opensearch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: transport
              containerPort: {{ .Values.service.transportPort }}
              protocol: TCP
          env: {{ toYaml .Values.env | nindent 12 }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
