apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: robusta
  namespace: monitoring
spec:
  repo: https://robusta-charts.storage.googleapis.com
  chart: robusta
  version: 0.13.3
  targetNamespace: monitoring
  valuesContent: |-
    clusterName: shopos-prod
    sinksConfig:
      - slack_sink:
          name: main_slack_sink
          slack_channel: "#shopos-alerts"
          api_key: "${SLACK_BOT_TOKEN}"
    playbookRepos: {}
    builtinPlaybooks:
      - triggers:
          - on_pod_crash_loop: {}
        actions:
          - logs_enricher: {}
          - pod_events_enricher: {}
      - triggers:
          - on_deployment_update: {}
        actions:
          - deployment_events_enricher: {}
      - triggers:
          - on_pod_oom_killed: {}
        actions:
          - logs_enricher: {}
          - oom_killer_enricher: {}
      - triggers:
          - on_node_not_ready: {}
        actions:
          - node_status_enricher: {}
      - triggers:
          - on_prometheus_alert:
              alert_name: KubeJobFailed
        actions:
          - job_events_enricher: {}
          - job_pod_enricher: {}
    enabledPlaybooks: []
