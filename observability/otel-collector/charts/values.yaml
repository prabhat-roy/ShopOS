replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.111.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4317
  targetPort: 4317

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
