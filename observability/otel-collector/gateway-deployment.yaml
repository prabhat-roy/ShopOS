# OTel Collector — gateway mode (Deployment, HA) for cross-cluster aggregation.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata: { name: otel-gateway, namespace: monitoring }
spec:
  mode: deployment
  replicas: 3
  image: otel/opentelemetry-collector-contrib:0.108.0
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 4, memory: 4Gi }
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch:           { timeout: 10s, send_batch_size: 8192 }
      memory_limiter:  { check_interval: 5s, limit_percentage: 80 }
      attributes:
        actions:
          - { key: cluster, action: upsert, value: shopos-prod }
    exporters:
      otlphttp/tempo:  { endpoint: http://tempo-distributor.monitoring.svc:4318 }
      prometheusremotewrite/mimir:
        endpoint: http://mimir-distributor.monitoring.svc:9009/api/v1/push
      loki: { endpoint: http://loki-gateway.monitoring.svc/loki/api/v1/push }
    service:
      pipelines:
        traces:  { receivers: [otlp], processors: [memory_limiter, attributes, batch], exporters: [otlphttp/tempo] }
        metrics: { receivers: [otlp], processors: [memory_limiter, attributes, batch], exporters: [prometheusremotewrite/mimir] }
        logs:    { receivers: [otlp], processors: [memory_limiter, attributes, batch], exporters: [loki] }
