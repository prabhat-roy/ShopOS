replicaCount: 1

image:
  repository: grafana/pyroscope
  tag: "1.7.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4040
  targetPort: 4040

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
