replicaCount: 1

image:
  repository: docker.elastic.co/logstash/logstash
  tag: "8.15.3"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5044
  targetPort: 5044

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
