replicaCount: 1

image:
  repository: ghcr.io/pyrra-dev/pyrra
  tag: "v0.7.8"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9099
  targetPort: 9099

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
