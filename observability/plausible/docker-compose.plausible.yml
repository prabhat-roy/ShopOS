# Plausible Analytics — privacy-friendly web analytics for ShopOS storefront
# Self-hosted, GDPR compliant, no cookies required
version: "3.8"

services:
  plausible_db:
    image: postgres:16
    restart: always
    volumes:
      - plausible-pg:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: plausible
      POSTGRES_DB: plausible_db

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.8
    restart: always
    volumes:
      - plausible-ch:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.4
    restart: always
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    ports:
      - "8096:8000"
    environment:
      BASE_URL: https://analytics.shopos.com
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DATABASE_URL: postgresql://postgres:plausible@plausible_db/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      DISABLE_REGISTRATION: true
      ENABLE_EMAIL_VERIFICATION: false
      # Google Search Console integration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # SMTP for reports
      MAILER_EMAIL: analytics@shopos.internal
      SMTP_HOST_ADDR: smtp.shopos.internal
      SMTP_HOST_PORT: 587
      SMTP_USER_NAME: ${SMTP_USER}
      SMTP_USER_PWD: ${SMTP_PASSWORD}

volumes:
  plausible-pg:
  plausible-ch:
