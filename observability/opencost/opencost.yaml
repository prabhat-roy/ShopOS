apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: opencost
  namespace: monitoring
spec:
  repo: https://opencost.github.io/opencost-helm-chart
  chart: opencost
  version: 1.43.0
  targetNamespace: monitoring
  valuesContent: |-
    opencost:
      exporter:
        defaultClusterId: shopos-prod
        cloudProviderApiKey: ""
      prometheus:
        internal:
          enabled: false
        external:
          enabled: true
          url: http://prometheus-server.monitoring:9090
      ui:
        enabled: true
        service:
          type: ClusterIP
          port: 9090
      metrics:
        serviceMonitor:
          enabled: true
          namespace: monitoring
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/shopos-opencost"
