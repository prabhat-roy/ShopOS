groups:
  - name: platform.api-gateway
    interval: 30s
    rules:
      - alert: ApiGatewayDown
        expr: up{service="api-gateway"} == 0
        for: 30s
        labels:
          severity: critical
          domain: platform
        annotations:
          summary: "API Gateway is down"

      - alert: ApiGatewayHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{service="api-gateway"}[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
          domain: platform
        annotations:
          summary: "API Gateway p95 latency > 1s"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 10m
        labels:
          severity: warning
          domain: platform
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.group }} lag is {{ $value }}"

      - alert: PostgresConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{state="active"} / pg_settings_max_connections > 0.85
        for: 5m
        labels:
          severity: warning
          domain: platform
        annotations:
          summary: "Postgres connection pool nearly exhausted"
