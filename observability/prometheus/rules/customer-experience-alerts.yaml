groups:
  - name: cx.alerts
    interval: 30s
    rules:
      - alert: SupportTicketBacklog
        expr: support_open_tickets{priority="high"} > 50
        for: 30m
        labels: { severity: warning, team: customer-experience }
        annotations: { summary: ">50 high-priority support tickets open" }

      - alert: LiveChatLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(livechat_message_dispatch_seconds_bucket[5m]))) > 1.5
        for: 10m
        labels: { severity: warning, team: customer-experience }
        annotations: { summary: "Live chat p95 dispatch > 1.5s" }

      - alert: ReviewModerationBacklog
        expr: review_pending_moderation_count > 5000
        for: 1h
        labels: { severity: info, team: customer-experience }
        annotations: { summary: ">5000 reviews pending moderation" }
