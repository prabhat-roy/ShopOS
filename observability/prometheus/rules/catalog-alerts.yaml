groups:
  - name: catalog.alerts
    interval: 30s
    rules:
      - alert: ProductCatalogReadLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(grpc_server_handling_seconds_bucket{namespace="catalog",app="product-catalog-service"}[5m]))) > 0.150
        for: 10m
        labels: { severity: warning, team: catalog }
        annotations: { summary: "product-catalog p95 > 150ms" }

      - alert: SearchServiceErrorBudgetBurn
        expr: |
          (1 - (sum(rate(http_requests_total{namespace="catalog",app="search-service",code!~"5.."}[1h])) / sum(rate(http_requests_total{namespace="catalog",app="search-service"}[1h])))) > 0.005
        for: 30m
        labels: { severity: warning, team: catalog }
        annotations: { summary: "Search SLO burn rate exceeds 14x" }

      - alert: InventoryNegative
        expr: min(inventory_available_units) by (sku) < 0
        for: 1m
        labels: { severity: critical, team: catalog, page: pagerduty }
        annotations: { summary: "Negative inventory observed — overselling risk" }

      - alert: ElasticsearchClusterRed
        expr: elasticsearch_cluster_health_status{color="red"} == 1
        for: 2m
        labels: { severity: critical, team: catalog, page: pagerduty }
        annotations: { summary: "Elasticsearch cluster is RED" }
