replicaCount: 1
image:
  repository: us-docker.pkg.dev/fairwinds-ops/oss/goldilocks
  tag: "v4.13.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  mountPath: /data
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 256Mi
