# Source: observability/goldilocks/goldilocks.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: goldilocks
    targetRevision: '9.0.1'
    helm:
      releaseName: goldilocks
      values: |
        controller:
          rbac:
            create: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
        dashboard:
          enabled: true
          replicaCount: 1
          service:
            type: ClusterIP
            port: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
