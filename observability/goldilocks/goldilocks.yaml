apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: goldilocks
  namespace: monitoring
spec:
  repo: https://charts.fairwinds.com/stable
  chart: goldilocks
  version: 9.0.1
  targetNamespace: monitoring
  valuesContent: |-
    controller:
      rbac:
        create: true
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi
    dashboard:
      enabled: true
      replicaCount: 1
      service:
        type: ClusterIP
        port: 80
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi
