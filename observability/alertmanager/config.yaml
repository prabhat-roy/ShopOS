global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  group_by: [alertname, domain, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true
    - match:
        severity: critical
      receiver: slack-critical
    - match:
        severity: warning
      receiver: slack-warnings
    - match:
        domain: commerce
      receiver: slack-commerce

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#alerts"
        title: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        title: ":fire: CRITICAL: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"
        send_resolved: true

  - name: slack-warnings
    slack_configs:
      - channel: "#alerts-warnings"
        send_resolved: true

  - name: slack-commerce
    slack_configs:
      - channel: "#commerce-alerts"
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, service]
