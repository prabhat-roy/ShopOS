# Fluent-bit DaemonSet — collects container logs from every node, parses JSON,
# adds Kubernetes metadata, ships to Loki (primary) + VictoriaLogs (high-volume overflow).
apiVersion: v1
kind: ServiceAccount
metadata: { name: fluent-bit, namespace: monitoring }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: fluent-bit-read }
rules:
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: fluent-bit-read }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: fluent-bit-read }
subjects: [{ kind: ServiceAccount, name: fluent-bit, namespace: monitoring }]
---
apiVersion: v1
kind: ConfigMap
metadata: { name: fluent-bit-config, namespace: monitoring }
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon         Off
        Log_Level      info
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020
        Health_Check   On
        Hot_Reload     On
        Parsers_File   parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /run/fluent-bit/state.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail    On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        Annotations         Off
        Labels              On

    [FILTER]
        Name    modify
        Match   *
        Add     cluster_name shopos-prod
        Add     cluster_region us-east-1

    [FILTER]
        Name        nest
        Match       kube.*
        Operation   lift
        Nested_under kubernetes
        Add_prefix  k8s_

    # Tier-0 logs → Loki for fast Grafana queries
    [OUTPUT]
        Name          loki
        Match         kube.var.log.containers.*_commerce_* kube.var.log.containers.*_identity_* kube.var.log.containers.*_financial_* kube.var.log.containers.*_platform_*
        Host          loki-gateway.monitoring.svc
        Port          80
        Labels        cluster=$cluster_name, namespace=$k8s_namespace_name, app=$k8s_labels_app, pod=$k8s_pod_name, container=$k8s_container_name
        Auto_Kubernetes_Labels Off
        Tenant_ID     shopos
        Line_Format   json

    # Everything else → VictoriaLogs (cheap, high volume)
    [OUTPUT]
        Name             http
        Match            *
        Host             vlogs.monitoring.svc
        Port             9428
        URI              /insert/jsonline
        Format           json_lines
        Json_date_format iso8601
        compress         gzip

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[FP]) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: fluent-bit, namespace: monitoring, labels: { app: fluent-bit } }
spec:
  selector: { matchLabels: { app: fluent-bit } }
  template:
    metadata:
      labels: { app: fluent-bit }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "2020" }
    spec:
      serviceAccountName: fluent-bit
      tolerations: [{ operator: Exists }]
      priorityClassName: system-node-critical
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.1.7
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 2020 }]
          env:
            - { name: HOST_IP, valueFrom: { fieldRef: { fieldPath: status.hostIP } } }
          resources:
            requests: { cpu: 50m, memory: 100Mi }
            limits:   { cpu: 500m, memory: 500Mi }
          volumeMounts:
            - { name: varlog,        mountPath: /var/log,        readOnly: true }
            - { name: varlibdocker,  mountPath: /var/lib/docker, readOnly: true }
            - { name: config,        mountPath: /fluent-bit/etc/ }
            - { name: state,         mountPath: /run/fluent-bit }
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      volumes:
        - { name: varlog,       hostPath: { path: /var/log } }
        - { name: varlibdocker, hostPath: { path: /var/lib/docker } }
        - { name: config,       configMap: { name: fluent-bit-config } }
        - { name: state,        emptyDir: {} }
