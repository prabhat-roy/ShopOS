  window: 30d
  indicator:
    ratio:
      errors: { metric: 'http_requests_total{namespace="shopos-web",app="storefront",code=~"5.."}' }
      total:  { metric: 'http_requests_total{namespace="shopos-web",app="storefront"}' }
