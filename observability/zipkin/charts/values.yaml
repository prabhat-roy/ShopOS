replicaCount: 1

image:
  repository: openzipkin/zipkin
  tag: "3.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9411
  targetPort: 9411

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
