# Quickwit — log search engine; Loki/ES alternative for cold logs (S3-backed indexes).
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata: { name: quickwit, namespace: monitoring }
spec:
  repo: https://helm.quickwit.io
  chart: quickwit
  version: 0.7.16
  targetNamespace: monitoring
  valuesContent: |-
    replicaCount: 3
    config:
      version: 0.7
      cluster_id: shopos-quickwit
      node_id: ${POD_NAME}
      default_index_root_uri: s3://shopos-quickwit-indexes
      metastore_uri: postgres://quickwit:${QUICKWIT_PG_PASSWORD}@postgres-primary.databases.svc:5432/quickwit
      indexer: { split_store_max_num_bytes: "200GB" }
    persistence: { enabled: true, size: 50Gi, storageClass: fast-ssd }
    serviceMonitor: { enabled: true }
