# Parca — continuous profiling alternative/complement to Pyroscope; eBPF-based whole-cluster CPU profiling.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata: { name: parca, namespace: monitoring }
spec:
  repo: https://parca-dev.github.io/helm-charts
  chart: parca
  version: 0.4.0
  targetNamespace: monitoring
  valuesContent: |-
    server:
      image: { tag: v0.22.0 }
      logLevel: info
      storage:
        objectStorage:
          enabled: true
          bucket: { name: shopos-parca-profiles, region: us-east-1 }
    persistence: { enabled: true, size: 100Gi }
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata: { name: parca-agent, namespace: monitoring }
spec:
  repo: https://parca-dev.github.io/helm-charts
  chart: parca-agent
  version: 0.4.0
  targetNamespace: monitoring
  valuesContent: |-
    image: { tag: v0.36.0 }
    args: ["--remote-store-address=parca.monitoring.svc:7070","--remote-store-insecure","--node=$(NODE_NAME)"]
    env: [{ name: NODE_NAME, valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }]
