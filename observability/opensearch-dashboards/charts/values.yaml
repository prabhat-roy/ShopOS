replicaCount: 1

image:
  repository: opensearchproject/opensearch-dashboards
  tag: "2.17.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5601
  targetPort: 5601

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
