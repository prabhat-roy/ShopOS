name: shopos_analytics
version: "1.0.0"
config-version: 2

profile: shopos

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  shopos_analytics:
    staging:
      +materialized: view
      +schema: staging
    commerce:
      +materialized: table
      +schema: analytics
    catalog:
      +materialized: table
      +schema: analytics
    financial:
      +materialized: table
      +schema: analytics
    marts:
      +materialized: table
      +schema: marts

vars:
  start_date: "2024-01-01"
  currency: "USD"
