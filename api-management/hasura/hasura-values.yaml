# Helm values override for Hasura production deployment
replicaCount: 2

image:
  repository: hasura/graphql-engine
  tag: "v2.42.0"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: hasura.shopos.internal
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

env:
  HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
  HASURA_GRAPHQL_DEV_MODE: "false"
  HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
  HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log, query-log"
