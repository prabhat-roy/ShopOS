replicaCount: 1

image:
  repository: geminabox/geminabox
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9292
  targetPort: 9292

persistence:
  enabled: true
  storageClass: """"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
