replicaCount: 1

image:
  repository: verdaccio/verdaccio
  tag: "6.0.5"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4873
  targetPort: 4873

persistence:
  enabled: true
  storageClass: """"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /verdaccio/storage

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 256Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
