replicaCount: 1

image:
  repository: sonatype/nexus3
  tag: "3.71.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

persistence:
  enabled: true
  storageClass: """"
  size: 50Gi
  accessMode: ReadWriteOnce
  mountPath: /nexus-data

resources:
  requests:
    cpu: 250m
    memory: 2Gi
  limits:
    cpu: "1"
    memory: 4Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
