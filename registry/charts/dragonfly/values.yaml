replicaCount: 1

image:
  repository: dragonflyoss/manager
  tag: "v2.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

persistence:
  enabled: true
  storageClass: ""
  size: 20Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/dragonfly

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
