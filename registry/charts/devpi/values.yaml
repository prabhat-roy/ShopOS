replicaCount: 1

image:
  repository: muccg/devpi
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3141
  targetPort: 3141

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
