replicaCount: 1

image:
  repository: cnpm/cnpmjs.org
  tag: "3.0.0-beta.37"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7001
  targetPort: 7001

persistence:
  enabled: true
  storageClass: """"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
