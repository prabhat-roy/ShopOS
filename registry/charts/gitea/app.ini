[server]
DOMAIN           = localhost
HTTP_PORT        = 3000
ROOT_URL         = http://localhost:3001/
SSH_PORT         = 22
SSH_LISTEN_PORT  = 22

[database]
DB_TYPE  = postgres
HOST     = postgres:5432
NAME     = gitea
USER     = postgres
PASSWD   = postgres

[repository]
ROOT = /data/gitea/repositories

[security]
INSTALL_LOCK   = false
SECRET_KEY     = change-me-in-production

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL     = false

[mailer]
ENABLED = false
