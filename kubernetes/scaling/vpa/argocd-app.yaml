# Source: kubernetes/scaling/vpa/vpa.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: vpa
    targetRevision: '4.5.0'
    helm:
      releaseName: vpa
      values: |
        recommender: { enabled: true, extraArgs: { recommendation-margin-fraction: "0.15" } }
        updater: { enabled: false }   # recommendation-only; do NOT auto-evict pods
        admissionController: { enabled: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: goldilocks
    targetRevision: '9.0.0'
    helm:
      releaseName: goldilocks
      values: |
        dashboard: { enabled: true, replicaCount: 2 }
        controller: { enabled: true }
  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
