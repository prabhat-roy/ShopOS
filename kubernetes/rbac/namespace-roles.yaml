# Namespace-scoped Role + RoleBinding per domain.
# Each domain team gets edit access to its own namespace only.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: domain-edit, namespace: platform }
rules:
  - { apiGroups: ["", "apps", "batch"], resources: ["*"], verbs: ["get","list","watch","create","update","patch","delete"] }
  - { apiGroups: ["networking.k8s.io"], resources: ["*"], verbs: ["get","list","watch"] }
  - { apiGroups: ["argoproj.io"], resources: ["applications","rollouts","workflows"], verbs: ["get","list","watch","update","patch"] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: team-platform-edit, namespace: platform }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: domain-edit }
subjects: [{ kind: Group, name: "shopos:team-platform", apiGroup: rbac.authorization.k8s.io }]
---
