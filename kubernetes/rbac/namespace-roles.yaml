# Namespace-scoped Roles + RoleBindings for per-domain team access
# Each domain team gets edit access to their own namespace only

{% set domains = [
  ("platform", "shopos:team-platform"),
  ("identity", "shopos:team-identity"),
  ("catalog", "shopos:team-catalog"),
  ("commerce", "shopos:team-commerce"),
  ("supply-chain", "shopos:team-supply-chain"),
  ("financial", "shopos:team-financial"),
  ("customer-experience", "shopos:team-customer-experience"),
  ("communications", "shopos:team-communications"),
  ("content", "shopos:team-content"),
  ("analytics-ai", "shopos:team-analytics-ai"),
  ("b2b", "shopos:team-b2b"),
  ("integrations", "shopos:team-integrations"),
  ("affiliate", "shopos:team-affiliate"),
  ("marketplace", "shopos:team-marketplace"),
  ("gamification", "shopos:team-gamification"),
  ("developer-platform", "shopos:team-developer-platform"),
  ("compliance", "shopos:team-compliance"),
  ("sustainability", "shopos:team-sustainability"),
  ("shopos-web", "shopos:team-web"),
] %}
---
# platform team
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-edit
  namespace: platform
subjects:
  - kind: Group
    name: "shopos:team-platform"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
---
