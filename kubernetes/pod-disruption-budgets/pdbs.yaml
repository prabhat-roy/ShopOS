# PodDisruptionBudgets — generated for every business-critical service.
# Convention: minAvailable: 2 for tier-0/tier-1 services with HPA replicas >= 3,
#             maxUnavailable: 25% for everything else (so cluster drains can proceed).
# A Kyverno mutation policy auto-applies maxUnavailable: 25% to any Deployment without an explicit PDB.

# === platform (tier-0) ===
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api-gateway-pdb, namespace: platform }
spec: { minAvailable: 2, selector: { matchLabels: { app: api-gateway } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: web-bff-pdb, namespace: platform }
spec: { minAvailable: 2, selector: { matchLabels: { app: web-bff } } }
