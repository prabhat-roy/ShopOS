apiVersion: v1
kind: ResourceQuota
metadata:
  name: commerce-quota
  namespace: commerce
spec:
  hard:
    requests.cpu: "40"
    requests.memory: 80Gi
    limits.cpu: "80"
    limits.memory: 160Gi
    pods: "200"
    services: "50"
    persistentvolumeclaims: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: analytics-quota
  namespace: analytics-ai
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 60Gi
    limits.cpu: "40"
    limits.memory: 120Gi
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: commerce-limits
  namespace: commerce
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: "8"
        memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: catalog
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
