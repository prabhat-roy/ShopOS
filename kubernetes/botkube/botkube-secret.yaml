## Botkube Slack credentials
## DO NOT commit real values — populate via Vault/ESO or CI secret injection.
## The SLACK_BOT_TOKEN is the Bot OAuth token (xoxb-...).
## The SLACK_APP_TOKEN is the App-level token with connections:write scope (xapp-...).
apiVersion: v1
kind: Secret
metadata:
  name: botkube-slack
  namespace: botkube
  labels:
    app.kubernetes.io/name: botkube
    app.kubernetes.io/part-of: shopos
    team: platform
  annotations:
    # Managed by External Secrets Operator — do not edit manually.
    # Source: vault/secret/shopos/botkube/slack
    secret.k8s.io/managed-by: external-secrets
type: Opaque
stringData:
  ## Slack Bot OAuth token — xoxb-...
  ## Obtained from https://api.slack.com/apps → OAuth & Permissions → Bot User OAuth Token
  SLACK_BOT_TOKEN: "REPLACE_WITH_SLACK_BOT_TOKEN"

  ## Slack App-level token — xapp-...
  ## Obtained from https://api.slack.com/apps → Basic Information → App-Level Tokens
  ## Required scope: connections:write (for Socket Mode)
  SLACK_APP_TOKEN: "REPLACE_WITH_SLACK_APP_TOKEN"
