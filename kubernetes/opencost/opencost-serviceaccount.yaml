## OpenCost ServiceAccount, ClusterRole, and ClusterRoleBinding
## OpenCost needs cluster-wide read access to pods, nodes, PVs, and namespaces
## to calculate per-workload cost allocations.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opencost
  namespace: opencost
  labels:
    app.kubernetes.io/name: opencost
    app.kubernetes.io/part-of: shopos
    team: platform
    env: production
  annotations:
    # Annotate for IRSA (AWS) or Workload Identity (GCP) if cloud pricing APIs are used
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/opencost
    # iam.gke.io/gcp-service-account: opencost@PROJECT_ID.iam.gserviceaccount.com
    description: "ServiceAccount for OpenCost cost exporter"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opencost
  labels:
    app.kubernetes.io/name: opencost
    app.kubernetes.io/part-of: shopos
    team: platform
    env: production
rules:
  # Core resource reads — required for cost allocation
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
      - configmaps
      - serviceaccounts
    verbs:
      - get
      - list
      - watch

  # Deployment / StatefulSet / DaemonSet reads — needed for workload-level allocation
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  # Batch workload reads — Jobs and CronJobs
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch

  # HPA reads — for scaling cost estimation
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch

  # Policy reads
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch

  # Storage reads — for PV cost attribution
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch

  # Node metrics — for actual utilisation data
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
      - watch

  # Argo Rollouts — if used for canary deployments
  - apiGroups: ["argoproj.io"]
    resources:
      - rollouts
    verbs:
      - get
      - list
      - watch

  # KEDA ScaledObjects — for event-driven autoscaling cost estimation
  - apiGroups: ["keda.sh"]
    resources:
      - scaledobjects
      - scaledjobs
    verbs:
      - get
      - list
      - watch

  # Events — for audit and anomaly detection
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opencost
  labels:
    app.kubernetes.io/name: opencost
    app.kubernetes.io/part-of: shopos
    team: platform
    env: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opencost
subjects:
  - kind: ServiceAccount
    name: opencost
    namespace: opencost
