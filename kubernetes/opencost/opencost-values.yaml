## OpenCost Helm Chart Values
## Chart: opencost/opencost
## Docs: https://www.opencost.io/docs/installation/helm

# ──────────────────────────────────────────────────────────────────────────────
# OpenCost application configuration
# ──────────────────────────────────────────────────────────────────────────────
opencost:
  # -- Exporter — cost data collection
  exporter:
    # Cluster identifier shown in all cost data
    defaultClusterId: shopos-cluster

    # Cloud provider API key — leave blank for on-prem/self-hosted
    cloudProviderApiKey: ""

    # Cloud provider: aws | gcp | azure | custom | ""
    cloudProvider: ""

    # Currency for cost display
    currencyCode: USD

    image:
      repository: ghcr.io/opencost/opencost
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/opencost/opencost
      tag: "1.111.0"

    # Extra environment variables
    extraEnv:
      PROMETHEUS_SERVER_ENDPOINT: http://prometheus-server.monitoring.svc.cluster.local:80
      CLOUD_PROVIDER_API_KEY: ""
      # Log level: trace | debug | info | warn | error
      LOG_LEVEL: info
      # Emit cost data to stdout as JSON
      LOG_FORMAT: JSON
      # Disable TLS verification for internal Prometheus
      INSECURE_SKIP_VERIFY: "false"
      # Data retention in days for the cost model store
      ASSET_CACHE_DURATION: "2h"

    resources:
      requests:
        cpu: 10m
        memory: 55Mi
      limits:
        cpu: 999m
        memory: 1Gi

    # Liveness and readiness probes
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
    readinessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3

    # Persistence for cost model data
    persistence:
      enabled: true
      storageClassName: standard-rwo
      accessModes:
        - ReadWriteOnce
      size: 32Gi

    # Pod labels
    podLabels:
      app.kubernetes.io/part-of: shopos
      team: platform

    # Annotations for Prometheus scraping
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9003"
      prometheus.io/path: /metrics

  # -- Prometheus configuration
  prometheus:
    # Use the existing in-cluster Prometheus (monitoring namespace)
    internal:
      enabled: false
      serviceName: prometheus-server
      namespaceName: monitoring
      port: 80

    # Point to the existing Prometheus stack
    external:
      enabled: true
      url: http://prometheus-server.monitoring.svc.cluster.local:80

    # Thanos sidecar endpoint (if Thanos is used for long-term storage)
    thanos:
      enabled: false
      queryOffset: "3h"

  # -- UI
  ui:
    enabled: true
    image:
      repository: ghcr.io/opencost/opencost-ui
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/opencost/opencost-ui
      tag: "1.111.0"

    service:
      type: ClusterIP
      port: 9090
      targetPort: 9090
      annotations: {}

    resources:
      requests:
        cpu: 10m
        memory: 55Mi
      limits:
        cpu: 100m
        memory: 256Mi

    ingress:
      enabled: false
      # Enable when Traefik/Istio ingress is set up:
      # className: traefik
      # hosts:
      #   - host: opencost.shopos.internal
      #     paths:
      #       - path: /
      #         pathType: Prefix

  # -- Grafana integration
  grafana:
    enabled: false
    # After deploying, import the OpenCost Grafana dashboard:
    # https://grafana.com/grafana/dashboards/20832
    datasource:
      enabled: false

  # -- Sigstore/SLSA provenance metrics (future)
  sigstore:
    enabled: false

# -- Service monitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 60s
  scrapeTimeout: 10s
  labels:
    release: prometheus

# -- Service account (created by opencost-serviceaccount.yaml)
serviceAccount:
  create: false
  name: opencost

# -- Common labels
commonLabels:
  app.kubernetes.io/part-of: shopos
  env: production
  team: platform
