apiVersion: v1
kind: ConfigMap
metadata:
  name: return-refund-service
  namespace: commerce
  labels:
    app: return-refund-service
    domain: commerce
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: return-refund-service
  SERVICE_DOMAIN: commerce
  GRPC_PORT: "50089"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50089"
  OTEL_SERVICE_NAME: return-refund-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
