apiVersion: v1
kind: ConfigMap
metadata:
  name: social-commerce-service
  namespace: integrations
  labels:
    app: social-commerce-service
    domain: integrations
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: social-commerce-service
  SERVICE_DOMAIN: integrations
  GRPC_PORT: "50171"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50171"
  OTEL_SERVICE_NAME: social-commerce-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
