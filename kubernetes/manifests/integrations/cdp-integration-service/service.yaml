apiVersion: v1
kind: Service
metadata:
  name: cdp-integration-service
  namespace: integrations
  labels:
    app: cdp-integration-service
    domain: integrations
spec:
  selector:
    app: cdp-integration-service
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
