apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-integration
  namespace: integrations
  labels:
    app: payment-gateway-integration
    domain: integrations
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway-integration
  template:
    metadata:
      labels:
        app: payment-gateway-integration
        domain: integrations
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50173"
    spec:
      serviceAccountName: payment-gateway-integration
      terminationGracePeriodSeconds: 30
      containers:
        - name: payment-gateway-integration
          image: shopos/payment-gateway-integration:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50173
              protocol: TCP
          envFrom:
            - configMapRef:
                name: payment-gateway-integration
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 50173
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50173
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: payment-gateway-integration
