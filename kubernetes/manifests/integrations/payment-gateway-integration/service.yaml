apiVersion: v1
kind: Service
metadata:
  name: payment-gateway-integration
  namespace: integrations
  labels:
    app: payment-gateway-integration
    domain: integrations
spec:
  selector:
    app: payment-gateway-integration
  type: ClusterIP
  ports:
    - name: grpc
      port: 50173
      targetPort: grpc
      protocol: TCP
