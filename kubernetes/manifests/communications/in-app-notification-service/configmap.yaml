apiVersion: v1
kind: ConfigMap
metadata:
  name: in-app-notification-service
  namespace: communications
  labels:
    app: in-app-notification-service
    domain: communications
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: in-app-notification-service
  SERVICE_DOMAIN: communications
  GRPC_PORT: "50132"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50132"
  OTEL_SERVICE_NAME: in-app-notification-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
