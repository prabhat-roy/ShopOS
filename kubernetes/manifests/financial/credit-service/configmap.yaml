apiVersion: v1
kind: ConfigMap
metadata:
  name: credit-service
  namespace: financial
  labels:
    app: credit-service
    domain: financial
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: credit-service
  SERVICE_DOMAIN: financial
  GRPC_PORT: "50115"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50115"
  OTEL_SERVICE_NAME: credit-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
