apiVersion: v1
kind: Service
metadata:
  name: supplier-rating-service
  namespace: supply-chain
  labels:
    app: supplier-rating-service
    domain: supply-chain
spec:
  selector:
    app: supplier-rating-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50194
      targetPort: grpc
      protocol: TCP
