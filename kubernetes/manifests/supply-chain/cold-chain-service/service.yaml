apiVersion: v1
kind: Service
metadata:
  name: cold-chain-service
  namespace: supply-chain
  labels:
    app: cold-chain-service
    domain: supply-chain
spec:
  selector:
    app: cold-chain-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50193
      targetPort: grpc
      protocol: TCP
