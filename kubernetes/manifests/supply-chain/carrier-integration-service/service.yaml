apiVersion: v1
kind: Service
metadata:
  name: carrier-integration-service
  namespace: supply-chain
  labels:
    app: carrier-integration-service
    domain: supply-chain
spec:
  selector:
    app: carrier-integration-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50106
      targetPort: grpc
      protocol: TCP
