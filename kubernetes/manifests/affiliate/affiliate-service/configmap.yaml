apiVersion: v1
kind: ConfigMap
metadata:
  name: affiliate-service
  namespace: affiliate
  labels:
    app: affiliate-service
    domain: affiliate
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: affiliate-service
  SERVICE_DOMAIN: affiliate
  GRPC_PORT: "50200"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50200"
  OTEL_SERVICE_NAME: affiliate-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
