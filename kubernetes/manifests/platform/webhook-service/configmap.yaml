apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-service
  namespace: platform
  labels:
    app: webhook-service
    domain: platform
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: webhook-service
  SERVICE_DOMAIN: platform
  HTTP_PORT: "8091"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8091"
  OTEL_SERVICE_NAME: webhook-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
