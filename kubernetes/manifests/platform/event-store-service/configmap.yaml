apiVersion: v1
kind: ConfigMap
metadata:
  name: event-store-service
  namespace: platform
  labels:
    app: event-store-service
    domain: platform
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: event-store-service
  SERVICE_DOMAIN: platform
  GRPC_PORT: "50055"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50055"
  OTEL_SERVICE_NAME: event-store-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
