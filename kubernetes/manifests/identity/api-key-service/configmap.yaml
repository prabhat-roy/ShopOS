apiVersion: v1
kind: ConfigMap
metadata:
  name: api-key-service
  namespace: identity
  labels:
    app: api-key-service
    domain: identity
data:
  APP_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  SERVICE_NAME: api-key-service
  SERVICE_DOMAIN: identity
  GRPC_PORT: "50066"
  METRICS_PORT: "9090"
  HEALTH_PORT: "50066"
  OTEL_SERVICE_NAME: api-key-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4317
  KAFKA_BROKERS: kafka.infra:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.infra:8081
