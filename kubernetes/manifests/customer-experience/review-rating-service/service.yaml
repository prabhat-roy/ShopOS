apiVersion: v1
kind: Service
metadata:
  name: review-rating-service
  namespace: customer-experience
  labels:
    app: review-rating-service
    domain: customer-experience
spec:
  selector:
    app: review-rating-service
  type: ClusterIP
  ports:
    - name: grpc
      port: 50120
      targetPort: grpc
      protocol: TCP
