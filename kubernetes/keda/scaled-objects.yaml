apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-service-kafka-scaler
  namespace: commerce
spec:
  scaleTargetRef:
    name: order-service
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.infra:9092
        consumerGroup: order-service
        topic: commerce.order.placed
        lagThreshold: "100"
        offsetResetPolicy: latest
---
