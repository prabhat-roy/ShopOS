apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-job-queue-redis-scaler
  namespace: platform
spec:
  scaleTargetRef:
    name: worker-job-queue
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
