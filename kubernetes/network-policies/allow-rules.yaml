# Domain-specific allow policies — applied on top of default-deny baseline.
# Pattern: each domain may always (a) talk intra-namespace, (b) be reached by ingress gateway,
# (c) reach databases/messaging in infra namespaces. Cross-domain ingress is named explicitly.

# ----- Allow ingress from istio-ingress to BFFs / gateway -----
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-from-ingress, namespace: platform }
spec:
  podSelector: { matchLabels: { tier: edge } }
  policyTypes: [Ingress]
  ingress:
    - from: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } } }]

# ----- Intra-namespace allow + outbound to data tier (templated per domain) -----
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-intra-and-data, namespace: platform }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ podSelector: {} }]
  egress:
    - to: [{ podSelector: {} }]
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: databases } } }]
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: streaming } } }]
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: infra } } }]   # Vault, Consul
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: monitoring } } }]
---
