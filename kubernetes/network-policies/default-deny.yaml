# Baseline default-deny + DNS egress for every business namespace.
# Per-domain allow rules live in allow-rules.yaml.
{{- /* Pure YAML — no template engine; this file is literal. */}}

# === default-deny + DNS-only egress applied to every domain namespace ===
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-all, namespace: platform }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  egress:
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } } }]
      ports: [{ port: 53, protocol: UDP }, { port: 53, protocol: TCP }]
