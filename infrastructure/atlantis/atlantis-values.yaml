# Helm values override for Atlantis production deployment
replicaCount: 1

image:
  repository: ghcr.io/runatlantis/atlantis
  tag: "v0.30.0"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: atlantis.shopos.internal
      paths:
        - path: /
          pathType: Prefix

storage:
  size: 5Gi
  storageClass: standard

config:
  repoAllowlist: "github.com/shopos/*"
  logLevel: "info"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
