apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: payment-resilience-workflow
  namespace: litmus
  labels:
    app.kubernetes.io/part-of: shopos-chaos
    chaos.shopos.io/domain: commerce
    subject: payment-resilience_litmus
spec:
  entrypoint: argowf-chaos
  serviceAccountName: argo-chaos
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
  arguments:
    parameters:
      - name: adminModeNamespace
        value: litmus
  templates:
    - name: argowf-chaos
      steps:
        - - name: install-application
            template: install-application
        - - name: install-chaos-experiments
            template: install-chaos-experiments
        - - name: pod-delete
            template: pod-delete
          - name: network-chaos
            template: network-chaos
        - - name: revert-chaos
            template: revert-chaos
        - - name: uninstall-application
            template: uninstall-application

    - name: install-application
      container:
        image: litmuschaos/litmus-checker:latest
        command: [sh, -c]
        args:
          - kubectl apply -f /var/run/chaos/commerce-test-app.yaml -n commerce 2>/dev/null || true;
            sleep 10

    - name: install-chaos-experiments
      container:
        image: litmuschaos/k8s:latest
        command: [sh, -c]
        args:
          - kubectl apply -f https://hub.litmuschaos.io/api/chaos/3.0.0?file=charts/generic/pod-delete/experiment.yaml -n litmus || true;
            kubectl apply -f https://hub.litmuschaos.io/api/chaos/3.0.0?file=charts/generic/pod-network-loss/experiment.yaml -n litmus || true;
            sleep 5

    - name: pod-delete
      inputs:
        artifacts:
          - name: pod-delete
            path: /tmp/chaosengine-pod-delete.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                kind: ChaosEngine
                metadata:
                  name: payment-pod-delete
                  namespace: commerce
                spec:
                  appinfo:
                    appns: commerce
                    applabel: app.kubernetes.io/name=payment-service
                    appkind: deployment
                  engineState: active
                  chaosServiceAccount: litmus-admin
                  experiments:
                    - name: pod-delete
                      spec:
                        components:
                          env:
                            - name: TOTAL_CHAOS_DURATION
                              value: "60"
                            - name: CHAOS_INTERVAL
                              value: "20"
                            - name: FORCE
                              value: "false"
                            - name: PODS_AFFECTED_PERC
                              value: "100"
      container:
        image: litmuschaos/litmus-checker:latest
        command: [sh, -c]
        args:
          - kubectl apply -f /tmp/chaosengine-pod-delete.yaml -n commerce;
            ./healthcheck -file=/home/litmus/monitor --timeout 3m

    - name: network-chaos
      inputs:
        artifacts:
          - name: network-chaos
            path: /tmp/chaosengine-network.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                kind: ChaosEngine
                metadata:
                  name: payment-network-loss
                  namespace: commerce
                spec:
                  appinfo:
                    appns: commerce
                    applabel: app.kubernetes.io/name=payment-service
                    appkind: deployment
                  engineState: active
                  chaosServiceAccount: litmus-admin
                  experiments:
                    - name: pod-network-loss
                      spec:
                        components:
                          env:
                            - name: TOTAL_CHAOS_DURATION
                              value: "60"
                            - name: NETWORK_INTERFACE
                              value: eth0
                            - name: NETWORK_PACKET_LOSS_PERCENTAGE
                              value: "20"
                            - name: PODS_AFFECTED_PERC
                              value: "50"
      container:
        image: litmuschaos/litmus-checker:latest
        command: [sh, -c]
        args:
          - kubectl apply -f /tmp/chaosengine-network.yaml -n commerce;
            ./healthcheck -file=/home/litmus/monitor --timeout 3m

    - name: revert-chaos
      container:
        image: litmuschaos/k8s:latest
        command: [sh, -c]
        args:
          - kubectl delete chaosengine payment-pod-delete -n commerce --ignore-not-found;
            kubectl delete chaosengine payment-network-loss -n commerce --ignore-not-found;
            sleep 5

    - name: uninstall-application
      container:
        image: litmuschaos/k8s:latest
        command: [sh, -c]
        args:
          - echo "Workflow complete"
