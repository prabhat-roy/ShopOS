apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kafka-broker-pod-kill
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/part-of: shopos-chaos
    chaos.shopos.io/tier: messaging
spec:
  action: pod-kill
  mode: fixed-percent
  value: "33"
  selector:
    namespaces:
      - messaging
    labelSelectors:
      app.kubernetes.io/name: kafka
  gracePeriod: 0
  duration: 3m
