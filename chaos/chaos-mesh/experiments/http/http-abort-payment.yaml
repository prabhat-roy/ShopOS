apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: http-abort-payment-provider
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/part-of: shopos-chaos
    chaos.shopos.io/tier: commerce
spec:
  mode: all
  selector:
    namespaces:
      - commerce
    labelSelectors:
      app.kubernetes.io/name: payment-service
  target: Request
  port: 8080
  path: /api/v1/charge*
  method: POST
  abort: true
  percent: 30
  duration: 3m
