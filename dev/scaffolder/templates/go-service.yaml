# Backstage Software Template — generates a new Go service with the standard ShopOS layout.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: shopos-go-service
  title: Create a new Go service
  description: Scaffolds a Go microservice with Dockerfile, Helm chart, CI Jenkinsfile, ArgoCD app
  tags: [go, recommended]
spec:
  owner: platform-team
  type: service
  parameters:
    - title: Identity
      required: [name, domain, port]
      properties:
        name:
          type: string
          title: Service name (kebab-case)
          pattern: "^[a-z][a-z0-9-]+-service$"
        domain:
          type: string
          enum: [platform, identity, catalog, commerce, supply-chain, financial, customer-experience,
                 communications, content, analytics-ai, b2b, integrations, affiliate, marketplace,
                 gamification, developer-platform, compliance, sustainability, events-ticketing,
                 auction, rental]
        port:
          type: integer
          minimum: 50000
          maximum: 60000
        owner:
          type: string
          ui:field: OwnerPicker
  steps:
    - id: fetch
      name: Fetch base
      action: fetch:template
      input:
        url: ./skeleton
        values: { name: "${{ parameters.name }}", domain: "${{ parameters.domain }}", port: "${{ parameters.port }}" }
    - id: publish
      name: Open PR
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=prabhat-roy&repo=ShopOS
        branchName: scaffold/${{ parameters.name }}
        title: "feat: scaffold ${{ parameters.name }}"
        description: "Auto-generated by Backstage scaffolder"
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/src/${{ parameters.domain }}/${{ parameters.name }}/catalog-info.yaml'
