syntax = "proto3";
package content.document.v1;
option go_package = "github.com/shopos/proto/content/document/v1;documentv1";

import "google/protobuf/timestamp.proto";

service DocumentService {
  rpc UploadDocument(UploadDocumentRequest) returns (UploadDocumentResponse);
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);
}

message Document {
  string id = 1;
  string name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string entity_type = 5;
  string entity_id = 6;
  string object_key = 7;
  string uploaded_by = 8;
  map<string, string> metadata = 9;
  google.protobuf.Timestamp created_at = 10;
}

message UploadDocumentRequest {
  string name = 1;
  string content_type = 2;
  bytes data = 3;
  string entity_type = 4;
  string entity_id = 5;
  map<string, string> metadata = 6;
  string uploaded_by = 7;
}

message UploadDocumentResponse { Document document = 1; }
message GetDocumentRequest { string id = 1; }
message GetDocumentResponse { Document document = 1; }
message DeleteDocumentRequest { string id = 1; }
message DeleteDocumentResponse { bool success = 1; }

message ListDocumentsRequest {
  string entity_type = 1;
  string entity_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
  int32 total = 2;
}

message GetDownloadURLRequest {
  string id = 1;
  int32 expires_in_seconds = 2;
}

message GetDownloadURLResponse {
  string download_url = 1;
  google.protobuf.Timestamp expires_at = 2;
}
