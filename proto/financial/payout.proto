syntax = "proto3";
package financial.payout.v1;
option go_package = "github.com/shopos/proto/financial/payout/v1;payoutv1";

import "google/protobuf/timestamp.proto";

service PayoutService {
  rpc CreatePayout(CreatePayoutRequest)   returns (CreatePayoutResponse);
  rpc GetPayout(GetPayoutRequest)         returns (GetPayoutResponse);
  rpc ProcessPayout(ProcessPayoutRequest) returns (ProcessPayoutResponse);
  rpc ListPayouts(ListPayoutsRequest)     returns (ListPayoutsResponse);
  rpc CancelPayout(CancelPayoutRequest)   returns (CancelPayoutResponse);
}

enum PayoutStatus {
  PAYOUT_STATUS_UNSPECIFIED = 0;
  PAYOUT_STATUS_PENDING     = 1;
  PAYOUT_STATUS_PROCESSING  = 2;
  PAYOUT_STATUS_COMPLETED   = 3;
  PAYOUT_STATUS_FAILED      = 4;
  PAYOUT_STATUS_CANCELLED   = 5;
}

message Payout {
  string       id            = 1;
  string       vendor_id     = 2;
  string       amount        = 3;
  string       currency      = 4;
  PayoutStatus status        = 5;
  string       reference     = 6;
  string       bank_account  = 7;
  string       error_message = 8;
  google.protobuf.Timestamp scheduled_at = 9;
  google.protobuf.Timestamp processed_at = 10;
  google.protobuf.Timestamp created_at   = 11;
}

message CreatePayoutRequest   { string vendor_id = 1; string amount = 2; string currency = 3; string bank_account = 4; google.protobuf.Timestamp scheduled_at = 5; }
message CreatePayoutResponse  { Payout payout = 1; }
message GetPayoutRequest      { string id = 1; }
message GetPayoutResponse     { Payout payout = 1; }
message ProcessPayoutRequest  { string id = 1; }
message ProcessPayoutResponse { Payout payout = 1; }
message ListPayoutsRequest    { string vendor_id = 1; PayoutStatus status = 2; int32 page = 3; int32 page_size = 4; }
message ListPayoutsResponse   { repeated Payout payouts = 1; int32 total = 2; }
message CancelPayoutRequest   { string id = 1; string reason = 2; }
message CancelPayoutResponse  { Payout payout = 1; }
