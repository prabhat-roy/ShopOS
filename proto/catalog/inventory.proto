syntax = "proto3";

package catalog;

option go_package = "github.com/shopos/proto/catalog";

// ---------------------------------------------------------------------------
// Core domain messages
// ---------------------------------------------------------------------------

// InventoryItem tracks stock levels for a single SKU at a single warehouse.
message InventoryItem {
  // UUID of the parent product
  string product_id   = 1;
  // Stock-keeping unit identifier
  string sku          = 2;
  // Total units on hand (physical count)
  int32  quantity     = 3;
  // Units locked by pending orders but not yet shipped
  int32  reserved     = 4;
  // quantity - reserved; read-only derived field
  int32  available    = 5;
  // UUID of the warehouse holding this stock
  string warehouse_id = 6;
}

// ---------------------------------------------------------------------------
// Request / response messages
// ---------------------------------------------------------------------------

message GetInventoryRequest {
  string product_id = 1;
  string sku        = 2;
  // Optional: scope to a specific warehouse; empty = aggregate across all
  string warehouse_id = 3;
}

message ReserveRequest {
  string product_id = 1;
  string sku        = 2;
  // How many units to reserve
  int32  quantity   = 3;
  // The order that is requesting the reservation
  string order_id   = 4;
}

message ReserveResponse {
  bool   success        = 1;
  // UUID of the created reservation record (used to release later)
  string reservation_id = 2;
  // Units still available after this reservation
  int32  available      = 3;
  // Human-readable reason when success = false
  string message        = 4;
}

message ReleaseRequest {
  // The reservation UUID returned by ReserveStock
  string reservation_id = 1;
}

message ReleaseResponse {
  bool   success = 1;
  string message = 2;
}

message UpdateStockRequest {
  string product_id   = 1;
  string sku          = 2;
  string warehouse_id = 3;
  // Absolute quantity to set (not a delta)
  int32  quantity     = 4;
}

message ListLowStockRequest {
  // Items with available <= threshold are returned; default threshold is 5
  int32  threshold  = 1;
  string warehouse_id = 2;
  int32  page       = 3;
  int32  page_size  = 4;
}

message ListLowStockResponse {
  repeated InventoryItem items       = 1;
  int32                  page        = 2;
  int32                  page_size   = 3;
  int32                  total       = 4;
  int32                  total_pages = 5;
}

// ---------------------------------------------------------------------------
// InventoryService — inventory-service (Go / Postgres, port 50074)
// ---------------------------------------------------------------------------
service InventoryService {
  // Get current stock levels for a product/SKU
  rpc GetInventory(GetInventoryRequest) returns (InventoryItem);

  // Atomically reserve stock for an order; fails if insufficient available
  rpc ReserveStock(ReserveRequest) returns (ReserveResponse);

  // Release a previously created reservation (cancellation / fulfillment)
  rpc ReleaseReservation(ReleaseRequest) returns (ReleaseResponse);

  // Set absolute stock quantity (used by warehouse reconciliation jobs)
  rpc UpdateStock(UpdateStockRequest) returns (InventoryItem);

  // List items whose available quantity is at or below the given threshold
  rpc ListLowStock(ListLowStockRequest) returns (ListLowStockResponse);
}
