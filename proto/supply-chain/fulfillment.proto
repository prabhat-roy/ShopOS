syntax = "proto3";

package supplychain;

import "common/common.proto";

option go_package = "github.com/shopos/proto/supplychain";

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

enum FulfillmentStatus {
  FULFILLMENT_STATUS_UNSPECIFIED    = 0;
  FULFILLMENT_STATUS_PENDING        = 1;
  FULFILLMENT_STATUS_PICKING        = 2;
  FULFILLMENT_STATUS_PACKING        = 3;
  FULFILLMENT_STATUS_READY_TO_SHIP  = 4;
  FULFILLMENT_STATUS_SHIPPED        = 5;
  FULFILLMENT_STATUS_DELIVERED      = 6;
  FULFILLMENT_STATUS_CANCELLED      = 7;
  FULFILLMENT_STATUS_EXCEPTION      = 8;
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message FulfillmentItem {
  string product_id  = 1;
  string sku         = 2;
  int32  quantity    = 3;
  int32  picked_qty  = 4;
}

message FulfillmentOrder {
  string                   id              = 1;
  string                   order_id        = 2;
  string                   warehouse_id    = 3;
  FulfillmentStatus        status          = 4;
  repeated FulfillmentItem items           = 5;
  string                   tracking_number = 6;
  string                   carrier         = 7;
  Timestamp                created_at      = 8;
}

message CreateFulfillmentRequest {
  string                   order_id     = 1;
  string                   warehouse_id = 2;
  repeated FulfillmentItem items        = 3;
}

message GetFulfillmentRequest {
  string fulfillment_id = 1;
}

message StartPickingRequest {
  string fulfillment_id = 1;
}

message StartPackingRequest {
  string fulfillment_id = 1;
}

message MarkReadyToShipRequest {
  string fulfillment_id = 1;
}

message ShipFulfillmentRequest {
  string fulfillment_id   = 1;
  string tracking_number  = 2;
  string carrier          = 3;
}

message DeliverFulfillmentRequest {
  string fulfillment_id = 1;
}

message CancelFulfillmentRequest {
  string fulfillment_id = 1;
  string reason         = 2;
}

message ListFulfillmentsRequest {
  string            order_id = 1;
  FulfillmentStatus status   = 2;
  int32             page     = 3;
  int32             page_size = 4;
}

message ListFulfillmentsResponse {
  repeated FulfillmentOrder fulfillments = 1;
  Pagination                pagination   = 2;
}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service FulfillmentService {
  // Create a fulfillment order and assign it to a warehouse.
  rpc CreateFulfillment(CreateFulfillmentRequest) returns (FulfillmentOrder);

  // Fetch a fulfillment order by its ID.
  rpc GetFulfillment(GetFulfillmentRequest) returns (FulfillmentOrder);

  // Transition a fulfillment to PICKING state.
  rpc StartPicking(StartPickingRequest) returns (FulfillmentOrder);

  // Transition a fulfillment to PACKING state (all items have been picked).
  rpc StartPacking(StartPackingRequest) returns (FulfillmentOrder);

  // Mark a fulfillment as READY_TO_SHIP (packed and awaiting carrier pickup).
  rpc MarkReadyToShip(MarkReadyToShipRequest) returns (FulfillmentOrder);

  // Record that a carrier has collected the parcel; attach tracking details.
  rpc Ship(ShipFulfillmentRequest) returns (FulfillmentOrder);

  // Mark the fulfillment as delivered.
  rpc Deliver(DeliverFulfillmentRequest) returns (FulfillmentOrder);

  // Cancel a fulfillment (only allowed before SHIPPED).
  rpc Cancel(CancelFulfillmentRequest) returns (FulfillmentOrder);

  // List fulfillments with optional order/status filters and pagination.
  rpc ListFulfillments(ListFulfillmentsRequest) returns (ListFulfillmentsResponse);
}
