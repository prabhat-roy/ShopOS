syntax = "proto3";
package communications.template.v1;
option go_package = "github.com/shopos/proto/communications/template/v1;templatev1";

import "google/protobuf/timestamp.proto";

service TemplateService {
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse);
}

message Template {
  string id = 1;
  string name = 2;
  string slug = 3;
  string channel = 4;
  string locale = 5;
  string subject = 6;
  string body_html = 7;
  string body_text = 8;
  repeated string variables = 9;
  bool active = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message CreateTemplateRequest {
  string name = 1;
  string slug = 2;
  string channel = 3;
  string locale = 4;
  string subject = 5;
  string body_html = 6;
  string body_text = 7;
}

message CreateTemplateResponse { Template template = 1; }
message GetTemplateRequest { string id = 1; }
message GetTemplateResponse { Template template = 1; }

message UpdateTemplateRequest {
  string id = 1;
  string subject = 2;
  string body_html = 3;
  string body_text = 4;
  bool active = 5;
}

message UpdateTemplateResponse { Template template = 1; }
message DeleteTemplateRequest { string id = 1; }
message DeleteTemplateResponse { bool success = 1; }

message ListTemplatesRequest {
  string channel = 1;
  string locale = 2;
  bool active_only = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListTemplatesResponse {
  repeated Template templates = 1;
  int32 total = 2;
}

message RenderTemplateRequest {
  string id = 1;
  map<string, string> variables = 2;
}

message RenderTemplateResponse {
  string subject = 1;
  string body_html = 2;
  string body_text = 3;
}
