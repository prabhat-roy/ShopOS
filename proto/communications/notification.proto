syntax = "proto3";
package communications.notification.v1;
option go_package = "github.com/shopos/proto/communications/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
  rpc GetDeliveryStatus(GetDeliveryStatusRequest) returns (GetDeliveryStatusResponse);
}

enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  NOTIFICATION_CHANNEL_EMAIL = 1;
  NOTIFICATION_CHANNEL_SMS = 2;
  NOTIFICATION_CHANNEL_PUSH = 3;
  NOTIFICATION_CHANNEL_IN_APP = 4;
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  NOTIFICATION_STATUS_PENDING = 1;
  NOTIFICATION_STATUS_SENT = 2;
  NOTIFICATION_STATUS_DELIVERED = 3;
  NOTIFICATION_STATUS_FAILED = 4;
  NOTIFICATION_STATUS_READ = 5;
}

message Notification {
  string id = 1;
  string user_id = 2;
  string template_id = 3;
  NotificationChannel channel = 4;
  NotificationStatus status = 5;
  string subject = 6;
  string body = 7;
  map<string, string> metadata = 8;
  google.protobuf.Timestamp sent_at = 9;
  google.protobuf.Timestamp read_at = 10;
  google.protobuf.Timestamp created_at = 11;
}

message SendNotificationRequest {
  string user_id = 1;
  string template_id = 2;
  repeated NotificationChannel channels = 3;
  map<string, string> variables = 4;
  map<string, string> metadata = 5;
}

message SendNotificationResponse {
  repeated string notification_ids = 1;
}

message GetNotificationRequest { string id = 1; }
message GetNotificationResponse { Notification notification = 1; }

message ListNotificationsRequest {
  string user_id = 1;
  NotificationChannel channel = 2;
  NotificationStatus status = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
}

message MarkAsReadRequest { string id = 1; }
message MarkAsReadResponse { bool success = 1; }

message GetDeliveryStatusRequest { string notification_id = 1; }
message GetDeliveryStatusResponse {
  string notification_id = 1;
  NotificationStatus status = 2;
  string error_message = 3;
  google.protobuf.Timestamp updated_at = 4;
}
