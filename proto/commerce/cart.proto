syntax = "proto3";

package commerce;

import "common/common.proto";

option go_package = "github.com/shopos/proto/commerce";

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message CartItem {
  string product_id  = 1;
  string sku         = 2;
  string name        = 3;
  int32  quantity    = 4;
  Money  unit_price  = 5;
  Money  total_price = 6;
}

message Cart {
  string            user_id     = 1;
  repeated CartItem items       = 2;
  Money             subtotal    = 3;
  Money             total       = 4;
  string            coupon_code = 5;
  Money             discount    = 6;
  Timestamp         updated_at  = 7;
}

message AddItemRequest {
  string product_id  = 1;
  string user_id     = 2;
  string sku         = 3;
  string name        = 4;
  int32  quantity    = 5;
  Money  unit_price  = 6;
}

message UpdateQuantityRequest {
  string user_id    = 1;
  string product_id = 2;
  int32  quantity   = 3;
}

message RemoveItemRequest {
  string user_id    = 1;
  string product_id = 2;
}

message ApplyCouponRequest {
  string user_id = 1;
  string code    = 2;
}

message RemoveCouponRequest {
  string user_id = 1;
}

message GetCartRequest {
  string user_id = 1;
}

message ClearCartRequest {
  string user_id = 1;
}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service CartService {
  // Retrieve the active cart for a user.
  rpc GetCart(GetCartRequest) returns (Cart);

  // Add a product item to the cart (or increment quantity if already present).
  rpc AddItem(AddItemRequest) returns (Cart);

  // Set the quantity of an existing cart item. A quantity of 0 removes it.
  rpc UpdateItemQuantity(UpdateQuantityRequest) returns (Cart);

  // Remove a specific item from the cart entirely.
  rpc RemoveItem(RemoveItemRequest) returns (Cart);

  // Apply a coupon/promo code to the cart, updating discount and total.
  rpc ApplyCoupon(ApplyCouponRequest) returns (Cart);

  // Remove the currently-applied coupon from the cart.
  rpc RemoveCoupon(RemoveCouponRequest) returns (Cart);

  // Delete all items from the cart (e.g. after successful checkout).
  rpc ClearCart(ClearCartRequest) returns (Cart);
}
