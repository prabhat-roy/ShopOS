syntax = "proto3";
package commerce.currency.v1;
option go_package = "github.com/shopos/proto/commerce/currency/v1;currencyv1";

service CurrencyService {
  rpc GetExchangeRate(GetExchangeRateRequest)   returns (GetExchangeRateResponse);
  rpc Convert(ConvertRequest)                   returns (ConvertResponse);
  rpc ListCurrencies(ListCurrenciesRequest)     returns (ListCurrenciesResponse);
}

message ExchangeRate {
  string from_currency = 1;
  string to_currency   = 2;
  double rate          = 3;
  int64  updated_at    = 4;
}

message Currency {
  string code     = 1;
  string name     = 2;
  string symbol   = 3;
  int32  decimals = 4;
}

message GetExchangeRateRequest  { string from = 1; string to = 2; }
message GetExchangeRateResponse { ExchangeRate rate = 1; }
message ConvertRequest          { string amount = 1; string from = 2; string to = 3; }
message ConvertResponse         { string converted_amount = 1; double rate = 2; }
message ListCurrenciesRequest   {}
message ListCurrenciesResponse  { repeated Currency currencies = 1; }
