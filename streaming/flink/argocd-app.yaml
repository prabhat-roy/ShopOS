# Source: streaming/flink/flink-operator.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-operator
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://downloads.apache.org/flink/flink-kubernetes-operator-1.10.0/
    chart: flink-kubernetes-operator
    targetRevision: '1.10.0'
    helm:
      releaseName: flink-operator
      values: |
        webhook:
          create: true
        defaultConfiguration:
          create: true
          append: true
          flink-conf.yaml: |+
            kubernetes.operator.metrics.reporter.slf4j.factory.class: org.apache.flink.metrics.slf4j.Slf4jReporterFactory
            kubernetes.operator.reconciler.max.parallelism: 5
  destination:
    server: https://kubernetes.default.svc
    namespace: flink-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
