apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: order-analytics-job
  namespace: analytics-ai
spec:
  image: shopos/flink-order-analytics:latest
  flinkVersion: v1_20
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    state.backend: rocksdb
    state.checkpoints.dir: s3://shopos-flink/checkpoints/order-analytics
    execution.checkpointing.interval: 60s
    execution.checkpointing.mode: EXACTLY_ONCE
  serviceAccount: flink
  jobManager:
    resource:
      memory: 1024m
      cpu: 0.5
  taskManager:
    resource:
      memory: 2048m
      cpu: 1
    replicas: 2
  job:
    jarURI: local:///opt/flink/usrlib/order-analytics.jar
    entryClass: com.shopos.flink.OrderAnalyticsJob
    args:
      - --kafka-brokers=kafka:9092
      - --input-topics=commerce.order.placed,commerce.order.fulfilled,commerce.order.cancelled
      - --clickhouse-url=jdbc:clickhouse://clickhouse:8123/shopos
      - --window-size=1min
    parallelism: 2
    upgradeMode: stateful
    state: running
