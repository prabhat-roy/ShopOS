apiVersion: database.shopos.io/v1alpha1
kind: PostgreSQLClaim
metadata:
  name: order-service-db
  namespace: commerce
spec:
  parameters:
    storageGB: 50
    instanceClass: db.t3.large
  compositionSelector:
    matchLabels:
      provider: aws
      db: postgres
  writeConnectionSecretToRef:
    name: order-service-db-conn
---
