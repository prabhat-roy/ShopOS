apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  repo: https://charts.crossplane.io/stable
  chart: crossplane
  version: 1.17.1
  targetNamespace: crossplane-system
  valuesContent: |-
    provider:
      packages:
        - xpkg.upbound.io/upbound/provider-aws:v1.14.0
        - xpkg.upbound.io/upbound/provider-gcp:v1.8.0
        - xpkg.upbound.io/upbound/provider-azure:v1.5.0
        - xpkg.upbound.io/crossplane-contrib/provider-helm:v0.19.0
        - xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.14.0
