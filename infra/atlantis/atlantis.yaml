# Atlantis project configuration for ShopOS Terraform repos
version: 3

automerge: false
delete_source_branch_on_merge: false
parallel_plan: true
parallel_apply: false

projects:
  - name: aws-eks
    dir: infra/terraform/aws/app-k8s
    workspace: default
    terraform_version: v1.9.0
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
      enabled: true
    apply_requirements:
      - approved
      - mergeable

  - name: gcp-gke
    dir: infra/terraform/gcp/app-k8s
    workspace: default
    terraform_version: v1.9.0
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
      enabled: true
    apply_requirements:
      - approved
      - mergeable

  - name: azure-aks
    dir: infra/terraform/azure/app-k8s
    workspace: default
    terraform_version: v1.9.0
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
      enabled: true
    apply_requirements:
      - approved
      - mergeable
