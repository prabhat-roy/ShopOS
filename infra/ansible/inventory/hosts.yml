---
all:
  children:
    k8s_nodes:
      hosts:
        node1:
          ansible_host: "{{ lookup('env', 'NODE1_IP') }}"
        node2:
          ansible_host: "{{ lookup('env', 'NODE2_IP') }}"
          ansible_user: ubuntu
        node3:
          ansible_host: "{{ lookup('env', 'NODE3_IP') }}"
          ansible_user: ubuntu
    jenkins:
      hosts:
        jenkins_server:
          ansible_host: "{{ lookup('env', 'JENKINS_IP') }}"
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') }}"
    ansible_python_interpreter: /usr/bin/python3
