---
- name: Install Java {{ java_version }}
  apt:
    name: "openjdk-{{ java_version }}-jdk"
    state: present
    update_cache: true

- name: Add Jenkins GPG key
  apt_key:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    state: present

- name: Add Jenkins repository
  apt_repository:
    repo: "deb https://pkg.jenkins.io/debian-stable binary/"
    state: present

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: true

- name: Stop Jenkins before initial config
  service:
    name: jenkins
    state: stopped

- name: Create Jenkins systemd override directory
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: "0755"

- name: Disable Jenkins setup wizard
  copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_OPTS=-Djenkins.install.runSetupWizard=false"
  notify: reload systemd

- name: Create Jenkins init.groovy.d directory
  file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Configure Jenkins admin user via Groovy
  template:
    src: 01-security.groovy.j2
    dest: /var/lib/jenkins/init.groovy.d/01-security.groovy
    owner: jenkins
    group: jenkins
    mode: "0644"

- name: Grant jenkins user passwordless sudo
  copy:
    dest: /etc/sudoers.d/jenkins
    content: "jenkins ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: visudo -cf %s

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Enable and start Jenkins
  service:
    name: jenkins
    state: started
    enabled: true

- name: Wait for Jenkins to be ready
  uri:
    url: "http://localhost:{{ jenkins_port }}/login"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 15

- name: Install Jenkins plugins
  community.general.jenkins_plugin:
    name: "{{ item }}"
    url: "http://localhost:{{ jenkins_port }}"
    url_username: "{{ jenkins_admin_user }}"
    url_password: "{{ jenkins_admin_password }}"
    state: present
    with_dependencies: true
  loop: "{{ jenkins_plugins }}"
  notify: restart jenkins

- name: Allow Jenkins port through ufw
  ufw:
    rule: allow
    port: "{{ jenkins_port | string }}"
    proto: tcp
