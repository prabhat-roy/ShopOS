---
# ── Go ────────────────────────────────────────────────────────────────────────
- name: Download Go {{ go_version }}
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    mode: "0644"

- name: Remove existing Go installation
  file:
    path: /usr/local/go
    state: absent

- name: Extract Go
  unarchive:
    src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: true

- name: Add Go to PATH
  lineinfile:
    path: /etc/environment
    regexp: '^PATH='
    line: 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/go/bin"'

# ── Node.js ───────────────────────────────────────────────────────────────────
- name: Add NodeSource repository for Node.js {{ node_version }}
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true

# ── Terraform ────────────────────────────────────────────────────────────────
- name: Add HashiCorp GPG key
  apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present

- name: Add HashiCorp repository
  apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present

- name: Install Terraform
  apt:
    name: "terraform={{ terraform_version }}-1"
    state: present
    update_cache: true

# ── kubectl ───────────────────────────────────────────────────────────────────
- name: Download kubectl {{ kubectl_version }}
  get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

# ── Helm ──────────────────────────────────────────────────────────────────────
- name: Download Helm {{ helm_version }}
  get_url:
    url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz"
    mode: "0644"

- name: Extract Helm
  unarchive:
    src: "/tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install Helm binary
  copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true

# ── Python packages ───────────────────────────────────────────────────────────
- name: Install Python build tools
  apt:
    name:
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
    state: present

# ── Maven ─────────────────────────────────────────────────────────────────────
- name: Install Maven
  apt:
    name: maven
    state: present

# ── Rust ─────────────────────────────────────────────────────────────────────
- name: Install Rust via rustup
  shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: /root/.cargo/bin/rustc
  environment:
    HOME: /root

# ── .NET SDK ─────────────────────────────────────────────────────────────────
- name: Add Microsoft package repository
  shell: |
    wget -qO /tmp/packages-microsoft-prod.deb https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
    dpkg -i /tmp/packages-microsoft-prod.deb
  args:
    creates: /etc/apt/sources.list.d/microsoft-prod.list

- name: Install .NET SDK 9
  apt:
    name: dotnet-sdk-9.0
    state: present
    update_cache: true
