---
# Provision a Jenkins CI server from scratch.
# Runs common baseline → Docker → Jenkins → all build tools.
#
# Usage:
#   ansible-playbook playbooks/jenkins.yml -i inventory/hosts.ini
#   ansible-playbook playbooks/jenkins.yml -i inventory/aws.yml --limit role_jenkins
#   ansible-playbook playbooks/jenkins.yml -i inventory/hosts.ini \
#     --extra-vars "jenkins_admin_password=secretpassword"

- name: Bootstrap Jenkins server
  hosts: jenkins
  become: true

  roles:
    - role: common
    - role: docker
    - role: tools
    - role: jenkins

  post_tasks:
    - name: Print Jenkins URL
      debug:
        msg: "Jenkins is ready at http://{{ ansible_host }}:{{ jenkins_port }}"
