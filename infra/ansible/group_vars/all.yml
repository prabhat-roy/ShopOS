---
# Variables applied to every host

timezone: UTC
locale: en_US.UTF-8

# System packages installed on every node
common_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - unzip
  - zip
  - jq
  - net-tools
  - ca-certificates
  - gnupg2
  - apt-transport-https
  - software-properties-common
  - python3
  - python3-pip

# SSH hardening
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 3

# Firewall — ports open on all nodes
ufw_allowed_ports:
  - 22   # SSH
  - 80   # HTTP
  - 443  # HTTPS
