# EventStoreDB configuration for ShopOS event sourcing

# Cluster configuration
ClusterSize: 3
DiscoverViaDns: false

# Network
IntIp: 0.0.0.0
ExtIp: 0.0.0.0
HttpPort: 2113
IntTcpPort: 1112
ExtTcpPort: 1113

# Security — set to false for dev, enable TLS in production
Insecure: true

# Projections
RunProjections: All
StartStandardProjections: true

# Storage
Db: /var/lib/eventstore/data
Log: /var/lib/eventstore/logs
Index: /var/lib/eventstore/index

# Performance
CachedChunks: -1
ChunksCacheSize: 536870912
MaxMemTableSize: 1048576

# Logging
LogLevel: Information
LogFormat: Json

# Gossip
GossipSeed: eventstore-0.eventstore-headless:2113,eventstore-1.eventstore-headless:2113,eventstore-2.eventstore-headless:2113
GossipAllowedDifferenceSec: 60
GossipIntervalMs: 1000
GossipTimeoutMs: 500

# Scavenge
ScavengeHistoryMaxAge: 30
