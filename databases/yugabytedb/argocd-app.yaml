# Source: databases/yugabytedb/yugabytedb.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yugabyte
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.yugabyte.com
    chart: yugabyte
    targetRevision: '2024.1.4'
    helm:
      releaseName: yugabyte
      values: |
        replicas:
          master: 3
          tserver: 6
        storage:
          master: { count: 1, size: 50Gi, storageClass: fast-ssd }
          tserver: { count: 2, size: 200Gi, storageClass: fast-ssd }
        resource:
          master:  { requests: { cpu: 1, memory: 2Gi }, limits: { cpu: 2, memory: 4Gi } }
          tserver: { requests: { cpu: 2, memory: 4Gi }, limits: { cpu: 4, memory: 8Gi } }
        enableLoadBalancer: false
        tls: { enabled: true }
  destination:
    server: https://kubernetes.default.svc
    namespace: databases
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
