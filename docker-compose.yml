      - "50165:50165"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  marketplace-seller-service:
    image: shopos/marketplace-seller-service:latest
    build:
      context: ./src/b2b/marketplace-seller-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50166
      - DATABASE_URL=jdbc:postgresql://postgres:5432/marketplace_sellers
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOG_LEVEL=INFO
    ports:
      - "50166:50166"
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  # ===========================================================================
  # DOMAIN: INTEGRATIONS (10 services)
  # ===========================================================================

  erp-integration-service:
    image: shopos/erp-integration-service:latest
    build:
      context: ./src/integrations/erp-integration-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50170
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOG_LEVEL=INFO
    ports:
      - "50170:50170"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  marketplace-connector-service:
    image: shopos/marketplace-connector-service:latest
    build:
      context: ./src/integrations/marketplace-connector-service
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  social-commerce-service:
    image: shopos/social-commerce-service:latest
    build:
      context: ./src/integrations/social-commerce-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50171
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    ports:
      - "50171:50171"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  crm-integration-service:
    image: shopos/crm-integration-service:latest
    build:
      context: ./src/integrations/crm-integration-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50172
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    ports:
      - "50172:50172"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  payment-gateway-integration:
    image: shopos/payment-gateway-integration:latest
    build:
      context: ./src/integrations/payment-gateway-integration
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50173
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    ports:
      - "50173:50173"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  logistics-provider-integration:
    image: shopos/logistics-provider-integration:latest
    build:
      context: ./src/integrations/logistics-provider-integration
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50174
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    ports:
      - "50174:50174"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  tax-provider-integration:
    image: shopos/tax-provider-integration:latest
    build:
      context: ./src/integrations/tax-provider-integration
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50175
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=info
    ports:
      - "50175:50175"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  pim-integration-service:
    image: shopos/pim-integration-service:latest
    build:
      context: ./src/integrations/pim-integration-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50195
      - PIM_API_URL=http://pim:8080
      - PIM_API_KEY=changeme
      - LOG_LEVEL=info
    ports:
      - "50195:50195"
    restart: unless-stopped
    networks:
      - shopos

  cdp-integration-service:
    image: shopos/cdp-integration-service:latest
    build:
      context: ./src/integrations/cdp-integration-service
      dockerfile: Dockerfile
    environment:
      - HTTP_PORT=8080
      - KAFKA_BROKERS=kafka:9092
      - CDP_WEBHOOK_URL=http://cdp:8080
      - LOG_LEVEL=info
    ports:
      - "8197:8080"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - shopos

  accounting-integration-service:
    image: shopos/accounting-integration-service:latest
    build:
      context: ./src/integrations/accounting-integration-service
      dockerfile: Dockerfile
    environment:
      - SERVER_PORT=50196
      - LOG_LEVEL=INFO
    ports:
      - "50196:50196"
    restart: unless-stopped
    networks:
      - shopos

  # ===========================================================================
  # DOMAIN: AFFILIATE (4 services)
  # ===========================================================================

  affiliate-service:
    image: shopos/affiliate-service:latest
    build:
      context: ./src/affiliate/affiliate-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50200
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/affiliates?sslmode=disable
      - LOG_LEVEL=info
    ports:
      - "50200:50200"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - shopos

  referral-service:
    image: shopos/referral-service:latest
    build:
      context: ./src/affiliate/referral-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50201
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/referrals?sslmode=disable
      - LOG_LEVEL=info
    ports:
      - "50201:50201"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - shopos

  influencer-service:
    image: shopos/influencer-service:latest
    build:
      context: ./src/affiliate/influencer-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50202
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/influencers?sslmode=disable
      - LOG_LEVEL=info
    ports:
      - "50202:50202"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - shopos

  commission-payout-service:
    image: shopos/commission-payout-service:latest
    build:
      context: ./src/affiliate/commission-payout-service
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=50203
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/commissions?sslmode=disable
      - LOG_LEVEL=info
    ports:
      - "50203:50203"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - shopos

# =============================================================================
# ADDITIONAL OPEN-SOURCE INFRASTRUCTURE
# =============================================================================

  # ── Message Brokers ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shopos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-shopos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-shopos}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - shopos

  nats:
    image: nats:2.10-alpine
    container_name: shopos-nats
    command: ["-js", "-m", "8222", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Workflow Engine ──────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: shopos-temporal
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PWD: ${DB_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "temporal --address localhost:7233 operator cluster health 2>/dev/null | grep -q SERVING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - shopos

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: shopos-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8383:8080"
    depends_on:
      - temporal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q Temporal || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopos

  # ── Change Data Capture ──────────────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.7
    container_name: shopos-debezium
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
    ports:
      - "8193:8083"
    depends_on:
      - kafka
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors | grep -q '\\[' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - shopos

  # ── Stream Processing ────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.20-scala_2.12
    container_name: shopos-flink-jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    ports:
      - "8192:8081"
    volumes:
      - flink_data:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview | grep -q 'flink-version' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopos

  flink-taskmanager:
    image: flink:1.20-scala_2.12
    container_name: shopos-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      - flink-jobmanager
    networks:
      - shopos

  # ── OLAP Database ────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: shopos-clickhouse
    environment:
      CLICKHOUSE_DB: shopos_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-shopos}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-shopos}
    ports:
      - "8123:8123"
      - "9900:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Vector Database ──────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.26.4
    container_name: shopos-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: text2vec-openai,generative-openai,text2vec-cohere
      CLUSTER_HOSTNAME: weaviate
    ports:
      - "8180:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready | grep -q '{}' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopos

  # ── Graph Database ───────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.23-community
    container_name: shopos-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-shopos}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/ | grep -q neo4j || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shopos

  # ── High-Performance Cache ───────────────────────────────────────────────────
  memcached:
    image: memcached:1.6-alpine
    container_name: shopos-memcached
    command: ["-m", "256", "-c", "1024"]
    ports:
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc localhost 11211 | grep -q uptime"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: shopos-opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "9202:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopos

  # ── ScyllaDB ─────────────────────────────────────────────────────────────────
  scylladb:
    image: scylladb/scylla:6.1
    container_name: shopos-scylladb
    command: --smp 1 --memory 512M --overprovisioned 1
    ports:
      - "9042:9042"
      - "9160:9160"
    volumes:
      - scylladb_data:/var/lib/scylla
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shopos

  # ── Edge Router ──────────────────────────────────────────────────────────────
  traefik:
    image: traefik:3.1
    container_name: shopos-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--metrics.prometheus=true"
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ping | grep -q OK || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Service Discovery ────────────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.19
    container_name: shopos-consul
    command: agent -dev -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8500/v1/status/leader | grep -q '.' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Identity Provider ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: shopos-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USER:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8480:8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - shopos

  # ── ML Experiment Tracking ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: shopos-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/mlflow --default-artifact-root s3://mlflow --serve-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "5001:5000"
    depends_on:
      - postgres
      - minio
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health | grep -q ok || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopos

  # ── Continuous Profiling ─────────────────────────────────────────────────────
  pyroscope:
    image: grafana/pyroscope:1.7.0
    container_name: shopos-pyroscope
    ports:
      - "4040:4040"
    volumes:
      - pyroscope_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4040/ready | grep -q ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Distributed Tracing (lightweight) ───────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: shopos-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9411/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - shopos

  # ── Uptime Monitoring ────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1.23
    container_name: shopos-uptime-kuma
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/status-page/heartbeat/default || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - shopos

  # ── Artifact Registry ────────────────────────────────────────────────────────
  nexus:
    image: sonatype/nexus3:3.71.0
    container_name: shopos-nexus
    ports:
      - "8181:8081"
    volumes:
      - nexus_data:/nexus-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/service/rest/v1/status | grep -q '\"edition\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - shopos

  # ── Self-hosted Git ──────────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.22.2
    container_name: shopos-gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: ${DB_USER:-postgres}
      GITEA__database__PASSWD: ${DB_PASSWORD:-postgres}
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/healthz | grep -q alive || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shopos

  # ── Code Quality ─────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.6-community
    container_name: shopos-sonarqube
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${DB_USER:-postgres}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "9010:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - shopos

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  shopos:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  cassandra_data:
  elasticsearch_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  etcd_data:
  rabbitmq_data:
  nats_data:
  clickhouse_data:
  weaviate_data:
  neo4j_data:
  opensearch_data:
  consul_data:
  flink_data:
  pyroscope_data:
  nexus_data:
  gitea_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  uptime_kuma_data:
  scylladb_data:
  mlflow_data:
