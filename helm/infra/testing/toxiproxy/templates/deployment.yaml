apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toxiproxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toxiproxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "toxiproxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "toxiproxy.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: toxiproxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: 8474
              protocol: TCP
            - name: proxy
              containerPort: 22222
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /version
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /version
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
