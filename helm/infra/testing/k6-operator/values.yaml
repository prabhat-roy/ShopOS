replicaCount: 1

image:
  repository: grafana/k6-operator
  tag: "0.9.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Operator manages TestRun CRDs — no ingress needed
ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
