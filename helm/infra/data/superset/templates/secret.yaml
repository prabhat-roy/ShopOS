apiVersion: v1
kind: Secret
metadata:
  name: {{ include "superset.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "superset.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.superset.secretKey | quote }}
  database-url: {{ .Values.superset.databaseUrl | quote }}
  redis-url: {{ .Values.superset.redisUrl | quote }}
  admin-password: {{ .Values.adminUser.password | quote }}
