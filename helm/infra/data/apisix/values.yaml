replicaCount: 2

image:
  repository: apache/apisix
  tag: "3.10.0-debian"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: http
      port: 9080
      targetPort: 9080
    - name: admin
      port: 9180
      targetPort: 9180

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: apisix.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

etcd:
  enabled: true
  host:
    - "http://etcd:2379"

admin:
  key: "shopos-apisix-admin-key"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9091"

podSecurityContext:
  runAsNonRoot: false

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
