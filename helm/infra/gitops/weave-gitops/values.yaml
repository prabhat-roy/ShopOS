replicaCount: 1

image:
  repository: ghcr.io/weaveworks/wego-app
  tag: "v0.38.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9001
  targetPort: 9001

persistence:
  enabled: true
  storageClass: ""
  size: 2Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
