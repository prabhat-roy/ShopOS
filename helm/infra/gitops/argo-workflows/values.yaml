replicaCount: 1

image:
  repository: quay.io/argoproj/workflow-controller
  tag: "v3.5.10"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 2746
  targetPort: 2746

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
