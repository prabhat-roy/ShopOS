replicaCount: 1

image:
  repository: quay.io/argoproj/argocd-image-updater
  tag: "v0.14.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: "1"
    memory: 256Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
