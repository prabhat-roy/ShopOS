replicaCount: 1

image:
  repository: ghcr.io/external-secrets/external-secrets
  tag: "v0.11.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Operator — no ingress needed
ingress:
  enabled: false

webhook:
  port: 9443

certController:
  enabled: true

installCRDs: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
