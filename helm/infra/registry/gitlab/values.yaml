replicaCount: 1

image:
  repository: gitlab/gitlab-ce
  tag: "17.4.1-ce.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

persistence:
  enabled: true
  storageClass: ""
  size: 50Gi
  accessMode: ReadWriteOnce
  mountPath: /var/opt/gitlab

resources:
  requests:
    cpu: 250m
    memory: 4Gi
  limits:
    cpu: "1"
    memory: 8Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
