apiVersion: v1
kind: Service
metadata:
  name: {{ include "nomad.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nomad.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "nomad.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nomad.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nomad.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 4647
      name: rpc
    - port: 4648
      name: serf
  selector:
    {{- include "nomad.selectorLabels" . | nindent 4 }}
