image:
  repository: snyk/driftctl
  tag: "v0.40.0"
  pullPolicy: IfNotPresent

# CronJob schedule for drift detection
schedule: "0 2 * * *"

# Terraform state source
tfState:
  backend: s3
  bucket: shopos-terraform-state
  region: us-east-1
  path: "**/*.tfstate"

env:
  DCTL_FROM: "tfstate+s3://shopos-terraform-state/**/*.tfstate"
  AWS_DEFAULT_REGION: "us-east-1"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

restartPolicy: OnFailure

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
