apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cachet.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cachet.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-key: "base64:changeme-replace-with-real-key"
  db-password: "changeme-replace-with-real-password"
