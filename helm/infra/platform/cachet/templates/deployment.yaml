apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cachet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cachet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cachet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cachet.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cachet
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cachet.fullname" . }}-secret
                  key: app-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cachet.fullname" . }}-secret
                  key: db-password
          {{- if .Values.pvc.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/www/html/public/uploads
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.pvc.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "cachet.fullname" . }}-pvc
      {{- end }}
