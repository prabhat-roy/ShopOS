replicaCount: 2

image:
  repository: unleashorg/unleash-server
  tag: "6.3.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4242

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: unleash.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  enabled: true
  auth:
    database: unleash
    username: unleash
    password: unleash

env:
  DATABASE_SSL: "false"
  LOG_LEVEL: "info"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "4242"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
