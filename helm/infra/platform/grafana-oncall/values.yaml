replicaCount: 1

image:
  repository: grafana/oncall
  tag: "v1.9.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: oncall.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  SECRET_KEY: "changeme-replace-in-production"
  BASE_URL: "http://oncall.shopos.internal"
  DJANGO_SETTINGS_MODULE: "settings.hobby"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
