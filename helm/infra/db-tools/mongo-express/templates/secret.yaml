apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mongo-express.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mongo-express.labels" . | nindent 4 }}
type: Opaque
stringData:
  basicauth-username: {{ .Values.basicAuth.username | quote }}
  basicauth-password: {{ .Values.basicAuth.password | quote }}
  {{- if .Values.mongodb.username }}
  mongodb-username: {{ .Values.mongodb.username | quote }}
  mongodb-password: {{ .Values.mongodb.password | quote }}
  {{- end }}
