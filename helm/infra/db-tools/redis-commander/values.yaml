replicaCount: 1

image:
  repository: rediscommander/redis-commander
  tag: "0.8.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: redis-commander.shopos.local
  path: /
  pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Comma-separated list of Redis hosts in format: label:host:port
# e.g. "local:redis:6379,dragonfly:dragonfly:6379"
redis:
  hosts: "local:redis:6379"
  # Optional password (applies to all hosts when set)
  password: ""

# HTTP basic auth for the web UI
basicAuth:
  enabled: false
  username: "admin"
  password: "changeme"

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nameOverride: ""
fullnameOverride: ""
