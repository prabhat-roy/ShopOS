apiVersion: v1
kind: Service
metadata:
  name: {{ include "cockroachdb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cockroachdb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "cockroachdb.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cockroachdb.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cockroachdb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 26257
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cockroachdb.selectorLabels" . | nindent 4 }}
