apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
    domain: {{ .Values.domain }}
    team: {{ .Values.domain }}-team
spec:
  replicas: {{ .Values.replicaCount }}
  selector: {{ matchLabels: {{ app: {{ .Chart.Name }} }} }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        domain: {{ .Values.domain }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
    spec:
      serviceAccountName: {{ include "chart.serviceAccountName" . }}
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.service.port }} }]
          env:
            - { name: PORT, value: "{{ .Values.service.port }}" }
            - { name: LOG_LEVEL, value: info }
          resources: {{ toYaml .Values.resources | nindent 12 }}
          securityContext: {{ toYaml .Values.containerSecurityContext | nindent 12 }}
          readinessProbe: {{ httpGet: { path: /healthz, port: {{ .Values.service.port }} } }}
          livenessProbe: {{ httpGet: { path: /healthz, port: {{ .Values.service.port }} }, initialDelaySeconds: 30 }}
