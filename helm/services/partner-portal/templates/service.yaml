apiVersion: v1
kind: Service
metadata:
  name: {{- include "partner-portal.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-portal.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: partner-portal
