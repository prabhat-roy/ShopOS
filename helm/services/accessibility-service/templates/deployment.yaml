apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{- include "accessibility-service.fullname" . }}
  namespace: {{- .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "accessibility-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{- .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "accessibility-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{- .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{- .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{- .Values.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "accessibility-service.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{- .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{- .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{- .Chart.Name }}
          image: "{{- .Values.image.repository }}:{{- .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{- .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{- .Values.service.targetPort }}
              protocol: {{- .Values.service.protocol }}
          env:
            - name: PORT
              value: {{- .Values.service.targetPort | quote }}
            - name: ENVIRONMENT
              value: {{- .Values.config.environment | quote }}
            - name: LOG_LEVEL
              value: {{- .Values.config.logLevel | quote }}
            - name: OTEL_ENABLED
              value: {{- .Values.config.otelEnabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{- .Values.config.otelEndpoint | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
