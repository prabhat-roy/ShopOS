  BACKSTAGE_URL: "http://backstage.platform.svc.cluster.local:7007"
  TEMPORAL_URL: "http://temporal-web.platform.svc.cluster.local:8080"
  UNLEASH_URL: "http://unleash.platform.svc.cluster.local:4242"
  CHAOS_MESH_URL: "http://chaos-dashboard.chaos-mesh.svc.cluster.local:2333"
  LITMUS_URL: "http://litmusportal-frontend.litmus.svc.cluster.local:9091"

livenessProbe:
  httpGet:
    path: /healthz
    port: 8300
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 8300
  initialDelaySeconds: 3
  periodSeconds: 5
