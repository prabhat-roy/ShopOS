replicaCount: 1

image:
  repository: shopos/click-tracking-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: shopos-service-account
  create: false
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8203"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8203
  targetPort: 8203
  protocol: TCP
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60

livenessProbe:
  httpGet:
    path: /healthz
    port: 8203
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 8203
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

config:
  environment: production
  kafkaBrokers: "kafka-0.kafka-headless.shopos-infra.svc.cluster.local:9092"
  redisUrl: "redis://redis-master.shopos-infra.svc.cluster.local:6379"
  logLevel: info
  logFormat: json
  otelEnabled: "false"
  otelEndpoint: "http://otel-collector.shopos-infra.svc.cluster.local:4318"

namespaceOverride: "shopos-affiliate"

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: click-tracking-service
