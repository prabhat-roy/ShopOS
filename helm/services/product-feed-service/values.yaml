replicaCount: 2
image:
  repository: ghcr.io/shopos/product-feed-service
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 50378
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1, memory: 512Mi }
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTarget: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: [ALL] }
serviceAccount:
  create: true
  annotations: {}
domain: catalog
