replicaCount: 1

image:
  repository: shopos/ios-push-gateway-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: shopos-service-account
  create: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8214"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8214
  targetPort: 8214
  protocol: TCP

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /healthz
    port: 8214
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: 8214
  initialDelaySeconds: 5
  periodSeconds: 10

config:
  environment: production
  logLevel: info
  logFormat: json
  otelEnabled: "true"
  otelEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"

namespaceOverride: ""

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
extraEnv: []
extraVolumes: []
extraVolumeMounts: []
