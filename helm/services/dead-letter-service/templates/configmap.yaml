apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dead-letter-service.fullname" . }}-config
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "dead-letter-service.labels" . | nindent 4 }}
data:
  KAFKA_BROKERS: {{ .Values.config.kafkaBrokers | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  OTEL_ENABLED: {{ .Values.config.otelEnabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
