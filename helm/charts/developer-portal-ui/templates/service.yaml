apiVersion: v1
kind: Service
metadata:
  name: {{- include "developer-portal-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "developer-portal-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: developer-portal-ui
