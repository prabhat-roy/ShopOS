{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{- include "partner-portal.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-portal.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{- include "partner-portal.fullname" $ }}
                port:
                  number: {{{ $.Values.service.port }}}
          {{- end }}
    {{- end }}
{{- end }}
