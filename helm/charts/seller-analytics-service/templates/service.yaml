apiVersion: v1
kind: Service
metadata:
  name: {{- include "seller-analytics-service.fullname" . }}
  namespace: {{- .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "seller-analytics-service.labels" . | nindent 4 }}
spec:
  type: {{- .Values.service.type }}
  selector:
    {{- include "seller-analytics-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{- .Values.service.port }}
      targetPort: {{- .Values.service.targetPort }}
      protocol: {{- .Values.service.protocol }}
