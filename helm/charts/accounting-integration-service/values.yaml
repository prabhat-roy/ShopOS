replicaCount: 1

image:
  repository: shopos/accounting-integration-service
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: shopos-service-account
  create: false
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "50196"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 50196
  targetPort: 50196
  protocol: TCP
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: accounting-integration-service.shopos.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60

livenessProbe:
  httpGet:
    path: /healthz
    port: 50196
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: 50196
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

config:
  kafkaBrokers: "kafka-0.kafka-headless.shopos-infra.svc.cluster.local:9092"
  environment: "production"
  logLevel: "info"
  logFormat: "json"
  otelEnabled: "false"
  otelEndpoint: "http://otel-collector.shopos-infra.svc.cluster.local:4317"

secrets:
  dbCredentialsSecret: shopos-db-credentials

extraEnv: []
extraVolumeMounts: []
extraVolumes: []
nodeSelector: {}
tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: accounting-integration-service
          topologyKey: kubernetes.io/hostname

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30
namespaceOverride: "shopos-integrations"
