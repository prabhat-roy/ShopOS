apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-portal-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: reports-portal-service
    domain: platform
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: reports-portal-service
  template:
    metadata:
      labels:
        app: reports-portal-service
        domain: platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: reports-portal-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8300
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
