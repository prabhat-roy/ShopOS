version: 0.2

# AWS CodePipeline — Deploy GitOps stack to EKS
# ArgoCD configured with EKS kubeconfig via aws eks update-kubeconfig
# Velero backed by S3; External Secrets pulls from AWS Parameter Store
# ACTION: INSTALL | UPGRADE | UNINSTALL | CONFIGURE

env:
  parameter-store:
    EKS_CLUSTER_NAME: /shopos/eks/cluster_name
    AWS_REGION: /shopos/aws/region
    AWS_ACCOUNT_ID: /shopos/aws/account_id
    VELERO_S3_BUCKET: /shopos/velero/s3-bucket
    MINIO_ACCESS_KEY: /shopos/minio/access-key
  secrets-manager:
    ARGOCD_ADMIN_PASSWORD_HASH: shopos/argocd:admin-password-hash
    MINIO_SECRET_KEY: shopos/minio:secret-key
  variables:
    ENVIRONMENT: dev
    ACTION: INSTALL
    ARGOCD: "true"
    ARGO_ROLLOUTS: "true"
    ARGO_WORKFLOWS: "true"
    ARGO_EVENTS: "true"
    FLUXCD: "false"
    SEALED_SECRETS: "false"
    EXTERNAL_SECRETS: "true"
    KEDA: "true"
    VELERO: "true"

phases:
  install:
    commands:
      - curl -fsSL "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  pre_build:
    commands:
      - aws eks update-kubeconfig --region ${AWS_REGION} --name ${EKS_CLUSTER_NAME}
      - echo "GitOps ${ACTION} on ${ENVIRONMENT}"

  build:
    commands:
      - |
        if [ "${ARGOCD}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall argocd -n argocd 2>/dev/null || true
          else
            helm upgrade --install argocd argo/argo-cd \
              --namespace argocd --create-namespace \
              --set server.replicas=2 \
              --set redis-ha.enabled=true \
              --set controller.replicas=1 \
              --set repoServer.replicas=2 \
              --set applicationSet.replicas=2 \
              --set configs.secret.argocdServerAdminPassword="${ARGOCD_ADMIN_PASSWORD_HASH}" \
              --wait --timeout 10m
          fi
        fi

      - |
        if [ "${ARGO_ROLLOUTS}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall argo-rollouts -n argo-rollouts 2>/dev/null || true
          else
            helm upgrade --install argo-rollouts argo/argo-rollouts \
              --namespace argo-rollouts --create-namespace \
              --set dashboard.enabled=true --wait --timeout 5m
            kubectl apply -f gitops/argo-rollouts/ 2>/dev/null || true
          fi
        fi

      - |
        if [ "${ARGO_WORKFLOWS}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall argo-workflows -n argo 2>/dev/null || true
          else
            helm upgrade --install argo-workflows argo/argo-workflows \
              --namespace argo --create-namespace \
              --set server.authModes[0]=server \
              --wait --timeout 5m
            kubectl apply -f gitops/argo-workflows/ 2>/dev/null || true
          fi
        fi

      - |
        if [ "${ARGO_EVENTS}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall argo-events -n argo-events 2>/dev/null || true
          else
            helm upgrade --install argo-events argo/argo-events \
              --namespace argo-events --create-namespace --wait --timeout 5m
            kubectl apply -f gitops/argo-events/ 2>/dev/null || true
          fi
        fi

      # External Secrets Operator — backed by AWS Parameter Store + Secrets Manager
      - |
        if [ "${EXTERNAL_SECRETS}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add external-secrets https://charts.external-secrets.io --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall external-secrets -n external-secrets 2>/dev/null || true
          else
            helm upgrade --install external-secrets external-secrets/external-secrets \
              --namespace external-secrets --create-namespace \
              --set installCRDs=true --wait --timeout 5m
            # Bootstrap ClusterSecretStore for AWS SSM
            kubectl apply -f - <<EOF
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: ${AWS_REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
EOF
          fi
        fi

      - |
        if [ "${KEDA}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add kedacore https://kedacore.github.io/charts --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall keda -n keda 2>/dev/null || true
          else
            helm upgrade --install keda kedacore/keda \
              --namespace keda --create-namespace \
              --set metricsServer.replicaCount=2 --wait --timeout 5m
            kubectl apply -f kubernetes/keda/ 2>/dev/null || true
          fi
        fi

      # Velero — backed by S3
      - |
        if [ "${VELERO}" = "true" ] && [ "${ACTION}" != "CONFIGURE" ]; then
          helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
          if [ "${ACTION}" = "UNINSTALL" ]; then
            helm uninstall velero -n velero 2>/dev/null || true
          else
            helm upgrade --install velero vmware-tanzu/velero \
              --namespace velero --create-namespace \
              --set configuration.backupStorageLocation[0].name=default \
              --set configuration.backupStorageLocation[0].provider=aws \
              --set configuration.backupStorageLocation[0].bucket=${VELERO_S3_BUCKET} \
              --set configuration.backupStorageLocation[0].config.region=${AWS_REGION} \
              --set configuration.volumeSnapshotLocation[0].provider=aws \
              --set configuration.volumeSnapshotLocation[0].config.region=${AWS_REGION} \
              --set initContainers[0].name=velero-plugin-for-aws \
              --set initContainers[0].image=velero/velero-plugin-for-aws:v1.10.0 \
              --set initContainers[0].volumeMounts[0].mountPath=/target \
              --set initContainers[0].volumeMounts[0].name=plugins \
              --wait --timeout 5m
            kubectl apply -f kubernetes/velero/ 2>/dev/null || true
          fi
        fi

      # CONFIGURE: Bootstrap ArgoCD App-of-Apps
      - |
        if [ "${ACTION}" = "CONFIGURE" ]; then
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=180s
          kubectl apply -f gitops/argocd/app-of-apps.yaml
          kubectl apply -f gitops/argocd/applicationsets/ 2>/dev/null || true
          echo "ArgoCD App-of-Apps bootstrapped for ${ENVIRONMENT}"
          # Store ArgoCD server URL in Parameter Store
          ARGOCD_URL=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          aws ssm put-parameter --name /shopos/argocd/url \
            --value "https://${ARGOCD_URL}" --type String --overwrite || true
        fi

  post_build:
    commands:
      - echo "GitOps ${ACTION} complete on ${ENVIRONMENT}"
      - kubectl get pods -n argocd 2>/dev/null | head -10 || true
