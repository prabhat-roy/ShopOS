version: 0.2

# AWS CodePipeline — Build service image, push to ECR, deploy to EKS via Helm
# IMAGE_TAG, SERVICE_NAME, DOMAIN, ENVIRONMENT set via CodePipeline action overrides

env:
  parameter-store:
    AWS_ACCOUNT_ID: /shopos/aws/account_id
    EKS_CLUSTER_NAME: /shopos/eks/cluster_name
    AWS_REGION: /shopos/aws/region
  variables:
    SERVICE_NAME: api-gateway
    DOMAIN: platform
    ENVIRONMENT: dev

phases:
  install:
    commands:
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - helm version --short
      - aws eks update-kubeconfig --region ${AWS_REGION} --name ${EKS_CLUSTER_NAME}
      - kubectl get nodes --no-headers | wc -l

  pre_build:
    commands:
      - IMAGE_TAG="${CODEBUILD_BUILD_NUMBER}-${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}"
      - ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - ECR_REPO="shopos/${SERVICE_NAME}"
      - IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
      - |
        aws ecr describe-repositories --repository-names ${ECR_REPO} --region ${AWS_REGION} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${ECR_REPO} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256 \
            --region ${AWS_REGION}
      - echo "Building ${IMAGE}"

  build:
    commands:
      - docker build -t ${IMAGE} src/${DOMAIN}/${SERVICE_NAME}/
      - |
        aws ecr start-image-scan \
          --repository-name shopos/${SERVICE_NAME} \
          --image-id imageTag=${IMAGE_TAG} \
          --region ${AWS_REGION} 2>/dev/null || true
      - docker push ${IMAGE}
      - docker tag ${IMAGE} ${ECR_REGISTRY}/shopos/${SERVICE_NAME}:latest
      - docker push ${ECR_REGISTRY}/shopos/${SERVICE_NAME}:latest
      - |
        helm upgrade --install ${SERVICE_NAME} helm/charts/${SERVICE_NAME} \
          --namespace ${DOMAIN} --create-namespace \
          --set image.repository=${ECR_REGISTRY}/shopos/${SERVICE_NAME} \
          --set image.tag=${IMAGE_TAG} \
          --set environment=${ENVIRONMENT} \
          --set persistence.storageClass=gp3 \
          -f helm/charts/${SERVICE_NAME}/values-${ENVIRONMENT}.yaml \
          --wait --timeout 10m

  post_build:
    commands:
      - kubectl rollout status deployment/${SERVICE_NAME} -n ${DOMAIN} --timeout=5m
      - kubectl get pods -n ${DOMAIN} -l app=${SERVICE_NAME}
      - |
        aws ssm put-parameter \
          --name /shopos/deployments/${SERVICE_NAME}/image_tag \
          --value "${IMAGE_TAG}" \
          --type String --overwrite || true
      - echo "Deploy complete: ${SERVICE_NAME}:${IMAGE_TAG} on ${ENVIRONMENT}"

artifacts:
  files:
    - "**/*"
  base-directory: reports
  name: deploy-reports-${CODEBUILD_BUILD_NUMBER}
