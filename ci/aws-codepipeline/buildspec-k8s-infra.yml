version: 0.2

# AWS CodePipeline — EKS cluster provisioning via Terraform
# Secrets via Parameter Store; kubeconfig via aws eks update-kubeconfig

env:
  parameter-store:
    TF_VAR_region: /shopos/aws/region
    TF_VAR_cluster_name: /shopos/eks/cluster_name
    TF_VAR_environment: /shopos/environment
    TF_STATE_BUCKET: /shopos/terraform/state-bucket
  variables:
    ACTION: APPLY
    TF_IN_AUTOMATION: "true"
    TF_CLI_ARGS: "-no-color"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - curl -sLo terraform.zip https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip
      - unzip -q terraform.zip && mv terraform /usr/local/bin/
      - terraform version
      - curl -sLo tofu.zip https://github.com/opentofu/opentofu/releases/download/v1.8.7/tofu_1.8.7_linux_amd64.zip
      - unzip -q tofu.zip && mv tofu /usr/local/bin/
      - tofu version
      - curl -fsSL "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
      - chmod +x /usr/local/bin/kubectl
      - curl -fsSL https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz | tar -xz -C /usr/local/bin
      - eksctl version

  pre_build:
    commands:
      - echo "Configuring AWS region ${TF_VAR_region}"
      - aws configure set region ${TF_VAR_region}
      - cd infra/terraform/aws/app-k8s
      - terraform init
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=${TF_VAR_environment}/eks/terraform.tfstate"
          -backend-config="region=${TF_VAR_region}"
      - terraform validate

  build:
    commands:
      - cd infra/terraform/aws/app-k8s
      - terraform plan
          -var="region=${TF_VAR_region}"
          -var="environment=${TF_VAR_environment}"
          -out=tfplan
      - |
        if [ "${ACTION}" = "APPLY" ]; then
          terraform apply tfplan
          terraform output -json > /tmp/tf-outputs.json
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          aws eks update-kubeconfig --region ${TF_VAR_region} --name ${CLUSTER_NAME}
          kubectl get nodes
        fi
      - |
        if [ "${ACTION}" = "DESTROY" ]; then
          terraform destroy -auto-approve \
            -var="region=${TF_VAR_region}" \
            -var="environment=${TF_VAR_environment}"
        fi

  post_build:
    commands:
      - |
        if [ "${ACTION}" = "APPLY" ]; then
          CLUSTER_NAME=$(cd infra/terraform/aws/app-k8s && terraform output -raw cluster_name)
          aws ssm put-parameter --name /shopos/eks/cluster_name \
            --value "${CLUSTER_NAME}" --type String --overwrite || true
          aws ssm put-parameter --name /shopos/eks/kubeconfig \
            --value "$(cat ~/.kube/config | base64 -w 0)" \
            --type SecureString --overwrite || true
          echo "EKS cluster ${CLUSTER_NAME} provisioned in ${TF_VAR_region}"
          aws eks describe-cluster --name ${CLUSTER_NAME} --region ${TF_VAR_region} \
            --query 'cluster.{Status:status,Version:version,Endpoint:endpoint}' --output table
        fi

artifacts:
  files:
    - /tmp/tf-outputs.json
  name: eks-outputs-${CODEBUILD_BUILD_NUMBER}
