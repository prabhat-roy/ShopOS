version: 0.2

# Docker-Build — CodeBuild buildspec
# Builds, scans (Trivy), and pushes ShopOS images to Harbor.
# Parameters via environment variables (set in CodePipeline action overrides):
#   SERVICE_NAME, DOMAIN, IMAGE_TAG, REGISTRY_PROJECT, PUSH_IMAGE, SCAN_IMAGE

env:
  variables:
    REGISTRY_PROJECT: shopos
    PUSH_IMAGE: "true"
    SCAN_IMAGE: "true"
    DOMAIN: ""
    SERVICE_NAME: ""
  parameter-store:
    HARBOR_REGISTRY: /shopos/harbor/registry
    HARBOR_USER: /shopos/harbor/user
    HARBOR_PASSWORD: /shopos/harbor/password
    SLACK_WEBHOOK: /shopos/slack/webhook

phases:
  install:
    commands:
      # Trivy
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - echo "=== Installed Trivy $(trivy --version) ==="

  pre_build:
    commands:
      - echo "=== Docker-Build pre-build: SERVICE_NAME=${SERVICE_NAME:-ALL} DOMAIN=${DOMAIN:-ALL} ==="
      - GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
      - IMAGE_TAG="${IMAGE_TAG:-dev-${GIT_SHA}-${CODEBUILD_BUILD_NUMBER}}"
      - echo "IMAGE_TAG=${IMAGE_TAG}"
      # Login to Harbor
      - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin

  build:
    commands:
      - echo "=== Docker Build Phase ==="
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

        build_svc() {
          local domain=$1 svc=$2
          local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
          echo "=== Building: $image ==="
          docker build \
            --label "git.commit=$IMAGE_TAG" \
            --label "build.number=$CODEBUILD_BUILD_NUMBER" \
            --label "domain=$domain" \
            -t "$image" \
            "src/$domain/$svc/" || echo "WARN build failed for $svc"
        }

        if [ -n "$SERVICE_NAME" ] && [ -n "$DOMAIN" ]; then
          build_svc "$DOMAIN" "$SERVICE_NAME"
        elif [ -n "$DOMAIN" ]; then
          for svc_path in src/$DOMAIN/*/; do
            [ -d "$svc_path" ] || continue
            build_svc "$DOMAIN" "$(basename $svc_path)"
          done
        else
          for d in $ALL_DOMAINS; do
            for svc_path in src/$d/*/; do
              [ -d "$svc_path" ] || continue
              build_svc "$d" "$(basename $svc_path)"
            done
          done
        fi

      - echo "=== Trivy Scan Phase ==="
      - mkdir -p reports/image-scan
      - |
        if [ "$SCAN_IMAGE" != "true" ]; then
          echo "SCAN_IMAGE=false — skipping Trivy scan"
        else
          ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

          scan_svc() {
            local svc=$1
            local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
            echo "=== Trivy: $image ==="
            trivy image \
              --exit-code 0 \
              --severity HIGH,CRITICAL \
              --format json \
              --output "reports/image-scan/trivy-${svc}.json" \
              "$image" || true
          }

          if [ -n "$SERVICE_NAME" ]; then
            scan_svc "$SERVICE_NAME"
          elif [ -n "$DOMAIN" ]; then
            for svc_path in src/$DOMAIN/*/; do
              [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
            done
          else
            for d in $ALL_DOMAINS; do
              for svc_path in src/$d/*/; do
                [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
              done
            done
          fi
        fi

  post_build:
    commands:
      - echo "=== Docker Push Phase ==="
      - |
        if [ "$PUSH_IMAGE" != "true" ]; then
          echo "PUSH_IMAGE=false — skipping push"
        else
          ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

          push_svc() {
            local svc=$1
            local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
            echo "=== Pushing: $image ==="
            docker push "$image" || echo "WARN push failed for $svc"
          }

          if [ -n "$SERVICE_NAME" ]; then
            push_svc "$SERVICE_NAME"
          elif [ -n "$DOMAIN" ]; then
            for svc_path in src/$DOMAIN/*/; do
              [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
            done
          else
            for d in $ALL_DOMAINS; do
              for svc_path in src/$d/*/; do
                [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
              done
            done
          fi
        fi
      - docker logout "$HARBOR_REGISTRY" || true
      - echo "Docker-Build complete. TAG=${IMAGE_TAG}"
      - |
        curl -sf -X POST "$SLACK_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\":whale: Docker Build complete — images pushed to $HARBOR_REGISTRY @ tag=$IMAGE_TAG — build #$CODEBUILD_BUILD_NUMBER\"}" || true

artifacts:
  files:
    - reports/image-scan/**/*
  name: docker-build-reports-$CODEBUILD_BUILD_NUMBER
