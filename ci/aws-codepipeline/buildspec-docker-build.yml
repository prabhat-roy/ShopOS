version: 0.2

# AWS CodePipeline — Build all service images, scan with Trivy, push to ECR
# Set DOMAIN to build one domain; leave empty to build all 13 domains

env:
  parameter-store:
    AWS_ACCOUNT_ID: /shopos/aws/account_id
    AWS_REGION: /shopos/aws/region
  variables:
    DOMAIN: ""
    SERVICE_NAME: ""

phases:
  install:
    commands:
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin latest
      - trivy --version | head -1

  pre_build:
    commands:
      - ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - IMAGE_TAG="${CODEBUILD_BUILD_NUMBER}-${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}"
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
      - mkdir -p reports/image-scan
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
        SCOPE="${DOMAIN:-${ALL_DOMAINS}}"
        for domain in ${SCOPE}; do
          for dir in src/${domain}/*/; do
            [ -d "${dir}" ] || continue
            SVC=$(basename ${dir})
            aws ecr describe-repositories --repository-names shopos/${SVC} --region ${AWS_REGION} 2>/dev/null || \
              aws ecr create-repository \
                --repository-name shopos/${SVC} \
                --image-scanning-configuration scanOnPush=true \
                --region ${AWS_REGION} || true
          done
        done

  build:
    commands:
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
        SCOPE="${DOMAIN:-${ALL_DOMAINS}}"
        FAILED=0
        for domain in ${SCOPE}; do
          for dir in src/${domain}/*/; do
            [ -d "${dir}" ] || continue
            SVC=$(basename ${dir})
            if [ -n "${SERVICE_NAME}" ] && [ "${SVC}" != "${SERVICE_NAME}" ]; then continue; fi
            IMAGE="${ECR_REGISTRY}/shopos/${SVC}:${IMAGE_TAG}"
            echo "=== Building ${IMAGE} ==="
            docker build \
              --label git.commit="${CODEBUILD_RESOLVED_SOURCE_VERSION}" \
              --label build.number="${CODEBUILD_BUILD_NUMBER}" \
              --label domain="${domain}" \
              -t "${IMAGE}" "${dir}" || { echo "WARN: ${SVC} build failed"; FAILED=$((FAILED+1)); continue; }
            trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 0 \
              --format json \
              --output "reports/image-scan/trivy-${SVC}.json" \
              "${IMAGE}" || true
            docker push "${IMAGE}" || { echo "WARN: ${SVC} push failed"; FAILED=$((FAILED+1)); }
          done
        done
        echo "Build complete. Failures: ${FAILED}"

  post_build:
    commands:
      - echo "All images pushed to ECR ${ECR_REGISTRY}"
      - |
        aws ssm put-parameter \
          --name /shopos/image_tag \
          --value "${IMAGE_TAG}" \
          --type String --overwrite || true
      - |
        aws cloudwatch put-metric-data \
          --metric-name DockerBuildComplete \
          --namespace ShopOS/CI \
          --value 1 \
          --unit Count \
          --region ${AWS_REGION} || true

artifacts:
  files:
    - reports/image-scan/**/*
  name: docker-build-reports-${CODEBUILD_BUILD_NUMBER}
