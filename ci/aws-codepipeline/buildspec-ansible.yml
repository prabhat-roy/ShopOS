version: 0.2

# Ansible Playbooks — CodeBuild buildspec
# Mirrors .github/workflows/ansible.yml
# Parameters via environment variables:
#   PLAYBOOK (jenkins|k8s-node|common)
#   INVENTORY (aws|gcp|azure)
#   LIMIT, EXTRA_VARS, CHECK_MODE (true|false)

env:
  variables:
    PLAYBOOK: k8s-node
    INVENTORY: aws
    LIMIT: ""
    EXTRA_VARS: ""
    CHECK_MODE: "false"
    ANSIBLE_DIR: infra/ansible
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_STDOUT_CALLBACK: yaml
  parameter-store:
    ANSIBLE_SSH_USER: /shopos/ansible/ssh-user
    AWS_REGION_PARAM: /shopos/aws/region
    GCP_PROJECT_ID: /shopos/gcp/project-id
  secrets-manager:
    ANSIBLE_SSH_PRIVATE_KEY: shopos/ansible:ssh-private-key
    GCP_SERVICE_ACCOUNT_KEY: shopos/gcp:service-account-key

phases:
  install:
    runtime-versions:
      python: 3.13

  pre_build:
    commands:
      - pip install ansible ansible-lint boto3 botocore google-auth msrest msrestazure --quiet
      - ansible-galaxy collection install amazon.aws google.cloud azure.azcollection community.kubernetes --quiet
      # Write SSH key
      - echo "$ANSIBLE_SSH_PRIVATE_KEY" > /tmp/ansible_key
      - chmod 600 /tmp/ansible_key
      # Cloud credentials
      - |
        if [ "$INVENTORY" = "gcp" ]; then
          echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
        fi

  build:
    commands:
      - ansible-lint "$ANSIBLE_DIR/playbooks/$PLAYBOOK.yml" -c "$ANSIBLE_DIR/.ansible-lint" || true

      - |
        LIMIT_ARG=""
        if [ -n "$LIMIT" ]; then
          LIMIT_ARG="--limit $LIMIT"
        fi
        EXTRA_VARS_ARG=""
        if [ -n "$EXTRA_VARS" ]; then
          EXTRA_VARS_ARG="--extra-vars '$EXTRA_VARS'"
        fi
        CHECK_ARG=""
        if [ "$CHECK_MODE" = "true" ]; then
          CHECK_ARG="--check --diff"
        fi

        eval ansible-playbook \
          -i "$ANSIBLE_DIR/inventories/$INVENTORY/hosts.yml" \
          "$ANSIBLE_DIR/playbooks/$PLAYBOOK.yml" \
          --private-key /tmp/ansible_key \
          --user "$ANSIBLE_SSH_USER" \
          $LIMIT_ARG \
          $EXTRA_VARS_ARG \
          $CHECK_ARG \
          -v

  post_build:
    commands:
      - rm -f /tmp/ansible_key /tmp/gcp-sa.json
      - echo "Ansible $PLAYBOOK on $INVENTORY complete"
