version: 0.2

# AWS CodePipeline — Verify all required tools available in CodeBuild environment
# Uses CodeBuild runtime-versions; installs extras via AWS-hosted runtimes

env:
  parameter-store:
    AWS_REGION: /shopos/aws/region

phases:
  install:
    runtime-versions:
      golang: 1.23
      java: corretto21
      nodejs: 22
      python: 3.12
      dotnet: 8.0
    commands:
      - echo "=== CodeBuild runtime versions installed ==="
      - go version
      - java -version 2>&1 | head -1
      - node --version
      - python3 --version
      - dotnet --version

  build:
    commands:
      # kubectl — from AWS-managed S3 mirror
      - |
        KUBECTL_VER=$(curl -Ls https://dl.k8s.io/release/stable.txt)
        curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
        chmod +x /usr/local/bin/kubectl
        kubectl version --client

      # eksctl — AWS EKS CLI
      - |
        curl -fsSL https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz | tar -xz -C /usr/local/bin
        eksctl version

      # Helm
      - |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm version --short

      # Terraform
      - |
        TF_VER=1.9.8
        curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip" -o /tmp/tf.zip
        unzip -q /tmp/tf.zip -d /usr/local/bin/
        terraform version

      # AWS CLI v2 (already present in CodeBuild but confirm version)
      - aws --version

      # Cosign
      - |
        curl -fsSL "https://github.com/sigstore/cosign/releases/download/v2.4.0/cosign-linux-amd64" \
          -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
        cosign version

      # Buf
      - |
        BUF_VERSION=1.35.1
        curl -fsSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
          -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf
        buf --version

      # Trivy
      - |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        trivy --version | head -1

      # Grype + Syft (Anchore)
      - |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        grype version | head -1
        syft --version

      # Semgrep + Checkov
      - |
        pip install semgrep checkov --quiet
        semgrep --version
        checkov --version

      # Gitleaks
      - |
        GITLEAKS_VER=8.21.0
        curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz" \
          | tar -xz -C /usr/local/bin gitleaks
        gitleaks version

      # Kustomize
      - |
        curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
        mv kustomize /usr/local/bin/
        kustomize version

      # k6 load testing
      - |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
          --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update -qq && sudo apt-get install k6 -y -qq
        k6 version

  post_build:
    commands:
      - echo "=== Tool inventory ==="
      - kubectl version --client
      - eksctl version
      - helm version --short
      - terraform version
      - aws --version
      - go version
      - java -version 2>&1 | head -1
      - node --version
      - python3 --version
      - dotnet --version
      - cosign version
      - buf --version
      - trivy --version | head -1
      - grype version | head -1
      - syft --version
      - semgrep --version
      - checkov --version
      - gitleaks version
      - k6 version
      - |
        aws cloudwatch put-metric-data \
          --metric-name InstallToolsComplete \
          --namespace ShopOS/CI \
          --value 1 --unit Count \
          --region ${AWS_REGION} || true
