version: 0.2

# AWS CodePipeline — Full EKS cluster bootstrap sequence
# Runs all 6 infra phases sequentially using aws eks update-kubeconfig
# Set PHASE to a specific phase or ALL to run everything

env:
  parameter-store:
    EKS_CLUSTER_NAME: /shopos/eks/cluster_name
    AWS_REGION: /shopos/aws/region
    AWS_ACCOUNT_ID: /shopos/aws/account_id
    KEYCLOAK_ADMIN_PASSWORD: /shopos/keycloak/admin-password
    GRAFANA_ADMIN_PASSWORD: /shopos/grafana/admin-password
    RABBITMQ_PASSWORD: /shopos/rabbitmq/password
    MINIO_ROOT_USER: /shopos/minio/root-user
    S3_BUCKET_LOGS: /shopos/s3/logs-bucket
    S3_BUCKET_TRACES: /shopos/s3/traces-bucket
    VELERO_S3_BUCKET: /shopos/velero/s3-bucket
    VAULT_KMS_KEY_ID: /shopos/vault/kms-key-id
  secrets-manager:
    HARBOR_ADMIN_PASSWORD: shopos/harbor:admin-password
    ARGOCD_ADMIN_PASSWORD_HASH: shopos/argocd:admin-password-hash
    MINIO_ROOT_PASSWORD: shopos/minio:root-password
  variables:
    ENVIRONMENT: dev
    PHASE: ALL
    SKIP_NETWORKING: "false"
    SKIP_SECURITY: "false"
    SKIP_OBSERVABILITY: "false"
    SKIP_MESSAGING: "false"
    SKIP_REGISTRY: "false"
    SKIP_GITOPS: "false"

phases:
  install:
    commands:
      - curl -fsSL "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  pre_build:
    commands:
      - aws eks update-kubeconfig --region ${AWS_REGION} --name ${EKS_CLUSTER_NAME}
      - kubectl get nodes
      - echo "Cluster Bootstrap — ${ENVIRONMENT} — Phase: ${PHASE}"

  build:
    commands:
      # Phase 1: Networking
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "networking" ]) && [ "${SKIP_NETWORKING}" != "true" ]; then
          echo "=== Phase 1/6: Networking ==="

          # AWS Load Balancer Controller
          helm repo add eks https://aws.github.io/eks-charts --force-update
          VPC_ID=$(aws eks describe-cluster --name ${EKS_CLUSTER_NAME} --region ${AWS_REGION} \
            --query 'cluster.resourcesVpcConfig.vpcId' --output text)
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${EKS_CLUSTER_NAME} \
            --set serviceAccount.create=true \
            --set region=${AWS_REGION} \
            --set vpcId=${VPC_ID} \
            --wait --timeout 5m

          # cert-manager (prerequisite for Istio)
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set installCRDs=true --set replicaCount=2 \
            --wait --timeout 5m

          # Istio
          helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
          helm upgrade --install istio-base istio/base \
            --namespace istio-system --create-namespace --wait --timeout 3m
          helm upgrade --install istiod istio/istiod \
            --namespace istio-system --set telemetry.enabled=true --wait --timeout 5m
          helm upgrade --install istio-ingressgateway istio/gateway \
            --namespace istio-system --wait --timeout 3m

          # Traefik with AWS NLB annotation
          helm repo add traefik https://traefik.github.io/charts --force-update
          helm upgrade --install traefik traefik/traefik \
            --namespace networking --create-namespace \
            --set deployment.replicas=2 \
            --set ports.websecure.tls.enabled=true \
            --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
            --set service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
            --wait --timeout 5m

          # Consul
          helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
          helm upgrade --install consul hashicorp/consul \
            --namespace consul --create-namespace \
            --set server.replicas=3 --set server.bootstrapExpect=3 \
            --set connectInject.enabled=true --wait --timeout 8m

          echo "Phase 1 Networking — DONE"
        fi

      # Phase 2: Security
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "security" ]) && [ "${SKIP_SECURITY}" != "true" ]; then
          echo "=== Phase 2/6: Security ==="

          helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
          # Vault with AWS KMS auto-unseal
          helm upgrade --install vault hashicorp/vault \
            --namespace vault --create-namespace \
            --set server.ha.enabled=true --set server.ha.raft.enabled=true \
            --set server.ha.replicas=3 --set ui.enabled=true \
            --set "server.extraEnvironmentVars.VAULT_SEAL_TYPE=awskms" \
            --set "server.extraEnvironmentVars.VAULT_AWSKMS_SEAL_KEY_ID=${VAULT_KMS_KEY_ID}" \
            --set "server.extraEnvironmentVars.AWS_REGION=${AWS_REGION}" \
            --wait --timeout 10m

          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak --create-namespace \
            --set replicaCount=2 \
            --set auth.adminPassword="${KEYCLOAK_ADMIN_PASSWORD}" \
            --set postgresql.enabled=true \
            --set postgresql.primary.persistence.storageClass=gp3 \
            --wait --timeout 10m

          helm repo add kyverno https://kyverno.github.io/kyverno --force-update
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno --create-namespace \
            --set replicaCount=2 --wait --timeout 5m

          helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco --create-namespace \
            --set driver.kind=ebpf \
            --set falcosidekick.enabled=true \
            --wait --timeout 8m

          helm repo add aqua https://aquasecurity.github.io/helm-charts --force-update
          helm upgrade --install trivy-operator aqua/trivy-operator \
            --namespace trivy-system --create-namespace \
            --set trivy.ignoreUnfixed=true --wait --timeout 5m

          echo "Phase 2 Security — DONE"
        fi

      # Phase 3: Observability
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "observability" ]) && [ "${SKIP_OBSERVABILITY}" != "true" ]; then
          echo "=== Phase 3/6: Observability ==="

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace observability --create-namespace \
            --set prometheus.prometheusSpec.retention=30d \
            --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=gp3 \
            --set grafana.enabled=false \
            --wait --timeout 10m

          helm repo add grafana https://grafana.github.io/helm-charts --force-update
          helm upgrade --install grafana grafana/grafana \
            --namespace observability \
            --set adminPassword="${GRAFANA_ADMIN_PASSWORD}" \
            --set persistence.enabled=true \
            --set persistence.storageClassName=gp3 \
            --wait --timeout 5m

          # Loki backed by S3
          helm upgrade --install loki grafana/loki \
            --namespace observability \
            --set loki.auth_enabled=false \
            --set loki.storage.type=s3 \
            --set loki.storage.s3.region=${AWS_REGION} \
            --set loki.storage.s3.bucketnames=${S3_BUCKET_LOGS} \
            --wait --timeout 8m

          echo "Phase 3 Observability — DONE"
        fi

      # Phase 4: Messaging
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "messaging" ]) && [ "${SKIP_MESSAGING}" != "true" ]; then
          echo "=== Phase 4/6: Messaging ==="

          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          helm upgrade --install zookeeper bitnami/zookeeper \
            --namespace messaging --create-namespace \
            --set replicaCount=3 \
            --set persistence.storageClass=gp3 \
            --wait --timeout 8m

          helm upgrade --install kafka bitnami/kafka \
            --namespace messaging \
            --set replicaCount=3 \
            --set zookeeper.enabled=false \
            --set externalZookeeper.servers=zookeeper.messaging.svc:2181 \
            --set autoCreateTopicsEnable=false \
            --set defaultReplicationFactor=3 \
            --set persistence.storageClass=gp3 \
            --wait --timeout 10m

          helm upgrade --install rabbitmq bitnami/rabbitmq \
            --namespace messaging \
            --set replicaCount=3 \
            --set auth.password="${RABBITMQ_PASSWORD}" \
            --set clustering.enabled=true \
            --set persistence.storageClass=gp3 \
            --wait --timeout 8m

          helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
          helm upgrade --install nats nats/nats \
            --namespace messaging \
            --set nats.jetstream.enabled=true \
            --set cluster.enabled=true --set cluster.replicas=3 \
            --set nats.jetstream.fileStorage.storageClassName=gp3 \
            --wait --timeout 5m

          # Core Kafka topics
          sleep 30
          KAFKA_POD=$(kubectl get pod -n messaging -l app.kubernetes.io/name=kafka -o jsonpath='{.items[0].metadata.name}')
          for ARGS in "commerce.order.placed 12 3" "commerce.payment.processed 12 3" "identity.user.registered 6 3" "analytics.page.viewed 12 3" "security.fraud.detected 3 3"; do
            kubectl exec -n messaging "${KAFKA_POD}" -- \
              kafka-topics.sh --create --if-not-exists \
              --bootstrap-server kafka.messaging.svc:9092 \
              --topic $(echo ${ARGS} | awk '{print $1}') \
              --partitions $(echo ${ARGS} | awk '{print $2}') \
              --replication-factor $(echo ${ARGS} | awk '{print $3}') || true
          done

          echo "Phase 4 Messaging — DONE"
        fi

      # Phase 5: Registry
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "registry" ]) && [ "${SKIP_REGISTRY}" != "true" ]; then
          echo "=== Phase 5/6: Registry ==="

          helm repo add harbor https://helm.goharbor.io --force-update
          helm upgrade --install harbor harbor/harbor \
            --namespace registry --create-namespace \
            --set harborAdminPassword="${HARBOR_ADMIN_PASSWORD}" \
            --set trivy.enabled=true \
            --set persistence.enabled=true \
            --set persistence.persistentVolumeClaim.registry.storageClass=gp3 \
            --wait --timeout 10m

          helm repo add minio https://charts.min.io --force-update
          helm upgrade --install minio minio/minio \
            --namespace registry \
            --set rootUser="${MINIO_ROOT_USER}" \
            --set rootPassword="${MINIO_ROOT_PASSWORD}" \
            --set replicas=4 --set persistence.enabled=true \
            --set persistence.size=100Gi \
            --set persistence.storageClass=gp3 \
            --wait --timeout 8m

          echo "Phase 5 Registry — DONE"
        fi

      # Phase 6: GitOps
      - |
        if ([ "${PHASE}" = "ALL" ] || [ "${PHASE}" = "gitops" ]) && [ "${SKIP_GITOPS}" != "true" ]; then
          echo "=== Phase 6/6: GitOps ==="

          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd --create-namespace \
            --set server.replicas=2 \
            --set redis-ha.enabled=true \
            --set configs.secret.argocdServerAdminPassword="${ARGOCD_ADMIN_PASSWORD_HASH}" \
            --wait --timeout 10m

          helm repo add kedacore https://kedacore.github.io/charts --force-update
          helm upgrade --install keda kedacore/keda \
            --namespace keda --create-namespace \
            --wait --timeout 5m

          # Velero backed by S3
          helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
          helm upgrade --install velero vmware-tanzu/velero \
            --namespace velero --create-namespace \
            --set configuration.backupStorageLocation[0].provider=aws \
            --set configuration.backupStorageLocation[0].bucket=${VELERO_S3_BUCKET} \
            --set configuration.backupStorageLocation[0].config.region=${AWS_REGION} \
            --set configuration.volumeSnapshotLocation[0].provider=aws \
            --set configuration.volumeSnapshotLocation[0].config.region=${AWS_REGION} \
            --set initContainers[0].name=velero-plugin-for-aws \
            --set initContainers[0].image=velero/velero-plugin-for-aws:v1.10.0 \
            --set initContainers[0].volumeMounts[0].mountPath=/target \
            --set initContainers[0].volumeMounts[0].name=plugins \
            --wait --timeout 5m

          # Bootstrap ArgoCD App-of-Apps
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s
          kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true

          echo "Phase 6 GitOps — DONE"
        fi

  post_build:
    commands:
      - echo "=== Cluster Bootstrap Complete — ${ENVIRONMENT} ==="
      - kubectl get nodes
      - kubectl get namespaces
      - |
        aws cloudwatch put-metric-data \
          --metric-name ClusterBootstrapComplete \
          --namespace ShopOS/CI \
          --value 1 --unit Count \
          --dimensions Environment=${ENVIRONMENT} \
          --region ${AWS_REGION} || true
