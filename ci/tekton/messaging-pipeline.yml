# Messaging Infrastructure Pipeline — Tekton (In-Cluster Helm Install)
# Role: Installs and configures messaging infrastructure (Kafka, RabbitMQ, NATS)
#       using helm Tasks running inside the cluster.
# Secrets: kubeconfig-secret, kafka-credentials, rabbitmq-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-kafka
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: messaging
    - name: chart-version
      default: "29.3.4"
    - name: replica-count
      default: "3"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: add-repo
      image: alpine/helm:3.16.2
      script: |
        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm repo update
    - name: install-kafka
      image: alpine/helm:3.16.2
      script: |
        helm upgrade --install kafka bitnami/kafka \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/messaging/kafka/values.yaml \
          --set replicaCount=$(params.replica-count) \
          --set kraft.enabled=true \
          --wait --timeout 10m
        echo "Kafka installed in $(params.namespace)"
    - name: verify
      image: bitnami/kubectl:1.31.0
      script: |
        kubectl rollout status statefulset/kafka \
          --namespace $(params.namespace) \
          --timeout=300s
        echo "Kafka is ready"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-rabbitmq
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: messaging
    - name: chart-version
      default: "14.7.0"
    - name: replica-count
      default: "3"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install-rabbitmq
      image: alpine/helm:3.16.2
      script: |
        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm upgrade --install rabbitmq bitnami/rabbitmq \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/messaging/rabbitmq/values.yaml \
          --set replicaCount=$(params.replica-count) \
          --wait --timeout 8m
        echo "RabbitMQ installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-nats
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: messaging
    - name: chart-version
      default: "1.2.6"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install-nats
      image: alpine/helm:3.16.2
      script: |
        helm repo add nats https://nats-io.github.io/k8s/helm/infra/messaging/ --force-update
        helm upgrade --install nats nats/nats \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/messaging/nats/values.yaml \
          --set nats.jetstream.enabled=true \
          --wait --timeout 5m
        echo "NATS JetStream installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-kafka-topics
  namespace: tekton-pipelines
spec:
  params:
    - name: kafka-namespace
      default: messaging
    - name: kafka-bootstrap
      default: kafka.messaging.svc.cluster.local:9092
  steps:
    - name: create-topics
      image: bitnami/kafka:3.8.0
      script: |
        TOPICS="
          identity.user.registered
          identity.user.deleted
          commerce.order.placed
          commerce.order.cancelled
          commerce.order.fulfilled
          commerce.payment.processed
          commerce.payment.failed
          commerce.cart.abandoned
          supplychain.shipment.created
          supplychain.shipment.updated
          supplychain.inventory.low
          supplychain.inventory.restocked
          notification.email.requested
          notification.sms.requested
          notification.push.requested
          analytics.page.viewed
          analytics.product.clicked
          analytics.search.performed
          security.fraud.detected
          security.login.failed
        "
        for TOPIC in $TOPICS; do
          kafka-topics.sh \
            --bootstrap-server $(params.kafka-bootstrap) \
            --create \
            --if-not-exists \
            --topic "$TOPIC" \
            --partitions 6 \
            --replication-factor 3
          echo "Topic created: $TOPIC"
        done
        echo "All Kafka topics created"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-messaging-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster messaging infrastructure pipeline. Installs Kafka, RabbitMQ, NATS
    via Helm and creates all required Kafka topics.
  params:
    - name: messaging-namespace
      default: messaging
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
    - name: install-kafka
      default: "true"
    - name: install-rabbitmq
      default: "true"
    - name: install-nats
      default: "true"
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: install-kafka
      taskRef:
        name: helm-install-kafka
      params:
        - name: namespace
          value: $(params.messaging-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-kafka)
          operator: in
          values: ["true"]

    - name: install-rabbitmq
      taskRef:
        name: helm-install-rabbitmq
      params:
        - name: namespace
          value: $(params.messaging-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-rabbitmq)
          operator: in
          values: ["true"]

    - name: install-nats
      taskRef:
        name: helm-install-nats
      params:
        - name: namespace
          value: $(params.messaging-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-nats)
          operator: in
          values: ["true"]

    - name: create-topics
      taskRef:
        name: create-kafka-topics
      params:
        - name: kafka-namespace
          value: $(params.messaging-namespace)
      runAfter: [install-kafka]
      when:
        - input: $(params.install-kafka)
          operator: in
          values: ["true"]
