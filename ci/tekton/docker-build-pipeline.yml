# Docker-Build Pipeline — Tekton (In-Cluster Image Build with Kaniko)
# Role: Builds images in-cluster without Docker daemon using Kaniko.
#       Triggered by git push events via EventListener.
# Secrets: harbor-credentials (dockerconfigjson as /kaniko/.docker/config.json)
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: EventListener
metadata:
  name: git-push-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: git-push-trigger
      interceptors:
        - ref:
            name: github
          params:
            - name: eventTypes
              value: [push]
      bindings:
        - ref: git-push-binding
      template:
        ref: build-pipeline-template
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerBinding
metadata:
  name: git-push-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: git-revision
      value: $(body.after)
    - name: git-ref
      value: $(body.ref)
    - name: repo-url
      value: $(body.repository.clone_url)
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: build-pipeline-template
  namespace: tekton-pipelines
spec:
  params:
    - name: git-revision
    - name: git-ref
    - name: repo-url
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: kaniko-build-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: shopos-build-pipeline
        params:
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: repo-url
            value: $(tt.params.repo-url)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 2Gi
          - name: docker-credentials
            secret:
              secretName: harbor-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: tekton-pipelines
spec:
  params:
    - name: image
      description: Full image reference including registry, project, name, and tag
    - name: context
      default: .
      description: Path within source workspace to the build context (relative)
    - name: dockerfile
      default: Dockerfile
    - name: cache-repo
      default: harbor.shopos.internal/shopos/cache
  workspaces:
    - name: source
    - name: docker-credentials
  steps:
    - name: build-push
      image: gcr.io/kaniko-project/executor:v1.23.0
      args:
        - --dockerfile=$(workspaces.source.path)/$(params.context)/$(params.dockerfile)
        - --context=$(workspaces.source.path)/$(params.context)
        - --destination=$(params.image)
        - --cache=true
        - --cache-repo=$(params.cache-repo)
        - --snapshot-mode=redo
        - --compressed-caching=false
        - --use-new-run
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
  volumes:
    - name: docker-config
      projected:
        sources:
          - secret:
              name: harbor-credentials
              items:
                - key: .dockerconfigjson
                  path: config.json
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-shallow
  namespace: tekton-pipelines
spec:
  params:
    - name: url
    - name: revision
      default: main
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:2.47.0
      script: |
        git clone --depth=1 --branch=$(params.revision) $(params.url) /workspace/source
        echo "Cloned at $(git -C /workspace/source rev-parse --short HEAD)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: resolve-services
  namespace: tekton-pipelines
spec:
  params:
    - name: service-name
      default: ""
    - name: domain
      default: ""
  workspaces:
    - name: source
  results:
    - name: targets
      description: Space-separated domain:service pairs to build
  steps:
    - name: resolve
      image: alpine:3.20
      script: |
        #!/bin/sh
        cd /workspace/source
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
        PAIRS=""
        if [ -n "$(params.service-name)" ] && [ -n "$(params.domain)" ]; then
          PAIRS="$(params.domain):$(params.service-name)"
        elif [ -n "$(params.domain)" ]; then
          for svc in $(ls src/$(params.domain)/); do
            [ -f "src/$(params.domain)/$svc/Dockerfile" ] && PAIRS="$PAIRS $(params.domain):$svc"
          done
        else
          for d in $ALL_DOMAINS; do
            for svc in $(ls src/$d/ 2>/dev/null); do
              [ -f "src/$d/$svc/Dockerfile" ] && PAIRS="$PAIRS $d:$svc"
            done
          done
        fi
        printf '%s' "$PAIRS" > $(results.targets.path)
        echo "Resolved targets: $PAIRS"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-build-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster Kaniko image build pipeline. Clones source, resolves services,
    builds images in-cluster (no Docker daemon), pushes to Harbor.
  params:
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: git-revision
      default: main
    - name: service-name
      default: ""
    - name: domain
      default: ""
    - name: registry
      default: harbor.shopos.internal
    - name: image-tag
      default: latest
  workspaces:
    - name: source
    - name: docker-credentials
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shallow
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: source
          workspace: source

    - name: kaniko-build-api-gateway
      taskRef:
        name: kaniko-build
      params:
        - name: image
          value: $(params.registry)/shopos/api-gateway:$(params.image-tag)
        - name: context
          value: src/platform/api-gateway
      workspaces:
        - name: source
          workspace: source
        - name: docker-credentials
          workspace: docker-credentials
      runAfter: [clone]

    - name: kaniko-build-order-service
      taskRef:
        name: kaniko-build
      params:
        - name: image
          value: $(params.registry)/shopos/order-service:$(params.image-tag)
        - name: context
          value: src/commerce/order-service
      workspaces:
        - name: source
          workspace: source
        - name: docker-credentials
          workspace: docker-credentials
      runAfter: [clone]

    - name: kaniko-build-payment-service
      taskRef:
        name: kaniko-build
      params:
        - name: image
          value: $(params.registry)/shopos/payment-service:$(params.image-tag)
        - name: context
          value: src/commerce/payment-service
      workspaces:
        - name: source
          workspace: source
        - name: docker-credentials
          workspace: docker-credentials
      runAfter: [clone]
