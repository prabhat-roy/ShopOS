# GitOps Tools Pipeline — Tekton
# Secrets: kubeconfig-secret, argocd-credentials, minio-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-argocd
  namespace: tekton-pipelines
spec:
  params:
    - name: action
      default: INSTALL
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: helm
      image: alpine/helm:latest
      env:
        - name: ARGOCD_ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: argocd-credentials
              key: admin-password-hash
      script: |
        if [ "$(params.action)" = "UNINSTALL" ]; then
          helm uninstall argocd -n argocd 2>/dev/null || true
          exit 0
        fi
        helm repo add argo https://argoproj.github.io/argo-helm --force-update
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --set server.replicas=2 \
          --set redis-ha.enabled=true \
          --set controller.replicas=1 \
          --set repoServer.replicas=2 \
          --set configs.secret.argocdServerAdminPassword="$ARGOCD_ADMIN_PASSWORD_HASH" \
          --wait --timeout 10m
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-argo-rollouts
  namespace: tekton-pipelines
spec:
  params:
    - name: action
      default: INSTALL
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: helm
      image: alpine/helm:latest
      script: |
        if [ "$(params.action)" = "UNINSTALL" ]; then
          helm uninstall argo-rollouts -n argo-rollouts 2>/dev/null || true
          exit 0
        fi
        helm repo add argo https://argoproj.github.io/argo-helm --force-update
        helm upgrade --install argo-rollouts argo/argo-rollouts \
          --namespace argo-rollouts --create-namespace \
          --set dashboard.enabled=true \
          --wait --timeout 5m
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-keda-gitops
  namespace: tekton-pipelines
spec:
  params:
    - name: action
      default: INSTALL
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: helm
      image: alpine/helm:latest
      script: |
        if [ "$(params.action)" = "UNINSTALL" ]; then
          helm uninstall keda -n keda 2>/dev/null || true
          exit 0
        fi
        helm repo add kedacore https://kedacore.github.io/charts --force-update
        helm upgrade --install keda kedacore/keda \
          --namespace keda --create-namespace \
          --set metricsServer.replicaCount=2 \
          --wait --timeout 5m
    - name: apply-scaledobjects
      image: bitnami/kubectl:latest
      script: |
        kubectl apply -f /workspace/source/kubernetes/keda/ 2>/dev/null || true
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-velero
  namespace: tekton-pipelines
spec:
  params:
    - name: action
      default: INSTALL
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: helm
      image: alpine/helm:latest
      env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: secret-key
      script: |
        if [ "$(params.action)" = "UNINSTALL" ]; then
          helm uninstall velero -n velero 2>/dev/null || true
          exit 0
        fi
        helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
        helm upgrade --install velero vmware-tanzu/velero \
          --namespace velero --create-namespace \
          --set configuration.backupStorageLocation[0].provider=aws \
          --set configuration.backupStorageLocation[0].bucket=velero-backups \
          --set "configuration.backupStorageLocation[0].config.s3Url=http://minio.registry.svc:9000" \
          --set configuration.backupStorageLocation[0].config.s3ForcePathStyle=true \
          --set "credentials.secretContents.cloud=[default]\naws_access_key_id=$MINIO_ACCESS_KEY\naws_secret_access_key=$MINIO_SECRET_KEY" \
          --wait --timeout 5m
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: argocd-bootstrap
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: wait-for-argocd
      image: bitnami/kubectl:latest
      script: |
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
    - name: apply-app-of-apps
      image: bitnami/kubectl:latest
      script: |
        kubectl apply -f /workspace/source/gitops/argocd/app-of-apps.yaml
        kubectl apply -f /workspace/source/gitops/argocd/applicationsets/ 2>/dev/null || true
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-pipeline
  namespace: tekton-pipelines
spec:
  params:
    - name: action
      default: INSTALL
    - name: install-argocd
      default: "true"
    - name: install-argo-rollouts
      default: "true"
    - name: install-keda
      default: "true"
    - name: install-velero
      default: "true"
    - name: bootstrap
      default: "false"
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: argocd
      taskRef:
        name: install-argocd
      params:
        - name: action
          value: $(params.action)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      when:
        - input: $(params.install-argocd)
          operator: in
          values: ["true"]

    - name: argo-rollouts
      taskRef:
        name: install-argo-rollouts
      params:
        - name: action
          value: $(params.action)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [argocd]
      when:
        - input: $(params.install-argo-rollouts)
          operator: in
          values: ["true"]

    - name: keda
      taskRef:
        name: install-keda-gitops
      params:
        - name: action
          value: $(params.action)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [argocd]
      when:
        - input: $(params.install-keda)
          operator: in
          values: ["true"]

    - name: velero
      taskRef:
        name: install-velero
      params:
        - name: action
          value: $(params.action)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [argocd]
      when:
        - input: $(params.install-velero)
          operator: in
          values: ["true"]

    - name: bootstrap
      taskRef:
        name: argocd-bootstrap
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [argocd, keda, velero]
      when:
        - input: $(params.bootstrap)
          operator: in
          values: ["true"]
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: gitops-pipeline-run
  namespace: tekton-pipelines
  annotations:
    description: "Example PipelineRun — update params before running"
spec:
  pipelineRef:
    name: gitops-pipeline
  params:
    - name: action
      value: INSTALL
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 512Mi
    - name: kubeconfig
      secret:
        secretName: kubeconfig-secret
