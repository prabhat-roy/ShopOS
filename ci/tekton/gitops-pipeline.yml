# GitOps Pipeline — Tekton (In-Cluster ArgoCD Sync)
# Role: Triggers ArgoCD application syncs from within the cluster after deployments.
#       Uses argocd CLI in a Task to sync apps and wait for health.
# Secrets: argocd-credentials, kubeconfig-secret
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: argocd-sync
  namespace: tekton-pipelines
spec:
  params:
    - name: app-name
      description: ArgoCD application name to sync
    - name: argocd-server
      default: argocd-server.argocd.svc.cluster.local
    - name: revision
      default: HEAD
    - name: prune
      default: "true"
    - name: timeout
      default: "300"
  steps:
    - name: sync
      image: argoproj/argocd:v2.13.0
      env:
        - name: ARGOCD_USERNAME
          valueFrom:
            secretKeyRef:
              name: argocd-credentials
              key: username
        - name: ARGOCD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: argocd-credentials
              key: password
      script: |
        echo "==> Logging in to ArgoCD at $(params.argocd-server)"
        argocd login $(params.argocd-server) \
          --username $ARGOCD_USERNAME \
          --password $ARGOCD_PASSWORD \
          --insecure \
          --grpc-web

        echo "==> Syncing app: $(params.app-name)"
        PRUNE_FLAG=""
        [ "$(params.prune)" = "true" ] && PRUNE_FLAG="--prune"

        argocd app sync $(params.app-name) \
          $PRUNE_FLAG \
          --revision $(params.revision) \
          --timeout $(params.timeout)

        echo "==> Waiting for app health: $(params.app-name)"
        argocd app wait $(params.app-name) \
          --health \
          --timeout $(params.timeout)

        echo "==> Sync complete for $(params.app-name)"
        argocd app get $(params.app-name)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: argocd-sync-all-apps
  namespace: tekton-pipelines
spec:
  params:
    - name: argocd-server
      default: argocd-server.argocd.svc.cluster.local
    - name: label-selector
      default: "app.kubernetes.io/part-of=shopos"
    - name: timeout
      default: "600"
  steps:
    - name: sync-all
      image: argoproj/argocd:v2.13.0
      env:
        - name: ARGOCD_USERNAME
          valueFrom:
            secretKeyRef:
              name: argocd-credentials
              key: username
        - name: ARGOCD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: argocd-credentials
              key: password
      script: |
        argocd login $(params.argocd-server) \
          --username $ARGOCD_USERNAME \
          --password $ARGOCD_PASSWORD \
          --insecure --grpc-web

        echo "==> Syncing all ShopOS ArgoCD applications"
        APPS=$(argocd app list -l $(params.label-selector) -o name 2>/dev/null || echo "")
        if [ -z "$APPS" ]; then
          echo "No apps matched selector: $(params.label-selector)"
          exit 0
        fi

        FAILED=0
        for APP in $APPS; do
          echo "Syncing: $APP"
          argocd app sync "$APP" --prune --timeout $(params.timeout) || FAILED=1
        done

        echo "==> Waiting for all apps to be healthy"
        for APP in $APPS; do
          argocd app wait "$APP" --health --timeout $(params.timeout) || FAILED=1
        done

        [ $FAILED -eq 1 ] && echo "Some apps failed to sync/become healthy" && exit 1
        echo "All apps synced and healthy"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: flux-reconcile
  namespace: tekton-pipelines
spec:
  params:
    - name: kustomization-name
      default: shopos
    - name: namespace
      default: flux-system
    - name: timeout
      default: 5m
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: reconcile
      image: fluxcd/flux-cli:v2.4.0
      script: |
        echo "==> Flux reconcile: $(params.kustomization-name)"
        flux reconcile kustomization $(params.kustomization-name) \
          --namespace=$(params.namespace) \
          --timeout=$(params.timeout) \
          --with-source
        echo "Reconciliation complete"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-gitops-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster GitOps pipeline. After a deploy completes, syncs ArgoCD applications
    and optionally triggers Flux reconciliation. All operations are cluster-internal.
  params:
    - name: app-name
      description: Specific ArgoCD app to sync (empty = sync all)
      default: ""
    - name: argocd-server
      default: argocd-server.argocd.svc.cluster.local
    - name: sync-all
      default: "false"
    - name: flux-reconcile
      default: "false"
  workspaces:
    - name: kubeconfig
  tasks:
    - name: sync-app
      taskRef:
        name: argocd-sync
      params:
        - name: app-name
          value: $(params.app-name)
        - name: argocd-server
          value: $(params.argocd-server)
      when:
        - input: $(params.sync-all)
          operator: in
          values: ["false"]

    - name: sync-all-apps
      taskRef:
        name: argocd-sync-all-apps
      params:
        - name: argocd-server
          value: $(params.argocd-server)
      when:
        - input: $(params.sync-all)
          operator: in
          values: ["true"]

    - name: flux-reconcile
      taskRef:
        name: flux-reconcile
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      when:
        - input: $(params.flux-reconcile)
          operator: in
          values: ["true"]
      runAfter: [sync-app, sync-all-apps]
