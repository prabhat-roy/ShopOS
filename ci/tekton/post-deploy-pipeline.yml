# Post-Deploy Pipeline — Tekton (In-Cluster k6 Load Test)
# Role: Runs k6 performance and smoke tests in-cluster after every deployment.
#       Triggered by the deploy-pipeline completing successfully.
# Secrets: kubeconfig-secret, influxdb-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k6-smoke-test
  namespace: tekton-pipelines
spec:
  params:
    - name: base-url
      description: Base URL of the deployed service
    - name: script-path
      default: load-testing/k6/smoke.js
    - name: influxdb-url
      default: http://influxdb.observability.svc.cluster.local:8086/k6
    - name: vus
      default: "10"
    - name: duration
      default: 30s
  workspaces:
    - name: source
  results:
    - name: passed
      description: "true if smoke test passed"
  steps:
    - name: run-smoke
      image: grafana/k6:0.55.0
      script: |
        echo "==> k6 smoke test against $(params.base-url)"
        k6 run \
          --env BASE_URL=$(params.base-url) \
          --vus $(params.vus) \
          --duration $(params.duration) \
          --out influxdb=$(params.influxdb-url) \
          --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
          /workspace/source/$(params.script-path) 2>&1
        EXIT=$?
        printf '%s' "$([ $EXIT -eq 0 ] && echo true || echo false)" > $(results.passed.path)
        exit $EXIT
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k6-load-test
  namespace: tekton-pipelines
spec:
  params:
    - name: base-url
    - name: script-path
      default: load-testing/k6/checkout-flow.js
    - name: influxdb-url
      default: http://influxdb.observability.svc.cluster.local:8086/k6
    - name: vus
      default: "50"
    - name: duration
      default: 5m
  workspaces:
    - name: source
  steps:
    - name: run-load
      image: grafana/k6:0.55.0
      script: |
        echo "==> k6 load test: $(params.script-path) @ $(params.base-url)"
        k6 run \
          --env BASE_URL=$(params.base-url) \
          --vus $(params.vus) \
          --duration $(params.duration) \
          --out influxdb=$(params.influxdb-url) \
          --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
          --thresholds '{"http_req_duration":["p(99)<2000"],"http_req_failed":["rate<0.01"]}' \
          /workspace/source/$(params.script-path)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k6-spike-test
  namespace: tekton-pipelines
spec:
  params:
    - name: base-url
    - name: script-path
      default: load-testing/k6/spike.js
    - name: influxdb-url
      default: http://influxdb.observability.svc.cluster.local:8086/k6
  workspaces:
    - name: source
  steps:
    - name: run-spike
      image: grafana/k6:0.55.0
      script: |
        echo "==> k6 spike test: $(params.base-url)"
        k6 run \
          --env BASE_URL=$(params.base-url) \
          --out influxdb=$(params.influxdb-url) \
          /workspace/source/$(params.script-path) || true
        echo "Spike test complete (non-blocking)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: healthz-check-all
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: default
    - name: service-name
      default: ""
    - name: port
      default: "8080"
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: check-endpoints
      image: curlimages/curl:8.10.1
      script: |
        SERVICES=$(params.service-name)
        if [ -z "$SERVICES" ]; then
          # Check critical platform services
          SERVICES="api-gateway web-bff graphql-gateway"
        fi
        FAILED=0
        for SVC in $SERVICES; do
          URL="http://$SVC.$(params.namespace).svc.cluster.local:$(params.port)/healthz"
          STATUS=$(curl -sf --max-time 10 "$URL" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "[PASS] $SVC /healthz → $STATUS"
          else
            echo "[FAIL] $SVC /healthz → $STATUS"
            FAILED=1
          fi
        done
        [ $FAILED -eq 1 ] && exit 1 || echo "All health checks passed"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-post-deploy-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster post-deployment validation pipeline. Runs k6 smoke, load, and spike
    tests using Grafana k6 container. Results sent to in-cluster InfluxDB.
    Triggered automatically after shopos-deploy-pipeline completes.
  params:
    - name: service-name
    - name: namespace
      default: default
    - name: base-url
      description: Full base URL for load tests
    - name: run-load-test
      default: "true"
    - name: run-spike-test
      default: "false"
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: health-check
      taskRef:
        name: healthz-check-all
      params:
        - name: service-name
          value: $(params.service-name)
        - name: namespace
          value: $(params.namespace)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: smoke-test
      taskRef:
        name: k6-smoke-test
      params:
        - name: base-url
          value: $(params.base-url)
      workspaces:
        - name: source
          workspace: source
      runAfter: [health-check]

    - name: load-test
      taskRef:
        name: k6-load-test
      params:
        - name: base-url
          value: $(params.base-url)
      workspaces:
        - name: source
          workspace: source
      runAfter: [smoke-test]
      when:
        - input: $(params.run-load-test)
          operator: in
          values: ["true"]

    - name: spike-test
      taskRef:
        name: k6-spike-test
      params:
        - name: base-url
          value: $(params.base-url)
      workspaces:
        - name: source
          workspace: source
      runAfter: [smoke-test]
      when:
        - input: $(params.run-spike-test)
          operator: in
          values: ["true"]
