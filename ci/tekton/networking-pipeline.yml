# Networking Pipeline — Tekton (In-Cluster Service Mesh + Edge Install)
# Role: Installs Traefik, Istio, Cilium, and Consul via Helm Tasks in-cluster.
#       Applies network policies and mTLS configuration.
# Secrets: kubeconfig-secret
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-traefik
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: networking
    - name: chart-version
      default: "33.1.0"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add traefik https://traefik.github.io/charts --force-update
        helm upgrade --install traefik traefik/traefik \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/networking/traefik/values.yaml \
          --set ingressClass.enabled=true \
          --set ingressClass.isDefaultClass=true \
          --wait --timeout 8m
        echo "Traefik edge router installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-istio
  namespace: tekton-pipelines
spec:
  params:
    - name: istio-version
      default: "1.23.3"
    - name: namespace
      default: istio-system
    - name: mesh-namespace
      default: default
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install-istio-base
      image: alpine/helm:3.16.2
      script: |
        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
        helm upgrade --install istio-base istio/base \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.istio-version) \
          --wait
        echo "Istio base CRDs installed"
    - name: install-istiod
      image: alpine/helm:3.16.2
      script: |
        helm upgrade --install istiod istio/istiod \
          --namespace $(params.namespace) \
          --version $(params.istio-version) \
          --values /workspace/source/networking/istio/values.yaml \
          --set pilot.traceSampling=1.0 \
          --wait --timeout 10m
        echo "Istiod installed"
    - name: enable-sidecar-injection
      image: bitnami/kubectl:1.31.0
      script: |
        kubectl label namespace $(params.mesh-namespace) \
          istio-injection=enabled \
          --overwrite
        echo "Sidecar injection enabled in namespace: $(params.mesh-namespace)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apply-network-policies-task
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: apply-cilium-policies
      image: bitnami/kubectl:1.31.0
      script: |
        if [ -d "/workspace/source/networking/cilium" ]; then
          kubectl apply -f /workspace/source/networking/cilium/ --server-side
          echo "Cilium network policies applied"
        fi
    - name: apply-k8s-policies
      image: bitnami/kubectl:1.31.0
      script: |
        kubectl apply -f /workspace/source/kubernetes/network-policies/ --server-side
        echo "K8s network policies applied"
    - name: apply-istio-policies
      image: bitnami/kubectl:1.31.0
      script: |
        if [ -d "/workspace/source/networking/istio" ]; then
          kubectl apply -f /workspace/source/networking/istio/ --server-side 2>/dev/null || true
          echo "Istio policies applied"
        fi
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-consul
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: consul
    - name: chart-version
      default: "1.5.3"
    - name: replicas
      default: "3"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        helm upgrade --install consul hashicorp/consul \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --set server.replicas=$(params.replicas) \
          --set connectInject.enabled=true \
          --wait --timeout 10m
        echo "Consul service mesh installed"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-networking-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster networking pipeline. Installs Traefik (edge), Istio (service mesh),
    Consul (service discovery), and applies all network policies.
  params:
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
    - name: install-traefik
      default: "true"
    - name: install-istio
      default: "true"
    - name: install-consul
      default: "true"
    - name: mesh-namespace
      default: default
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: install-traefik
      taskRef:
        name: helm-install-traefik
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-traefik)
          operator: in
          values: ["true"]

    - name: install-istio
      taskRef:
        name: helm-install-istio
      params:
        - name: mesh-namespace
          value: $(params.mesh-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-istio)
          operator: in
          values: ["true"]

    - name: install-consul
      taskRef:
        name: helm-install-consul
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
      when:
        - input: $(params.install-consul)
          operator: in
          values: ["true"]

    - name: apply-network-policies
      taskRef:
        name: apply-network-policies-task
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [install-istio, install-traefik]
