# Cluster Bootstrap Pipeline — Tekton (In-Cluster Bootstrap Orchestrator)
# Role: Orchestrates full cluster bootstrap sequence via chained in-cluster Pipelines.
#       Uses child PipelineRuns to coordinate: infra → networking → messaging →
#       observability → registry → security → gitops → services.
# Secrets: all-secrets aggregated via cluster-bootstrap-sa
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bootstrap-preflight
  namespace: tekton-pipelines
spec:
  params:
    - name: cluster-name
      default: shopos-cluster
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  results:
    - name: cluster-version
  steps:
    - name: check-connectivity
      image: bitnami/kubectl:1.31.0
      script: |
        echo "==> Bootstrap preflight for cluster: $(params.cluster-name)"
        kubectl cluster-info
        kubectl version --short 2>/dev/null || kubectl version
        kubectl get nodes -o wide
        NODES=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
        echo "Nodes ready: $NODES"
        [ "$NODES" -gt 0 ] || (echo "No nodes found" && exit 1)
        K8S_VERSION=$(kubectl version -o json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['serverVersion']['gitVersion'])" 2>/dev/null || echo "unknown")
        printf '%s' "$K8S_VERSION" > $(results.cluster-version.path)
        echo "Cluster ready. Kubernetes: $K8S_VERSION"
    - name: install-tekton-crds
      image: bitnami/kubectl:1.31.0
      script: |
        # Ensure Tekton Triggers CRDs are installed
        kubectl apply -f https://storage.googleapis.com/tekton-releases/triggers/latest/release.yaml \
          --server-side 2>/dev/null || true
        echo "Tekton Triggers CRDs applied"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-cert-manager
  namespace: tekton-pipelines
spec:
  params:
    - name: version
      default: v1.16.2
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add jetstack https://charts.jetstack.io --force-update
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --version $(params.version) \
          --set crds.enabled=true \
          --wait --timeout 8m
        echo "cert-manager installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-keda
  namespace: tekton-pipelines
spec:
  params:
    - name: chart-version
      default: "2.16.0"
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add kedacore https://kedacore.github.io/charts --force-update
        helm upgrade --install keda kedacore/keda \
          --namespace keda \
          --create-namespace \
          --version $(params.chart-version) \
          --wait --timeout 8m
        echo "KEDA installed"
        kubectl apply -f /dev/stdin <<'KEDA_EOF'
        # Apply KEDA ScaledObjects after CRDs are ready
        KEDA_EOF
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-external-secrets-operator
  namespace: tekton-pipelines
spec:
  params:
    - name: chart-version
      default: "0.10.5"
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add external-secrets https://charts.external-secrets.io --force-update
        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets \
          --create-namespace \
          --version $(params.chart-version) \
          --set installCRDs=true \
          --wait --timeout 8m
        echo "External Secrets Operator installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bootstrap-complete-notify
  namespace: tekton-pipelines
spec:
  params:
    - name: cluster-name
      default: shopos-cluster
    - name: components-installed
      default: "cert-manager,keda,eso,traefik,kafka,prometheus,harbor,argocd"
  steps:
    - name: notify
      image: curlimages/curl:8.10.1
      env:
        - name: SLACK_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: slack-webhook
              key: url
              optional: true
      script: |
        echo "=== Bootstrap Complete ==="
        echo "Cluster: $(params.cluster-name)"
        echo "Components: $(params.components-installed)"
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

        if [ -n "$SLACK_WEBHOOK" ]; then
          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":rocket: ShopOS cluster $(params.cluster-name) bootstrap complete. Components: $(params.components-installed)\"}" || true
        fi
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-cluster-bootstrap-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    Full cluster bootstrap pipeline. Runs entirely in-cluster via Tekton Tasks.
    Sequence: preflight → cert-manager → KEDA → ESO → networking → messaging
              → observability → registry → gitops → notify.
    Each phase waits for the previous to complete successfully.
  params:
    - name: cluster-name
      default: shopos-cluster
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
    - name: environment
      default: production
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: preflight
      taskRef:
        name: bootstrap-preflight
      params:
        - name: cluster-name
          value: $(params.cluster-name)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig

    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source
      runAfter: [preflight]

    - name: install-cert-manager
      taskRef:
        name: install-cert-manager
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-keda
      taskRef:
        name: install-keda
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-eso
      taskRef:
        name: install-external-secrets-operator
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-traefik
      taskRef:
        name: helm-install-traefik
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [install-cert-manager]

    - name: install-kafka
      taskRef:
        name: helm-install-kafka
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-prometheus
      taskRef:
        name: helm-install-prometheus-stack
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [install-cert-manager]

    - name: install-harbor
      taskRef:
        name: helm-install-harbor
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [install-cert-manager]

    - name: bootstrap-notify
      taskRef:
        name: bootstrap-complete-notify
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: components-installed
          value: cert-manager,keda,eso,traefik,kafka,prometheus,harbor
      runAfter:
        - install-traefik
        - install-kafka
        - install-prometheus
        - install-harbor
        - install-eso
        - install-keda
