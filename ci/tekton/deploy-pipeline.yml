# Deploy Pipeline — Tekton (In-Cluster CD)
# Role: Triggered by Harbor image push webhooks via EventListener/TriggerTemplate.
#       Deploys services using helm Tasks. Verifies rollout and runs smoke tests.
# Secrets: kubeconfig-secret, harbor-credentials
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: EventListener
metadata:
  name: shopos-event-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: harbor-push-trigger
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: "header.match('X-Harbor-Event', 'PUSH_ARTIFACT')"
      bindings:
        - ref: harbor-push-binding
      template:
        ref: deploy-pipeline-template
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerBinding
metadata:
  name: harbor-push-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: image-tag
      value: $(body.event_data.resources[0].tag)
    - name: service-name
      value: $(body.event_data.repository.name)
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: deploy-pipeline-template
  namespace: tekton-pipelines
spec:
  params:
    - name: image-tag
    - name: service-name
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: deploy-$(tt.params.service-name)-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: shopos-deploy-pipeline
        params:
          - name: service-name
            value: $(tt.params.service-name)
          - name: image-tag
            value: $(tt.params.image-tag)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 1Gi
          - name: kubeconfig
            secret:
              secretName: kubeconfig-secret
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-shopos
  namespace: tekton-pipelines
spec:
  params:
    - name: url
      default: https://github.com/shopos/shopos.git
    - name: revision
      default: main
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:2.47.0
      script: |
        git clone --depth=1 --branch=$(params.revision) $(params.url) /workspace/source
        echo "Cloned $(params.url)@$(params.revision)"
        ls /workspace/source
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-deploy
  namespace: tekton-pipelines
spec:
  params:
    - name: service-name
    - name: image-tag
    - name: namespace
      default: default
    - name: environment
      default: production
    - name: registry
      default: harbor.shopos.internal
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: helm-upgrade
      image: alpine/helm:3.16.2
      script: |
        cp /root/.kube/config /root/.kube/kubeconfig 2>/dev/null || true
        helm upgrade --install $(params.service-name) \
          /workspace/source/helm/services/$(params.service-name) \
          --namespace $(params.namespace) \
          --create-namespace \
          --set image.repository=$(params.registry)/shopos/$(params.service-name) \
          --set image.tag=$(params.image-tag) \
          --set environment=$(params.environment) \
          --atomic \
          --timeout 5m \
          --history-max 5
        echo "Deployed $(params.service-name):$(params.image-tag) to $(params.namespace)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-rollout
  namespace: tekton-pipelines
spec:
  params:
    - name: service-name
    - name: namespace
      default: default
    - name: timeout
      default: "300"
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: rollout-status
      image: bitnami/kubectl:1.31.0
      script: |
        kubectl rollout status deployment/$(params.service-name) \
          --namespace $(params.namespace) \
          --timeout=$(params.timeout)s
        echo "Rollout verified: $(params.service-name)"
        kubectl get pods -n $(params.namespace) -l app=$(params.service-name)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: smoke-test
  namespace: tekton-pipelines
spec:
  params:
    - name: service-name
    - name: namespace
      default: default
    - name: healthz-path
      default: /healthz
    - name: port
      default: "8080"
  steps:
    - name: health-check
      image: curlimages/curl:8.10.1
      script: |
        SVC_URL="http://$(params.service-name).$(params.namespace).svc.cluster.local:$(params.port)$(params.healthz-path)"
        echo "Smoke test: GET $SVC_URL"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -sf --max-time 10 "$SVC_URL" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
          echo "Attempt $i → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Smoke test PASSED for $(params.service-name)"
            exit 0
          fi
          sleep 10
        done
        echo "Smoke test FAILED for $(params.service-name)"
        exit 1
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-deploy-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster CD pipeline triggered by Harbor image push webhooks.
    Clones the repo, helm deploys, verifies rollout, and runs smoke tests.
  params:
    - name: service-name
      description: Name of the service to deploy
    - name: image-tag
      description: Docker image tag pushed to Harbor
    - name: namespace
      default: default
    - name: environment
      default: production
    - name: registry
      default: harbor.shopos.internal
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
    - name: healthz-port
      default: "8080"
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: helm-deploy
      taskRef:
        name: helm-deploy
      params:
        - name: service-name
          value: $(params.service-name)
        - name: image-tag
          value: $(params.image-tag)
        - name: namespace
          value: $(params.namespace)
        - name: environment
          value: $(params.environment)
        - name: registry
          value: $(params.registry)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: verify-rollout
      taskRef:
        name: verify-rollout
      params:
        - name: service-name
          value: $(params.service-name)
        - name: namespace
          value: $(params.namespace)
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [helm-deploy]

    - name: smoke-test
      taskRef:
        name: smoke-test
      params:
        - name: service-name
          value: $(params.service-name)
        - name: namespace
          value: $(params.namespace)
        - name: port
          value: $(params.healthz-port)
      runAfter: [verify-rollout]
---
# RBAC for Tekton Triggers service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-sa
  namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-triggers-sa-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: tekton-pipelines
