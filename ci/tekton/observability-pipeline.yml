# Observability Pipeline — Tekton (In-Cluster Helm Install)
# Role: Installs the full observability stack (Prometheus, Grafana, Loki, Jaeger, OTel)
#       via Helm Tasks running inside the cluster.
# Secrets: kubeconfig-secret, grafana-credentials, minio-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-prometheus-stack
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: observability
    - name: chart-version
      default: "65.8.1"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
        helm upgrade --install kube-prometheus-stack \
          prometheus-community/kube-prometheus-stack \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/observability/prometheus/values.yaml \
          --set grafana.adminPassword="$(GRAFANA_ADMIN_PASSWORD)" \
          --wait --timeout 15m
        echo "Prometheus + Grafana stack installed"
      env:
        - name: GRAFANA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-credentials
              key: admin-password
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-loki-stack
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: observability
    - name: chart-version
      default: "6.23.0"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add grafana https://grafana.github.io/helm-charts --force-update
        helm upgrade --install loki grafana/loki-stack \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/observability/loki/values.yaml \
          --set loki.storage.type=s3 \
          --set loki.storage.s3.endpoint="http://minio.minio.svc.cluster.local:9000" \
          --wait --timeout 10m
        echo "Loki stack installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-jaeger
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: observability
    - name: chart-version
      default: "3.3.1"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
        helm upgrade --install jaeger jaegertracing/jaeger \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/observability/jaeger/values.yaml \
          --set storage.type=elasticsearch \
          --wait --timeout 10m
        echo "Jaeger installed"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-install-otel-collector
  namespace: tekton-pipelines
spec:
  params:
    - name: namespace
      default: observability
    - name: chart-version
      default: "0.108.0"
  workspaces:
    - name: source
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: install
      image: alpine/helm:3.16.2
      script: |
        helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
        helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
          --namespace $(params.namespace) \
          --create-namespace \
          --version $(params.chart-version) \
          --values /workspace/source/observability/otel-collector/values.yaml \
          --wait --timeout 8m
        echo "OpenTelemetry Collector installed"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-observability-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster observability stack deployment. Installs Prometheus+Grafana,
    Loki, Jaeger, and OTel Collector via Helm Tasks running inside the cluster.
  params:
    - name: observability-namespace
      default: observability
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: install-prometheus
      taskRef:
        name: helm-install-prometheus-stack
      params:
        - name: namespace
          value: $(params.observability-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-loki
      taskRef:
        name: helm-install-loki-stack
      params:
        - name: namespace
          value: $(params.observability-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-jaeger
      taskRef:
        name: helm-install-jaeger
      params:
        - name: namespace
          value: $(params.observability-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]

    - name: install-otel-collector
      taskRef:
        name: helm-install-otel-collector
      params:
        - name: namespace
          value: $(params.observability-namespace)
      workspaces:
        - name: source
          workspace: source
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [install-prometheus]
