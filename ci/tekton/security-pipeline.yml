# Security Pipeline — Tekton (In-Cluster Scanning)
# Role: Runs Trivy container scanning and Semgrep SAST as in-cluster Tasks.
#       Triggered by image push events from Harbor (shares EventListener with deploy).
# Secrets: harbor-credentials, sonarqube-credentials
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image-scan
  namespace: tekton-pipelines
spec:
  params:
    - name: image-ref
      description: Full image reference to scan
    - name: severity
      default: HIGH,CRITICAL
    - name: exit-code
      default: "1"
    - name: format
      default: table
  results:
    - name: vuln-count
      description: Number of vulnerabilities found
  steps:
    - name: scan
      image: aquasec/trivy:0.57.1
      env:
        - name: TRIVY_USERNAME
          valueFrom:
            secretKeyRef:
              name: harbor-credentials
              key: username
              optional: true
        - name: TRIVY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-credentials
              key: password
              optional: true
      script: |
        echo "==> Trivy scan: $(params.image-ref)"
        trivy image \
          --exit-code $(params.exit-code) \
          --severity $(params.severity) \
          --format $(params.format) \
          --no-progress \
          $(params.image-ref) 2>&1 | tee /tmp/trivy-report.txt || true
        VULN_COUNT=$(grep -c "^|" /tmp/trivy-report.txt 2>/dev/null || echo "0")
        printf '%s' "$VULN_COUNT" > $(results.vuln-count.path)
        echo "Scan complete. Vulnerabilities found: $VULN_COUNT"
    - name: sbom-generate
      image: aquasec/trivy:0.57.1
      script: |
        trivy image \
          --format cyclonedx \
          --output /tmp/sbom.json \
          --no-progress \
          $(params.image-ref) || true
        echo "SBOM generated at /tmp/sbom.json"
        wc -c /tmp/sbom.json
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: semgrep-sast-scan
  namespace: tekton-pipelines
spec:
  params:
    - name: service-name
    - name: domain
      default: ""
    - name: config
      default: auto
    - name: output-format
      default: json
  workspaces:
    - name: source
  results:
    - name: findings-count
  steps:
    - name: semgrep
      image: returntocorp/semgrep:1.94.0
      script: |
        SRC_PATH="/workspace/source/src"
        if [ -n "$(params.domain)" ]; then
          SRC_PATH="$SRC_PATH/$(params.domain)/$(params.service-name)"
        else
          SRC_PATH="$SRC_PATH"
        fi
        echo "==> Semgrep SAST on $SRC_PATH"
        semgrep \
          --config=$(params.config) \
          --$(params.output-format) \
          --output=/tmp/semgrep-report.json \
          --no-git-ignore \
          "$SRC_PATH" 2>&1 | tee /tmp/semgrep-output.txt || true
        FINDINGS=$(python3 -c "import json,sys; d=json.load(open('/tmp/semgrep-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "0")
        printf '%s' "$FINDINGS" > $(results.findings-count.path)
        echo "SAST complete. Findings: $FINDINGS"
    - name: custom-rules
      image: returntocorp/semgrep:1.94.0
      script: |
        if [ -d "/workspace/source/security/semgrep" ]; then
          echo "==> Running custom Semgrep rules"
          semgrep \
            --config=/workspace/source/security/semgrep \
            --json \
            --output=/tmp/semgrep-custom.json \
            /workspace/source/src || true
          echo "Custom rules scan complete"
        else
          echo "No custom rules found at security/semgrep/"
        fi
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: grype-scan
  namespace: tekton-pipelines
spec:
  params:
    - name: image-ref
    - name: fail-on-severity
      default: high
  steps:
    - name: scan
      image: anchore/grype:v0.82.0
      script: |
        echo "==> Grype CVE scan: $(params.image-ref)"
        grype $(params.image-ref) \
          --fail-on $(params.fail-on-severity) \
          --output table 2>&1 | tee /tmp/grype-report.txt || true
        echo "Grype scan complete"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kube-bench-scan
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: kubeconfig
      mountPath: /root/.kube
  steps:
    - name: bench
      image: aquasec/kube-bench:v0.8.0
      securityContext:
        runAsUser: 0
      script: |
        kube-bench run \
          --targets=master,node,etcd,controlplane,policies \
          --json \
          --outputfile /tmp/kube-bench-report.json 2>&1 || true
        echo "==> CIS Benchmark Results:"
        kube-bench run --targets=master,node 2>&1 | grep -E "^\[PASS\]|^\[FAIL\]|^\[WARN\]" | head -30
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: shopos-security-pipeline
  namespace: tekton-pipelines
spec:
  description: |
    In-cluster security scanning pipeline. Runs Trivy (image scan + SBOM),
    Semgrep SAST (code + custom rules), Grype CVE scan, and kube-bench CIS benchmark.
    Triggered by image push events via Tekton Triggers.
  params:
    - name: image-ref
      description: Full image reference to scan
    - name: service-name
      description: Service name for SAST scoping
    - name: domain
      default: ""
    - name: repo-url
      default: https://github.com/shopos/shopos.git
    - name: repo-revision
      default: main
  workspaces:
    - name: source
    - name: kubeconfig
  tasks:
    - name: clone
      taskRef:
        name: git-clone-shopos
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.repo-revision)
      workspaces:
        - name: source
          workspace: source

    - name: trivy-scan
      taskRef:
        name: trivy-image-scan
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: exit-code
          value: "0"
      runAfter: [clone]

    - name: semgrep-sast
      taskRef:
        name: semgrep-sast-scan
      params:
        - name: service-name
          value: $(params.service-name)
        - name: domain
          value: $(params.domain)
      workspaces:
        - name: source
          workspace: source
      runAfter: [clone]

    - name: grype-scan
      taskRef:
        name: grype-scan
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: fail-on-severity
          value: critical
      runAfter: [clone]

    - name: kube-bench
      taskRef:
        name: kube-bench-scan
      workspaces:
        - name: kubeconfig
          workspace: kubeconfig
      runAfter: [clone]
