# Docker-Build Pipeline — CircleCI
# Builds, scans (Trivy), and pushes ShopOS Docker images to Harbor.
# Context: shopos-harbor
# Env vars: HARBOR_REGISTRY, HARBOR_USERNAME, HARBOR_PASSWORD,
#            SERVICE_NAME, DOMAIN, IMAGE_TAG, REGISTRY_PROJECT, PUSH_IMAGE, SCAN_IMAGE
version: 2.1

executors:
  docker-executor:
    docker:
      - image: docker:27-dind
    resource_class: large
  trivy-executor:
    docker:
      - image: aquasec/trivy:latest
    resource_class: medium

jobs:
  resolve-build-context:
    docker:
      - image: alpine/git:latest
    steps:
      - checkout
      - run:
          name: Resolve image tag and service list
          command: |
            GIT_SHA=$(git rev-parse --short HEAD)
            TAG="${IMAGE_TAG:-dev-${GIT_SHA}-${CIRCLE_BUILD_NUM}}"
            echo "export IMAGE_TAG=${TAG}" >> .build.env
            echo "export REGISTRY_PROJECT=${REGISTRY_PROJECT:-shopos}" >> .build.env
            echo "Resolved tag: ${TAG}"
            cat .build.env
      - persist_to_workspace:
          root: .
          paths: [.build.env]

  docker-build:
    executor: docker-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Harbor
          command: |
            source .build.env
            echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
      - run:
          name: Build Docker images
          command: |
            source .build.env
            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

            build_svc() {
              local domain=$1 svc=$2
              local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
              echo "=== Building: $image ==="
              docker build \
                --label "git.commit=$IMAGE_TAG" \
                --label "build.number=$CIRCLE_BUILD_NUM" \
                --label "domain=$domain" \
                -t "$image" \
                "src/$domain/$svc/" || echo "WARN build failed for $svc"
            }

            if [ -n "$SERVICE_NAME" ] && [ -n "$DOMAIN" ]; then
              build_svc "$DOMAIN" "$SERVICE_NAME"
            elif [ -n "$DOMAIN" ]; then
              for svc_path in src/$DOMAIN/*/; do
                [ -d "$svc_path" ] || continue
                build_svc "$DOMAIN" "$(basename $svc_path)"
              done
            else
              for d in $ALL_DOMAINS; do
                for svc_path in src/$d/*/; do
                  [ -d "$svc_path" ] || continue
                  build_svc "$d" "$(basename $svc_path)"
                done
              done
            fi
      - run:
          name: Save image list for downstream jobs
          command: |
            source .build.env
            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
            LIST=""
            if [ -n "$SERVICE_NAME" ]; then
              LIST="$SERVICE_NAME"
            elif [ -n "$DOMAIN" ]; then
              for svc_path in src/$DOMAIN/*/; do
                [ -d "$svc_path" ] && LIST="${LIST} $(basename $svc_path)"
              done
            else
              for d in $ALL_DOMAINS; do
                for svc_path in src/$d/*/; do
                  [ -d "$svc_path" ] && LIST="${LIST} $(basename $svc_path)"
                done
              done
            fi
            echo "$LIST" > /tmp/service-list.txt
      - persist_to_workspace:
          root: .
          paths: [.build.env]

  trivy-scan:
    executor: trivy-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Trivy image scan
          command: |
            source .build.env
            if [ "${SCAN_IMAGE:-true}" != "true" ]; then
              echo "Skipping Trivy scan"
              exit 0
            fi
            mkdir -p /tmp/trivy-reports
            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

            scan_svc() {
              local svc=$1
              local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
              echo "=== Trivy: $image ==="
              trivy image \
                --exit-code 0 \
                --severity HIGH,CRITICAL \
                --format json \
                --output "/tmp/trivy-reports/trivy-${svc}.json" \
                "$image" || true
            }

            if [ -n "$SERVICE_NAME" ]; then
              scan_svc "$SERVICE_NAME"
            elif [ -n "$DOMAIN" ]; then
              for svc_path in src/$DOMAIN/*/; do
                [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
              done
            else
              for d in $ALL_DOMAINS; do
                for svc_path in src/$d/*/; do
                  [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
                done
              done
            fi
      - store_artifacts:
          path: /tmp/trivy-reports
          destination: trivy-image-scan

  docker-push:
    executor: docker-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker
      - run:
          name: Push images to Harbor
          command: |
            source .build.env
            if [ "${PUSH_IMAGE:-true}" != "true" ]; then
              echo "Skipping push"
              exit 0
            fi
            echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

            push_svc() {
              local svc=$1
              local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
              echo "=== Pushing: $image ==="
              docker push "$image" || echo "WARN push failed for $svc"
            }

            if [ -n "$SERVICE_NAME" ]; then
              push_svc "$SERVICE_NAME"
            elif [ -n "$DOMAIN" ]; then
              for svc_path in src/$DOMAIN/*/; do
                [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
              done
            else
              for d in $ALL_DOMAINS; do
                for svc_path in src/$d/*/; do
                  [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
                done
              done
            fi
            docker logout "$HARBOR_REGISTRY" || true
      - run:
          name: Notify on success
          command: |
            source .build.env
            curl -sf -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              --data "{\"text\":\":whale: Docker build complete — tag=${IMAGE_TAG} pushed to ${HARBOR_REGISTRY}\"}" || true
          when: on_success

workflows:
  docker-build-workflow:
    jobs:
      - resolve-build-context:
          context: shopos-harbor
      - docker-build:
          requires: [resolve-build-context]
          context: shopos-harbor
      - trivy-scan:
          requires: [docker-build]
          context: shopos-harbor
      - docker-push:
          requires: [trivy-scan]
          context: shopos-harbor
          filters:
            branches:
              only: [main, develop, /release\/.*/]
