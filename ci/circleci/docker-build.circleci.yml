# Docker Build Pipeline — CircleCI
# Role: Builds and pushes Docker images using the circleci/docker orb.
#       Runs Trivy scan after build, stores results as artifacts.
# Context: shopos-harbor (HARBOR_REGISTRY, HARBOR_USERNAME, HARBOR_PASSWORD)
version: 2.1

orbs:
  docker: circleci/docker@2.6

executors:
  build-executor:
    docker:
      - image: cimg/base:current
    resource_class: large

jobs:
  build-and-push:
    executor: build-executor
    parameters:
      service:
        type: string
        default: api-gateway
      domain:
        type: string
        default: platform
    steps:
      - checkout
      - setup_remote_docker:
          version: docker24
          docker_layer_caching: true
      - docker/check:
          registry: ${HARBOR_REGISTRY:-harbor.shopos.internal}
          docker-username: HARBOR_USERNAME
          docker-password: HARBOR_PASSWORD
      - docker/build:
          image: ${HARBOR_REGISTRY:-harbor.shopos.internal}/shopos/<< parameters.service >>
          tag: ${CIRCLE_SHA1:0:8}-${CIRCLE_BUILD_NUM},latest
          path: src/<< parameters.domain >>/<< parameters.service >>
          dockerfile: src/<< parameters.domain >>/<< parameters.service >>/Dockerfile
          extra_build_args: "--label git-commit=${CIRCLE_SHA1} --label build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - run:
          name: Trivy scan built image
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.57.1 image \
              --exit-code 0 \
              --severity HIGH,CRITICAL \
              --format table \
              --no-progress \
              "${HARBOR_REGISTRY:-harbor.shopos.internal}/shopos/<< parameters.service >>:${CIRCLE_SHA1:0:8}-${CIRCLE_BUILD_NUM}" \
              2>&1 | tee /tmp/trivy-<< parameters.service >>.txt
      - store_artifacts:
          path: /tmp/trivy-<< parameters.service >>.txt
          destination: trivy-<< parameters.service >>
      - docker/push:
          image: ${HARBOR_REGISTRY:-harbor.shopos.internal}/shopos/<< parameters.service >>
          tag: ${CIRCLE_SHA1:0:8}-${CIRCLE_BUILD_NUM}

  build-matrix:
    executor: build-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: docker24
          docker_layer_caching: true
      - run:
          name: Login to Harbor
          command: |
            echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" \
              -u "$HARBOR_USERNAME" --password-stdin
      - run:
          name: Build all services (parallel within job)
          command: |
            TAG="${CIRCLE_SHA1:0:8}-${CIRCLE_BUILD_NUM}"
            REGISTRY="${HARBOR_REGISTRY:-harbor.shopos.internal}"

            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

            build_push() {
              local domain=$1 svc=$2
              local image="$REGISTRY/shopos/$svc:$TAG"
              echo "==> Building $image"
              docker build \
                -t "$image" \
                "src/$domain/$svc/" 2>&1 | tail -5
              if [ $? -eq 0 ]; then
                docker push "$image"
                echo "PUSHED: $image"
              else
                echo "FAILED: $image"
              fi
            }

            PIDS=()
            for domain in $ALL_DOMAINS; do
              for svc in $(ls "src/$domain/" 2>/dev/null); do
                [ -f "src/$domain/$svc/Dockerfile" ] && build_push "$domain" "$svc" &
                PIDS+=($!)
                # Limit parallelism to 8
                [ ${#PIDS[@]} -ge 8 ] && { wait "${PIDS[0]}"; PIDS=("${PIDS[@]:1}"); }
              done
            done
            wait
            echo "All builds complete"

workflows:
  build-images:
    jobs:
      - build-and-push:
          name: build-api-gateway
          service: api-gateway
          domain: platform
          context: shopos-harbor
          filters:
            branches:
              only: [main, develop]

      - build-and-push:
          name: build-order-service
          service: order-service
          domain: commerce
          context: shopos-harbor
          filters:
            branches:
              only: [main, develop]

      - build-and-push:
          name: build-payment-service
          service: payment-service
          domain: commerce
          context: shopos-harbor
          filters:
            branches:
              only: [main, develop]

      - build-and-push:
          name: build-auth-service
          service: auth-service
          domain: identity
          context: shopos-harbor
          filters:
            branches:
              only: [main, develop]

      - build-matrix:
          context: shopos-harbor
          filters:
            branches:
              only: main
