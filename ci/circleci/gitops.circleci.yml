# GitOps Pipeline — CircleCI
# Role: ArgoCD sync and image tag update using orb-based kubectl approach.
#       Uses circleci/kubernetes orb for cluster interaction.
# Context: shopos-kubernetes, shopos-argocd
version: 2.1

orbs:
  kubernetes: circleci/kubernetes@1.3

jobs:
  update-image-tag:
    docker:
      - image: alpine/git:2.47.0
    steps:
      - checkout
      - run:
          name: Update image tag in GitOps repo
          command: |
            git config --global user.email "circleci@shopos.internal"
            git config --global user.name "CircleCI GitOps"
            SERVICE="${SERVICE_NAME:-api-gateway}"
            TAG="${IMAGE_TAG:-${CIRCLE_SHA1:0:8}-${CIRCLE_BUILD_NUM}}"
            # Update values in gitops manifests
            if [ -f "gitops/argocd/apps/$SERVICE/values.yaml" ]; then
              sed -i "s|tag:.*|tag: \"$TAG\"|g" "gitops/argocd/apps/$SERVICE/values.yaml"
              git add "gitops/argocd/apps/$SERVICE/values.yaml"
              git commit -m "chore: update $SERVICE to $TAG [skip ci]" || true
              git push origin main || true
            fi

  argocd-sync:
    docker:
      - image: argoproj/argocd:v2.13.0
    steps:
      - run:
          name: ArgoCD sync application
          command: |
            argocd login "${ARGOCD_SERVER:-argocd-server.argocd.svc.cluster.local}" \
              --username "$ARGOCD_USERNAME" \
              --password "$ARGOCD_PASSWORD" \
              --insecure --grpc-web
            APP="${SERVICE_NAME:-api-gateway}"
            argocd app sync "$APP" --prune --timeout 300
            argocd app wait "$APP" --health --timeout 300
            echo "ArgoCD sync complete: $APP"
            argocd app get "$APP"

  flux-reconcile:
    docker:
      - image: fluxcd/flux-cli:v2.4.0
    steps:
      - run:
          name: Flux reconcile kustomization
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
            flux reconcile kustomization shopos \
              --namespace flux-system \
              --timeout 5m \
              --with-source
            echo "Flux reconciliation complete"

workflows:
  gitops:
    jobs:
      - argocd-sync:
          context:
            - shopos-kubernetes
            - shopos-argocd
          filters:
            branches:
              only: main

      - flux-reconcile:
          context: shopos-kubernetes
          requires: [argocd-sync]
          filters:
            branches:
              only: main
