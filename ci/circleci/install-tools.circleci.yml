# Install Tools Pipeline — CircleCI
# Role: Verifies all required tools and images are available using CircleCI orbs.
#       Runs as preflight before other pipelines in CircleCI.
version: 2.1

orbs:
  helm: circleci/helm@3.0
  kubernetes: circleci/kubernetes@1.3

jobs:
  verify-kubectl-helm:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - run:
          name: Verify kubectl and helm versions
          command: |
            helm version --short
            kubectl version --client --short 2>/dev/null || kubectl version --client
            echo "kubectl and Helm verified"

  verify-security-tools:
    docker:
      - image: aquasec/trivy:0.57.1
    steps:
      - run:
          name: Verify Trivy
          command: trivy version

  verify-performance-tools:
    docker:
      - image: grafana/k6:0.55.0
    steps:
      - run:
          name: Verify k6
          command: k6 version

  verify-terraform:
    docker:
      - image: hashicorp/terraform:1.9.8
    steps:
      - run:
          name: Verify Terraform
          command: terraform version

  verify-cluster-access:
    docker:
      - image: bitnami/kubectl:1.31.0
    steps:
      - run:
          name: Configure kubeconfig and verify cluster access
          command: |
            if [ -n "$KUBECONFIG_DATA" ]; then
              mkdir -p ~/.kube
              echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
              kubectl cluster-info
              kubectl get nodes
              echo "Cluster access verified"
            else
              echo "KUBECONFIG_DATA not set - cluster access skipped"
            fi

workflows:
  verify-tools:
    jobs:
      - verify-kubectl-helm
      - verify-security-tools
      - verify-performance-tools
      - verify-terraform
      - verify-cluster-access:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, develop]
