# Registry Infrastructure Pipeline — CircleCI
# Role: Deploys Harbor registry and configures projects using circleci/helm orb.
# Context: shopos-kubernetes, shopos-harbor, shopos-minio
version: 2.1

orbs:
  helm: circleci/helm@3.0

jobs:
  install-harbor:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Helm install Harbor
          command: |
            helm repo add harbor https://helm.goharbor.io --force-update
            helm upgrade --install harbor harbor/harbor \
              --namespace harbor --create-namespace \
              --version 1.15.1 \
              --set expose.type=ingress \
              --set expose.ingress.hosts.core="${HARBOR_HOSTNAME:-harbor.shopos.internal}" \
              --set externalURL="https://${HARBOR_HOSTNAME:-harbor.shopos.internal}" \
              --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD" \
              --set persistence.enabled=true \
              --wait --timeout 15m
            echo "Harbor installed"

  configure-harbor:
    docker:
      - image: curlimages/curl:8.10.1
    steps:
      - run:
          name: Create Harbor projects and robot accounts
          command: |
            HARBOR_URL="${HARBOR_API_URL:-http://harbor.harbor.svc.cluster.local:80}"
            AUTH="-u admin:$HARBOR_ADMIN_PASSWORD"
            for PROJECT in shopos shopos-staging shopos-dev shopos-cache; do
              curl -sf $AUTH -X POST "$HARBOR_URL/api/v2.0/projects" \
                -H "Content-Type: application/json" \
                -d "{\"project_name\":\"$PROJECT\",\"public\":false,\"metadata\":{\"auto_scan\":\"true\"}}" \
                && echo "Project: $PROJECT" || echo "Exists: $PROJECT"
            done

workflows:
  registry-infra:
    jobs:
      - install-harbor:
          context:
            - shopos-kubernetes
            - shopos-harbor
          filters:
            branches:
              only: [main, /infra\/.*/]
      - configure-harbor:
          context: shopos-harbor
          requires: [install-harbor]
          filters:
            branches:
              only: main
