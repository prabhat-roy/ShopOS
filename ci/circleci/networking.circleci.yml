# Networking Infrastructure Pipeline — CircleCI
# Role: Installs networking stack (Traefik, Istio) using circleci/helm orb.
# Context: shopos-kubernetes
version: 2.1

orbs:
  helm: circleci/helm@3.0

jobs:
  install-traefik:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Helm install Traefik
          command: |
            helm repo add traefik https://traefik.github.io/charts --force-update
            helm upgrade --install traefik traefik/traefik \
              --namespace networking --create-namespace \
              --version 33.1.0 \
              --values networking/traefik/values.yaml \
              --set ingressClass.enabled=true \
              --set ingressClass.isDefaultClass=true \
              --wait --timeout 8m
            echo "Traefik installed"

  install-istio:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Install Istio via Helm
          command: |
            helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
            helm upgrade --install istio-base istio/base \
              --namespace istio-system --create-namespace \
              --version 1.23.3 --wait
            helm upgrade --install istiod istio/istiod \
              --namespace istio-system \
              --version 1.23.3 \
              --set pilot.traceSampling=1.0 \
              --wait --timeout 10m
            echo "Istio installed"

  apply-network-policies:
    docker:
      - image: bitnami/kubectl:1.31.0
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Apply network policies
          command: |
            kubectl apply -f kubernetes/network-policies/ --server-side
            [ -d "networking/cilium" ] && kubectl apply -f networking/cilium/ --server-side || true
            echo "Network policies applied"

workflows:
  networking-infra:
    jobs:
      - install-traefik:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, /infra\/.*/]
      - install-istio:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, /infra\/.*/]
      - apply-network-policies:
          context: shopos-kubernetes
          requires: [install-traefik, install-istio]
          filters:
            branches:
              only: main
