# K8s Infrastructure Pipeline — CircleCI
# Role: Terraform provisioning using orb-based approach.
#       Uses circleci/terraform orb for plan/apply across AWS, GCP, Azure.
# Context: shopos-aws, shopos-gcp, shopos-azure
version: 2.1

orbs:
  terraform: circleci/terraform@3.2

executors:
  terraform-executor:
    docker:
      - image: hashicorp/terraform:1.9.8
    resource_class: medium

jobs:
  tf-plan-eks:
    executor: terraform-executor
    steps:
      - checkout
      - run:
          name: Terraform init and plan (EKS)
          environment:
            TF_DIR: infra/terraform/aws/app-k8s
          command: |
            cd $TF_DIR
            terraform init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET:-shopos-tfstate}" \
              -backend-config="key=$TF_DIR/terraform.tfstate" \
              -backend-config="region=${AWS_DEFAULT_REGION:-us-east-1}"
            terraform plan -input=false -out=tfplan 2>&1 | tee /tmp/tf-plan-eks.txt
      - store_artifacts:
          path: /tmp/tf-plan-eks.txt
          destination: tf-plan-eks

  tf-apply-eks:
    executor: terraform-executor
    steps:
      - checkout
      - run:
          name: Terraform apply (EKS)
          environment:
            TF_DIR: infra/terraform/aws/app-k8s
          command: |
            cd $TF_DIR
            terraform init -input=false
            terraform plan -out=tfplan
            terraform apply -auto-approve tfplan
            terraform output -json | tee /tmp/tf-outputs-eks.json
      - store_artifacts:
          path: /tmp/tf-outputs-eks.json
          destination: tf-outputs-eks

  tf-plan-gke:
    executor: terraform-executor
    steps:
      - checkout
      - run:
          name: Configure GCP credentials
          command: |
            echo "$GOOGLE_CREDENTIALS" > /tmp/gcp-key.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
      - run:
          name: Terraform init and plan (GKE)
          environment:
            TF_DIR: infra/opentofu/gcp/app-k8s
          command: |
            cd $TF_DIR
            terraform init -input=false \
              -backend-config="bucket=${GCS_TF_BUCKET:-shopos-tfstate-gcp}" \
              -backend-config="prefix=$TF_DIR"
            terraform plan -input=false 2>&1 | tee /tmp/tf-plan-gke.txt
      - store_artifacts:
          path: /tmp/tf-plan-gke.txt
          destination: tf-plan-gke

  tf-plan-aks:
    executor: terraform-executor
    steps:
      - checkout
      - run:
          name: Terraform init and plan (AKS)
          environment:
            TF_DIR: infra/opentofu/azure/app-k8s
          command: |
            cd $TF_DIR
            terraform init -input=false \
              -backend-config="resource_group_name=${AZURE_TF_RG:-shopos-tfstate-rg}" \
              -backend-config="storage_account_name=${AZURE_TF_SA:-shoposterraform}" \
              -backend-config="container_name=tfstate" \
              -backend-config="key=$TF_DIR/terraform.tfstate"
            terraform plan -input=false 2>&1 | tee /tmp/tf-plan-aks.txt
      - store_artifacts:
          path: /tmp/tf-plan-aks.txt
          destination: tf-plan-aks

  apply-k8s-manifests:
    docker:
      - image: bitnami/kubectl:1.31.0
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Apply base K8s manifests
          command: |
            kubectl apply -f kubernetes/namespaces/ --server-side
            kubectl apply -f kubernetes/rbac/ --server-side
            kubectl apply -f kubernetes/network-policies/ --server-side
            kubectl apply -f kubernetes/resource-quotas/ --server-side
            kubectl apply -f kubernetes/pod-disruption-budgets/ --server-side
            echo "Base manifests applied"

workflows:
  plan-all-clouds:
    jobs:
      - tf-plan-eks:
          context: shopos-aws
          filters:
            branches:
              only: [main, develop, /infra\/.*/]

      - tf-plan-gke:
          context: shopos-gcp
          filters:
            branches:
              only: [main, develop, /infra\/.*/]

      - tf-plan-aks:
          context: shopos-azure
          filters:
            branches:
              only: [main, develop, /infra\/.*/]

  apply-eks:
    jobs:
      - hold-eks-apply:
          type: approval
          filters:
            branches:
              only: main
      - tf-apply-eks:
          requires: [hold-eks-apply]
          context: shopos-aws
          filters:
            branches:
              only: main
      - apply-k8s-manifests:
          requires: [tf-apply-eks]
          context: shopos-kubernetes
          filters:
            branches:
              only: main
