# Cluster Bootstrap Pipeline — CircleCI
# Role: Full cluster bootstrap using orb-based Helm and kubectl steps.
#       Sequential phases with approval holds between major milestones.
# Context: shopos-kubernetes, shopos-harbor, shopos-grafana, shopos-slack
version: 2.1

orbs:
  helm: circleci/helm@3.0
  kubernetes: circleci/kubernetes@1.3

jobs:
  bootstrap-preflight:
    docker:
      - image: bitnami/kubectl:1.31.0
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Verify cluster and apply base manifests
          command: |
            kubectl cluster-info
            kubectl get nodes
            kubectl apply -f kubernetes/namespaces/ --server-side
            kubectl apply -f kubernetes/rbac/ --server-side
            kubectl apply -f kubernetes/resource-quotas/ --server-side
            echo "Preflight complete"

  install-core-tools:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Install cert-manager
          command: |
            helm repo add jetstack https://charts.jetstack.io --force-update
            helm upgrade --install cert-manager jetstack/cert-manager \
              --namespace cert-manager --create-namespace \
              --version v1.16.2 --set crds.enabled=true \
              --wait --timeout 8m
      - run:
          name: Install KEDA
          command: |
            helm repo add kedacore https://kedacore.github.io/charts --force-update
            helm upgrade --install keda kedacore/keda \
              --namespace keda --create-namespace \
              --version 2.16.0 --wait --timeout 8m
      - run:
          name: Install External Secrets Operator
          command: |
            helm repo add external-secrets https://charts.external-secrets.io --force-update
            helm upgrade --install external-secrets external-secrets/external-secrets \
              --namespace external-secrets --create-namespace \
              --version 0.10.5 --set installCRDs=true \
              --wait --timeout 8m

  bootstrap-complete:
    docker:
      - image: curlimages/curl:8.10.1
    steps:
      - run:
          name: Send bootstrap completion notification
          command: |
            if [ -n "$SLACK_WEBHOOK" ]; then
              curl -sf -X POST "$SLACK_WEBHOOK" \
                -H 'Content-type: application/json' \
                -d "{\"text\":\":rocket: ShopOS cluster bootstrap complete via CircleCI build #$CIRCLE_BUILD_NUM\"}" || true
            fi
            echo "Bootstrap complete!"

workflows:
  cluster-bootstrap:
    jobs:
      - bootstrap-preflight:
          context: shopos-kubernetes
          filters:
            branches:
              only: main

      - hold-core-tools:
          type: approval
          requires: [bootstrap-preflight]

      - install-core-tools:
          context: shopos-kubernetes
          requires: [hold-core-tools]

      - bootstrap-complete:
          context: shopos-slack
          requires: [install-core-tools]
