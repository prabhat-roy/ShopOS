# Messaging Infrastructure Pipeline — CircleCI
# Role: Installs messaging stack using circleci/helm orb.
#       Verifies Kafka, RabbitMQ, NATS health after install.
# Context: shopos-kubernetes
version: 2.1

orbs:
  helm: circleci/helm@3.0

jobs:
  install-kafka:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Helm install Kafka
          command: |
            helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
            helm upgrade --install kafka bitnami/kafka \
              --namespace messaging --create-namespace \
              --version 29.3.4 \
              --values messaging/kafka/values.yaml \
              --set replicaCount=3 \
              --set kraft.enabled=true \
              --wait --timeout 15m
            echo "Kafka installed"

  create-kafka-topics:
    docker:
      - image: bitnami/kafka:3.8.0
    steps:
      - run:
          name: Create all Kafka topics
          command: |
            TOPICS="identity.user.registered identity.user.deleted commerce.order.placed commerce.order.cancelled commerce.order.fulfilled commerce.payment.processed commerce.payment.failed commerce.cart.abandoned supplychain.shipment.created supplychain.shipment.updated supplychain.inventory.low supplychain.inventory.restocked notification.email.requested notification.sms.requested notification.push.requested analytics.page.viewed analytics.product.clicked analytics.search.performed security.fraud.detected security.login.failed"
            BOOTSTRAP="${KAFKA_BOOTSTRAP:-kafka.messaging.svc.cluster.local:9092}"
            for T in $TOPICS; do
              kafka-topics.sh --bootstrap-server $BOOTSTRAP \
                --create --if-not-exists \
                --topic "$T" \
                --partitions 6 \
                --replication-factor 3
              echo "Created: $T"
            done

  install-rabbitmq:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Helm install RabbitMQ
          command: |
            helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
            helm upgrade --install rabbitmq bitnami/rabbitmq \
              --namespace messaging --create-namespace \
              --version 14.7.0 \
              --values messaging/rabbitmq/values.yaml \
              --set replicaCount=3 \
              --wait --timeout 8m
            echo "RabbitMQ installed"

  install-nats:
    docker:
      - image: alpine/helm:3.16.2
    steps:
      - checkout
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
      - run:
          name: Helm install NATS JetStream
          command: |
            helm repo add nats https://nats-io.github.io/k8s/helm/charts/ --force-update
            helm upgrade --install nats nats/nats \
              --namespace messaging --create-namespace \
              --version 1.2.6 \
              --set nats.jetstream.enabled=true \
              --wait --timeout 5m
            echo "NATS JetStream installed"

workflows:
  messaging-infra:
    jobs:
      - install-kafka:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, /infra\/.*/]
      - create-kafka-topics:
          requires: [install-kafka]
          context: shopos-kubernetes
      - install-rabbitmq:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, /infra\/.*/]
      - install-nats:
          context: shopos-kubernetes
          filters:
            branches:
              only: [main, /infra\/.*/]
