# Security Pipeline — CircleCI
# Role: Container vulnerability scanning using circleci/trivy orb + Semgrep SAST.
#       Generates SBOM and stores scan results as artifacts.
# Context: shopos-harbor (HARBOR_REGISTRY), shopos-sonarqube (SONAR_TOKEN)
version: 2.1

orbs:
  trivy: aquasecurity/trivy@0.0.6

executors:
  security-executor:
    docker:
      - image: cimg/base:current
    resource_class: medium

  semgrep-executor:
    docker:
      - image: returntocorp/semgrep:1.94.0
    resource_class: medium

jobs:
  trivy-image-scan:
    executor: security-executor
    parameters:
      service:
        type: string
        default: api-gateway
      severity:
        type: string
        default: CRITICAL
    steps:
      - checkout
      - setup_remote_docker:
          version: docker24
      - run:
          name: Trivy image scan (<< parameters.severity >>)
          command: |
            IMAGE="${HARBOR_REGISTRY:-harbor.shopos.internal}/shopos/<< parameters.service >>:latest"
            docker run --rm \
              aquasec/trivy:0.57.1 image \
              --exit-code 1 \
              --severity << parameters.severity >> \
              --format table \
              --no-progress \
              "$IMAGE" 2>&1 | tee /tmp/trivy-<< parameters.service >>.txt
          no_output_timeout: 10m
      - store_artifacts:
          path: /tmp/trivy-<< parameters.service >>.txt
          destination: trivy-<< parameters.service >>

  trivy-sbom-generate:
    executor: security-executor
    parameters:
      service:
        type: string
        default: api-gateway
    steps:
      - setup_remote_docker:
          version: docker24
      - run:
          name: Generate SBOM (CycloneDX) for << parameters.service >>
          command: |
            IMAGE="${HARBOR_REGISTRY:-harbor.shopos.internal}/shopos/<< parameters.service >>:latest"
            docker run --rm \
              aquasec/trivy:0.57.1 image \
              --format cyclonedx \
              --output /tmp/sbom-<< parameters.service >>.json \
              --no-progress \
              "$IMAGE" 2>&1 || true
            echo "SBOM generated"
      - store_artifacts:
          path: /tmp/sbom-<< parameters.service >>.json
          destination: sbom-<< parameters.service >>

  semgrep-sast:
    executor: semgrep-executor
    steps:
      - checkout
      - run:
          name: Semgrep SAST scan (auto config)
          command: |
            semgrep \
              --config=auto \
              --json \
              --output=/tmp/semgrep-report.json \
              --no-git-ignore \
              src/ 2>&1 | tail -30
            FINDINGS=$(python3 -c "import json; d=json.load(open('/tmp/semgrep-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "0")
            echo "SAST findings: $FINDINGS"
      - run:
          name: Semgrep custom rules scan
          command: |
            if [ -d "security/semgrep" ]; then
              semgrep \
                --config=security/semgrep \
                --json \
                --output=/tmp/semgrep-custom.json \
                --no-git-ignore \
                src/ 2>&1 | tail -15 || true
            fi
      - store_artifacts:
          path: /tmp/semgrep-report.json
          destination: semgrep-report
      - store_test_results:
          path: /tmp/semgrep-report.json

  gitleaks-secret-scan:
    docker:
      - image: zricethezav/gitleaks:latest
    steps:
      - checkout
      - run:
          name: Gitleaks secret scan
          command: |
            gitleaks detect \
              --source . \
              --report-format json \
              --report-path /tmp/gitleaks-report.json \
              --exit-code 0 2>&1
            COUNT=$(python3 -c "import json; d=json.load(open('/tmp/gitleaks-report.json')); print(len(d))" 2>/dev/null || echo "0")
            echo "Potential secrets: $COUNT"
            [ "$COUNT" -gt 0 ] && cat /tmp/gitleaks-report.json | python3 -c "import json,sys; [print(r.get('Description',''),r.get('File','')) for r in json.load(sys.stdin)]"
            exit 0
      - store_artifacts:
          path: /tmp/gitleaks-report.json
          destination: gitleaks-report

  checkov-iac-scan:
    docker:
      - image: bridgecrew/checkov:latest
    steps:
      - checkout
      - run:
          name: Checkov IaC scan (Terraform + K8s)
          command: |
            checkov -d infra/ \
              --output json \
              --output-file-path /tmp/checkov-infra \
              --soft-fail 2>&1 | tail -20 || true
            checkov -d kubernetes/ \
              --output json \
              --output-file-path /tmp/checkov-k8s \
              --soft-fail 2>&1 | tail -10 || true
            echo "IaC scanning complete"
      - store_artifacts:
          path: /tmp/checkov-infra
          destination: checkov-infra

workflows:
  security-scan:
    jobs:
      - gitleaks-secret-scan:
          filters:
            branches:
              only: [main, develop, /release\/.*/]

      - semgrep-sast:
          filters:
            branches:
              only: [main, develop, /release\/.*/]

      - checkov-iac-scan:
          filters:
            branches:
              only: [main, develop]

      - trivy-image-scan:
          name: trivy-api-gateway
          service: api-gateway
          severity: CRITICAL
          context: shopos-harbor
          filters:
            branches:
              only: main

      - trivy-image-scan:
          name: trivy-order-service
          service: order-service
          severity: CRITICAL
          context: shopos-harbor
          requires: [trivy-api-gateway]
          filters:
            branches:
              only: main

      - trivy-sbom-generate:
          name: sbom-api-gateway
          service: api-gateway
          context: shopos-harbor
          requires: [trivy-api-gateway]
          filters:
            branches:
              only: main
