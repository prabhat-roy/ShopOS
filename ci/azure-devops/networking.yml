# Azure DevOps — Deploy networking stack to AKS
# AGIC (Application Gateway Ingress Controller) as Azure-native ingress
# ExternalDNS configured for Azure DNS; Traefik with Azure LB annotations
# action: INSTALL | UPGRADE | UNINSTALL

trigger: none

parameters:
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]
  - name: action
    type: string
    default: INSTALL
    values: [INSTALL, UPGRADE, UNINSTALL]
  - name: istio
    type: boolean
    default: true
  - name: traefik
    type: boolean
    default: true
  - name: consul
    type: boolean
    default: true
  - name: externalDns
    type: boolean
    default: true
  - name: agic
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials

jobs:
  - job: Networking
    displayName: Networking ${{ parameters.action }} on ${{ parameters.environment }}
    timeoutInMinutes: 60
    steps:
      - task: KubectlInstaller@0

      - task: HelmInstaller@1
        inputs:
          helmVersion: 3.16.0

      - task: AzureCLI@2
        displayName: Configure AKS kubeconfig
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az aks get-credentials \
              --resource-group shopos-${{ parameters.environment }}-rg \
              --name shopos-aks-${{ parameters.environment }} \
              --overwrite-existing

      # Azure Application Gateway Ingress Controller (native Azure ingress)
      - ${{ if eq(parameters.agic, true) }}:
        - task: AzureCLI@2
          displayName: Enable AGIC add-on on AKS
          inputs:
            azureSubscription: azure-service-connection
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              RG="shopos-${{ parameters.environment }}-rg"
              CLUSTER="shopos-aks-${{ parameters.environment }}"
              if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
                az aks disable-addons --addons ingress-appgw \
                  --resource-group ${RG} --name ${CLUSTER} || true
              else
                APPGW_ID=$(az network application-gateway list -g ${RG} \
                  --query '[0].id' -o tsv)
                az aks enable-addons --addons ingress-appgw \
                  --resource-group ${RG} --name ${CLUSTER} \
                  --appgw-id ${APPGW_ID} || true
              fi

      - ${{ if eq(parameters.istio, true) }}:
        - script: |
            helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall istio-ingressgateway -n istio-system 2>/dev/null || true
              helm uninstall istiod -n istio-system 2>/dev/null || true
              helm uninstall istio-base -n istio-system 2>/dev/null || true
            else
              helm upgrade --install istio-base istio/base \
                --namespace istio-system --create-namespace --wait --timeout 3m
              helm upgrade --install istiod istio/istiod \
                --namespace istio-system \
                --set telemetry.enabled=true \
                --set pilot.traceSampling=1.0 \
                --wait --timeout 5m
              # Azure internal load balancer annotation for Istio gateway
              helm upgrade --install istio-ingressgateway istio/gateway \
                --namespace istio-system \
                --set service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-internal"=true \
                --wait --timeout 3m
              kubectl apply -f networking/istio/ 2>/dev/null || true
            fi
          displayName: Istio Service Mesh

      - ${{ if eq(parameters.traefik, true) }}:
        - script: |
            helm repo add traefik https://traefik.github.io/charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall traefik -n networking 2>/dev/null || true
            else
              helm upgrade --install traefik traefik/traefik \
                --namespace networking --create-namespace \
                --set deployment.replicas=2 \
                --set ports.websecure.tls.enabled=true \
                --set ingressClass.enabled=true \
                --set ingressClass.isDefaultClass=true \
                --set metrics.prometheus.enabled=true \
                --wait --timeout 5m
              kubectl apply -f networking/traefik/ 2>/dev/null || true
            fi
          displayName: Traefik

      - ${{ if eq(parameters.consul, true) }}:
        - script: |
            helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall consul -n consul 2>/dev/null || true
            else
              helm upgrade --install consul hashicorp/consul \
                --namespace consul --create-namespace \
                --set global.name=consul \
                --set server.replicas=3 \
                --set server.bootstrapExpect=3 \
                --set connectInject.enabled=true \
                --set ui.enabled=true \
                --wait --timeout 8m
              kubectl apply -f networking/consul/ 2>/dev/null || true
            fi
          displayName: Consul

      - ${{ if eq(parameters.externalDns, true) }}:
        - task: AzureCLI@2
          displayName: ExternalDNS (Azure DNS)
          inputs:
            azureSubscription: azure-service-connection
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              SUBSCRIPTION_ID=$(az account show --query id -o tsv)
              RESOURCE_GROUP="shopos-${{ parameters.environment }}-rg"
              helm repo add external-dns https://kubernetes-sigs.github.io/external-dns --force-update
              if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
                helm uninstall external-dns -n networking 2>/dev/null || true
              else
                helm upgrade --install external-dns external-dns/external-dns \
                  --namespace networking --create-namespace \
                  --set provider=azure \
                  --set azure.resourceGroup="${RESOURCE_GROUP}" \
                  --set azure.subscriptionId="${SUBSCRIPTION_ID}" \
                  --set txtOwnerId=shopos-${{ parameters.environment }} \
                  --set policy=sync \
                  --wait --timeout 3m
              fi
