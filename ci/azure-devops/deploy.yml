# Azure DevOps — Build service image, push to ACR, deploy to AKS via Helm
# Uses Azure DevOps: environments with approvals, Docker@2, HelmDeploy@0, canary for prod

trigger: none

parameters:
  - name: serviceName
    type: string
    default: api-gateway
  - name: domain
    type: string
    default: platform
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials
  - name: ACR_NAME
    value: shoposacrregistry
  - name: IMAGE_TAG
    value: $(Build.BuildNumber)-$(Build.SourceVersion)

stages:
  - stage: Build
    displayName: Build + Push to ACR
    jobs:
      - job: BuildAndPush
        displayName: Build ${{ parameters.serviceName }}
        steps:
          - task: Docker@2
            displayName: Build and push image to ACR
            inputs:
              containerRegistry: acr-service-connection
              repository: shopos/${{ parameters.serviceName }}
              command: buildAndPush
              Dockerfile: src/${{ parameters.domain }}/${{ parameters.serviceName }}/Dockerfile
              buildContext: src/${{ parameters.domain }}/${{ parameters.serviceName }}
              tags: |
                $(IMAGE_TAG)
                latest

          - task: AzureCLI@2
            displayName: Trivy scan on ACR image
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Authenticate Docker to ACR then scan
                az acr login --name $(ACR_NAME)
                docker run --rm \
                  aquasec/trivy:latest image \
                  --severity HIGH,CRITICAL \
                  --exit-code 0 \
                  --format json \
                  $(ACR_NAME).azurecr.io/shopos/${{ parameters.serviceName }}:$(IMAGE_TAG) \
                  > $(Build.ArtifactStagingDirectory)/trivy-${{ parameters.serviceName }}.json || true

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: scan-reports

  - stage: DeployDev
    displayName: Deploy to Dev
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'dev'))
    jobs:
      - deployment: DeployToDev
        displayName: Deploy ${{ parameters.serviceName }} to dev
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Configure AKS kubeconfig
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group shopos-dev-rg \
                        --name shopos-aks-dev \
                        --overwrite-existing

                - task: HelmDeploy@0
                  displayName: Helm deploy to dev
                  inputs:
                    connectionType: None
                    namespace: ${{ parameters.domain }}
                    command: upgrade
                    chartType: FilePath
                    chartPath: helm/charts/${{ parameters.serviceName }}
                    releaseName: ${{ parameters.serviceName }}
                    install: true
                    arguments: >-
                      --create-namespace
                      --set image.repository=$(ACR_NAME).azurecr.io/shopos/${{ parameters.serviceName }}
                      --set image.tag=$(IMAGE_TAG)
                      --set environment=dev
                      --set persistence.storageClass=managed-premium
                      -f helm/charts/${{ parameters.serviceName }}/values-dev.yaml
                      --wait --timeout 10m

                - task: AzureCLI@2
                  displayName: Verify rollout
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      kubectl rollout status deployment/${{ parameters.serviceName }} \
                        -n ${{ parameters.domain }} --timeout=5m
                      kubectl get pods -n ${{ parameters.domain }} -l app=${{ parameters.serviceName }}

  - stage: DeployStaging
    displayName: Deploy to Staging
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'staging'))
    jobs:
      - deployment: DeployToStaging
        displayName: Deploy ${{ parameters.serviceName }} to staging
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Configure AKS kubeconfig
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group shopos-staging-rg \
                        --name shopos-aks-staging \
                        --overwrite-existing

                - task: HelmDeploy@0
                  displayName: Helm deploy to staging
                  inputs:
                    connectionType: None
                    namespace: ${{ parameters.domain }}
                    command: upgrade
                    chartType: FilePath
                    chartPath: helm/charts/${{ parameters.serviceName }}
                    releaseName: ${{ parameters.serviceName }}
                    install: true
                    arguments: >-
                      --create-namespace
                      --set image.repository=$(ACR_NAME).azurecr.io/shopos/${{ parameters.serviceName }}
                      --set image.tag=$(IMAGE_TAG)
                      --set environment=staging
                      --set replicaCount=2
                      --set persistence.storageClass=managed-premium
                      -f helm/charts/${{ parameters.serviceName }}/values-staging.yaml
                      --wait --timeout 10m

  - stage: DeployProd
    displayName: Deploy to Production
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'prod'))
    jobs:
      - deployment: DeployToProd
        displayName: Deploy ${{ parameters.serviceName }} to production
        environment: production
        strategy:
          canary:
            increments: [10, 50]
            preDeploy:
              steps:
                - task: AzureCLI@2
                  displayName: Configure AKS kubeconfig (prod)
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group shopos-prod-rg \
                        --name shopos-aks-prod \
                        --overwrite-existing
                - script: |
                    echo "Pre-deployment checks for ${{ parameters.serviceName }} in production"
                    kubectl get deployments -n ${{ parameters.domain }}
                  displayName: Pre-deployment checks
            deploy:
              steps:
                - task: HelmDeploy@0
                  displayName: Helm canary deploy to prod
                  inputs:
                    connectionType: None
                    namespace: ${{ parameters.domain }}
                    command: upgrade
                    chartType: FilePath
                    chartPath: helm/charts/${{ parameters.serviceName }}
                    releaseName: ${{ parameters.serviceName }}
                    install: true
                    arguments: >-
                      --create-namespace
                      --set image.repository=$(ACR_NAME).azurecr.io/shopos/${{ parameters.serviceName }}
                      --set image.tag=$(IMAGE_TAG)
                      --set environment=prod
                      --set replicaCount=3
                      --set resources.requests.cpu=200m
                      --set resources.requests.memory=256Mi
                      --set persistence.storageClass=managed-premium
                      -f helm/charts/${{ parameters.serviceName }}/values-prod.yaml
                      --wait --timeout 15m
            postRouteTraffic:
              steps:
                - script: |
                    kubectl rollout status deployment/${{ parameters.serviceName }} \
                      -n ${{ parameters.domain }} --timeout=5m
                    HTTP_CODE=$(kubectl exec -n ${{ parameters.domain }} \
                      $(kubectl get pod -n ${{ parameters.domain }} -l app=${{ parameters.serviceName }} -o jsonpath='{.items[0].metadata.name}') \
                      -- curl -sf -o /dev/null -w "%{http_code}" http://localhost/healthz 2>/dev/null || echo "000")
                    echo "Health check response: ${HTTP_CODE}"
                    [ "${HTTP_CODE}" = "200" ]
                  displayName: Post-traffic health check
            on:
              failure:
                steps:
                  - task: HelmDeploy@0
                    displayName: Rollback on failure
                    inputs:
                      connectionType: None
                      namespace: ${{ parameters.domain }}
                      command: rollback
                      releaseName: ${{ parameters.serviceName }}
