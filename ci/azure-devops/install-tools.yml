# Azure DevOps — Verify all required tools available on the build agent
# Uses Azure-native tasks where possible (AzureCLI@2, UseDotNet@2, UseNode@1)

trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials

jobs:
  - job: InstallTools
    displayName: Verify CI Agent Tools
    timeoutInMinutes: 30
    steps:
      - task: UseNode@1
        displayName: Use Node.js 22
        inputs:
          version: 22.x

      - task: UseDotNet@2
        displayName: Use .NET 8.0
        inputs:
          version: 8.0.x

      - task: JavaToolInstaller@0
        displayName: Use Java 21 (Corretto)
        inputs:
          versionSpec: 21
          jdkArchitectureOption: x64
          jdkSourceOption: PreInstalled

      - task: GoTool@0
        displayName: Use Go 1.23
        inputs:
          version: 1.23

      - task: KubectlInstaller@0
        displayName: Install kubectl

      - task: HelmInstaller@1
        displayName: Install Helm 3.16.0
        inputs:
          helmVersion: 3.16.0

      - task: TerraformInstaller@1
        displayName: Install Terraform 1.9.8
        inputs:
          terraformVersion: 1.9.8

      - task: AzureCLI@2
        displayName: Verify Azure CLI + install extra tools
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "=== Azure CLI ==="
            az version

            echo "=== kubectl ==="
            kubectl version --client

            echo "=== Helm ==="
            helm version --short

            echo "=== Terraform ==="
            terraform version

            echo "=== Go ==="
            go version

            echo "=== Node.js ==="
            node --version

            echo "=== .NET ==="
            dotnet --version

            echo "=== Java ==="
            java -version 2>&1 | head -1

            echo "=== Cosign ==="
            curl -fsSL "https://github.com/sigstore/cosign/releases/download/v2.4.0/cosign-linux-amd64" \
              -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
            cosign version

            echo "=== Buf ==="
            BUF_VERSION=1.35.1
            curl -fsSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
              -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf
            buf --version

            echo "=== Trivy ==="
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
            trivy --version | head -1

            echo "=== Grype + Syft ==="
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
            grype version | head -1
            syft --version

            echo "=== Gitleaks ==="
            GITLEAKS_VER=8.21.0
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
            gitleaks version

            echo "=== Semgrep + Checkov ==="
            pip install semgrep checkov --quiet
            semgrep --version
            checkov --version

            echo "=== k6 ==="
            sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
              --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update -qq && sudo apt-get install k6 -y -qq
            k6 version

            echo "=== All tools verified ==="
