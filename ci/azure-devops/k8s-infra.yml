# Azure DevOps — AKS cluster provisioning via Terraform
# Uses Azure-native: TerraformTaskV4, azurerm backend, AzureCLI, Key Vault for kubeconfig

trigger:
  branches:
    include: [main]
  paths:
    include: [infra/terraform/azure/app-k8s/**]

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials
  - name: TF_DIR
    value: infra/terraform/azure/app-k8s
  - name: ENVIRONMENT
    value: dev
  - name: TF_IN_AUTOMATION
    value: "true"
  - name: TF_CLI_ARGS
    value: "-no-color"

steps:
  - task: TerraformInstaller@1
    displayName: Install Terraform 1.9.8
    inputs:
      terraformVersion: 1.9.8

  - task: TerraformTaskV4@4
    displayName: Terraform Init (AKS)
    inputs:
      provider: azurerm
      command: init
      workingDirectory: $(TF_DIR)
      backendServiceArm: azure-service-connection
      backendAzureRmResourceGroupName: shopos-tfstate-rg
      backendAzureRmStorageAccountName: shoposterraformstate
      backendAzureRmContainerName: tfstate
      backendAzureRmKey: aks/$(ENVIRONMENT)/terraform.tfstate

  - task: TerraformTaskV4@4
    displayName: Terraform Validate
    inputs:
      provider: azurerm
      command: validate
      workingDirectory: $(TF_DIR)
      environmentServiceNameAzureRM: azure-service-connection

  - task: TerraformTaskV4@4
    displayName: Terraform Plan (AKS)
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: $(TF_DIR)
      environmentServiceNameAzureRM: azure-service-connection
      commandOptions: >-
        -var="environment=$(ENVIRONMENT)"
        -var="location=$(AZURE_LOCATION)"
        -out=tfplan

  - task: TerraformTaskV4@4
    displayName: Terraform Apply (AKS)
    inputs:
      provider: azurerm
      command: apply
      workingDirectory: $(TF_DIR)
      environmentServiceNameAzureRM: azure-service-connection
      commandOptions: tfplan

  - task: AzureCLI@2
    displayName: Configure AKS kubeconfig + store in Key Vault
    inputs:
      azureSubscription: azure-service-connection
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        CLUSTER_NAME=$(terraform -chdir=$(TF_DIR) output -raw cluster_name)
        RG=$(terraform -chdir=$(TF_DIR) output -raw resource_group_name)
        echo "AKS Cluster: ${CLUSTER_NAME} in ${RG}"
        az aks get-credentials \
          --resource-group ${RG} \
          --name ${CLUSTER_NAME} \
          --overwrite-existing
        kubectl get nodes
        KUBECONFIG_B64=$(cat ~/.kube/config | base64 -w 0)
        az keyvault secret set \
          --vault-name shopos-keyvault \
          --name kubeconfig-$(ENVIRONMENT) \
          --value "${KUBECONFIG_B64}" || true
        az keyvault secret set \
          --vault-name shopos-keyvault \
          --name aks-cluster-name-$(ENVIRONMENT) \
          --value "${CLUSTER_NAME}" || true
        echo "##vso[task.setvariable variable=AKS_CLUSTER_NAME;isOutput=true]${CLUSTER_NAME}"
        echo "##vso[task.setvariable variable=AKS_RESOURCE_GROUP;isOutput=true]${RG}"
