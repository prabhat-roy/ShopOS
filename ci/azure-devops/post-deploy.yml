# Azure DevOps — Post-deploy validation on AKS
# Uses Azure DevOps: environments, AzureCLI@2; k6 results published as pipeline artifacts
# DAST findings can be uploaded to Azure Security Center via AzureCLI@2

trigger: none

parameters:
  - name: environment
    type: string
    default: staging
    values: [dev, staging, prod]
  - name: runLoadTest
    type: boolean
    default: true
  - name: runDast
    type: boolean
    default: false
  - name: runK8sAudit
    type: boolean
    default: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials

stages:
  - stage: Validation
    displayName: Post-Deploy Validation on ${{ parameters.environment }}
    jobs:
      - deployment: Validate
        displayName: Validate ${{ parameters.environment }}
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: KubectlInstaller@0

                - task: AzureCLI@2
                  displayName: Configure AKS kubeconfig
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group shopos-${{ parameters.environment }}-rg \
                        --name shopos-aks-${{ parameters.environment }} \
                        --overwrite-existing
                      mkdir -p $(Build.ArtifactStagingDirectory)/reports/k6
                      mkdir -p $(Build.ArtifactStagingDirectory)/reports/dast
                      mkdir -p $(Build.ArtifactStagingDirectory)/reports/k8s-audit

                - script: |
                    echo "=== Health Checks ==="
                    HEALTH_FAILED=0
                    DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
                    for ns in ${DOMAINS}; do
                      UNAVAILABLE=$(kubectl get deployments -n "${ns}" --no-headers 2>/dev/null | awk '{print $4}' | grep -c "^0$" || true)
                      if [ "${UNAVAILABLE}" -gt 0 ]; then
                        echo "WARN: ${UNAVAILABLE} deployment(s) with 0 available in ${ns}"
                        HEALTH_FAILED=$((HEALTH_FAILED+1))
                      fi
                    done

                    kubectl port-forward svc/api-gateway 18080:8080 -n platform &
                    PF_PID=$!; sleep 10
                    HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/healthz 2>/dev/null || echo "000")
                    kill ${PF_PID} 2>/dev/null || true
                    echo "API Gateway /healthz → ${HTTP_CODE}"

                    if [ "${HTTP_CODE}" != "200" ]; then
                      echo "##vso[task.logissue type=warning]API Gateway health check failed: ${HTTP_CODE}"
                    fi
                    echo "Health check failures: ${HEALTH_FAILED}"
                  displayName: Health Checks

                - ${{ if eq(parameters.runLoadTest, true) }}:
                  - script: |
                      echo "=== Install k6 ==="
                      sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
                        --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
                      echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
                      sudo apt-get update -qq && sudo apt-get install k6 -y -qq

                      echo "=== k6 Smoke Test ==="
                      kubectl port-forward svc/api-gateway 18080:8080 -n platform &
                      PF_PID=$!; sleep 10
                      BASE_URL=http://localhost:18080 k6 run load-testing/k6/scripts/smoke.js \
                        --out json=$(Build.ArtifactStagingDirectory)/reports/k6/smoke-${{ parameters.environment }}.json \
                        --summary-export=$(Build.ArtifactStagingDirectory)/reports/k6/summary-${{ parameters.environment }}.json || true
                      kill ${PF_PID} 2>/dev/null || true
                    displayName: k6 Smoke Test

                - ${{ if eq(parameters.runDast, true) }}:
                  - script: |
                      echo "=== DAST: OWASP ZAP ==="
                      kubectl port-forward svc/api-gateway 18080:8080 -n platform &
                      PF_PID=$!; sleep 10
                      docker run --rm --network=host \
                        -v "$(Build.ArtifactStagingDirectory)/reports/dast:/zap/wrk" \
                        ghcr.io/zaproxy/zaproxy:stable \
                        zap-baseline.py \
                        -t http://localhost:18080 \
                        -J /zap/wrk/zap-${{ parameters.environment }}.json \
                        -r /zap/wrk/zap-${{ parameters.environment }}.html \
                        -I || true
                      kill ${PF_PID} 2>/dev/null || true
                    displayName: OWASP ZAP DAST

                - ${{ if eq(parameters.runK8sAudit, true) }}:
                  - script: |
                      echo "=== kube-bench ==="
                      docker run --rm --pid=host \
                        -v /etc:/etc:ro -v /var:/var:ro \
                        aquasec/kube-bench:latest --json \
                        > $(Build.ArtifactStagingDirectory)/reports/k8s-audit/kube-bench-${{ parameters.environment }}.json || true

                      echo "=== Kubescape ==="
                      docker run --rm -v ~/.kube:/root/.kube \
                        quay.io/armosec/kubescape:latest scan \
                        framework nsa,mitre \
                        --format json \
                        --output $(Build.ArtifactStagingDirectory)/reports/k8s-audit/kubescape-${{ parameters.environment }}.json || true
                    displayName: K8s Security Audit

                - task: PublishPipelineArtifact@1
                  displayName: Publish validation reports
                  inputs:
                    targetPath: $(Build.ArtifactStagingDirectory)/reports
                    artifact: post-deploy-reports-$(Build.BuildNumber)
                  condition: always()

                - task: AzureCLI@2
                  displayName: Upload reports to Azure Blob Storage
                  condition: always()
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      STORAGE_ACCOUNT=$(az storage account list \
                        -g shopos-${{ parameters.environment }}-rg \
                        --query "[?starts_with(name,'shopos')].name" -o tsv | head -1)
                      if [ -n "${STORAGE_ACCOUNT}" ]; then
                        az storage blob upload-batch \
                          --account-name ${STORAGE_ACCOUNT} \
                          --destination post-deploy-reports \
                          --source $(Build.ArtifactStagingDirectory)/reports \
                          --destination-path ${{ parameters.environment }}/$(Build.BuildNumber) 2>/dev/null || true
                        echo "Reports uploaded to Azure Blob Storage"
                      fi
