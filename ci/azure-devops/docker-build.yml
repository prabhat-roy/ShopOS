# Azure DevOps — Build all ShopOS images, scan with Trivy, push to ACR
# Uses Azure DevOps: Docker@2 task for ACR, AzureCLI@2, variable groups, environments

trigger: none

parameters:
  - name: domain
    displayName: Domain to build (empty = all 13)
    type: string
    default: ""
  - name: serviceName
    displayName: Specific service (empty = all in domain)
    type: string
    default: ""
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials
  - name: ACR_NAME
    value: shoposacrregistry
  - name: IMAGE_TAG
    value: $(Build.BuildNumber)-$(Build.SourceVersion)

jobs:
  - job: BuildAndPush
    displayName: Build + Scan + Push to ACR
    timeoutInMinutes: 120
    steps:
      - task: AzureCLI@2
        displayName: Login to ACR
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az acr login --name $(ACR_NAME)

      - task: AzureCLI@2
        displayName: Build and push all images to ACR
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
            SCOPE="${{ parameters.domain }}"
            [ -z "${SCOPE}" ] && SCOPE="${ALL_DOMAINS}"
            FAILED=0
            for domain in ${SCOPE}; do
              for dir in src/${domain}/*/; do
                [ -d "${dir}" ] || continue
                SVC=$(basename ${dir})
                if [ -n "${{ parameters.serviceName }}" ] && [ "${SVC}" != "${{ parameters.serviceName }}" ]; then continue; fi
                IMAGE="$(ACR_NAME).azurecr.io/shopos/${SVC}:$(IMAGE_TAG)"
                echo "=== Building ${IMAGE} ==="
                docker build \
                  --label "build.number=$(Build.BuildNumber)" \
                  --label "commit.sha=$(Build.SourceVersion)" \
                  --label "domain=${domain}" \
                  -t "${IMAGE}" \
                  -t "$(ACR_NAME).azurecr.io/shopos/${SVC}:latest" \
                  "${dir}" || { echo "WARN: ${SVC} build failed"; FAILED=$((FAILED+1)); continue; }
                docker push "${IMAGE}" || { echo "WARN: ${SVC} push failed"; FAILED=$((FAILED+1)); }
                docker push "$(ACR_NAME).azurecr.io/shopos/${SVC}:latest" || true
              done
            done
            echo "Build complete. Failures: ${FAILED}"

      - task: AzureCLI@2
        displayName: Trivy security scan (representative services)
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            mkdir -p $(Build.ArtifactStagingDirectory)/trivy-reports
            az acr login --name $(ACR_NAME)
            for SVC in api-gateway order-service payment-service fraud-detection-service auth-service; do
              IMAGE="$(ACR_NAME).azurecr.io/shopos/${SVC}:$(IMAGE_TAG)"
              docker run --rm \
                aquasec/trivy:latest image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --format json \
                "${IMAGE}" \
                > $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-${SVC}.json 2>/dev/null || true
            done
        continueOnError: true

      - task: AzureCLI@2
        displayName: Store image tag in Key Vault
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az keyvault secret set \
              --vault-name shopos-keyvault \
              --name image-tag-${{ parameters.environment }} \
              --value "$(IMAGE_TAG)" || true

      - task: PublishPipelineArtifact@1
        displayName: Publish Trivy scan reports
        inputs:
          targetPath: $(Build.ArtifactStagingDirectory)/trivy-reports
          artifact: trivy-reports-$(Build.BuildNumber)
        condition: always()
