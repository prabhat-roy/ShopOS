# Azure DevOps — Full AKS cluster bootstrap sequence
# Runs all 6 infra phases; uses AzureCLI@2 for all Azure-native operations
# Velero backed by Azure Blob; Loki/Tempo backed by Azure Blob

trigger: none

parameters:
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]
  - name: skipNetworking
    type: boolean
    default: false
  - name: skipSecurity
    type: boolean
    default: false
  - name: skipObservability
    type: boolean
    default: false
  - name: skipMessaging
    type: boolean
    default: false
  - name: skipRegistry
    type: boolean
    default: false
  - name: skipGitops
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials
  - name: ACR_NAME
    value: shoposacrregistry

jobs:
  - job: ClusterBootstrap
    displayName: Cluster Bootstrap on ${{ parameters.environment }}
    timeoutInMinutes: 180
    steps:
      - task: KubectlInstaller@0

      - task: HelmInstaller@1
        inputs:
          helmVersion: 3.16.0

      - task: AzureCLI@2
        displayName: Configure AKS kubeconfig + Azure prereqs
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            RG="shopos-${{ parameters.environment }}-rg"
            CLUSTER="shopos-aks-${{ parameters.environment }}"
            az aks get-credentials --resource-group ${RG} --name ${CLUSTER} --overwrite-existing
            kubectl get nodes

            # Attach ACR to AKS
            az aks update --resource-group ${RG} --name ${CLUSTER} \
              --attach-acr $(ACR_NAME) 2>/dev/null || true

            # Get storage account details
            STORAGE_ACCOUNT=$(az storage account list -g ${RG} \
              --query "[?starts_with(name,'shopos')].name" -o tsv | head -1)
            STORAGE_KEY=""
            if [ -n "${STORAGE_ACCOUNT}" ]; then
              STORAGE_KEY=$(az storage account keys list \
                --account-name ${STORAGE_ACCOUNT} -g ${RG} \
                --query '[0].value' -o tsv)
              for CONTAINER in loki-chunks tempo-traces velero-backups; do
                az storage container create --name ${CONTAINER} \
                  --account-name ${STORAGE_ACCOUNT} \
                  --account-key "${STORAGE_KEY}" 2>/dev/null || true
              done
            fi
            echo "##vso[task.setvariable variable=STORAGE_ACCOUNT]${STORAGE_ACCOUNT}"
            echo "##vso[task.setvariable variable=STORAGE_KEY;issecret=true]${STORAGE_KEY}"
            TENANT_ID=$(az account show --query tenantId -o tsv)
            echo "##vso[task.setvariable variable=TENANT_ID]${TENANT_ID}"

      # Phase 1: Networking
      - ${{ if eq(parameters.skipNetworking, false) }}:
        - script: |
            echo "=== Phase 1/6: Networking ==="
            helm repo add jetstack https://charts.jetstack.io --force-update
            helm upgrade --install cert-manager jetstack/cert-manager \
              --namespace cert-manager --create-namespace \
              --set installCRDs=true --set replicaCount=2 --wait --timeout 5m

            helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
            helm upgrade --install istio-base istio/base \
              --namespace istio-system --create-namespace --wait --timeout 3m
            helm upgrade --install istiod istio/istiod \
              --namespace istio-system --set telemetry.enabled=true --wait --timeout 5m
            helm upgrade --install istio-ingressgateway istio/gateway \
              --namespace istio-system \
              --set service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-internal"=true \
              --wait --timeout 3m

            helm repo add traefik https://traefik.github.io/charts --force-update
            helm upgrade --install traefik traefik/traefik \
              --namespace networking --create-namespace \
              --set deployment.replicas=2 \
              --set ports.websecure.tls.enabled=true \
              --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
              --wait --timeout 5m

            helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
            helm upgrade --install consul hashicorp/consul \
              --namespace consul --create-namespace \
              --set server.replicas=3 --set server.bootstrapExpect=3 \
              --set connectInject.enabled=true --wait --timeout 8m
            echo "Phase 1 Networking — DONE"
          displayName: Phase 1 - Networking

      # Phase 2: Security
      - ${{ if eq(parameters.skipSecurity, false) }}:
        - script: |
            echo "=== Phase 2/6: Security ==="
            helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
            helm upgrade --install vault hashicorp/vault \
              --namespace vault --create-namespace \
              --set server.ha.enabled=true --set server.ha.raft.enabled=true \
              --set server.ha.replicas=3 --set ui.enabled=true \
              --set "server.extraEnvironmentVars.AZURE_TENANT_ID=$(TENANT_ID)" \
              --set "server.extraEnvironmentVars.VAULT_AZUREKEYVAULT_VAULT_NAME=shopos-keyvault" \
              --set "server.extraEnvironmentVars.VAULT_AZUREKEYVAULT_KEY_NAME=vault-unseal-key" \
              --wait --timeout 10m

            helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
            helm upgrade --install keycloak bitnami/keycloak \
              --namespace keycloak --create-namespace \
              --set replicaCount=2 \
              --set auth.adminPassword="$(KEYCLOAK_ADMIN_PASSWORD)" \
              --set postgresql.enabled=true \
              --set postgresql.primary.persistence.storageClass=managed-premium \
              --wait --timeout 10m

            helm repo add kyverno https://kyverno.github.io/kyverno --force-update
            helm upgrade --install kyverno kyverno/kyverno \
              --namespace kyverno --create-namespace \
              --set replicaCount=2 --wait --timeout 5m

            helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
            helm upgrade --install falco falcosecurity/falco \
              --namespace falco --create-namespace \
              --set driver.kind=ebpf --set falcosidekick.enabled=true \
              --wait --timeout 8m

            echo "Phase 2 Security — DONE"
          displayName: Phase 2 - Security

      # Phase 3: Observability
      - ${{ if eq(parameters.skipObservability, false) }}:
        - script: |
            echo "=== Phase 3/6: Observability ==="
            helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
            helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
              --namespace observability --create-namespace \
              --set prometheus.prometheusSpec.retention=30d \
              --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=managed-premium \
              --set grafana.enabled=false --wait --timeout 10m

            helm repo add grafana https://grafana.github.io/helm-charts --force-update
            helm upgrade --install grafana grafana/grafana \
              --namespace observability \
              --set adminPassword="$(GRAFANA_ADMIN_PASSWORD)" \
              --set persistence.enabled=true \
              --set persistence.storageClassName=managed-premium \
              --wait --timeout 5m

            helm upgrade --install loki grafana/loki \
              --namespace observability \
              --set loki.auth_enabled=false \
              --set loki.storage.type=azure \
              --set loki.storage.azure.account_name="$(STORAGE_ACCOUNT)" \
              --set loki.storage.azure.account_key="$(STORAGE_KEY)" \
              --set loki.storage.azure.container_name=loki-chunks \
              --wait --timeout 8m
            echo "Phase 3 Observability — DONE"
          displayName: Phase 3 - Observability

      # Phase 4: Messaging
      - ${{ if eq(parameters.skipMessaging, false) }}:
        - script: |
            echo "=== Phase 4/6: Messaging ==="
            helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
            helm upgrade --install zookeeper bitnami/zookeeper \
              --namespace messaging --create-namespace \
              --set replicaCount=3 \
              --set persistence.storageClass=managed-premium \
              --wait --timeout 8m

            helm upgrade --install kafka bitnami/kafka \
              --namespace messaging \
              --set replicaCount=3 \
              --set zookeeper.enabled=false \
              --set externalZookeeper.servers=zookeeper.messaging.svc:2181 \
              --set autoCreateTopicsEnable=false \
              --set defaultReplicationFactor=3 \
              --set persistence.storageClass=managed-premium \
              --wait --timeout 10m

            helm upgrade --install rabbitmq bitnami/rabbitmq \
              --namespace messaging \
              --set replicaCount=3 \
              --set auth.password="$(RABBITMQ_PASSWORD)" \
              --set clustering.enabled=true \
              --set persistence.storageClass=managed-premium \
              --wait --timeout 8m

            helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
            helm upgrade --install nats nats/nats \
              --namespace messaging \
              --set nats.jetstream.enabled=true \
              --set cluster.enabled=true --set cluster.replicas=3 \
              --set nats.jetstream.fileStorage.storageClassName=managed-premium \
              --wait --timeout 5m
            echo "Phase 4 Messaging — DONE"
          displayName: Phase 4 - Messaging

      # Phase 5: Registry
      - ${{ if eq(parameters.skipRegistry, false) }}:
        - script: |
            echo "=== Phase 5/6: Registry ==="
            helm repo add harbor https://helm.goharbor.io --force-update
            helm upgrade --install harbor harbor/harbor \
              --namespace registry --create-namespace \
              --set harborAdminPassword="$(HARBOR_ADMIN_PASSWORD)" \
              --set trivy.enabled=true \
              --set persistence.enabled=true \
              --set persistence.persistentVolumeClaim.registry.storageClass=managed-premium \
              --wait --timeout 10m

            helm repo add minio https://charts.min.io --force-update
            helm upgrade --install minio minio/minio \
              --namespace registry \
              --set rootUser="$(MINIO_ROOT_USER)" \
              --set rootPassword="$(MINIO_ROOT_PASSWORD)" \
              --set replicas=4 --set persistence.enabled=true \
              --set persistence.size=100Gi \
              --set persistence.storageClass=managed-premium \
              --wait --timeout 8m
            echo "Phase 5 Registry — DONE"
          displayName: Phase 5 - Registry

      # Phase 6: GitOps
      - ${{ if eq(parameters.skipGitops, false) }}:
        - script: |
            echo "=== Phase 6/6: GitOps ==="
            helm repo add argo https://argoproj.github.io/argo-helm --force-update
            helm upgrade --install argocd argo/argo-cd \
              --namespace argocd --create-namespace \
              --set server.replicas=2 \
              --set redis-ha.enabled=true \
              --set configs.secret.argocdServerAdminPassword="$(ARGOCD_ADMIN_PASSWORD_HASH)" \
              --wait --timeout 10m

            helm repo add kedacore https://kedacore.github.io/charts --force-update
            helm upgrade --install keda kedacore/keda \
              --namespace keda --create-namespace --wait --timeout 5m

            # Velero backed by Azure Blob
            helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
            helm upgrade --install velero vmware-tanzu/velero \
              --namespace velero --create-namespace \
              --set configuration.backupStorageLocation[0].provider=azure \
              --set configuration.backupStorageLocation[0].bucket=velero-backups \
              --set "configuration.backupStorageLocation[0].config.storageAccount=$(STORAGE_ACCOUNT)" \
              --set "configuration.backupStorageLocation[0].config.resourceGroup=shopos-${{ parameters.environment }}-rg" \
              --set configuration.volumeSnapshotLocation[0].provider=azure \
              --set initContainers[0].name=velero-plugin-for-microsoft-azure \
              --set initContainers[0].image=velero/velero-plugin-for-microsoft-azure:v1.10.0 \
              --set initContainers[0].volumeMounts[0].mountPath=/target \
              --set initContainers[0].volumeMounts[0].name=plugins \
              --wait --timeout 5m

            kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s
            kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true
            echo "Phase 6 GitOps — DONE"
          displayName: Phase 6 - GitOps

      - script: |
          echo "=== Cluster Bootstrap Complete — ${{ parameters.environment }} ==="
          kubectl get nodes
          kubectl get namespaces
        displayName: Final Status
