# Azure DevOps — Deploy observability stack to AKS
# Loki/Tempo backed by Azure Blob Storage; uses AzureCLI@2, HelmDeploy, variable groups
# action: INSTALL | UPGRADE | UNINSTALL

trigger: none

parameters:
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]
  - name: action
    type: string
    default: INSTALL
    values: [INSTALL, UPGRADE, UNINSTALL]
  - name: prometheus
    type: boolean
    default: true
  - name: grafana
    type: boolean
    default: true
  - name: loki
    type: boolean
    default: true
  - name: jaeger
    type: boolean
    default: true
  - name: tempo
    type: boolean
    default: true
  - name: otelCollector
    type: boolean
    default: true
  - name: fluentBit
    type: boolean
    default: true
  - name: metricsServer
    type: boolean
    default: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials

jobs:
  - job: Observability
    displayName: Observability ${{ parameters.action }} on ${{ parameters.environment }}
    timeoutInMinutes: 90
    steps:
      - task: KubectlInstaller@0

      - task: HelmInstaller@1
        inputs:
          helmVersion: 3.16.0

      - task: AzureCLI@2
        displayName: Configure AKS + ensure Azure Blob Storage for logs/traces
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az aks get-credentials \
              --resource-group shopos-${{ parameters.environment }}-rg \
              --name shopos-aks-${{ parameters.environment }} \
              --overwrite-existing
            # Ensure Azure Storage containers for Loki and Tempo
            if [ "${{ parameters.action }}" = "INSTALL" ]; then
              STORAGE_ACCOUNT=$(az storage account list -g shopos-${{ parameters.environment }}-rg \
                --query "[?starts_with(name,'shopos')].name" -o tsv | head -1)
              if [ -n "${STORAGE_ACCOUNT}" ]; then
                STORAGE_KEY=$(az storage account keys list --account-name ${STORAGE_ACCOUNT} \
                  -g shopos-${{ parameters.environment }}-rg --query '[0].value' -o tsv)
                az storage container create --name loki-chunks \
                  --account-name ${STORAGE_ACCOUNT} --account-key "${STORAGE_KEY}" 2>/dev/null || true
                az storage container create --name tempo-traces \
                  --account-name ${STORAGE_ACCOUNT} --account-key "${STORAGE_KEY}" 2>/dev/null || true
                echo "##vso[task.setvariable variable=STORAGE_ACCOUNT]${STORAGE_ACCOUNT}"
                echo "##vso[task.setvariable variable=STORAGE_KEY;issecret=true]${STORAGE_KEY}"
              fi
            fi

      - ${{ if eq(parameters.metricsServer, true) }}:
        - script: |
            helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall metrics-server -n kube-system 2>/dev/null || true
            else
              helm upgrade --install metrics-server metrics-server/metrics-server \
                --namespace kube-system \
                --set args[0]=--kubelet-insecure-tls \
                --wait --timeout 3m
            fi
          displayName: Metrics Server

      - ${{ if eq(parameters.prometheus, true) }}:
        - script: |
            helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall kube-prometheus-stack -n observability 2>/dev/null || true
            else
              helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
                --namespace observability --create-namespace \
                --set prometheus.prometheusSpec.retention=30d \
                --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=managed-premium \
                --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=50Gi \
                --set alertmanager.alertmanagerSpec.replicas=2 \
                --set grafana.enabled=false \
                --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
                --wait --timeout 10m
              kubectl apply -f observability/prometheus/ 2>/dev/null || true
            fi
          displayName: kube-prometheus-stack

      - ${{ if eq(parameters.grafana, true) }}:
        - script: |
            helm repo add grafana https://grafana.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall grafana -n observability 2>/dev/null || true
            else
              helm upgrade --install grafana grafana/grafana \
                --namespace observability --create-namespace \
                --set adminPassword="$(GRAFANA_ADMIN_PASSWORD)" \
                --set persistence.enabled=true \
                --set persistence.storageClassName=managed-premium \
                --set sidecar.dashboards.enabled=true \
                --set sidecar.datasources.enabled=true \
                --wait --timeout 5m
              kubectl apply -f observability/grafana/ 2>/dev/null || true
            fi
          displayName: Grafana

      - ${{ if eq(parameters.loki, true) }}:
        - script: |
            helm repo add grafana https://grafana.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall loki -n observability 2>/dev/null || true
            else
              # Loki with Azure Blob Storage backend
              helm upgrade --install loki grafana/loki \
                --namespace observability --create-namespace \
                --set loki.auth_enabled=false \
                --set loki.storage.type=azure \
                --set loki.storage.azure.account_name="$(STORAGE_ACCOUNT)" \
                --set loki.storage.azure.account_key="$(STORAGE_KEY)" \
                --set loki.storage.azure.container_name=loki-chunks \
                --wait --timeout 8m
            fi
          displayName: Loki (Azure Blob Storage)

      - ${{ if eq(parameters.tempo, true) }}:
        - script: |
            helm repo add grafana https://grafana.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall tempo-distributed -n observability 2>/dev/null || true
            else
              # Tempo with Azure Blob Storage backend
              helm upgrade --install tempo-distributed grafana/tempo-distributed \
                --namespace observability --create-namespace \
                --set storage.trace.backend=azure \
                --set storage.trace.azure.storage_account_name="$(STORAGE_ACCOUNT)" \
                --set storage.trace.azure.storage_account_key="$(STORAGE_KEY)" \
                --set storage.trace.azure.container_name=tempo-traces \
                --wait --timeout 8m
            fi
          displayName: Tempo (Azure Blob Storage)

      - ${{ if eq(parameters.jaeger, true) }}:
        - script: |
            helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall jaeger -n observability 2>/dev/null || true
            else
              helm upgrade --install jaeger jaegertracing/jaeger \
                --namespace observability --create-namespace \
                --set provisionDataStore.cassandra=false \
                --set allInOne.enabled=true \
                --wait --timeout 8m
            fi
          displayName: Jaeger

      - ${{ if eq(parameters.otelCollector, true) }}:
        - script: |
            helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall otel-collector -n observability 2>/dev/null || true
            else
              helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
                --namespace observability --create-namespace \
                --set mode=deployment --set replicaCount=2 \
                -f observability/otel-collector/values.yaml \
                --wait --timeout 5m
            fi
          displayName: OpenTelemetry Collector

      - ${{ if eq(parameters.fluentBit, true) }}:
        - script: |
            helm repo add fluent https://fluent.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall fluent-bit -n observability 2>/dev/null || true
            else
              helm upgrade --install fluent-bit fluent/fluent-bit \
                --namespace observability --create-namespace \
                --wait --timeout 5m
            fi
          displayName: Fluent Bit
