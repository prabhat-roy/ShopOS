# Azure DevOps — Deploy registry tools to AKS; configure ACR as primary registry
# ACR lifecycle policies applied via AzureCLI@2; Harbor/Nexus/Gitea on AKS
# action: INSTALL | UPGRADE | UNINSTALL | CONFIGURE

trigger: none

parameters:
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]
  - name: action
    type: string
    default: INSTALL
    values: [INSTALL, UPGRADE, UNINSTALL, CONFIGURE]
  - name: harbor
    type: boolean
    default: true
  - name: nexus
    type: boolean
    default: true
  - name: gitea
    type: boolean
    default: true
  - name: minio
    type: boolean
    default: true
  - name: configureAcr
    type: boolean
    default: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials
  - name: ACR_NAME
    value: shoposacrregistry

jobs:
  - job: Registry
    displayName: Registry ${{ parameters.action }} on ${{ parameters.environment }}
    timeoutInMinutes: 90
    steps:
      - task: KubectlInstaller@0

      - task: HelmInstaller@1
        inputs:
          helmVersion: 3.16.0

      - task: AzureCLI@2
        displayName: Configure AKS kubeconfig
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az aks get-credentials \
              --resource-group shopos-${{ parameters.environment }}-rg \
              --name shopos-aks-${{ parameters.environment }} \
              --overwrite-existing

      # Configure ACR — Azure-native container registry
      - ${{ if and(eq(parameters.configureAcr, true), eq(parameters.action, 'CONFIGURE')) }}:
        - task: AzureCLI@2
          displayName: Configure ACR lifecycle policies
          inputs:
            azureSubscription: azure-service-connection
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              # Apply retention policy to ACR
              az acr config retention update \
                --registry $(ACR_NAME) \
                --status enabled \
                --days 30 \
                --type UntaggedManifests 2>/dev/null || true

              # Geo-replication for prod
              if [ "${{ parameters.environment }}" = "prod" ]; then
                az acr replication create \
                  --registry $(ACR_NAME) \
                  --location eastus 2>/dev/null || true
              fi

              # Attach ACR to AKS
              az aks update \
                --resource-group shopos-${{ parameters.environment }}-rg \
                --name shopos-aks-${{ parameters.environment }} \
                --attach-acr $(ACR_NAME) 2>/dev/null || true

              echo "ACR $(ACR_NAME) configured and attached to AKS"

      - ${{ if and(eq(parameters.harbor, true), ne(parameters.action, 'CONFIGURE')) }}:
        - script: |
            helm repo add harbor https://helm.goharbor.io --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall harbor -n registry 2>/dev/null || true
            else
              helm upgrade --install harbor harbor/harbor \
                --namespace registry --create-namespace \
                --set expose.type=ingress \
                --set expose.ingress.className=traefik \
                --set expose.ingress.hosts.core=harbor.shopos.internal \
                --set externalURL=https://harbor.shopos.internal \
                --set harborAdminPassword="$(HARBOR_ADMIN_PASSWORD)" \
                --set trivy.enabled=true \
                --set notary.enabled=true \
                --set chartmuseum.enabled=true \
                --set persistence.enabled=true \
                --set persistence.persistentVolumeClaim.registry.storageClass=managed-premium \
                --wait --timeout 10m
            fi
          displayName: Harbor Registry

      - ${{ if and(eq(parameters.nexus, true), ne(parameters.action, 'CONFIGURE')) }}:
        - script: |
            helm repo add sonatype https://sonatype.github.io/helm3-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall nexus -n registry 2>/dev/null || true
            else
              helm upgrade --install nexus sonatype/nexus-repository-manager \
                --namespace registry --create-namespace \
                --set nexus.resources.requests.memory=2Gi \
                --set nexus.resources.limits.memory=4Gi \
                --set persistence.enabled=true \
                --set persistence.storageSize=50Gi \
                --set persistence.storageClass=managed-premium \
                --wait --timeout 10m
            fi
          displayName: Nexus Repository Manager

      - ${{ if and(eq(parameters.gitea, true), ne(parameters.action, 'CONFIGURE')) }}:
        - script: |
            helm repo add gitea-charts https://dl.gitea.io/charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall gitea -n registry 2>/dev/null || true
            else
              helm upgrade --install gitea gitea-charts/gitea \
                --namespace registry --create-namespace \
                --set gitea.admin.username=gitea-admin \
                --set gitea.admin.password="$(GITEA_ADMIN_PASSWORD)" \
                --set gitea.admin.email=admin@shopos.internal \
                --set persistence.enabled=true \
                --set persistence.storageClass=managed-premium \
                --set postgresql.enabled=true \
                --wait --timeout 8m
            fi
          displayName: Gitea Git Server

      - ${{ if and(eq(parameters.minio, true), ne(parameters.action, 'CONFIGURE')) }}:
        - script: |
            helm repo add minio https://charts.min.io --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall minio -n registry 2>/dev/null || true
            else
              helm upgrade --install minio minio/minio \
                --namespace registry --create-namespace \
                --set rootUser="$(MINIO_ROOT_USER)" \
                --set rootPassword="$(MINIO_ROOT_PASSWORD)" \
                --set replicas=4 \
                --set persistence.enabled=true \
                --set persistence.size=100Gi \
                --set persistence.storageClass=managed-premium \
                --wait --timeout 8m
            fi
          displayName: MinIO Object Storage
