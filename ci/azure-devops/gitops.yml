# Azure DevOps — Deploy GitOps stack to AKS
# ArgoCD configured with AKS kubeconfig; Velero backed by Azure Blob Storage
# External Secrets pulls from Azure Key Vault
# action: INSTALL | UPGRADE | UNINSTALL | CONFIGURE

trigger: none

parameters:
  - name: environment
    type: string
    default: dev
    values: [dev, staging, prod]
  - name: action
    type: string
    default: INSTALL
    values: [INSTALL, UPGRADE, UNINSTALL, CONFIGURE]
  - name: argocd
    type: boolean
    default: true
  - name: argoRollouts
    type: boolean
    default: true
  - name: argoWorkflows
    type: boolean
    default: true
  - name: argoEvents
    type: boolean
    default: true
  - name: externalSecrets
    type: boolean
    default: true
  - name: keda
    type: boolean
    default: true
  - name: velero
    type: boolean
    default: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: shopos-azure-credentials

jobs:
  - job: GitOps
    displayName: GitOps ${{ parameters.action }} on ${{ parameters.environment }}
    timeoutInMinutes: 90
    steps:
      - task: KubectlInstaller@0

      - task: HelmInstaller@1
        inputs:
          helmVersion: 3.16.0

      - task: AzureCLI@2
        displayName: Configure AKS kubeconfig + Azure storage for Velero
        inputs:
          azureSubscription: azure-service-connection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az aks get-credentials \
              --resource-group shopos-${{ parameters.environment }}-rg \
              --name shopos-aks-${{ parameters.environment }} \
              --overwrite-existing
            # Ensure Azure Blob container for Velero backups
            if [ "${{ parameters.action }}" = "INSTALL" ] && [ "${{ parameters.velero }}" = "True" ]; then
              STORAGE_ACCOUNT=$(az storage account list \
                -g shopos-${{ parameters.environment }}-rg \
                --query "[?starts_with(name,'shopos')].name" -o tsv | head -1)
              if [ -n "${STORAGE_ACCOUNT}" ]; then
                STORAGE_KEY=$(az storage account keys list \
                  --account-name ${STORAGE_ACCOUNT} \
                  -g shopos-${{ parameters.environment }}-rg \
                  --query '[0].value' -o tsv)
                az storage container create --name velero-backups \
                  --account-name ${STORAGE_ACCOUNT} \
                  --account-key "${STORAGE_KEY}" 2>/dev/null || true
                echo "##vso[task.setvariable variable=VELERO_STORAGE_ACCOUNT]${STORAGE_ACCOUNT}"
                echo "##vso[task.setvariable variable=VELERO_STORAGE_KEY;issecret=true]${STORAGE_KEY}"
              fi
            fi

      - ${{ if eq(parameters.argocd, true) }}:
        - script: |
            helm repo add argo https://argoproj.github.io/argo-helm --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall argocd -n argocd 2>/dev/null || true
            else
              helm upgrade --install argocd argo/argo-cd \
                --namespace argocd --create-namespace \
                --set server.replicas=2 \
                --set redis-ha.enabled=true \
                --set controller.replicas=1 \
                --set repoServer.replicas=2 \
                --set applicationSet.replicas=2 \
                --set configs.secret.argocdServerAdminPassword="$(ARGOCD_ADMIN_PASSWORD_HASH)" \
                --wait --timeout 10m
            fi
          displayName: ArgoCD

      - ${{ if eq(parameters.argoRollouts, true) }}:
        - script: |
            helm repo add argo https://argoproj.github.io/argo-helm --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall argo-rollouts -n argo-rollouts 2>/dev/null || true
            else
              helm upgrade --install argo-rollouts argo/argo-rollouts \
                --namespace argo-rollouts --create-namespace \
                --set dashboard.enabled=true --wait --timeout 5m
              kubectl apply -f gitops/argo-rollouts/ 2>/dev/null || true
            fi
          displayName: Argo Rollouts

      - ${{ if eq(parameters.argoWorkflows, true) }}:
        - script: |
            helm repo add argo https://argoproj.github.io/argo-helm --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall argo-workflows -n argo 2>/dev/null || true
            else
              helm upgrade --install argo-workflows argo/argo-workflows \
                --namespace argo --create-namespace \
                --set server.authModes[0]=server \
                --wait --timeout 5m
              kubectl apply -f gitops/argo-workflows/ 2>/dev/null || true
            fi
          displayName: Argo Workflows

      - ${{ if eq(parameters.argoEvents, true) }}:
        - script: |
            helm repo add argo https://argoproj.github.io/argo-helm --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall argo-events -n argo-events 2>/dev/null || true
            else
              helm upgrade --install argo-events argo/argo-events \
                --namespace argo-events --create-namespace --wait --timeout 5m
              kubectl apply -f gitops/argo-events/ 2>/dev/null || true
            fi
          displayName: Argo Events

      # External Secrets backed by Azure Key Vault
      - ${{ if eq(parameters.externalSecrets, true) }}:
        - task: AzureCLI@2
          displayName: External Secrets Operator (Azure Key Vault backend)
          inputs:
            azureSubscription: azure-service-connection
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              helm repo add external-secrets https://charts.external-secrets.io --force-update
              if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
                helm uninstall external-secrets -n external-secrets 2>/dev/null || true
              else
                helm upgrade --install external-secrets external-secrets/external-secrets \
                  --namespace external-secrets --create-namespace \
                  --set installCRDs=true --wait --timeout 5m
                TENANT_ID=$(az account show --query tenantId -o tsv)
                kubectl apply -f - <<EOF
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      tenantId: ${TENANT_ID}
      vaultUrl: https://shopos-keyvault.vault.azure.net/
      authType: WorkloadIdentity
EOF
              fi

      - ${{ if eq(parameters.keda, true) }}:
        - script: |
            helm repo add kedacore https://kedacore.github.io/charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall keda -n keda 2>/dev/null || true
            else
              helm upgrade --install keda kedacore/keda \
                --namespace keda --create-namespace \
                --set metricsServer.replicaCount=2 --wait --timeout 5m
              kubectl apply -f kubernetes/keda/ 2>/dev/null || true
            fi
          displayName: KEDA

      # Velero backed by Azure Blob Storage
      - ${{ if eq(parameters.velero, true) }}:
        - script: |
            helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
            if [ "${{ parameters.action }}" = "UNINSTALL" ]; then
              helm uninstall velero -n velero 2>/dev/null || true
            else
              helm upgrade --install velero vmware-tanzu/velero \
                --namespace velero --create-namespace \
                --set configuration.backupStorageLocation[0].name=default \
                --set configuration.backupStorageLocation[0].provider=azure \
                --set configuration.backupStorageLocation[0].bucket=velero-backups \
                --set "configuration.backupStorageLocation[0].config.storageAccount=$(VELERO_STORAGE_ACCOUNT)" \
                --set "configuration.backupStorageLocation[0].config.resourceGroup=shopos-${{ parameters.environment }}-rg" \
                --set configuration.volumeSnapshotLocation[0].provider=azure \
                --set "configuration.volumeSnapshotLocation[0].config.apiTimeout=5m" \
                --set initContainers[0].name=velero-plugin-for-microsoft-azure \
                --set initContainers[0].image=velero/velero-plugin-for-microsoft-azure:v1.10.0 \
                --set initContainers[0].volumeMounts[0].mountPath=/target \
                --set initContainers[0].volumeMounts[0].name=plugins \
                --wait --timeout 5m
              kubectl apply -f kubernetes/velero/ 2>/dev/null || true
            fi
          displayName: Velero (Azure Blob Storage)

      - ${{ if eq(parameters.action, 'CONFIGURE') }}:
        - script: |
            kubectl wait --for=condition=available deployment/argocd-server \
              -n argocd --timeout=180s
            kubectl apply -f gitops/argocd/app-of-apps.yaml
            kubectl apply -f gitops/argocd/applicationsets/ 2>/dev/null || true
            echo "ArgoCD App-of-Apps bootstrapped for ${{ parameters.environment }}"
          displayName: Bootstrap ArgoCD App-of-Apps
