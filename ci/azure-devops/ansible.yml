name: Ansible Playbooks

trigger: none

parameters:
  - name: playbook
    displayName: Ansible playbook
    type: string
    default: k8s-node
    values: [jenkins, k8s-node, common]
  - name: inventory
    displayName: Target cloud inventory
    type: string
    default: aws
    values: [aws, gcp, azure]
  - name: limit
    displayName: Limit to specific host or group (leave blank for all)
    type: string
    default: ''
  - name: extra_vars
    displayName: Extra Ansible variables (key=value)
    type: string
    default: ''
  - name: check_mode
    displayName: Dry run (no changes)
    type: boolean
    default: false

variables:
  - group: shopos-secrets
  - name: ANSIBLE_DIR
    value: infra/ansible
  - name: ANSIBLE_FORCE_COLOR
    value: '1'
  - name: ANSIBLE_HOST_KEY_CHECKING
    value: 'False'
  - name: ANSIBLE_STDOUT_CALLBACK
    value: yaml

pool:
  vmImage: ubuntu-latest

jobs:
  - job: Ansible
    displayName: Ansible ${{ parameters.playbook }} on ${{ parameters.inventory }}
    timeoutInMinutes: 60
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.13'

      - script: |
          pip install ansible ansible-lint boto3 botocore google-auth msrest msrestazure --quiet
          ansible-galaxy collection install \
            amazon.aws google.cloud azure.azcollection community.kubernetes --quiet
        displayName: Install Ansible + dependencies

      - script: |
          echo "$(ANSIBLE_SSH_PRIVATE_KEY)" > /tmp/ansible_key
          chmod 600 /tmp/ansible_key
        displayName: Write SSH private key

      # ── AWS credentials ───────────────────────────────────────────────────
      - ${{ if eq(parameters.inventory, 'aws') }}:
        - task: AWSShellScript@1
          displayName: Configure AWS credentials
          inputs:
            awsCredentials: AWS-Service-Connection
            regionName: $(AWS_REGION)
            scriptType: inline
            inlineScript: |
              echo "AWS_DEFAULT_REGION=$(AWS_REGION)" >> $(ANSIBLE_DIR)/.env || true

      # ── GCP credentials ───────────────────────────────────────────────────
      - ${{ if eq(parameters.inventory, 'gcp') }}:
        - script: |
            echo "$(GCP_SERVICE_ACCOUNT_KEY)" | base64 -d > /tmp/gcp-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
            echo "##vso[task.setvariable variable=GOOGLE_APPLICATION_CREDENTIALS]/tmp/gcp-sa.json"
          displayName: Configure GCP credentials

      # ── Azure credentials ─────────────────────────────────────────────────
      - ${{ if eq(parameters.inventory, 'azure') }}:
        - task: AzureCLI@2
          displayName: Configure Azure credentials
          inputs:
            azureSubscription: Azure-Service-Connection
            scriptType: bash
            scriptLocation: inlineScript
            addSpnToEnvironment: true
            inlineScript: |
              echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
              echo "##vso[task.setvariable variable=AZURE_SECRET]$servicePrincipalKey"
              echo "##vso[task.setvariable variable=AZURE_TENANT]$tenantId"
              echo "##vso[task.setvariable variable=AZURE_SUBSCRIPTION_ID]$(az account show --query id -o tsv)"

      - script: |
          ansible-lint "$(ANSIBLE_DIR)/playbooks/${{ parameters.playbook }}.yml" \
            -c "$(ANSIBLE_DIR)/.ansible-lint" || true
        displayName: Ansible lint
        continueOnError: true

      - script: |
          LIMIT_ARG=""
          if [ -n "${{ parameters.limit }}" ]; then
            LIMIT_ARG="--limit '${{ parameters.limit }}'"
          fi
          EXTRA_VARS_ARG=""
          if [ -n "${{ parameters.extra_vars }}" ]; then
            EXTRA_VARS_ARG="--extra-vars '${{ parameters.extra_vars }}'"
          fi
          CHECK_ARG=""
          if [ "${{ parameters.check_mode }}" = "True" ]; then
            CHECK_ARG="--check --diff"
          fi

          eval ansible-playbook \
            -i "$(ANSIBLE_DIR)/inventories/${{ parameters.inventory }}/hosts.yml" \
            "$(ANSIBLE_DIR)/playbooks/${{ parameters.playbook }}.yml" \
            --private-key /tmp/ansible_key \
            --user "$(ANSIBLE_SSH_USER)" \
            $LIMIT_ARG \
            $EXTRA_VARS_ARG \
            $CHECK_ARG \
            -v
        displayName: Run Ansible playbook

      - script: rm -f /tmp/ansible_key /tmp/gcp-sa.json
        condition: always()
        displayName: Cleanup credentials
