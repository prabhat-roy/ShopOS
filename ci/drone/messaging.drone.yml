kind: pipeline
type: docker
name: messaging

trigger:
  event:
    - custom

# Secrets required:
#   kubeconfig_b64

# Variables (set via Drone UI / API):
#   ACTION — INSTALL | UNINSTALL | CONFIGURE
#   ZOOKEEPER, KAFKA, SCHEMA_REGISTRY, KAFKA_CONNECT, KSQLDB, STRIMZI
#   RABBITMQ, NATS, REDPANDA, PULSAR
#   DEBEZIUM, FLINK, SPARK, KAFKA_UI, CONDUKTOR

steps:

  - name: load-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  # ── Kafka Ecosystem ────────────────────────────────────────────────────────

  - name: install-zookeeper
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm upgrade --install zookeeper bitnami/zookeeper --namespace zookeeper --create-namespace --wait --timeout 5m
    when:
      branch: [main]

  - name: install-kafka
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm upgrade --install kafka bitnami/kafka --namespace kafka --create-namespace \
          --set kraft.enabled=true \
          --wait --timeout 10m
      - KAFKA_IP=$(kubectl get svc kafka -n kafka -o jsonpath='{.spec.clusterIP}' 2>/dev/null)
      - sed -i '/^KAFKA_BOOTSTRAP_SERVERS=/d' infra.env && echo "KAFKA_BOOTSTRAP_SERVERS=$KAFKA_IP:9092" >> infra.env
    when:
      branch: [main]

  - name: install-schema-registry
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm upgrade --install schema-registry bitnami/schema-registry --namespace schema-registry --create-namespace \
          --set kafka.bootstrapServers=$(grep '^KAFKA_BOOTSTRAP_SERVERS=' infra.env | cut -d= -f2 || echo "kafka.kafka.svc.cluster.local:9092") \
          --wait --timeout 5m
      - SR_IP=$(kubectl get svc schema-registry -n schema-registry -o jsonpath='{.spec.clusterIP}' 2>/dev/null)
      - sed -i '/^SCHEMA_REGISTRY_URL=/d' infra.env && echo "SCHEMA_REGISTRY_URL=http://$SR_IP:8081" >> infra.env
    when:
      branch: [main]

  - name: install-kafka-connect
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm upgrade --install kafka-connect bitnami/kafka --namespace kafka-connect --create-namespace --wait --timeout 5m
    when:
      branch: [main]

  - name: install-strimzi
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add strimzi https://strimzi.io/charts
      - helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator --namespace strimzi --create-namespace --wait --timeout 5m
    when:
      branch: [main]

  # ── Message Brokers ────────────────────────────────────────────────────────

  - name: install-rabbitmq
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm upgrade --install rabbitmq bitnami/rabbitmq --namespace rabbitmq --create-namespace \
          --set auth.username=admin --set auth.password=admin123 \
          --wait --timeout 5m
      - RMQIP=$(kubectl get svc rabbitmq -n rabbitmq -o jsonpath='{.spec.clusterIP}' 2>/dev/null)
      - sed -i '/^RABBITMQ_URL=/d' infra.env && echo "RABBITMQ_URL=amqp://admin:admin123@$RMQIP:5672" >> infra.env
    when:
      branch: [main]

  - name: install-nats
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts
      - helm upgrade --install nats nats/nats --namespace nats --create-namespace \
          --set config.jetstream.enabled=true \
          --wait --timeout 5m
      - NATS_IP=$(kubectl get svc nats -n nats -o jsonpath='{.spec.clusterIP}' 2>/dev/null)
      - sed -i '/^NATS_URL=/d' infra.env && echo "NATS_URL=nats://$NATS_IP:4222" >> infra.env
    when:
      branch: [main]

  - name: install-redpanda
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add redpanda https://charts.redpanda.com
      - helm upgrade --install redpanda redpanda/redpanda --namespace redpanda --create-namespace --wait --timeout 10m
    when:
      branch: [main]

  # ── Stream Processing ──────────────────────────────────────────────────────

  - name: install-debezium
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add debezium https://charts.debezium.io
      - helm upgrade --install debezium debezium/debezium-operator --namespace debezium --create-namespace --wait --timeout 5m
    when:
      branch: [main]

  - name: install-flink
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add flink-operator-repo https://downloads.apache.org/flink/flink-kubernetes-operator-1.9.0/
      - helm upgrade --install flink-kubernetes-operator flink-operator-repo/flink-kubernetes-operator --namespace flink --create-namespace --wait --timeout 5m
    when:
      branch: [main]

  - name: install-kafka-ui
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - helm repo add kafka-ui https://provectus.github.io/kafka-ui-charts
      - helm upgrade --install kafka-ui kafka-ui/kafka-ui --namespace kafka-ui --create-namespace \
          --set yamlApplicationConfig.kafka.clusters[0].name=shopos \
          --set yamlApplicationConfig.kafka.clusters[0].bootstrapServers=$(grep '^KAFKA_BOOTSTRAP_SERVERS=' infra.env | cut -d= -f2 || echo "kafka.kafka.svc.cluster.local:9092") \
          --wait --timeout 5m
    when:
      branch: [main]

  - name: uninstall-tools
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - for ns_tool in "zookeeper:zookeeper" "kafka:kafka" "schema-registry:schema-registry" "kafka-connect:kafka-connect" "strimzi:strimzi-kafka-operator" "rabbitmq:rabbitmq" "nats:nats" "redpanda:redpanda" "debezium:debezium" "flink:flink-kubernetes-operator" "kafka-ui:kafka-ui"; do
          ns=${ns_tool%%:*}; tool=${ns_tool##*:}
          helm uninstall $tool -n $ns --ignore-not-found || true
        done
    when:
      branch: [main]

  - name: configure-kafka-topics
    image: bitnami/kafka:latest
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - KAFKA_BS=$(grep '^KAFKA_BOOTSTRAP_SERVERS=' infra.env | cut -d= -f2 || echo "kafka.kafka.svc.cluster.local:9092")
      - |
        for topic in \
          identity.user.registered identity.user.deleted \
          commerce.order.placed commerce.order.cancelled commerce.order.fulfilled \
          commerce.payment.processed commerce.payment.failed commerce.cart.abandoned \
          supplychain.shipment.created supplychain.shipment.updated \
          supplychain.inventory.low supplychain.inventory.restocked \
          notification.email.requested notification.sms.requested notification.push.requested \
          analytics.page.viewed analytics.product.clicked analytics.search.performed \
          security.fraud.detected security.login.failed; do
          kafka-topics.sh --bootstrap-server $KAFKA_BS \
            --create --if-not-exists --topic $topic \
            --partitions 3 --replication-factor 1 2>/dev/null || true
          echo "Topic: $topic"
        done
    when:
      branch: [main]

  - name: configure-rabbitmq-exchanges
    image: alpine/curl:latest
    commands:
      - RMQIP=$(kubectl get svc rabbitmq -n rabbitmq -o jsonpath='{.spec.clusterIP}' 2>/dev/null || echo "rabbitmq.rabbitmq.svc.cluster.local")
      - |
        for exchange in shopos.orders shopos.notifications shopos.analytics; do
          curl -sf -X PUT http://admin:admin123@$RMQIP:15672/api/exchanges/%2F/$exchange \
            -H "Content-Type: application/json" \
            -d '{"type":"topic","durable":true}' || true
          echo "Exchange: $exchange"
        done
    when:
      branch: [main]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Messaging {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Messaging {{build.params.ACTION}} failed* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
