# Drone CI — Messaging Infrastructure Install
# Role: install Kafka, RabbitMQ, NATS and related tools via Helm docker image.
# No host installs — all tooling runs in containers.
# Secrets: kubeconfig_b64, slack_webhook
# Params (via Drone API): ACTION=INSTALL|UNINSTALL|CONFIGURE

kind: pipeline
type: docker
name: messaging

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - echo "Kubeconfig written"

  - name: install-kafka-zookeeper
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - helm upgrade --install zookeeper bitnami/zookeeper \
          --namespace messaging --create-namespace --wait --timeout 5m || true
      - helm upgrade --install kafka bitnami/kafka \
          --namespace messaging --create-namespace \
          --set kraft.enabled=true \
          --wait --timeout 10m || true
    depends_on: [setup-kubeconfig]

  - name: install-schema-registry
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - helm upgrade --install schema-registry bitnami/schema-registry \
          --namespace messaging --create-namespace \
          --set kafka.bootstrapServers=kafka.messaging.svc.cluster.local:9092 \
          --wait --timeout 5m || true
    depends_on: [install-kafka-zookeeper]

  - name: install-rabbitmq
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - helm upgrade --install rabbitmq bitnami/rabbitmq \
          --namespace messaging --create-namespace \
          --set auth.username=admin --set auth.password=admin123 \
          --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-nats
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
      - helm upgrade --install nats nats/nats \
          --namespace messaging --create-namespace \
          --set config.jetstream.enabled=true \
          --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-strimzi-debezium-flink
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add strimzi https://strimzi.io/charts --force-update
      - helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
          --namespace strimzi --create-namespace --wait --timeout 5m || true
      - helm repo add debezium https://charts.debezium.io --force-update
      - helm upgrade --install debezium debezium/debezium-operator \
          --namespace debezium --create-namespace --wait --timeout 5m || true
      - helm repo add flink-operator-repo https://downloads.apache.org/flink/flink-kubernetes-operator-1.9.0/ --force-update
      - helm upgrade --install flink-kubernetes-operator flink-operator-repo/flink-kubernetes-operator \
          --namespace flink --create-namespace --wait --timeout 5m || true
    depends_on: [install-schema-registry]

  - name: install-kafka-ui
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add kafka-ui https://provectus.github.io/kafka-ui-charts --force-update
      - helm upgrade --install kafka-ui kafka-ui/kafka-ui \
          --namespace messaging --create-namespace \
          --set yamlApplicationConfig.kafka.clusters[0].name=shopos \
          --set yamlApplicationConfig.kafka.clusters[0].bootstrapServers=kafka.messaging.svc.cluster.local:9092 \
          --wait --timeout 5m || true
    depends_on: [install-schema-registry]

  - name: configure-kafka-topics
    image: bitnami/kafka:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || [ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - KAFKA_BS="kafka.messaging.svc.cluster.local:9092"
      - |
        for topic in \
          identity.user.registered identity.user.deleted \
          commerce.order.placed commerce.order.cancelled commerce.order.fulfilled \
          commerce.payment.processed commerce.payment.failed commerce.cart.abandoned \
          supplychain.shipment.created supplychain.shipment.updated \
          supplychain.inventory.low supplychain.inventory.restocked \
          notification.email.requested notification.sms.requested notification.push.requested \
          analytics.page.viewed analytics.product.clicked analytics.search.performed \
          security.fraud.detected security.login.failed; do
          kafka-topics.sh --bootstrap-server "$KAFKA_BS" \
            --create --if-not-exists --topic "$topic" \
            --partitions 3 --replication-factor 1 2>/dev/null || true
          echo "Topic ready: $topic"
        done
    depends_on: [install-kafka-zookeeper]

  - name: uninstall-messaging
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "UNINSTALL" ] || exit 0'
      - |
        for release in kafka-ui strimzi-kafka-operator debezium flink-kubernetes-operator \
                       schema-registry kafka zookeeper rabbitmq nats; do
          helm uninstall "$release" --ignore-not-found 2>/dev/null || true
        done
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Messaging {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Messaging {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
