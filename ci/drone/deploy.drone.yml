# Drone CI — Deploy after image build
# Triggered by `drone build promote` to dev or staging environments
# Secrets: harbor_registry, kubeconfig_b64, slack_webhook

kind: pipeline
type: docker
name: deploy

trigger:
  event: [promote]
  target: [dev, staging]

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock

steps:
  - name: resolve-image-tag
    image: alpine:3.21
    commands:
      - IMAGE_TAG="${DRONE_SOURCE_BRANCH:-main}-${DRONE_COMMIT_SHA:0:8}"
      - NAMESPACE="${DRONE_DEPLOY_TO:-dev}"
      - echo "IMAGE_TAG=${IMAGE_TAG}" > /drone/src/.deploy.env
      - echo "NAMESPACE=${NAMESPACE}" >> /drone/src/.deploy.env
      - cat /drone/src/.deploy.env

  - name: deploy-platform-services
    image: alpine/helm:3.16.0
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.deploy.env
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - |
        for svc in api-gateway web-bff mobile-bff partner-bff graphql-gateway tenant-service; do
          echo "=== Deploying platform/$svc → $NAMESPACE ==="
          helm upgrade --install "$svc" "helm/services/$svc" \
            --namespace platform --create-namespace \
            --set image.repository="$HARBOR_REGISTRY/shopos/$svc" \
            --set image.tag="$IMAGE_TAG" \
            --set environment="$NAMESPACE" \
            --wait --timeout 5m || echo "WARN $svc deploy failed — continuing"
        done
      - rm -f /tmp/kubeconfig
    depends_on: [resolve-image-tag]

  - name: deploy-commerce-services
    image: alpine/helm:3.16.0
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.deploy.env
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      - export KUBECONFIG=/tmp/kubeconfig
      - |
        for svc in cart-service checkout-service order-service payment-service; do
          echo "=== Deploying commerce/$svc → $NAMESPACE ==="
          helm upgrade --install "$svc" "helm/services/$svc" \
            --namespace commerce --create-namespace \
            --set image.repository="$HARBOR_REGISTRY/shopos/$svc" \
            --set image.tag="$IMAGE_TAG" \
            --set environment="$NAMESPACE" \
            --wait --timeout 5m || echo "WARN $svc deploy failed — continuing"
        done
      - rm -f /tmp/kubeconfig
    depends_on: [deploy-platform-services]

  - name: smoke-healthz
    image: curlimages/curl:latest
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - source /drone/src/.deploy.env
      - sleep 20
      - |
        for endpoint in \
          "http://api-gateway.platform.svc.cluster.local:8080/healthz" \
          "http://web-bff.platform.svc.cluster.local:8081/healthz"; do
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$endpoint" 2>/dev/null || echo "000")
          echo "$endpoint → $CODE"
        done
    depends_on: [deploy-commerce-services]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#deployments"
      template: |
        {{#success build.status}}
        :rocket: *Drone deploy succeeded* — `{{build.deployTo}}` @ `{{truncate build.commit 8}}`
        {{else}}
        :x: *Drone deploy FAILED* — `{{build.deployTo}}` @ `{{truncate build.commit 8}}`
        {{/success}}
    depends_on: [smoke-healthz]
    when:
      status: [success, failure]
