# Drone CI — Security Infrastructure Install
# Role: install Vault, Keycloak, cert-manager, Falco, OPA, Kyverno, Istio, Trivy Operator
#       via containerised Helm — no host installs.
# Secrets: kubeconfig_b64, slack_webhook
# Params: ACTION=INSTALL|UNINSTALL|CONFIGURE

kind: pipeline
type: docker
name: security

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  - name: install-cert-manager
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add jetstack https://charts.jetstack.io --force-update
      - helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set installCRDs=true --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-vault
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
      - helm upgrade --install vault hashicorp/vault \
          --namespace vault --create-namespace \
          --set server.ha.enabled=false --wait --timeout 10m || true
    depends_on: [install-cert-manager]

  - name: install-keycloak
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - helm upgrade --install keycloak bitnami/keycloak \
          --namespace keycloak --create-namespace \
          --set auth.adminUser=admin --wait --timeout 10m || true
    depends_on: [install-cert-manager]

  - name: install-policy-engines
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add gatekeeper https://open-policy-agent.github.io/gatekeeper/charts --force-update
      - helm upgrade --install gatekeeper gatekeeper/gatekeeper \
          --namespace gatekeeper-system --create-namespace --wait --timeout 5m || true
      - helm repo add kyverno https://kyverno.github.io/kyverno --force-update
      - helm upgrade --install kyverno kyverno/kyverno \
          --namespace kyverno --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-runtime-security
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
      - helm upgrade --install falco falcosecurity/falco \
          --namespace falco --create-namespace \
          --set driver.kind=ebpf --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-trivy-operator
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add aquasecurity https://aquasecurity.github.io/helm-charts --force-update
      - helm upgrade --install trivy-operator aquasecurity/trivy-operator \
          --namespace trivy-system --create-namespace \
          --set operator.scanJobsInSameNamespace=true --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-istio-mesh
    image: alpine:3.21
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - apk add --no-cache curl
      - curl -L https://istio.io/downloadIstio | ISTIO_VERSION=1.23.0 sh -
      - ./istio-*/bin/istioctl install --set profile=default -y --kubeconfig /tmp/kubeconfig || true
    depends_on: [install-cert-manager]

  - name: configure-security
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || exit 0'
      - |
        # Enable Istio mTLS STRICT across all namespaces
        kubectl apply -f - <<EOF || true
        apiVersion: security.istio.io/v1beta1
        kind: PeerAuthentication
        metadata:
          name: default
          namespace: istio-system
        spec:
          mtls:
            mode: STRICT
        EOF
      - |
        for ns in platform identity catalog commerce supply-chain financial \
                  customer-experience communications content analytics-ai b2b integrations affiliate; do
          kubectl label namespace "$ns" istio-injection=enabled --overwrite 2>/dev/null || true
        done
      - kubectl apply -f security/kyverno/ 2>/dev/null || true
      - kubectl apply -f security/falco/ -n falco 2>/dev/null || true
      - |
        # Init Vault
        kubectl exec vault-0 -n vault -- vault operator init -format=json 2>/dev/null > /tmp/vault-init.json || true
        KEY=$(grep '"unseal_keys_b64"' -A5 /tmp/vault-init.json 2>/dev/null | grep '"' | head -1 | tr -d '", ' || echo "")
        [ -n "$KEY" ] && kubectl exec vault-0 -n vault -- vault operator unseal "$KEY" 2>/dev/null || true
    depends_on: [setup-kubeconfig]

  - name: uninstall-security
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "UNINSTALL" ] || exit 0'
      - |
        for ns in vault keycloak cert-manager falco gatekeeper-system kyverno trivy-system; do
          helm uninstall "$(helm list -n "$ns" -q 2>/dev/null | head -1)" -n "$ns" --ignore-not-found 2>/dev/null || true
        done
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#security"
      template: |
        {{#success build.status}}
        :white_check_mark: *Security {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Security {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
