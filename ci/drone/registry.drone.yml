# Drone CI — Registry Configuration
# Role: configure Harbor projects and Nexus repos after Harbor is deployed.
#       Runs entirely in containers — no host tooling.
# Secrets: kubeconfig_b64, harbor_registry, harbor_user, harbor_password,
#          aws_access_key_id, aws_secret_access_key, aws_account_id, aws_region, slack_webhook
# Params: ACTION=CONFIGURE_HARBOR|CONFIGURE_NEXUS|CREATE_ECR|DESTROY_ECR|INSTALL_K8S_REPOS

kind: pipeline
type: docker
name: registry

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  - name: install-harbor-k8s
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "INSTALL_K8S_REPOS" ] || exit 0'
      - helm repo add harbor https://helm.goharbor.io --force-update
      - helm upgrade --install harbor harbor/harbor \
          --namespace harbor --create-namespace \
          --set expose.type=clusterIP \
          --set persistence.enabled=true \
          --wait --timeout 10m || true
      - helm repo add gitea-charts https://dl.gitea.com/charts --force-update
      - helm upgrade --install gitea gitea-charts/gitea \
          --namespace gitea --create-namespace \
          --set gitea.admin.username=admin \
          --wait --timeout 5m || true
      - helm repo add chartmuseum https://chartmuseum.github.io/charts --force-update
      - helm upgrade --install chartmuseum chartmuseum/chartmuseum \
          --namespace chartmuseum --create-namespace \
          --set env.open.DISABLE_API=false \
          --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: configure-harbor-projects
    image: curlimages/curl:latest
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - '[ "${ACTION}" = "CONFIGURE_HARBOR" ] || [ "${ACTION:-CONFIGURE_HARBOR}" = "CONFIGURE_HARBOR" ] || exit 0'
      - HARBOR_URL="https://${HARBOR_REGISTRY}"
      - |
        for proj in platform identity catalog commerce supply-chain financial \
                    customer-experience communications content analytics-ai \
                    b2b integrations affiliate shopos; do
          curl -sf -X POST "$HARBOR_URL/api/v2.0/projects" \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "{\"project_name\":\"$proj\",\"public\":false}" || true
          echo "Project ready: $proj"
        done
      - |
        # Enable Trivy scanner on shopos project
        curl -sf -X PUT "$HARBOR_URL/api/v2.0/projects/shopos/scanner" \
          -u "$HARBOR_USER:$HARBOR_PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{"name":"Trivy"}' || true
      - |
        # Set replication rules: pull from Docker Hub for base images
        curl -sf -X POST "$HARBOR_URL/api/v2.0/replication/policies" \
          -u "$HARBOR_USER:$HARBOR_PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{"name":"dockerhub-pull","description":"Pull base images from Docker Hub","type":"pull","src_registry":{"id":1},"dest_namespace":"library","trigger":{"type":"manual"},"enabled":true}' || true
    depends_on: [setup-kubeconfig]

  - name: configure-nexus-repos
    image: curlimages/curl:latest
    commands:
      - '[ "${ACTION}" = "CONFIGURE_NEXUS" ] || exit 0'
      - NEXUS_URL="http://nexus.nexus.svc.cluster.local:8081"
      - |
        for repo_type in maven2 npm pypi go docker helm; do
          curl -sf -X POST "$NEXUS_URL/service/rest/v1/repositories/$repo_type/hosted" \
            -u admin:admin123 \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"shopos-$repo_type\",\"online\":true,\"storage\":{\"blobStoreName\":\"default\",\"strictContentTypeValidation\":true,\"writePolicy\":\"allow\"}}" || true
          echo "Nexus repo: shopos-$repo_type"
        done
    depends_on: [setup-kubeconfig]

  - name: create-ecr-repos
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
      AWS_DEFAULT_REGION:
        from_secret: aws_region
    commands:
      - '[ "${ACTION}" = "CREATE_ECR" ] || exit 0'
      - |
        for domain in platform identity catalog commerce supply-chain financial \
                      customer-experience communications content analytics-ai \
                      b2b integrations affiliate; do
          for svc_path in src/$domain/*/; do
            SVC=$(basename "$svc_path")
            aws ecr create-repository \
              --repository-name "shopos/$SVC" \
              --region "$AWS_DEFAULT_REGION" \
              --image-scanning-configuration scanOnPush=true 2>/dev/null || true
            echo "ECR repo: shopos/$SVC"
          done
        done
    depends_on: [setup-kubeconfig]

  - name: destroy-ecr-repos
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
      AWS_DEFAULT_REGION:
        from_secret: aws_region
    commands:
      - '[ "${ACTION}" = "DESTROY_ECR" ] || exit 0'
      - |
        for repo in $(aws ecr describe-repositories \
          --query 'repositories[?starts_with(repositoryName, `shopos/`)].repositoryName' \
          --output text 2>/dev/null); do
          aws ecr delete-repository --repository-name "$repo" --force \
            --region "$AWS_DEFAULT_REGION" 2>/dev/null || true
          echo "Deleted ECR: $repo"
        done
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Registry {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Registry {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
