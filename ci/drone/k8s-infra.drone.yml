# Drone CI — Kubernetes Infrastructure via Terraform (containerised)
# Role: provision EKS/GKE/AKS using hashicorp/terraform docker image — no host installs.
# Triggered manually. ACTION=CREATE or DESTROY via Drone API parameters.
# Secrets: aws_access_key_id, aws_secret_access_key, gcp_credentials_json,
#          azure_client_id, azure_client_secret, azure_tenant_id, azure_subscription_id,
#          slack_webhook

kind: pipeline
type: docker
name: k8s-infra

trigger:
  event: [custom]

steps:
  - name: detect-cloud
    image: alpine:3.21
    commands:
      - apk add --no-cache curl
      - |
        TOKEN=$(curl -sf -X PUT -H "X-aws-ec2-metadata-token-ttl-seconds:21600" \
          http://169.254.169.254/latest/api/token 2>/dev/null || echo "")
        if [ -n "$TOKEN" ]; then
          CLOUD="aws"
        elif curl -sf -H "Metadata-Flavor: Google" \
          http://metadata.google.internal/computeMetadata/v1/instance/zone >/dev/null 2>&1; then
          CLOUD="gcp"
        elif curl -sf -H "Metadata: true" \
          "http://169.254.169.254/metadata/instance?api-version=2021-02-01" >/dev/null 2>&1; then
          CLOUD="azure"
        else
          CLOUD="aws"
        fi
        echo "CLOUD=$CLOUD" > /drone/src/.cloud.env
        echo "Detected cloud: $CLOUD"

  - name: terraform-init
    image: hashicorp/terraform:1.9
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
    commands:
      - source /drone/src/.cloud.env
      - |
        case "$CLOUD" in
          aws)   TF_DIR="infra/terraform/aws/app-k8s" ;;
          gcp)   TF_DIR="infra/terraform/gcp/app-k8s" ;;
          azure) TF_DIR="infra/terraform/azure/app-k8s" ;;
          *)     TF_DIR="infra/terraform/aws/app-k8s" ;;
        esac
        echo "TF_DIR=$TF_DIR" >> /drone/src/.cloud.env
        terraform -chdir="$TF_DIR" init -input=false
    depends_on: [detect-cloud]

  - name: terraform-plan
    image: hashicorp/terraform:1.9
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
    commands:
      - source /drone/src/.cloud.env
      - terraform -chdir="$TF_DIR" plan -input=false -out=/drone/src/tfplan
    depends_on: [terraform-init]

  - name: terraform-apply
    image: hashicorp/terraform:1.9
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
    commands:
      - source /drone/src/.cloud.env
      - |
        ACTION="${ACTION:-CREATE}"
        if [ "$ACTION" = "DESTROY" ]; then
          echo "=== DESTROY requested ==="
          terraform -chdir="$TF_DIR" destroy -auto-approve -input=false
        else
          echo "=== APPLY requested ==="
          terraform -chdir="$TF_DIR" apply /drone/src/tfplan
          terraform -chdir="$TF_DIR" output -json > /drone/src/.tf-outputs.json
        fi
    depends_on: [terraform-plan]

  - name: update-kubeconfig
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
    commands:
      - source /drone/src/.cloud.env
      - |
        ACTION="${ACTION:-CREATE}"
        [ "$ACTION" = "DESTROY" ] && echo "Destroy — skip kubeconfig update" && exit 0
        if [ "$CLOUD" = "aws" ] && [ -f /drone/src/.tf-outputs.json ]; then
          CLUSTER=$(grep -o '"cluster_name":"[^"]*"' /drone/src/.tf-outputs.json | cut -d'"' -f4 || echo "shopos-cluster")
          REGION=$(grep -o '"region":"[^"]*"' /drone/src/.tf-outputs.json | cut -d'"' -f4 || echo "us-east-1")
          aws eks update-kubeconfig --name "$CLUSTER" --region "$REGION"
          echo "KUBECONFIG_B64=$(cat ~/.kube/config | base64 -w0)" >> /drone/src/.cloud.env
          echo "Kubeconfig captured"
        fi
    depends_on: [terraform-apply]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *K8s infra {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *K8s infra {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    depends_on: [update-kubeconfig]
    when:
      status: [success, failure]
