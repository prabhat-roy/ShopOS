# Drone CI — Cluster Bootstrap Trigger
# Role: top-level orchestrator that triggers other Drone pipelines in order
#       to bring up a fresh cluster. Uses drone/cli container — no host installs.
# Secrets: drone_server, drone_token, kubeconfig_b64, slack_webhook
# Params: ENVIRONMENT=dev|staging|prod
#         SKIP_NETWORKING=true|false  SKIP_SECURITY=true|false
#         SKIP_OBSERVABILITY=true|false  SKIP_MESSAGING=true|false

kind: pipeline
type: docker
name: cluster-bootstrap

trigger:
  event: [custom]

x-drone-cli: &drone_cli
  image: drone/cli:2
  environment:
    DRONE_SERVER:
      from_secret: drone_server
    DRONE_TOKEN:
      from_secret: drone_token

steps:

  # ── Phase 1: Networking & CNI ────────────────────────────────────────────────

  - name: trigger-networking-install
    <<: *drone_cli
    commands:
      - '[ "${SKIP_NETWORKING:-false}" = "true" ] && echo "Skipping networking" && exit 0'
      - drone build create \
          --param ACTION=INSTALL \
          --param CILIUM=true \
          --param TRAEFIK=true \
          --param ISTIO=true \
          --param METALLB=true \
          --wait \
          "$DRONE_REPO" networking

  # ── Phase 2: Security ─────────────────────────────────────────────────────────

  - name: trigger-security-install
    <<: *drone_cli
    commands:
      - '[ "${SKIP_SECURITY:-false}" = "true" ] && echo "Skipping security" && exit 0'
      - drone build create \
          --param ACTION=INSTALL \
          --param CERT_MANAGER=true \
          --param VAULT=true \
          --param KEYCLOAK=true \
          --param OPA=true \
          --param KYVERNO=true \
          --param FALCO=true \
          --wait \
          "$DRONE_REPO" security
    depends_on: [trigger-networking-install]

  - name: trigger-security-configure
    <<: *drone_cli
    commands:
      - '[ "${SKIP_SECURITY:-false}" = "true" ] && echo "Skipping security configure" && exit 0'
      - drone build create \
          --param ACTION=CONFIGURE \
          --param VAULT=true \
          --param KEYCLOAK=true \
          --param OPA=true \
          --param KYVERNO=true \
          --wait \
          "$DRONE_REPO" security
    depends_on: [trigger-security-install]

  # ── Phase 3: Messaging ────────────────────────────────────────────────────────

  - name: trigger-messaging-install
    <<: *drone_cli
    commands:
      - '[ "${SKIP_MESSAGING:-false}" = "true" ] && echo "Skipping messaging" && exit 0'
      - drone build create \
          --param ACTION=INSTALL \
          --param KAFKA=true \
          --param RABBITMQ=true \
          --param NATS=true \
          --param SCHEMA_REGISTRY=true \
          --wait \
          "$DRONE_REPO" messaging
    depends_on: [trigger-security-configure]

  - name: trigger-messaging-configure
    <<: *drone_cli
    commands:
      - '[ "${SKIP_MESSAGING:-false}" = "true" ] && echo "Skipping messaging configure" && exit 0'
      - drone build create \
          --param ACTION=CONFIGURE \
          --param KAFKA=true \
          --param RABBITMQ=true \
          --wait \
          "$DRONE_REPO" messaging
    depends_on: [trigger-messaging-install]

  # ── Phase 4: Observability ────────────────────────────────────────────────────

  - name: trigger-observability-install
    <<: *drone_cli
    commands:
      - '[ "${SKIP_OBSERVABILITY:-false}" = "true" ] && echo "Skipping observability" && exit 0'
      - drone build create \
          --param ACTION=INSTALL \
          --param PROMETHEUS=true \
          --param GRAFANA=true \
          --param LOKI=true \
          --param JAEGER=true \
          --param OTEL_COLLECTOR=true \
          --param FLUENT_BIT=true \
          --wait \
          "$DRONE_REPO" observability
    depends_on: [trigger-messaging-configure]

  - name: trigger-observability-configure
    <<: *drone_cli
    commands:
      - '[ "${SKIP_OBSERVABILITY:-false}" = "true" ] && echo "Skipping observability configure" && exit 0'
      - drone build create \
          --param ACTION=CONFIGURE \
          --param PROMETHEUS=true \
          --param GRAFANA=true \
          --wait \
          "$DRONE_REPO" observability
    depends_on: [trigger-observability-install]

  # ── Summary ───────────────────────────────────────────────────────────────────

  - name: bootstrap-summary
    image: alpine:3.21
    commands:
      - |
        echo "=================================================="
        echo "  Cluster Bootstrap Complete — ${ENVIRONMENT:-dev}"
        echo "  CNI + Ingress: Cilium + Traefik + Istio"
        echo "  Security: cert-manager, Vault, Keycloak, Falco"
        echo "  Policy: OPA/Gatekeeper + Kyverno"
        echo "  Messaging: Kafka + RabbitMQ + NATS"
        echo "  Observability: Prometheus + Grafana + Loki + Jaeger"
        echo "  Next: trigger docker-build then deploy pipelines"
        echo "=================================================="
    depends_on:
      - trigger-observability-configure

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :tada: *Cluster bootstrap COMPLETE* — `{{build.params.ENVIRONMENT}}` — build {{build.number}}
        {{else}}
        :x: *Cluster bootstrap FAILED* — `{{build.params.ENVIRONMENT}}` — build {{build.number}}
        {{/success}}
    depends_on: [bootstrap-summary]
    when:
      status: [success, failure]
