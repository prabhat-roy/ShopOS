# Drone CI — Primary Role: Image Build & Push to Harbor
# Triggered by Gitea webhooks on push to main / release/*
# Secrets: harbor_registry, harbor_user, harbor_password, slack_webhook

kind: pipeline
type: docker
name: docker-build

trigger:
  event: [push]
  branch: [main, "release/*"]

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock

steps:
  - name: login-harbor
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
      - IMAGE_TAG="${DRONE_BRANCH}-${DRONE_COMMIT_SHA:0:8}"
      - echo "IMAGE_TAG=${IMAGE_TAG}" > /drone/src/.build.env
      - echo "HARBOR_REGISTRY=${HARBOR_REGISTRY}" >> /drone/src/.build.env

  - name: build-push-platform
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for dir in src/platform/*/; do
          SVC=$(basename "$dir")
          echo "=== platform/$SVC ==="
          docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
            && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
            || echo "WARN $SVC failed — continuing"
        done
    depends_on: [login-harbor]

  - name: build-push-identity
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for dir in src/identity/*/; do
          SVC=$(basename "$dir")
          echo "=== identity/$SVC ==="
          docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
            && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
            || echo "WARN $SVC failed — continuing"
        done
    depends_on: [login-harbor]

  - name: build-push-catalog
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for dir in src/catalog/*/; do
          SVC=$(basename "$dir")
          echo "=== catalog/$SVC ==="
          docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
            && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
            || echo "WARN $SVC failed — continuing"
        done
    depends_on: [login-harbor]

  - name: build-push-commerce
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for dir in src/commerce/*/; do
          SVC=$(basename "$dir")
          echo "=== commerce/$SVC ==="
          docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
            && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
            || echo "WARN $SVC failed — continuing"
        done
    depends_on: [login-harbor]

  - name: build-push-supply-chain
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for dir in src/supply-chain/*/; do
          SVC=$(basename "$dir")
          echo "=== supply-chain/$SVC ==="
          docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
            && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
            || echo "WARN $SVC failed — continuing"
        done
    depends_on: [login-harbor]

  - name: build-push-remaining
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        for domain in financial customer-experience communications content analytics-ai b2b integrations affiliate; do
          for dir in src/$domain/*/; do
            [ -d "$dir" ] || continue
            SVC=$(basename "$dir")
            echo "=== $domain/$SVC ==="
            docker build -t "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" "$dir" \
              && docker push "$HARBOR_REGISTRY/shopos/${SVC}:${IMAGE_TAG}" \
              || echo "WARN $SVC failed — continuing"
          done
        done
    depends_on: [login-harbor]

  - name: trivy-scan-spot-check
    image: aquasec/trivy:latest
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        # Spot-check key gateway image; non-blocking
        trivy image --severity HIGH,CRITICAL --exit-code 0 \
          "$HARBOR_REGISTRY/shopos/api-gateway:${IMAGE_TAG}" || true
    depends_on:
      - build-push-platform
      - build-push-commerce

  - name: tag-latest
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - source /drone/src/.build.env
      - |
        # Re-tag the gateway image as :latest on main
        if [ "${DRONE_BRANCH}" = "main" ]; then
          docker pull "$HARBOR_REGISTRY/shopos/api-gateway:${IMAGE_TAG}" || true
          docker tag  "$HARBOR_REGISTRY/shopos/api-gateway:${IMAGE_TAG}" \
                      "$HARBOR_REGISTRY/shopos/api-gateway:latest" && \
          docker push "$HARBOR_REGISTRY/shopos/api-gateway:latest" || true
        fi
    depends_on:
      - build-push-platform
      - build-push-identity
      - build-push-catalog
      - build-push-commerce
      - build-push-supply-chain
      - build-push-remaining
    when:
      branch: [main]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#builds"
      template: |
        {{#success build.status}}
        :white_check_mark: *Drone build complete* — `{{build.branch}}@{{truncate build.commit 8}}` — all 154 images pushed to Harbor
        {{else}}
        :x: *Drone build FAILED* — `{{build.branch}}@{{truncate build.commit 8}}` — check logs
        {{/success}}
    depends_on:
      - trivy-scan-spot-check
      - tag-latest
    when:
      status: [success, failure]
