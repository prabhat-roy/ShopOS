kind: pipeline
type: docker
name: docker-build

trigger:
  event:
    - push
    - custom
  branch:
    - main
    - develop
    - "release/*"

# Secrets required:
#   harbor_url, harbor_user, harbor_password

environment:
  REGISTRY_PROJECT: shopos
  DOMAIN: ""           # empty = build all domains
  SERVICE_NAME: ""     # empty = build all services in DOMAIN (or all 154 if DOMAIN also empty)
  IMAGE_TAG: ""        # empty = dev-<sha>-<build-number>
  PUSH_IMAGE: "true"
  SCAN_IMAGE: "true"

steps:

  - name: resolve-build-context
    image: alpine/git:latest
    commands:
      - export GIT_SHA=$(git rev-parse --short HEAD)
      - export TAG=${IMAGE_TAG:-"dev-${GIT_SHA}-${DRONE_BUILD_NUMBER}"}
      - echo "IMAGE_TAG=${TAG}" > /drone/src/.build.env
      - echo "REGISTRY_PROJECT=${REGISTRY_PROJECT:-shopos}" >> /drone/src/.build.env
      - cat /drone/src/.build.env

  - name: docker-build
    image: docker:27-dind
    privileged: true
    environment:
      HARBOR_URL:
        from_secret: harbor_url
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - source /drone/src/.build.env
      - echo "$HARBOR_PASSWORD" | docker login $HARBOR_URL -u $HARBOR_USER --password-stdin
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

        build_service() {
          local domain=$1
          local svc=$2
          local image="$HARBOR_URL/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
          echo "=== Building: $image ==="
          docker build \
            --label "git.commit=$IMAGE_TAG" \
            --label "build.number=${DRONE_BUILD_NUMBER}" \
            --label "domain=$domain" \
            -t "$image" \
            "src/$domain/$svc/" || echo "WARN: build failed for $svc (non-blocking)"
        }

        if [ -n "$SERVICE_NAME" ] && [ -n "$DOMAIN" ]; then
          build_service "$DOMAIN" "$SERVICE_NAME"
        elif [ -n "$DOMAIN" ]; then
          for svc in src/$DOMAIN/*/; do
            svc_name=$(basename "$svc")
            build_service "$DOMAIN" "$svc_name"
          done
        else
          for domain in $ALL_DOMAINS; do
            for svc in src/$domain/*/; do
              [ -d "$svc" ] || continue
              svc_name=$(basename "$svc")
              build_service "$domain" "$svc_name"
            done
          done
        fi
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock

  - name: image-scan-trivy
    image: aquasec/trivy:latest
    environment:
      HARBOR_URL:
        from_secret: harbor_url
    commands:
      - source /drone/src/.build.env
      - mkdir -p reports/image-scan
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

        scan_service() {
          local svc=$1
          local image="$HARBOR_URL/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
          echo "=== Trivy scan: $image ==="
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --format json \
            --output "reports/image-scan/trivy-${svc}.json" \
            "$image" || true
        }

        if [ "$SCAN_IMAGE" != "true" ]; then
          echo "SCAN_IMAGE=false — skipping Trivy scan"
          exit 0
        fi

        if [ -n "$SERVICE_NAME" ]; then
          scan_service "$SERVICE_NAME"
        elif [ -n "$DOMAIN" ]; then
          for svc in src/$DOMAIN/*/; do
            scan_service "$(basename $svc)"
          done
        else
          for domain in $ALL_DOMAINS; do
            for svc in src/$domain/*/; do
              [ -d "$svc" ] || continue
              scan_service "$(basename $svc)"
            done
          done
        fi
    depends_on: [docker-build]

  - name: docker-push
    image: docker:27-dind
    privileged: true
    environment:
      HARBOR_URL:
        from_secret: harbor_url
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - source /drone/src/.build.env
      - |
        if [ "$PUSH_IMAGE" != "true" ]; then
          echo "PUSH_IMAGE=false — skipping push"
          exit 0
        fi
      - echo "$HARBOR_PASSWORD" | docker login $HARBOR_URL -u $HARBOR_USER --password-stdin
      - |
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

        push_service() {
          local svc=$1
          local image="$HARBOR_URL/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
          echo "=== Pushing: $image ==="
          docker push "$image" || echo "WARN: push failed for $svc"
        }

        if [ -n "$SERVICE_NAME" ]; then
          push_service "$SERVICE_NAME"
        elif [ -n "$DOMAIN" ]; then
          for svc in src/$DOMAIN/*/; do
            push_service "$(basename $svc)"
          done
        else
          for domain in $ALL_DOMAINS; do
            for svc in src/$domain/*/; do
              [ -d "$svc" ] || continue
              push_service "$(basename $svc)"
            done
          done
        fi
      - docker logout $HARBOR_URL || true
    depends_on: [image-scan-trivy]
    when:
      branch: [main, develop, "release/*"]
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock

  - name: cleanup
    image: docker:27-dind
    privileged: true
    environment:
      HARBOR_URL:
        from_secret: harbor_url
    commands:
      - source /drone/src/.build.env
      - docker image prune -f 2>/dev/null || true
      - echo "Cleanup complete. Tag=${IMAGE_TAG}"
    depends_on: [docker-push]
    when:
      status: [success, failure]
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
