# Drone CI — Networking Infrastructure Install
# Role: install Traefik, Istio, Consul, MetalLB, Kong, external-dns via Helm containers.
# Secrets: kubeconfig_b64, slack_webhook
# Params: ACTION=INSTALL|UNINSTALL|CONFIGURE

kind: pipeline
type: docker
name: networking

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  - name: install-traefik
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add traefik https://traefik.github.io/charts --force-update
      - helm upgrade --install traefik traefik/traefik \
          --namespace traefik --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-metallb
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add metallb https://metallb.github.io/metallb --force-update
      - helm upgrade --install metallb metallb/metallb \
          --namespace metallb-system --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-consul
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
      - helm upgrade --install consul hashicorp/consul \
          --namespace consul --create-namespace \
          --set global.name=consul \
          --set connectInject.enabled=true \
          --wait --timeout 10m || true
    depends_on: [setup-kubeconfig]

  - name: install-kong
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add kong https://charts.konghq.com --force-update
      - helm upgrade --install kong kong/kong \
          --namespace kong --create-namespace \
          --set ingressController.installCRDs=false \
          --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-external-dns
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns --force-update
      - helm upgrade --install external-dns external-dns/external-dns \
          --namespace external-dns --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-nginx-ingress
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx --force-update
      - helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: configure-traefik-middlewares
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || [ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - |
        kubectl apply -f - <<EOF || true
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ratelimit-api
          namespace: traefik
        spec:
          rateLimit:
            average: 100
            burst: 200
        EOF
    depends_on: [install-traefik]

  - name: configure-kong-plugins
    image: curlimages/curl:latest
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || [ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - KONG_ADMIN="http://kong-kong-admin.kong.svc.cluster.local:8001"
      - curl -sf -X POST "$KONG_ADMIN/plugins" \
          -d "name=rate-limiting&config.minute=1000&config.policy=local" || true
      - curl -sf -X POST "$KONG_ADMIN/plugins" \
          -d "name=request-size-limiting&config.allowed_payload_size=10" || true
    depends_on: [install-kong]

  - name: uninstall-networking
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "UNINSTALL" ] || exit 0'
      - helm uninstall traefik       -n traefik        --ignore-not-found || true
      - helm uninstall metallb       -n metallb-system --ignore-not-found || true
      - helm uninstall consul        -n consul         --ignore-not-found || true
      - helm uninstall kong          -n kong           --ignore-not-found || true
      - helm uninstall external-dns  -n external-dns   --ignore-not-found || true
      - helm uninstall ingress-nginx -n ingress-nginx  --ignore-not-found || true
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Networking {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Networking {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
