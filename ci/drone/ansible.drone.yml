kind: pipeline
type: docker
name: ansible

trigger:
  event:
    - custom

# Secrets required (set in Drone UI):
#   ssh_private_key   — private key to SSH into target servers
#   aws_access_key    — for AWS dynamic inventory
#   aws_secret_key    — for AWS dynamic inventory
#   gcp_credentials   — GCP service account JSON (for GCP dynamic inventory)
#   azure_client_id   — for Azure dynamic inventory
#   azure_client_secret
#   azure_subscription_id
#   azure_tenant_id

# Variables (set in Drone UI or via trigger):
#   PLAYBOOK  — jenkins | k8s-node | common
#   INVENTORY — aws | gcp | azure
#   LIMIT     — host/group filter (optional)
#   EXTRA_VARS — extra ansible vars (optional)
#   CHECK_MODE — true | false

steps:
  - name: install-ansible
    image: ubuntu:24.04
    environment:
      DEBIAN_FRONTEND: noninteractive
    commands:
      - apt-get update -y
      - apt-get install -y ansible python3-pip curl
      - pip3 install --quiet boto3 google-auth azure-mgmt-compute azure-mgmt-network
      - ansible --version

  - name: install-collections
    image: ubuntu:24.04
    environment:
      DEBIAN_FRONTEND: noninteractive
    commands:
      - apt-get update -y && apt-get install -y ansible -q
      - ansible-galaxy collection install -r infra/ansible/requirements.yml --force

  - name: write-ssh-key
    image: ubuntu:24.04
    environment:
      SSH_PRIVATE_KEY:
        from_secret: ssh_private_key
    commands:
      - mkdir -p ~/.ssh
      - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa

  - name: validate-inventory
    image: ubuntu:24.04
    environment:
      DEBIAN_FRONTEND: noninteractive
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_key
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-creds.json
      AZURE_CLIENT_ID:
        from_secret: azure_client_id
      AZURE_SECRET:
        from_secret: azure_client_secret
      AZURE_SUBSCRIPTION_ID:
        from_secret: azure_subscription_id
      AZURE_TENANT:
        from_secret: azure_tenant_id
    commands:
      - apt-get update -y && apt-get install -y ansible -q
      - ansible-inventory -i infra/ansible/inventory/$${INVENTORY}.yml --list > /dev/null
      - echo "Inventory valid"

  - name: run-playbook
    image: ubuntu:24.04
    environment:
      DEBIAN_FRONTEND: noninteractive
      ANSIBLE_FORCE_COLOR: "1"
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_key
      AZURE_CLIENT_ID:
        from_secret: azure_client_id
      AZURE_SECRET:
        from_secret: azure_client_secret
      AZURE_SUBSCRIPTION_ID:
        from_secret: azure_subscription_id
      AZURE_TENANT:
        from_secret: azure_tenant_id
    commands:
      - apt-get update -y && apt-get install -y ansible python3-pip -q
      - pip3 install --quiet boto3 google-auth azure-mgmt-compute azure-mgmt-network
      - ansible-galaxy collection install -r infra/ansible/requirements.yml --force -q
      - |
        CMD="ansible-playbook infra/ansible/playbooks/$${PLAYBOOK}.yml \
          -i infra/ansible/inventory/$${INVENTORY}.yml"
        [ -n "$${LIMIT:-}" ]      && CMD="$CMD --limit '$${LIMIT}'"
        [ -n "$${EXTRA_VARS:-}" ] && CMD="$CMD --extra-vars '$${EXTRA_VARS}'"
        [ "$${CHECK_MODE:-false}" = "true" ] && CMD="$CMD --check --diff"
        CMD="$CMD -v"
        echo "Running: $CMD"
        eval $CMD
