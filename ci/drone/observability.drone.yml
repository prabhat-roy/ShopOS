# Drone CI — Observability Stack Install
# Role: install Prometheus, Grafana, Loki, Jaeger, Tempo, OTel Collector and friends
#       via alpine/helm docker image — no host installs.
# Secrets: kubeconfig_b64, slack_webhook
# Params: ACTION=INSTALL|UNINSTALL|CONFIGURE

kind: pipeline
type: docker
name: observability

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  - name: install-prometheus-stack
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
      - helm upgrade --install prometheus prometheus-community/prometheus \
          --namespace prometheus --create-namespace --wait --timeout 8m || true
      - helm upgrade --install alertmanager prometheus-community/alertmanager \
          --namespace alertmanager --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-grafana-stack
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add grafana https://grafana.github.io/helm-charts --force-update
      - helm upgrade --install grafana grafana/grafana \
          --namespace grafana --create-namespace --wait --timeout 5m || true
      - helm upgrade --install loki grafana/loki \
          --namespace loki --create-namespace \
          --set loki.commonConfig.replication_factor=1 \
          --set loki.storage.type=filesystem \
          --wait --timeout 5m || true
      - helm upgrade --install tempo grafana/tempo \
          --namespace tempo --create-namespace --wait --timeout 5m || true
      - helm upgrade --install pyroscope grafana/pyroscope \
          --namespace pyroscope --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-tracing
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
      - helm upgrade --install jaeger jaegertracing/jaeger \
          --namespace jaeger --create-namespace --wait --timeout 5m || true
      - helm repo add openzipkin https://zipkin.io/zipkin-helm --force-update
      - helm upgrade --install zipkin openzipkin/zipkin \
          --namespace zipkin --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-logging
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add fluent https://fluent.github.io/helm-charts --force-update
      - helm upgrade --install fluent-bit fluent/fluent-bit \
          --namespace fluent-bit --create-namespace --wait --timeout 5m || true
      - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - helm upgrade --install fluentd bitnami/fluentd \
          --namespace fluentd --create-namespace --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-otel-collector
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
      - helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
          --namespace otel-collector --create-namespace \
          --set mode=deployment --wait --timeout 5m || true
    depends_on: [setup-kubeconfig]

  - name: install-slo-tools
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - helm repo add pyrra https://pyrra-dev.github.io/pyrra/helm --force-update
      - helm upgrade --install pyrra pyrra/pyrra \
          --namespace pyrra --create-namespace --wait --timeout 5m || true
      - helm repo add uptime-kuma https://dirsigler.github.io/uptime-kuma-helm --force-update
      - helm upgrade --install uptime-kuma uptime-kuma/uptime-kuma \
          --namespace uptime-kuma --create-namespace --wait --timeout 5m || true
    depends_on: [install-prometheus-stack]

  - name: configure-grafana-datasources
    image: curlimages/curl:latest
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || [ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - GRAFANA_URL="http://grafana.grafana.svc.cluster.local:3000"
      - |
        for ds in \
          "Prometheus:prometheus:http://prometheus-prometheus.prometheus.svc.cluster.local:9090" \
          "Loki:loki:http://loki.loki.svc.cluster.local:3100" \
          "Tempo:tempo:http://tempo.tempo.svc.cluster.local:3200" \
          "Jaeger:jaeger:http://jaeger-query.jaeger.svc.cluster.local:16686"; do
          NAME=$(echo "$ds" | cut -d: -f1)
          TYPE=$(echo "$ds" | cut -d: -f2)
          URL=$(echo "$ds" | cut -d: -f3-)
          curl -sf -X POST "$GRAFANA_URL/api/datasources" \
            -u admin:admin \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$NAME\",\"type\":\"$TYPE\",\"url\":\"$URL\",\"access\":\"proxy\"}" || true
          echo "Datasource $NAME configured"
        done
    depends_on: [install-grafana-stack, install-tracing]

  - name: apply-slo-rules
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "CONFIGURE" ] || [ "${ACTION:-INSTALL}" = "INSTALL" ] || exit 0'
      - kubectl apply -f observability/slo/ 2>/dev/null || true
    depends_on: [install-slo-tools]

  - name: uninstall-observability
    image: alpine/helm:3.16.2
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - '[ "${ACTION}" = "UNINSTALL" ] || exit 0'
      - |
        for ns_rel in \
          "prometheus:prometheus" "alertmanager:alertmanager" \
          "grafana:grafana" "loki:loki" "tempo:tempo" "pyroscope:pyroscope" \
          "jaeger:jaeger" "zipkin:zipkin" \
          "fluent-bit:fluent-bit" "fluentd:fluentd" \
          "otel-collector:otel-collector" \
          "pyrra:pyrra" "uptime-kuma:uptime-kuma"; do
          NS="${ns_rel%%:*}"; REL="${ns_rel##*:}"
          helm uninstall "$REL" -n "$NS" --ignore-not-found 2>/dev/null || true
        done
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Observability {{build.params.ACTION}} succeeded* — build {{build.number}}
        {{else}}
        :x: *Observability {{build.params.ACTION}} FAILED* — build {{build.number}}
        {{/success}}
    when:
      status: [success, failure]
