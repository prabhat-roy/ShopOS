# Drone CI — Post-Deploy Load Tests
# Role: run k6 smoke and load tests against the deployed environment.
#       Triggered after successful deploy pipeline completes.
# Secrets: kubeconfig_b64, slack_webhook
# Params: ENVIRONMENT=dev|staging, BASE_URL, LOAD_PROFILE=smoke|light|medium|heavy

kind: pipeline
type: docker
name: post-deploy

trigger:
  event: [custom, promote]
  target: [post-deploy-dev, post-deploy-staging]

steps:
  - name: resolve-target
    image: alpine:3.21
    commands:
      - ENVIRONMENT="${ENVIRONMENT:-dev}"
      - BASE_URL="${BASE_URL:-http://api-gateway.platform.svc.cluster.local:8080}"
      - LOAD_PROFILE="${LOAD_PROFILE:-smoke}"
      - echo "ENVIRONMENT=$ENVIRONMENT" > /drone/src/.test.env
      - echo "BASE_URL=$BASE_URL" >> /drone/src/.test.env
      - echo "LOAD_PROFILE=$LOAD_PROFILE" >> /drone/src/.test.env
      - cat /drone/src/.test.env

  - name: healthz-check
    image: curlimages/curl:latest
    commands:
      - source /drone/src/.test.env
      - |
        echo "=== Healthz check: $BASE_URL ==="
        for path in /healthz /readyz; do
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$BASE_URL$path" 2>/dev/null || echo "000")
          echo "$BASE_URL$path → $CODE"
        done
    depends_on: [resolve-target]

  - name: k6-smoke
    image: grafana/k6:latest
    commands:
      - source /drone/src/.test.env
      - |
        cat > /tmp/smoke.js <<'EOF'
        import http from 'k6/http';
        import { check, sleep } from 'k6';
        export const options = {
          vus: 5,
          duration: '30s',
          thresholds: {
            http_req_failed: ['rate<0.05'],
            http_req_duration: ['p(95)<2000'],
          },
        };
        export default function () {
          const res = http.get(`${__ENV.BASE_URL}/healthz`);
          check(res, { 'status 200': (r) => r.status === 200 });
          sleep(1);
        }
        EOF
        k6 run /tmp/smoke.js -e BASE_URL="$BASE_URL" \
          --out json=/drone/src/smoke-results.json || true
    depends_on: [healthz-check]

  - name: k6-load
    image: grafana/k6:latest
    commands:
      - source /drone/src/.test.env
      - |
        case "$LOAD_PROFILE" in
          smoke)  VUS=5;   DURATION=30s ;;
          light)  VUS=20;  DURATION=2m  ;;
          medium) VUS=50;  DURATION=5m  ;;
          heavy)  VUS=150; DURATION=10m ;;
          *)      VUS=20;  DURATION=2m  ;;
        esac
        echo "=== k6 load: ${VUS}VU for ${DURATION} against $BASE_URL ==="
        cat > /tmp/load.js <<'EOF'
        import http from 'k6/http';
        import { check, sleep } from 'k6';
        export const options = {
          vus: __ENV.VUS,
          duration: __ENV.DURATION,
          thresholds: {
            http_req_failed: ['rate<0.05'],
            http_req_duration: ['p(95)<3000'],
          },
        };
        export default function () {
          const res = http.get(`${__ENV.BASE_URL}/healthz`);
          check(res, { 'status ok': (r) => r.status === 200 });
          sleep(1);
        }
        EOF
        k6 run /tmp/load.js \
          -e BASE_URL="$BASE_URL" \
          -e VUS="$VUS" \
          -e DURATION="$DURATION" \
          --out json=/drone/src/load-results.json || true
    depends_on: [k6-smoke]

  - name: k6-checkout-flow
    image: grafana/k6:latest
    commands:
      - source /drone/src/.test.env
      - |
        # Use the pre-built checkout flow script from the repo
        k6 run load-testing/k6/checkout-flow.js \
          -e BASE_URL="$BASE_URL" \
          --vus 10 --duration 1m \
          --out json=/drone/src/checkout-results.json || true
    depends_on: [k6-smoke]

  - name: assert-thresholds
    image: alpine:3.21
    commands:
      - source /drone/src/.test.env
      - |
        echo "=== Threshold assertions ==="
        # Parse k6 JSON summary for error rate
        ERROR_RATE=$(grep '"http_req_failed"' /drone/src/load-results.json 2>/dev/null | \
          grep '"value"' | tail -1 | grep -o '[0-9.]*' | head -1 || echo "0")
        P95=$(grep '"http_req_duration"' /drone/src/load-results.json 2>/dev/null | \
          grep '"p(95)"' | grep -o '"value":[0-9.]*' | head -1 | cut -d: -f2 || echo "0")
        echo "Error rate: ${ERROR_RATE}"
        echo "P95 latency: ${P95}ms"
        echo "{\"environment\":\"$ENVIRONMENT\",\"error_rate\":$ERROR_RATE,\"p95_ms\":$P95}" > /drone/src/summary.json
    depends_on: [k6-load, k6-checkout-flow]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#deployments"
      template: |
        {{#success build.status}}
        :bar_chart: *Post-deploy k6 tests passed* — `{{build.params.ENVIRONMENT}}` — build {{build.number}}
        {{else}}
        :x: *Post-deploy k6 tests FAILED* — `{{build.params.ENVIRONMENT}}` — build {{build.number}}
        {{/success}}
    depends_on: [assert-thresholds]
    when:
      status: [success, failure]
