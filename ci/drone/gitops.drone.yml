# Drone CI — GitOps: Trigger ArgoCD Sync
# Role: after a successful image build, sync ArgoCD apps so deployments pick up
#       the new image tags. Runs entirely in containers.
# Secrets: kubeconfig_b64, argocd_auth_token, gitea_url, gitea_token, slack_webhook

kind: pipeline
type: docker
name: gitops

trigger:
  event: [custom]

steps:
  - name: setup-kubeconfig
    image: alpine:3.21
    environment:
      KUBECONFIG_B64:
        from_secret: kubeconfig_b64
    commands:
      - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig

  - name: argocd-sync-platform
    image: argoproj/argocd:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
      ARGOCD_AUTH_TOKEN:
        from_secret: argocd_auth_token
    commands:
      - ARGOCD_SERVER="argocd-server.argocd.svc.cluster.local"
      - |
        for app in api-gateway web-bff mobile-bff partner-bff graphql-gateway tenant-service; do
          argocd app sync "$app" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --insecure \
            --timeout 120 \
            --grpc-web || echo "WARN sync failed for $app — continuing"
        done
    depends_on: [setup-kubeconfig]

  - name: argocd-sync-commerce
    image: argoproj/argocd:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
      ARGOCD_AUTH_TOKEN:
        from_secret: argocd_auth_token
    commands:
      - ARGOCD_SERVER="argocd-server.argocd.svc.cluster.local"
      - |
        for app in cart-service checkout-service order-service payment-service \
                   shipping-service fraud-detection-service; do
          argocd app sync "$app" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --insecure \
            --timeout 120 \
            --grpc-web || echo "WARN sync failed for $app — continuing"
        done
    depends_on: [argocd-sync-platform]

  - name: argocd-sync-remaining-domains
    image: argoproj/argocd:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
      ARGOCD_AUTH_TOKEN:
        from_secret: argocd_auth_token
    commands:
      - ARGOCD_SERVER="argocd-server.argocd.svc.cluster.local"
      - |
        # Sync the App-of-Apps to cascade to all remaining domain apps
        argocd app sync shopos-app-of-apps \
          --server "$ARGOCD_SERVER" \
          --auth-token "$ARGOCD_AUTH_TOKEN" \
          --insecure \
          --timeout 300 \
          --grpc-web || echo "WARN app-of-apps sync failed — check ArgoCD UI"
    depends_on: [argocd-sync-commerce]

  - name: wait-for-healthy
    image: argoproj/argocd:latest
    environment:
      ARGOCD_AUTH_TOKEN:
        from_secret: argocd_auth_token
    commands:
      - ARGOCD_SERVER="argocd-server.argocd.svc.cluster.local"
      - |
        # Wait up to 5 min for platform apps to reach Synced+Healthy
        for app in api-gateway web-bff; do
          argocd app wait "$app" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --insecure \
            --grpc-web \
            --health --timeout 300 || echo "WARN $app not healthy after 5m"
        done
    depends_on: [argocd-sync-remaining-domains]

  - name: apply-gitops-manifests
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - kubectl apply -f gitops/argocd/ -n argocd 2>/dev/null || true
      - echo "ArgoCD App-of-Apps manifests applied"
    depends_on: [setup-kubeconfig]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#deployments"
      template: |
        {{#success build.status}}
        :arrows_counterclockwise: *ArgoCD sync triggered* — build {{build.number}} — apps syncing
        {{else}}
        :x: *ArgoCD sync FAILED* — build {{build.number}}
        {{/success}}
    depends_on: [wait-for-healthy, apply-gitops-manifests]
    when:
      status: [success, failure]
