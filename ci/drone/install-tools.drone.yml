# Drone CI — Install Tools on Drone Runner
# Role: verify that the required docker images (used as tool runners) are pullable
# and pre-cache them on the Drone runner node.
# Triggered manually (custom event) — run once after a new runner is provisioned.
# Secrets: harbor_registry, harbor_user, harbor_password

kind: pipeline
type: docker
name: install-tools

trigger:
  event: [custom]

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock

steps:
  - name: pull-build-images
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - |
        for img in \
          docker:26-cli \
          alpine/helm:3.16.0 \
          alpine:3.21 \
          bitnami/kubectl:latest \
          curlimages/curl:latest \
          aquasec/trivy:latest \
          grafana/k6:latest \
          hashicorp/terraform:1.9 \
          plugins/slack; do
          echo "=== Pulling: $img ==="
          docker pull "$img" || echo "WARN pull failed for $img"
        done

  - name: pull-scanner-images
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - |
        for img in \
          anchore/syft:latest \
          gcr.io/projectsigstore/cosign:latest \
          semgrep/semgrep:latest \
          zricethezav/gitleaks:latest \
          bridgecrew/checkov:latest; do
          echo "=== Pulling: $img ==="
          docker pull "$img" || echo "WARN pull failed for $img"
        done
    depends_on: [pull-build-images]

  - name: pull-language-runtime-images
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - |
        for img in \
          golang:1.24-alpine \
          maven:3.9-eclipse-temurin-21 \
          gradle:8.10-jdk21 \
          python:3.13-slim \
          node:22-alpine \
          rust:1.82-alpine \
          mcr.microsoft.com/dotnet/sdk:8.0; do
          echo "=== Pulling: $img ==="
          docker pull "$img" || echo "WARN pull failed for $img"
        done
    depends_on: [pull-build-images]

  - name: login-and-pull-harbor-base
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
      - echo "Harbor login verified — runner is authenticated"
      - docker logout "$HARBOR_REGISTRY" || true
    depends_on: [pull-scanner-images, pull-language-runtime-images]

  - name: verify-docker-daemon
    image: docker:26-cli
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - docker info
      - docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | head -30
      - echo "Runner tool cache populated successfully"
    depends_on: [login-and-pull-harbor-base]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: "#infrastructure"
      template: |
        {{#success build.status}}
        :white_check_mark: *Drone runner tool images cached* — build {{build.number}}
        {{else}}
        :x: *Drone runner cache FAILED* — build {{build.number}}
        {{/success}}
    depends_on: [verify-docker-daemon]
    when:
      status: [success, failure]
