# Messaging Infrastructure Pipeline — Travis CI
# Role: Multi-version messaging client compatibility matrix.
#       Tests Kafka producer/consumer client libraries across language versions
#       to ensure messaging contracts are maintained.
language: minimal
os: linux
dist: jammy

services:
  - docker

matrix:
  fast_finish: true
  include:
    # Go Kafka client (Sarama) across Go versions
    - env: LANG=go GO_VERSION=1.22 KAFKA_CLIENT=sarama DOMAIN=commerce SERVICE=order-service
      name: "Kafka client: Go 1.22 sarama / order-service"
    - env: LANG=go GO_VERSION=1.23 KAFKA_CLIENT=sarama DOMAIN=commerce SERVICE=order-service
      name: "Kafka client: Go 1.23 sarama / order-service"

    # Node.js kafkajs across Node versions
    - env: LANG=nodejs NODE_VERSION=18 KAFKA_CLIENT=kafkajs DOMAIN=communications SERVICE=notification-orchestrator
      name: "Kafka client: Node 18 kafkajs / notification-orchestrator"
    - env: LANG=nodejs NODE_VERSION=20 KAFKA_CLIENT=kafkajs DOMAIN=communications SERVICE=notification-orchestrator
      name: "Kafka client: Node 20 kafkajs / notification-orchestrator"
    - env: LANG=nodejs NODE_VERSION=22 KAFKA_CLIENT=kafkajs DOMAIN=communications SERVICE=notification-orchestrator
      name: "Kafka client: Node 22 kafkajs / notification-orchestrator"

    # Python confluent-kafka across Python versions
    - env: LANG=python PYTHON_VERSION=3.11 KAFKA_CLIENT=confluent-kafka DOMAIN=analytics-ai SERVICE=analytics-service
      name: "Kafka client: Python 3.11 confluent-kafka / analytics-service"
    - env: LANG=python PYTHON_VERSION=3.12 KAFKA_CLIENT=confluent-kafka DOMAIN=analytics-ai SERVICE=analytics-service
      name: "Kafka client: Python 3.12 confluent-kafka / analytics-service"

    # Java kafka-clients across JVM versions
    - env: LANG=java JAVA_VERSION=17 KAFKA_CLIENT=kafka-clients DOMAIN=platform SERVICE=audit-service
      name: "Kafka client: Java 17 kafka-clients / audit-service"
    - env: LANG=java JAVA_VERSION=21 KAFKA_CLIENT=kafka-clients DOMAIN=platform SERVICE=audit-service
      name: "Kafka client: Java 21 kafka-clients / audit-service"

    # Avro schema validation — all 20 schemas across versions
    - env: LANG=python PYTHON_VERSION=3.12 CHECK=avro-schema
      name: "Avro schema validation: Python 3.12"
    - env: LANG=python PYTHON_VERSION=3.11 CHECK=avro-schema
      name: "Avro schema validation: Python 3.11"

script:
  - |
    echo "==> Messaging compatibility: ${LANG} / ${KAFKA_CLIENT:-${CHECK}}"

    if [ "${CHECK}" = "avro-schema" ]; then
      # Validate all Avro schemas parse correctly
      docker run --rm \
        -v "$(pwd):/workspace" \
        "python:${PYTHON_VERSION}-slim" \
        sh -c "pip install --quiet avro-python3 fastavro 2>/dev/null && \
          python3 -c \"
import fastavro, glob, json, sys
schemas = glob.glob('/workspace/events/*.avsc')
errors = 0
for s in schemas:
    try:
        with open(s) as f:
            schema = json.load(f)
        fastavro.parse_schema(schema)
        print(f'PASS: {s.split(\"/\")[-1]}')
    except Exception as e:
        print(f'FAIL: {s.split(\"/\")[-1]}: {e}')
        errors += 1
sys.exit(errors)
          \" 2>&1"
      echo "Avro schema validation complete"
      exit 0
    fi

    # Build the service to verify Kafka client compatibility
    SVC_DIR="src/${DOMAIN}/${SERVICE}"
    if [ ! -f "${SVC_DIR}/Dockerfile" ]; then
      echo "SKIP: Dockerfile not found"
      exit 0
    fi

    case "$LANG" in
      go)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "golang:${GO_VERSION}-alpine" \
          sh -c "go mod download 2>&1 | tail -5 && go build ./... 2>&1"
        ;;
      nodejs)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "node:${NODE_VERSION}-alpine" \
          sh -c "npm install --prefer-offline 2>&1 | tail -5"
        ;;
      python)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "python:${PYTHON_VERSION}-slim" \
          sh -c "pip install --quiet -r requirements.txt 2>&1 | tail -5"
        ;;
      java)
        docker build -t "kafka-compat-test:travis-${TRAVIS_BUILD_NUMBER}" "${SVC_DIR}/" 2>&1 | tail -10
        docker rmi "kafka-compat-test:travis-${TRAVIS_BUILD_NUMBER}" 2>/dev/null || true
        ;;
    esac
    echo "Kafka client compatibility check complete"

notifications:
  email:
    on_success: never
    on_failure: change
