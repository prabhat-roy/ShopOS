# GitOps Pipeline — Travis CI
# Role: Multi-version GitOps tool compatibility matrix.
#       Tests ArgoCD and Flux CLI version compatibility across Kubernetes API versions.
language: minimal
os: linux
dist: jammy

services:
  - docker

matrix:
  fast_finish: true
  include:
    # ArgoCD CLI versions — dry-run app manifest validation
    - env: GITOPS_TOOL=argocd ARGOCD_VERSION=v2.11.0 TARGET=gitops/argocd
      name: "ArgoCD CLI v2.11 manifest validation"
    - env: GITOPS_TOOL=argocd ARGOCD_VERSION=v2.12.0 TARGET=gitops/argocd
      name: "ArgoCD CLI v2.12 manifest validation"
    - env: GITOPS_TOOL=argocd ARGOCD_VERSION=v2.13.0 TARGET=gitops/argocd
      name: "ArgoCD CLI v2.13 manifest validation"

    # Flux CLI versions — manifest validation
    - env: GITOPS_TOOL=flux FLUX_VERSION=v2.3.0 TARGET=gitops/flux
      name: "Flux CLI v2.3 validation"
    - env: GITOPS_TOOL=flux FLUX_VERSION=v2.4.0 TARGET=gitops/flux
      name: "Flux CLI v2.4 validation"

    # Helm chart lint across versions (for GitOps chart templates)
    - env: GITOPS_TOOL=helm HELM_VERSION=3.15.4 TARGET=helm/infra/gitops
      name: "Helm 3.15 / gitops charts lint"
    - env: GITOPS_TOOL=helm HELM_VERSION=3.16.2 TARGET=helm/infra/gitops
      name: "Helm 3.16 / gitops charts lint"

    # kubectl apply --dry-run for ArgoCD ApplicationSet manifests
    - env: GITOPS_TOOL=kubectl KUBECTL_VERSION=1.30 TARGET=gitops/argocd
      name: "kubectl 1.30 dry-run / argocd manifests"
    - env: GITOPS_TOOL=kubectl KUBECTL_VERSION=1.31 TARGET=gitops/argocd
      name: "kubectl 1.31 dry-run / argocd manifests"

script:
  - |
    echo "==> GitOps tool: ${GITOPS_TOOL}, target: ${TARGET}"
    case "$GITOPS_TOOL" in
      argocd)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "argoproj/argocd:${ARGOCD_VERSION}" \
          sh -c "argocd version --client && \
            find /workspace/${TARGET} -name '*.yaml' -o -name '*.yml' | \
            xargs -I{} sh -c 'echo \"Validating: {}\" && cat {}' 2>&1 | head -50 || true"
        echo "ArgoCD ${ARGOCD_VERSION} validation complete"
        ;;

      flux)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "fluxcd/flux-cli:${FLUX_VERSION}" \
          sh -c "flux version --client && \
            find /workspace/${TARGET} -name '*.yaml' | head -10 | xargs -I{} echo 'Found: {}'"
        echo "Flux ${FLUX_VERSION} validation complete"
        ;;

      helm)
        if [ -d "${TARGET}" ]; then
          for CHART in $(ls "${TARGET}/" 2>/dev/null); do
            [ -f "${TARGET}/$CHART/Chart.yaml" ] && \
              docker run --rm -v "$(pwd):/workspace" "alpine/helm:${HELM_VERSION}" \
                helm lint "/workspace/${TARGET}/$CHART" 2>&1 || true
          done
        fi
        echo "Helm ${HELM_VERSION} lint complete"
        ;;

      kubectl)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "bitnami/kubectl:${KUBECTL_VERSION}" \
          sh -c "find /workspace/${TARGET} -name '*.yaml' -o -name '*.yml' | \
            xargs -I{} kubectl apply --dry-run=client --validate=false -f {} 2>&1 | head -30 || true"
        echo "kubectl ${KUBECTL_VERSION} dry-run complete"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
