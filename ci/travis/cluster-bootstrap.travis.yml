# Cluster Bootstrap Pipeline — Travis CI
# Role: Multi-version bootstrap tool compatibility matrix.
#       Tests that all bootstrap tooling (Helm, kubectl, Terraform, ArgoCD)
#       validates cluster manifests across multiple tool versions.
language: minimal
os: linux
dist: jammy

services:
  - docker

matrix:
  fast_finish: true
  include:
    # cert-manager Helm chart lint across Helm versions
    - env: BOOTSTRAP_TOOL=helm HELM_VERSION=3.15.4 COMPONENT=cert-manager CHART_REPO=jetstack
      name: "Bootstrap: Helm 3.15 / cert-manager chart lint"
    - env: BOOTSTRAP_TOOL=helm HELM_VERSION=3.16.2 COMPONENT=cert-manager CHART_REPO=jetstack
      name: "Bootstrap: Helm 3.16 / cert-manager chart lint"

    # KEDA Helm chart lint
    - env: BOOTSTRAP_TOOL=helm HELM_VERSION=3.15.4 COMPONENT=keda CHART_REPO=kedacore
      name: "Bootstrap: Helm 3.15 / keda chart lint"
    - env: BOOTSTRAP_TOOL=helm HELM_VERSION=3.16.2 COMPONENT=keda CHART_REPO=kedacore
      name: "Bootstrap: Helm 3.16 / keda chart lint"

    # Namespace manifests across kubectl versions
    - env: BOOTSTRAP_TOOL=kubectl KUBECTL_VERSION=1.29 MANIFEST=kubernetes/namespaces
      name: "Bootstrap: kubectl 1.29 / namespace manifests"
    - env: BOOTSTRAP_TOOL=kubectl KUBECTL_VERSION=1.30 MANIFEST=kubernetes/namespaces
      name: "Bootstrap: kubectl 1.30 / namespace manifests"
    - env: BOOTSTRAP_TOOL=kubectl KUBECTL_VERSION=1.31 MANIFEST=kubernetes/namespaces
      name: "Bootstrap: kubectl 1.31 / namespace manifests"

    # RBAC manifests across kubectl versions
    - env: BOOTSTRAP_TOOL=kubectl KUBECTL_VERSION=1.30 MANIFEST=kubernetes/rbac
      name: "Bootstrap: kubectl 1.30 / RBAC manifests"
    - env: BOOTSTRAP_TOOL=kubectl KUBECTL_VERSION=1.31 MANIFEST=kubernetes/rbac
      name: "Bootstrap: kubectl 1.31 / RBAC manifests"

    # Ansible playbook syntax check
    - env: BOOTSTRAP_TOOL=ansible ANSIBLE_VERSION=2.17 PLAYBOOK=infra/ansible
      name: "Bootstrap: Ansible 2.17 playbook syntax"

script:
  - |
    echo "==> Bootstrap validation: ${BOOTSTRAP_TOOL} / ${COMPONENT:-${MANIFEST:-${PLAYBOOK}}}"
    case "$BOOTSTRAP_TOOL" in
      helm)
        # Pull chart and lint template rendering
        docker run --rm \
          "alpine/helm:${HELM_VERSION}" \
          sh -c "
            case '${COMPONENT}' in
              cert-manager)
                helm repo add jetstack https://charts.jetstack.io --force-update 2>/dev/null
                helm show chart jetstack/cert-manager 2>&1 | head -10
                helm template cert-manager jetstack/cert-manager --set crds.enabled=true 2>&1 | wc -l | xargs -I{} echo 'Template lines: {}'
                ;;
              keda)
                helm repo add kedacore https://kedacore.github.io/charts --force-update 2>/dev/null
                helm show chart kedacore/keda 2>&1 | head -10
                helm template keda kedacore/keda 2>&1 | wc -l | xargs -I{} echo 'Template lines: {}'
                ;;
            esac
          " 2>&1
        echo "Helm ${HELM_VERSION} bootstrap validation complete"
        ;;

      kubectl)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "bitnami/kubectl:${KUBECTL_VERSION}" \
          sh -c "find /workspace/${MANIFEST} -name '*.yaml' -o -name '*.yml' | \
            xargs -I{} kubectl apply --dry-run=client --validate=false -f {} 2>&1 | \
            grep -v '^$' | head -40 || true"
        echo "kubectl ${KUBECTL_VERSION} bootstrap validation complete"
        ;;

      ansible)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "willhallonline/ansible:${ANSIBLE_VERSION}-alpine-3.19" \
          sh -c "find /workspace/${PLAYBOOK} -name '*.yml' -o -name '*.yaml' | \
            xargs -I{} ansible-playbook --syntax-check {} 2>&1 | head -20 || true"
        echo "Ansible ${ANSIBLE_VERSION} syntax check complete"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
