# Cluster Bootstrap Pipeline — Travis CI (6-phase ordered bootstrap)
language: minimal

install:
  - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
  - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

stages:
  - phase1-networking
  - phase2-security
  - phase3-observability
  - phase4-messaging
  - phase5-registry
  - phase6-gitops

jobs:
  include:
    - stage: phase1-networking
      name: "Phase 1 — Networking (Istio + Traefik)"
      script:
        - |
          helm repo add istio https://istio-release.storage.googleapis.com/charts \
            traefik https://traefik.github.io/charts --force-update
          helm upgrade --install istio-base istio/base \
            --namespace istio-system --create-namespace --wait --timeout 3m
          helm upgrade --install istiod istio/istiod \
            --namespace istio-system --set telemetry.enabled=true --wait --timeout 5m
          helm upgrade --install traefik traefik/traefik \
            --namespace networking --create-namespace \
            --set deployment.replicas=2 \
            --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
            --wait --timeout 5m
          echo "Phase 1 Networking — DONE"

    - stage: phase2-security
      name: "Phase 2 — Security (Vault + Keycloak + Kyverno + Falco)"
      script:
        - |
          helm repo add hashicorp https://helm.releases.hashicorp.com \
            bitnami https://charts.bitnami.com/bitnami \
            kyverno https://kyverno.github.io/kyverno \
            falcosecurity https://falcosecurity.github.io/charts --force-update
          helm upgrade --install vault hashicorp/vault \
            --namespace vault --create-namespace \
            --set server.ha.enabled=true --set server.ha.raft.enabled=true \
            --set server.ha.replicas=3 --wait --timeout 10m
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak --create-namespace \
            --set replicaCount=2 \
            --set auth.adminPassword="$KEYCLOAK_ADMIN_PASSWORD" \
            --set postgresql.enabled=true --wait --timeout 10m
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno --create-namespace \
            --set replicaCount=2 --wait --timeout 5m
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco --create-namespace \
            --set driver.kind=ebpf \
            --set falcosidekick.enabled=true \
            --set falcosidekick.config.slack.webhookurl="$SLACK_WEBHOOK" \
            --wait --timeout 8m
          echo "Phase 2 Security — DONE"

    - stage: phase3-observability
      name: "Phase 3 — Observability (Prometheus + Grafana)"
      script:
        - |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts \
            grafana https://grafana.github.io/helm-charts --force-update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace observability --create-namespace \
            --set prometheus.prometheusSpec.retention=30d \
            --set grafana.enabled=false --wait --timeout 10m
          helm upgrade --install grafana grafana/grafana \
            --namespace observability \
            --set adminPassword="$GRAFANA_ADMIN_PASSWORD" \
            --set persistence.enabled=true --wait --timeout 5m
          echo "Phase 3 Observability — DONE"

    - stage: phase4-messaging
      name: "Phase 4 — Messaging (ZooKeeper + Kafka + RabbitMQ + NATS)"
      script:
        - |
          helm repo add bitnami https://charts.bitnami.com/bitnami \
            nats https://nats-io.github.io/k8s/helm/charts --force-update
          helm upgrade --install zookeeper bitnami/zookeeper \
            --namespace messaging --create-namespace \
            --set replicaCount=3 --wait --timeout 8m
          helm upgrade --install kafka bitnami/kafka \
            --namespace messaging \
            --set replicaCount=3 \
            --set zookeeper.enabled=false \
            --set externalZookeeper.servers=zookeeper.messaging.svc:2181 \
            --set autoCreateTopicsEnable=false \
            --set defaultReplicationFactor=3 --wait --timeout 10m
          helm upgrade --install rabbitmq bitnami/rabbitmq \
            --namespace messaging \
            --set replicaCount=3 \
            --set auth.password="$RABBITMQ_PASSWORD" \
            --set clustering.enabled=true --wait --timeout 8m
          helm upgrade --install nats nats/nats \
            --namespace messaging \
            --set nats.jetstream.enabled=true \
            --set cluster.enabled=true --set cluster.replicas=3 --wait --timeout 5m
          echo "Phase 4 Messaging — DONE"

    - stage: phase5-registry
      name: "Phase 5 — Registry (Harbor + MinIO)"
      script:
        - |
          helm repo add harbor https://helm.goharbor.io \
            minio https://charts.min.io --force-update
          helm upgrade --install harbor harbor/harbor \
            --namespace registry --create-namespace \
            --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD" \
            --set trivy.enabled=true --set persistence.enabled=true \
            --wait --timeout 10m
          helm upgrade --install minio minio/minio \
            --namespace registry \
            --set rootUser="$MINIO_ROOT_USER" \
            --set rootPassword="$MINIO_ROOT_PASSWORD" \
            --set replicas=4 \
            --set persistence.enabled=true --set persistence.size=100Gi \
            --wait --timeout 8m
          echo "Phase 5 Registry — DONE"

    - stage: phase6-gitops
      name: "Phase 6 — GitOps (ArgoCD + KEDA)"
      script:
        - |
          helm repo add argo https://argoproj.github.io/argo-helm \
            kedacore https://kedacore.github.io/charts --force-update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd --create-namespace \
            --set server.replicas=2 --set redis-ha.enabled=true \
            --set configs.secret.argocdServerAdminPassword="$ARGOCD_ADMIN_PASSWORD_HASH" \
            --wait --timeout 10m
          helm upgrade --install keda kedacore/keda \
            --namespace keda --create-namespace --wait --timeout 5m
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
          kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true
          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            --data '{"text":":rocket: Cluster bootstrap complete — all 6 phases done"}' || true
          echo "Phase 6 GitOps — DONE"
