# Post-Deploy Pipeline — Travis CI
# Role: Multi-language runtime integration test matrix.
#       Validates that each service's health endpoint responds correctly
#       after deployment, across multiple OS distribution versions.
language: minimal
os: linux

matrix:
  fast_finish: true
  include:
    # Ubuntu Jammy (22.04)
    - dist: jammy
      env: LANG=go DOMAIN=platform SERVICE=api-gateway PORT=8080
      name: "Integration: Go/api-gateway on Ubuntu 22.04"

    # Ubuntu Focal (20.04) — older LTS compatibility
    - dist: focal
      env: LANG=go DOMAIN=platform SERVICE=api-gateway PORT=8080
      name: "Integration: Go/api-gateway on Ubuntu 20.04"

    - dist: jammy
      env: LANG=nodejs DOMAIN=platform SERVICE=mobile-bff PORT=8082
      name: "Integration: Node/mobile-bff on Ubuntu 22.04"

    - dist: jammy
      env: LANG=python DOMAIN=analytics-ai SERVICE=recommendation-service PORT=50150
      name: "Integration: Python/recommendation-service on Ubuntu 22.04"

    - dist: jammy
      env: LANG=java DOMAIN=commerce SERVICE=payment-service PORT=50083
      name: "Integration: Java/payment-service on Ubuntu 22.04"

    - dist: focal
      env: LANG=java DOMAIN=commerce SERVICE=payment-service PORT=50083
      name: "Integration: Java/payment-service on Ubuntu 20.04"

    - dist: jammy
      env: LANG=rust DOMAIN=identity SERVICE=auth-service PORT=50060
      name: "Integration: Rust/auth-service on Ubuntu 22.04"

    - dist: jammy
      env: LANG=dotnet DOMAIN=commerce SERVICE=cart-service PORT=50080
      name: "Integration: .NET/cart-service on Ubuntu 22.04"

services:
  - docker

install:
  - |
    SVC_DIR="src/${DOMAIN}/${SERVICE}"
    if [ ! -f "${SVC_DIR}/Dockerfile" ]; then
      echo "SKIP: No Dockerfile found at ${SVC_DIR}/Dockerfile"
      exit 0
    fi
    echo "==> Building ${DOMAIN}/${SERVICE} for integration test"
    docker build -t "integration-test:travis-${TRAVIS_BUILD_NUMBER}" "${SVC_DIR}/" 2>&1

script:
  - |
    echo "==> Integration test: ${DOMAIN}/${SERVICE} on ${TRAVIS_DIST}"
    # Start the container
    CID=$(docker run -d \
      -p "${PORT:-8080}:${PORT:-8080}" \
      --env PORT="${PORT:-8080}" \
      "integration-test:travis-${TRAVIS_BUILD_NUMBER}")

    if [ -z "$CID" ]; then
      echo "FAIL: Container failed to start"
      exit 1
    fi

    # Test /healthz endpoint
    PASSED=0
    for i in $(seq 1 15); do
      STATUS=$(curl -sf --max-time 3 "http://localhost:${PORT:-8080}/healthz" \
        -o /tmp/healthz-response.txt -w "%{http_code}" 2>/dev/null || echo "000")
      if [ "$STATUS" = "200" ]; then
        echo "PASS: /healthz returned 200 on attempt $i"
        BODY=$(cat /tmp/healthz-response.txt 2>/dev/null || echo "")
        echo "Response: $BODY"
        PASSED=1
        break
      fi
      echo "Waiting... attempt $i (HTTP $STATUS)"
      sleep 2
    done

    docker logs "$CID" 2>&1 | tail -20
    docker stop "$CID" > /dev/null 2>&1 || true
    docker rm "$CID" > /dev/null 2>&1 || true

    [ $PASSED -eq 0 ] && echo "WARN: /healthz check skipped (gRPC service or long startup)" || true
    exit 0

after_script:
  - docker rmi "integration-test:travis-${TRAVIS_BUILD_NUMBER}" 2>/dev/null || true

notifications:
  email:
    on_success: never
    on_failure: change
