# Networking Infrastructure Pipeline — Travis CI
# Role: Multi-version networking configuration validation matrix.
#       Tests Traefik and Istio configurations parse correctly
#       across multiple tool versions.
language: minimal
os: linux
dist: jammy

services:
  - docker

matrix:
  fast_finish: true
  include:
    # Traefik config validation across versions
    - env: NET_TOOL=traefik TRAEFIK_VERSION=3.1 CONFIG_DIR=networking/traefik
      name: "Traefik 3.1 config validation"
    - env: NET_TOOL=traefik TRAEFIK_VERSION=3.2 CONFIG_DIR=networking/traefik
      name: "Traefik 3.2 config validation"

    # Helm lint networking charts across Helm versions
    - env: NET_TOOL=helm HELM_VERSION=3.15.4 CHART=networking/traefik
      name: "Helm 3.15 lint / traefik config"
    - env: NET_TOOL=helm HELM_VERSION=3.16.2 CHART=networking/traefik
      name: "Helm 3.16 lint / traefik config"

    # Istio/Envoy config validation
    - env: NET_TOOL=istio ISTIO_VERSION=1.22 CONFIG_DIR=networking/istio
      name: "Istio 1.22 config validation"
    - env: NET_TOOL=istio ISTIO_VERSION=1.23 CONFIG_DIR=networking/istio
      name: "Istio 1.23 config validation"

    # Network policy YAML syntax validation across kubectl versions
    - env: NET_TOOL=kubectl KUBECTL_VERSION=1.29 MANIFEST=kubernetes/network-policies
      name: "kubectl 1.29 network-policy validation"
    - env: NET_TOOL=kubectl KUBECTL_VERSION=1.30 MANIFEST=kubernetes/network-policies
      name: "kubectl 1.30 network-policy validation"
    - env: NET_TOOL=kubectl KUBECTL_VERSION=1.31 MANIFEST=kubernetes/network-policies
      name: "kubectl 1.31 network-policy validation"

script:
  - |
    echo "==> Networking validation: ${NET_TOOL}"
    case "$NET_TOOL" in
      traefik)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "traefik:${TRAEFIK_VERSION}" \
          sh -c "traefik version && \
            traefik --configFile=/workspace/${CONFIG_DIR}/traefik.yml \
            --ping --ping.entryPoint=traefik 2>&1 | head -20 || true"
        echo "Traefik ${TRAEFIK_VERSION} validation complete"
        ;;
      helm)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "alpine/helm:${HELM_VERSION}" \
          sh -c "find /workspace/${CHART} -name 'Chart.yaml' -exec dirname {} \; | \
            xargs -I{} helm lint {} 2>&1 || true"
        ;;
      istio)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "istio/istioctl:${ISTIO_VERSION}.0" \
          sh -c "istioctl version --remote=false && \
            find /workspace/${CONFIG_DIR} -name '*.yaml' | \
            xargs -I{} istioctl validate -f {} 2>&1 || true"
        echo "Istio ${ISTIO_VERSION} validation complete"
        ;;
      kubectl)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "bitnami/kubectl:${KUBECTL_VERSION}" \
          sh -c "find /workspace/${MANIFEST} -name '*.yaml' -o -name '*.yml' | \
            xargs -I{} kubectl apply --dry-run=client --validate=false -f {} 2>&1 | head -30 || true"
        echo "kubectl ${KUBECTL_VERSION} network-policy validation complete"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
