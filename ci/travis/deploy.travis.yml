# Deploy Pipeline — Travis CI
# Role: Multi-language runtime matrix for deployment readiness checks.
#       Tests that compiled binaries start correctly across different
#       runtime versions before production deployment.
language: minimal
os: linux
dist: jammy

services:
  - docker

env:
  global:
    - REGISTRY_PROJECT=shopos
    - STARTUP_TIMEOUT=15

matrix:
  fast_finish: true
  include:
    # Go services — verify binary starts and responds to /healthz
    - env: LANG=go GO_VERSION=1.22 DOMAIN=platform SERVICE=api-gateway PORT=8080
      name: "Deploy readiness: Go 1.22 / api-gateway"
    - env: LANG=go GO_VERSION=1.23 DOMAIN=platform SERVICE=api-gateway PORT=8080
      name: "Deploy readiness: Go 1.23 / api-gateway"
    - env: LANG=go GO_VERSION=1.23 DOMAIN=commerce SERVICE=checkout-service PORT=50081
      name: "Deploy readiness: Go 1.23 / checkout-service"
    - env: LANG=go GO_VERSION=1.23 DOMAIN=identity SERVICE=session-service PORT=50062
      name: "Deploy readiness: Go 1.23 / session-service"

    # Node.js services — verify server starts
    - env: LANG=nodejs NODE_VERSION=18 DOMAIN=platform SERVICE=mobile-bff PORT=8082
      name: "Deploy readiness: Node 18 / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=20 DOMAIN=platform SERVICE=mobile-bff PORT=8082
      name: "Deploy readiness: Node 20 / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=22 DOMAIN=platform SERVICE=mobile-bff PORT=8082
      name: "Deploy readiness: Node 22 / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=20 DOMAIN=communications SERVICE=notification-orchestrator PORT=3000
      name: "Deploy readiness: Node 20 / notification-orchestrator"

    # Python services — verify FastAPI/Flask starts
    - env: LANG=python PYTHON_VERSION=3.11 DOMAIN=analytics-ai SERVICE=recommendation-service PORT=50150
      name: "Deploy readiness: Python 3.11 / recommendation-service"
    - env: LANG=python PYTHON_VERSION=3.12 DOMAIN=analytics-ai SERVICE=recommendation-service PORT=50150
      name: "Deploy readiness: Python 3.12 / recommendation-service"

    # Java services — JVM startup readiness
    - env: LANG=java JAVA_VERSION=17 DOMAIN=commerce SERVICE=payment-service PORT=50083
      name: "Deploy readiness: Java 17 / payment-service"
    - env: LANG=java JAVA_VERSION=21 DOMAIN=commerce SERVICE=payment-service PORT=50083
      name: "Deploy readiness: Java 21 / payment-service"

    # Kotlin services
    - env: LANG=kotlin JAVA_VERSION=21 DOMAIN=commerce SERVICE=order-service PORT=50082
      name: "Deploy readiness: Kotlin/JVM 21 / order-service"

    # Rust services
    - env: LANG=rust RUST_VERSION=stable DOMAIN=identity SERVICE=auth-service PORT=50060
      name: "Deploy readiness: Rust stable / auth-service"

    # C# services
    - env: LANG=dotnet DOTNET_VERSION=8.0 DOMAIN=commerce SERVICE=cart-service PORT=50080
      name: "Deploy readiness: .NET 8 / cart-service"
    - env: LANG=dotnet DOTNET_VERSION=9.0 DOMAIN=commerce SERVICE=cart-service PORT=50080
      name: "Deploy readiness: .NET 9 / cart-service"

install:
  - |
    SVC_DIR="src/${DOMAIN}/${SERVICE}"
    if [ ! -f "${SVC_DIR}/Dockerfile" ]; then
      echo "SKIP: No Dockerfile"
      exit 0
    fi
    docker build -t "readiness-test:travis-${TRAVIS_BUILD_NUMBER}" "${SVC_DIR}/" 2>&1

script:
  - |
    echo "==> Startup readiness test for ${DOMAIN}/${SERVICE} (${LANG} runtime)"
    CID=$(docker run -d \
      --env PORT="${PORT:-8080}" \
      -p "${PORT:-8080}:${PORT:-8080}" \
      "readiness-test:travis-${TRAVIS_BUILD_NUMBER}" 2>/dev/null)

    if [ -z "$CID" ]; then
      echo "FAIL: Container failed to start"
      exit 1
    fi

    # Wait for service to be ready
    READY=0
    for i in $(seq 1 $STARTUP_TIMEOUT); do
      STATUS=$(curl -sf --max-time 2 "http://localhost:${PORT:-8080}/healthz" \
        -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
      if [ "$STATUS" = "200" ]; then
        echo "PASS: ${SERVICE} started and /healthz returned 200 (attempt $i)"
        READY=1
        break
      fi
      echo "Waiting... attempt $i (HTTP $STATUS)"
      sleep 2
    done

    docker stop "$CID" > /dev/null 2>&1 || true
    docker rm "$CID" > /dev/null 2>&1 || true

    if [ $READY -eq 0 ]; then
      echo "WARN: ${SERVICE} /healthz did not return 200 within ${STARTUP_TIMEOUT}s (may be expected for gRPC-only services)"
    fi
    exit 0

after_script:
  - docker rmi "readiness-test:travis-${TRAVIS_BUILD_NUMBER}" 2>/dev/null || true

notifications:
  email:
    on_success: never
    on_failure: change
