# Security Pipeline — Travis CI
# Role: Multi-language dependency vulnerability matrix.
#       Tests each language's dependency resolution across versions,
#       and validates security tool compatibility with each runtime.
language: minimal
os: linux
dist: jammy

services:
  - docker

env:
  global:
    - REGISTRY_PROJECT=shopos

matrix:
  fast_finish: true
  include:
    # Go — test go mod tidy and govulncheck across versions
    - env: LANG=go GO_VERSION=1.22 SECURITY_CHECK=govulncheck DOMAIN=platform SERVICE=api-gateway
      name: "Security: Go 1.22 govulncheck / api-gateway"
    - env: LANG=go GO_VERSION=1.23 SECURITY_CHECK=govulncheck DOMAIN=platform SERVICE=api-gateway
      name: "Security: Go 1.23 govulncheck / api-gateway"
    - env: LANG=go GO_VERSION=1.23 SECURITY_CHECK=govulncheck DOMAIN=commerce SERVICE=checkout-service
      name: "Security: Go 1.23 govulncheck / checkout-service"

    # Node.js — npm audit across Node versions
    - env: LANG=nodejs NODE_VERSION=18 SECURITY_CHECK=npm-audit DOMAIN=platform SERVICE=mobile-bff
      name: "Security: Node 18 npm-audit / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=20 SECURITY_CHECK=npm-audit DOMAIN=platform SERVICE=mobile-bff
      name: "Security: Node 20 npm-audit / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=22 SECURITY_CHECK=npm-audit DOMAIN=platform SERVICE=mobile-bff
      name: "Security: Node 22 npm-audit / mobile-bff"
    - env: LANG=nodejs NODE_VERSION=20 SECURITY_CHECK=npm-audit DOMAIN=communications SERVICE=notification-orchestrator
      name: "Security: Node 20 npm-audit / notification-orchestrator"

    # Python — pip-audit and safety across Python versions
    - env: LANG=python PYTHON_VERSION=3.11 SECURITY_CHECK=pip-audit DOMAIN=analytics-ai SERVICE=recommendation-service
      name: "Security: Python 3.11 pip-audit / recommendation-service"
    - env: LANG=python PYTHON_VERSION=3.12 SECURITY_CHECK=pip-audit DOMAIN=analytics-ai SERVICE=recommendation-service
      name: "Security: Python 3.12 pip-audit / recommendation-service"
    - env: LANG=python PYTHON_VERSION=3.11 SECURITY_CHECK=pip-audit DOMAIN=communications SERVICE=email-service
      name: "Security: Python 3.11 pip-audit / email-service"

    # Java — OWASP dependency-check across JVM versions
    - env: LANG=java JAVA_VERSION=17 SECURITY_CHECK=owasp-dc DOMAIN=commerce SERVICE=payment-service
      name: "Security: Java 17 OWASP DC / payment-service"
    - env: LANG=java JAVA_VERSION=21 SECURITY_CHECK=owasp-dc DOMAIN=commerce SERVICE=payment-service
      name: "Security: Java 21 OWASP DC / payment-service"

    # Rust — cargo audit across Rust versions
    - env: LANG=rust RUST_VERSION=stable SECURITY_CHECK=cargo-audit DOMAIN=identity SERVICE=auth-service
      name: "Security: Rust stable cargo-audit / auth-service"
    - env: LANG=rust RUST_VERSION=1.82.0 SECURITY_CHECK=cargo-audit DOMAIN=identity SERVICE=auth-service
      name: "Security: Rust 1.82 cargo-audit / auth-service"

    # C# — dotnet list package --vulnerable across .NET versions
    - env: LANG=dotnet DOTNET_VERSION=8.0 SECURITY_CHECK=dotnet-vuln DOMAIN=commerce SERVICE=cart-service
      name: "Security: .NET 8 vuln scan / cart-service"
    - env: LANG=dotnet DOTNET_VERSION=9.0 SECURITY_CHECK=dotnet-vuln DOMAIN=commerce SERVICE=cart-service
      name: "Security: .NET 9 vuln scan / cart-service"

install:
  - |
    case "$LANG" in
      go)
        docker pull "golang:${GO_VERSION}-alpine"
        ;;
      nodejs)
        docker pull "node:${NODE_VERSION}-alpine"
        ;;
      python)
        docker pull "python:${PYTHON_VERSION}-slim"
        ;;
      java)
        docker pull "eclipse-temurin:${JAVA_VERSION}-jdk-jammy"
        ;;
      rust)
        docker pull "rust:${RUST_VERSION}-slim"
        ;;
      dotnet)
        docker pull "mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}"
        ;;
    esac

script:
  - |
    SVC_DIR="src/${DOMAIN}/${SERVICE}"
    echo "==> Security check: ${SECURITY_CHECK} on ${DOMAIN}/${SERVICE} (${LANG})"

    case "$LANG" in
      go)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "golang:${GO_VERSION}-alpine" \
          sh -c "go install golang.org/x/vuln/cmd/govulncheck@latest 2>/dev/null && govulncheck ./... 2>&1 || true"
        echo "Go vulnerability check complete"
        ;;

      nodejs)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "node:${NODE_VERSION}-alpine" \
          sh -c "npm install --prefer-offline 2>/dev/null; npm audit --audit-level=high 2>&1 || true"
        echo "npm audit complete"
        ;;

      python)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "python:${PYTHON_VERSION}-slim" \
          sh -c "pip install --quiet pip-audit 2>/dev/null; pip-audit -r requirements.txt 2>&1 || true"
        echo "pip-audit complete"
        ;;

      java)
        # Run OWASP dependency check via Docker
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/src" \
          owasp/dependency-check:latest \
          --scan /src \
          --format JSON \
          --out /tmp/owasp-report \
          --failOnCVSS 9 \
          --noupdate 2>&1 | tail -20 || true
        echo "OWASP dependency check complete"
        ;;

      rust)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "rust:${RUST_VERSION}-slim" \
          sh -c "cargo install cargo-audit 2>/dev/null && cargo audit 2>&1 || true"
        echo "cargo audit complete"
        ;;

      dotnet)
        docker run --rm \
          -v "$(pwd)/$SVC_DIR:/workspace" \
          -w /workspace \
          "mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}" \
          sh -c "dotnet list package --vulnerable 2>&1 || true"
        echo ".NET vulnerability check complete"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
