# Observability Stack Pipeline — Travis CI
# Role: Multi-version observability configuration validation matrix.
#       Tests Prometheus scrape configs, Grafana dashboard JSON, and
#       OTel collector configs parse correctly across tool versions.
language: minimal
os: linux
dist: jammy

services:
  - docker

matrix:
  fast_finish: true
  include:
    # Prometheus config validation across versions
    - env: OBS_TOOL=prometheus PROM_VERSION=v2.54.1 CONFIG=observability/prometheus
      name: "Prometheus 2.54 config validation"
    - env: OBS_TOOL=prometheus PROM_VERSION=v3.0.0 CONFIG=observability/prometheus
      name: "Prometheus 3.0 config validation"

    # OTel Collector config validation
    - env: OBS_TOOL=otel-collector OTEL_VERSION=0.113.0 CONFIG=observability/otel-collector
      name: "OTel Collector 0.113 config validation"
    - env: OBS_TOOL=otel-collector OTEL_VERSION=0.116.0 CONFIG=observability/otel-collector
      name: "OTel Collector 0.116 config validation"

    # Grafana dashboard JSON linting
    - env: OBS_TOOL=grafana-lint PYTHON_VERSION=3.12 CONFIG=observability/grafana
      name: "Grafana dashboard JSON lint (Python 3.12)"
    - env: OBS_TOOL=grafana-lint PYTHON_VERSION=3.11 CONFIG=observability/grafana
      name: "Grafana dashboard JSON lint (Python 3.11)"

    # Helm chart lint for observability charts
    - env: OBS_TOOL=helm HELM_VERSION=3.15.4 CHART=observability/prometheus
      name: "Helm 3.15 / prometheus chart lint"
    - env: OBS_TOOL=helm HELM_VERSION=3.16.2 CHART=observability/prometheus
      name: "Helm 3.16 / prometheus chart lint"

script:
  - |
    echo "==> Observability validation: ${OBS_TOOL}"
    case "$OBS_TOOL" in
      prometheus)
        # Validate prometheus.yml and alerting rules
        docker run --rm \
          -v "$(pwd):/workspace" \
          "prom/prometheus:${PROM_VERSION}" \
          sh -c "find /workspace/${CONFIG} -name 'prometheus.yml' | \
            xargs -I{} promtool check config {} 2>&1 || true; \
            find /workspace/${CONFIG} -name '*.rules.yml' | \
            xargs -I{} promtool check rules {} 2>&1 || true"
        echo "Prometheus ${PROM_VERSION} validation complete"
        ;;

      otel-collector)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "otel/opentelemetry-collector:${OTEL_VERSION}" \
          sh -c "find /workspace/${CONFIG} -name '*.yaml' | \
            xargs -I{} otelcol validate --config={} 2>&1 || true"
        echo "OTel Collector ${OTEL_VERSION} validation complete"
        ;;

      grafana-lint)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "python:${PYTHON_VERSION}-slim" \
          python3 -c "
import json, glob, sys
dashboards = glob.glob('/workspace/${CONFIG}/dashboards/**/*.json', recursive=True)
if not dashboards:
    dashboards = glob.glob('/workspace/${CONFIG}/**/*.json', recursive=True)
errors = 0
for d in dashboards:
    try:
        with open(d) as f:
            data = json.load(f)
        print(f'PASS: {d.split(\"/\")[-1]}')
    except json.JSONDecodeError as e:
        print(f'FAIL: {d.split(\"/\")[-1]}: {e}')
        errors += 1
print(f'Total: {len(dashboards)} dashboards, {errors} errors')
sys.exit(errors)
          " 2>&1
        echo "Grafana dashboard lint complete"
        ;;

      helm)
        docker run --rm \
          -v "$(pwd):/workspace" \
          "alpine/helm:${HELM_VERSION}" \
          sh -c "find /workspace/${CHART} -name 'Chart.yaml' -exec dirname {} \; | \
            xargs -I{} helm lint {} 2>&1 || true"
        echo "Helm ${HELM_VERSION} lint complete"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
