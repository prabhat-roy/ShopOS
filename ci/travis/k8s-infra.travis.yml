# K8s Infrastructure Pipeline — Travis CI
# Role: Multi-cloud Terraform version compatibility matrix.
#       Tests that Terraform configurations validate correctly
#       across Terraform 1.8, 1.9 and OpenTofu 1.8, 1.9.
language: minimal
os: linux
dist: jammy

services:
  - docker

env:
  global:
    - TF_IN_AUTOMATION=true

matrix:
  fast_finish: true
  include:
    # Terraform versions — AWS EKS
    - env: TF_TOOL=terraform TF_VERSION=1.8.5 TF_DIR=infra/terraform/aws/app-k8s CLOUD=aws
      name: "Terraform 1.8 validate / aws/app-k8s"
    - env: TF_TOOL=terraform TF_VERSION=1.9.8 TF_DIR=infra/terraform/aws/app-k8s CLOUD=aws
      name: "Terraform 1.9 validate / aws/app-k8s"

    # Terraform versions — GCP GKE
    - env: TF_TOOL=terraform TF_VERSION=1.8.5 TF_DIR=infra/terraform/gcp/app-k8s CLOUD=gcp
      name: "Terraform 1.8 validate / gcp/app-k8s"
    - env: TF_TOOL=terraform TF_VERSION=1.9.8 TF_DIR=infra/terraform/gcp/app-k8s CLOUD=gcp
      name: "Terraform 1.9 validate / gcp/app-k8s"

    # Terraform versions — Azure AKS
    - env: TF_TOOL=terraform TF_VERSION=1.8.5 TF_DIR=infra/terraform/azure/app-k8s CLOUD=azure
      name: "Terraform 1.8 validate / azure/app-k8s"
    - env: TF_TOOL=terraform TF_VERSION=1.9.8 TF_DIR=infra/terraform/azure/app-k8s CLOUD=azure
      name: "Terraform 1.9 validate / azure/app-k8s"

    # OpenTofu (OSS Terraform fork) — AWS
    - env: TF_TOOL=opentofu TF_VERSION=1.8.3 TF_DIR=infra/opentofu/aws/app-k8s CLOUD=aws
      name: "OpenTofu 1.8 validate / opentofu/aws/app-k8s"
    - env: TF_TOOL=opentofu TF_VERSION=1.9.0 TF_DIR=infra/opentofu/gcp/app-k8s CLOUD=gcp
      name: "OpenTofu 1.9 validate / opentofu/gcp/app-k8s"

    # Kubernetes manifest validation — multiple kubectl versions
    - env: TF_TOOL=kubectl KUBECTL_VERSION=1.29 MANIFEST_DIR=kubernetes
      name: "kubectl 1.29 dry-run validate / kubernetes manifests"
    - env: TF_TOOL=kubectl KUBECTL_VERSION=1.30 MANIFEST_DIR=kubernetes
      name: "kubectl 1.30 dry-run validate / kubernetes manifests"
    - env: TF_TOOL=kubectl KUBECTL_VERSION=1.31 MANIFEST_DIR=kubernetes
      name: "kubectl 1.31 dry-run validate / kubernetes manifests"

    # Helm chart validation — multiple Helm versions
    - env: TF_TOOL=helm HELM_VERSION=3.15.4 CHART_PATH=helm/services/api-gateway
      name: "Helm 3.15 lint / api-gateway chart"
    - env: TF_TOOL=helm HELM_VERSION=3.16.2 CHART_PATH=helm/services/api-gateway
      name: "Helm 3.16 lint / api-gateway chart"
    - env: TF_TOOL=helm HELM_VERSION=3.16.2 CHART_PATH=helm/services/order-service
      name: "Helm 3.16 lint / order-service chart"

install:
  - |
    case "$TF_TOOL" in
      terraform)
        docker pull "hashicorp/terraform:${TF_VERSION}"
        ;;
      opentofu)
        docker pull "ghcr.io/opentofu/opentofu:${TF_VERSION}"
        ;;
      kubectl)
        docker pull "bitnami/kubectl:${KUBECTL_VERSION}"
        ;;
      helm)
        docker pull "alpine/helm:${HELM_VERSION}"
        ;;
    esac

script:
  - |
    echo "==> ${TF_TOOL} validation: ${TF_DIR:-$MANIFEST_DIR:-$CHART_PATH}"
    case "$TF_TOOL" in
      terraform)
        if [ ! -d "${TF_DIR}" ]; then
          echo "SKIP: ${TF_DIR} not found"
          exit 0
        fi
        docker run --rm \
          -v "$(pwd):/workspace" \
          -w "/workspace/${TF_DIR}" \
          -e TF_IN_AUTOMATION=true \
          "hashicorp/terraform:${TF_VERSION}" \
          sh -c "terraform init -backend=false 2>&1 && terraform validate 2>&1"
        echo "PASS: Terraform ${TF_VERSION} validated ${TF_DIR}"
        ;;

      opentofu)
        if [ ! -d "${TF_DIR}" ]; then
          echo "SKIP: ${TF_DIR} not found"
          exit 0
        fi
        docker run --rm \
          -v "$(pwd):/workspace" \
          -w "/workspace/${TF_DIR}" \
          "ghcr.io/opentofu/opentofu:${TF_VERSION}" \
          sh -c "tofu init -backend=false 2>&1 && tofu validate 2>&1"
        echo "PASS: OpenTofu ${TF_VERSION} validated ${TF_DIR}"
        ;;

      kubectl)
        # Dry-run validation of all K8s manifests
        docker run --rm \
          -v "$(pwd):/workspace" \
          "bitnami/kubectl:${KUBECTL_VERSION}" \
          sh -c "find /workspace/${MANIFEST_DIR} -name '*.yml' -o -name '*.yaml' | \
            xargs -I{} kubectl apply --dry-run=client --validate=false -f {} 2>&1 | \
            grep -v '^$' | head -50 || true"
        echo "PASS: kubectl ${KUBECTL_VERSION} dry-run validation complete"
        ;;

      helm)
        if [ ! -d "${CHART_PATH}" ]; then
          echo "SKIP: ${CHART_PATH} not found"
          exit 0
        fi
        docker run --rm \
          -v "$(pwd):/workspace" \
          "alpine/helm:${HELM_VERSION}" \
          helm lint "/workspace/${CHART_PATH}" --strict 2>&1
        echo "PASS: Helm ${HELM_VERSION} lint passed for ${CHART_PATH}"
        ;;
    esac

notifications:
  email:
    on_success: never
    on_failure: change
