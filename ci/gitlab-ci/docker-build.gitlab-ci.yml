# GitLab CI — Docker Build with GitLab Container Registry fallback
#
# GitLab CI role: build and push images, preferring Harbor registry but falling
# back to GitLab's built-in container registry ($CI_REGISTRY) when Harbor is
# unavailable. Uses GitLab's native CI_REGISTRY_* variables — no secrets needed
# for the fallback path.

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY_PROJECT: shopos
  PUSH_IMAGE: "true"
  SCAN_IMAGE: "true"
  DOMAIN: ""       # empty = all 13 domains
  SERVICE_NAME: "" # empty = all services in DOMAIN

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - build
  - scan
  - push
  - attest

# ── Docker build (Harbor primary, GitLab registry fallback) ──────────────────
docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Login to Harbor (primary)
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin 2>/dev/null || true
    # Login to GitLab Container Registry (fallback — no secrets needed)
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - |
      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      build_and_tag() {
        local domain=$1 svc=$2
        local harbor_image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
        local gl_image="$CI_REGISTRY_IMAGE/$svc:$IMAGE_TAG"

        echo "=== Building: $svc (domain=$domain) ==="
        docker build \
          --label "git.commit=$CI_COMMIT_SHA" \
          --label "build.number=$CI_PIPELINE_IID" \
          --label "domain=$domain" \
          --label "ci.platform=gitlab" \
          -t "$harbor_image" \
          -t "$gl_image" \
          "src/$domain/$svc/" || { echo "WARN: $svc build failed"; return; }

        # Always push to GitLab registry (fallback)
        docker push "$gl_image" || echo "WARN: GitLab registry push failed for $svc"
      }

      if [ -n "$SERVICE_NAME" ] && [ -n "$DOMAIN" ]; then
        build_and_tag "$DOMAIN" "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] && build_and_tag "$DOMAIN" "$(basename $svc_path)"
        done
      else
        for d in $ALL_DOMAINS; do
          for svc_path in src/$d/*/; do
            [ -d "$svc_path" ] && build_and_tag "$d" "$(basename $svc_path)"
          done
        done
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/

# ── Trivy scan (from GitLab registry — no Harbor needed) ─────────────────────
trivy-scan:
  stage: scan
  image: aquasec/trivy:latest
  script:
    - mkdir -p reports/image-scan
    - |
      [ "$SCAN_IMAGE" != "true" ] && echo "Scan disabled" && exit 0

      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      scan_svc() {
        local svc=$1
        # Scan from GitLab registry (always available)
        local image="$CI_REGISTRY_IMAGE/$svc:$IMAGE_TAG"
        echo "=== Trivy: $svc ==="
        trivy image \
          --exit-code 0 \
          --severity HIGH,CRITICAL \
          --format sarif \
          --output "reports/image-scan/trivy-${svc}.sarif" \
          "$image" 2>/dev/null || true
      }

      if [ -n "$SERVICE_NAME" ]; then
        scan_svc "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
        done
      else
        # Scan key services as a representative sample
        for svc in api-gateway order-service product-catalog-service payment-service auth-service; do
          scan_svc "$svc" || true
        done
      fi
  artifacts:
    paths: [reports/image-scan/]
    reports:
      container_scanning: reports/image-scan/trivy-api-gateway.sarif
    expire_in: 7d
  needs: [docker-build]
  allow_failure: true

# ── Push to Harbor (primary registry) ────────────────────────────────────────
push-to-harbor:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
  script:
    - |
      [ "$PUSH_IMAGE" != "true" ] && echo "Push disabled" && exit 0

      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      retag_and_push() {
        local svc=$1
        local gl_image="$CI_REGISTRY_IMAGE/$svc:$IMAGE_TAG"
        local harbor_image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
        docker pull "$gl_image" || return
        docker tag "$gl_image" "$harbor_image"
        docker push "$harbor_image" || echo "WARN: Harbor push failed for $svc"
      }

      if [ -n "$SERVICE_NAME" ]; then
        retag_and_push "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] && retag_and_push "$(basename $svc_path)"
        done
      else
        for d in $ALL_DOMAINS; do
          for svc_path in src/$d/*/; do
            [ -d "$svc_path" ] && retag_and_push "$(basename $svc_path)"
          done
        done
      fi
  needs: [trivy-scan]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/
      when: on_success
    - when: manual

# ── Cosign attestation ───────────────────────────────────────────────────────
cosign-attest:
  stage: attest
  image: gcr.io/projectsigstore/cosign:latest
  script:
    - |
      [ -z "$COSIGN_KEY" ] && echo "No COSIGN_KEY set — skipping attestation" && exit 0
      SVC="${SERVICE_NAME:-api-gateway}"
      IMAGE="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$IMAGE_TAG"
      echo "$COSIGN_KEY" | base64 -d > /tmp/cosign.key
      cosign sign --key /tmp/cosign.key --yes "$IMAGE" || true
      rm -f /tmp/cosign.key
  needs: [push-to-harbor]
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
