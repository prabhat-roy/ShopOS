# Docker-Build Pipeline — GitLab CI
# Builds Docker images for all ShopOS services and pushes to Harbor with Trivy scanning.
# Required CI/CD variables (Settings → CI/CD → Variables):
#   HARBOR_REGISTRY, HARBOR_USER, HARBOR_PASSWORD

variables:
  SERVICE_NAME: ""           # empty = all services in DOMAIN (or all 154 if DOMAIN also empty)
  DOMAIN: ""                 # empty = all 13 domains
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY_PROJECT: shopos
  PUSH_IMAGE: "true"
  SCAN_IMAGE: "true"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/

stages:
  - build
  - scan
  - push
  - cleanup

# ── Docker Build ─────────────────────────────────────────────────────────────
docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
  script:
    - |
      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      build_svc() {
        local domain=$1 svc=$2
        local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
        echo "=== Building: $image ==="
        docker build \
          --label "git.commit=$CI_COMMIT_SHA" \
          --label "build.number=$CI_PIPELINE_IID" \
          --label "domain=$domain" \
          -t "$image" \
          "src/$domain/$svc/" || echo "WARN build failed for $svc"
      }

      if [ -n "$SERVICE_NAME" ] && [ -n "$DOMAIN" ]; then
        build_svc "$DOMAIN" "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] || continue
          build_svc "$DOMAIN" "$(basename $svc_path)"
        done
      else
        for d in $ALL_DOMAINS; do
          for svc_path in src/$d/*/; do
            [ -d "$svc_path" ] || continue
            build_svc "$d" "$(basename $svc_path)"
          done
        done
      fi

# ── Trivy Image Scan ──────────────────────────────────────────────────────────
trivy-image-scan:
  stage: scan
  image: aquasec/trivy:latest
  script:
    - mkdir -p reports/image-scan
    - |
      if [ "$SCAN_IMAGE" != "true" ]; then
        echo "SCAN_IMAGE=false — skipping"
        exit 0
      fi

      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      scan_svc() {
        local svc=$1
        local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
        echo "=== Trivy: $image ==="
        trivy image \
          --exit-code 0 \
          --severity HIGH,CRITICAL \
          --format json \
          --output "reports/image-scan/trivy-${svc}.json" \
          "$image" || true
      }

      if [ -n "$SERVICE_NAME" ]; then
        scan_svc "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
        done
      else
        for d in $ALL_DOMAINS; do
          for svc_path in src/$d/*/; do
            [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
          done
        done
      fi
  artifacts:
    paths: [reports/image-scan/]
    expire_in: 7d
  needs: [docker-build]
  allow_failure: true

# ── Docker Push ───────────────────────────────────────────────────────────────
docker-push:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
  script:
    - |
      if [ "$PUSH_IMAGE" != "true" ]; then
        echo "PUSH_IMAGE=false — skipping"
        exit 0
      fi

      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

      push_svc() {
        local svc=$1
        local image="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$svc:$IMAGE_TAG"
        echo "=== Pushing: $image ==="
        docker push "$image" || echo "WARN push failed for $svc"
      }

      if [ -n "$SERVICE_NAME" ]; then
        push_svc "$SERVICE_NAME"
      elif [ -n "$DOMAIN" ]; then
        for svc_path in src/$DOMAIN/*/; do
          [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
        done
      else
        for d in $ALL_DOMAINS; do
          for svc_path in src/$d/*/; do
            [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
          done
        done
      fi
  needs: [trivy-image-scan]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/
      when: on_success
    - when: manual

# ── Cleanup ───────────────────────────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker image prune -f 2>/dev/null || true
    - docker logout "$HARBOR_REGISTRY" 2>/dev/null || true
    - echo "Cleanup complete. Tag=${IMAGE_TAG}"
  needs: [docker-push]
  when: always
