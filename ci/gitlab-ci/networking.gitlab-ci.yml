# GitLab CI — Networking Infrastructure with GitLab Environments
#
# GitLab CI role: deploy networking stack with full GitLab environment tracking.
# Each network component gets its own environment: for deployment history and
# stop actions. Uses GitLab runner tags to target nodes with host networking.

variables:
  ENVIRONMENT: dev
  ACTION: INSTALL
  CILIUM: "false"
  ISTIO: "true"
  TRAEFIK: "true"
  CONSUL: "true"
  EXTERNAL_DNS: "true"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - cni
  - mesh
  - edge
  - discovery

default:
  image: alpine/helm:3.16.1
  before_script:
    - apk add --no-cache curl bash
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

cilium:
  stage: cni
  environment:
    name: $ENVIRONMENT/networking/cilium
    on_stop: stop-cilium
  script:
    - '[ "$CILIUM" = "true" ] || exit 0'
    - helm repo add cilium https://helm.cilium.io --force-update
    - |
      if [ "$ACTION" = "UNINSTALL" ]; then
        helm uninstall cilium -n kube-system 2>/dev/null || true
      else
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set loadBalancer.algorithm=maglev \
          --set prometheus.enabled=true \
          --wait --timeout 8m
        kubectl -n kube-system rollout status daemonset/cilium --timeout=120s
      fi

stop-cilium:
  stage: cni
  environment:
    name: $ENVIRONMENT/networking/cilium
    action: stop
  script:
    - helm uninstall cilium -n kube-system --ignore-not-found || true
  when: manual

istio:
  stage: mesh
  environment:
    name: $ENVIRONMENT/networking/istio
    url: https://kiali.$ENVIRONMENT.shopos.internal
    on_stop: stop-istio
  script:
    - '[ "$ISTIO" = "true" ] || exit 0'
    - helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
    - |
      if [ "$ACTION" = "UNINSTALL" ]; then
        helm uninstall istio-ingressgateway -n istio-system 2>/dev/null || true
        helm uninstall istiod -n istio-system 2>/dev/null || true
        helm uninstall istio-base -n istio-system 2>/dev/null || true
      else
        REPLICAS=1; [ "$ENVIRONMENT" != "dev" ] && REPLICAS=2
        helm upgrade --install istio-base istio/base \
          --namespace istio-system --create-namespace --wait --timeout 3m
        helm upgrade --install istiod istio/istiod \
          --namespace istio-system \
          --set telemetry.enabled=true \
          --set pilot.traceSampling=1.0 \
          --set meshConfig.enableTracing=true \
          --set meshConfig.accessLogFile=/dev/stdout \
          --wait --timeout 5m
        helm upgrade --install istio-ingressgateway istio/gateway \
          --namespace istio-system \
          --set autoscaling.minReplicas=$REPLICAS \
          --wait --timeout 3m
        kubectl apply -f networking/istio/ 2>/dev/null || true
      fi
  needs: [cilium]

stop-istio:
  stage: mesh
  environment:
    name: $ENVIRONMENT/networking/istio
    action: stop
  script:
    - helm uninstall istio-ingressgateway istiod istio-base -n istio-system --ignore-not-found || true
  when: manual

traefik:
  stage: edge
  environment:
    name: $ENVIRONMENT/networking/traefik
    url: https://traefik.$ENVIRONMENT.shopos.internal/dashboard/
    on_stop: stop-traefik
  script:
    - '[ "$TRAEFIK" = "true" ] || exit 0'
    - helm repo add traefik https://traefik.github.io/charts --force-update
    - |
      if [ "$ACTION" = "UNINSTALL" ]; then
        helm uninstall traefik -n networking 2>/dev/null || true
      else
        REPLICAS=1; [ "$ENVIRONMENT" = "staging" ] && REPLICAS=2; [ "$ENVIRONMENT" = "prod" ] && REPLICAS=3
        helm upgrade --install traefik traefik/traefik \
          --namespace networking --create-namespace \
          --set deployment.replicas=$REPLICAS \
          --set ports.websecure.tls.enabled=true \
          --set ingressClass.enabled=true \
          --set ingressClass.isDefaultClass=true \
          --set metrics.prometheus.enabled=true \
          --set logs.access.enabled=true \
          --wait --timeout 5m
        kubectl apply -f networking/traefik/ 2>/dev/null || true
      fi
  needs: [istio]

stop-traefik:
  stage: edge
  environment:
    name: $ENVIRONMENT/networking/traefik
    action: stop
  script:
    - helm uninstall traefik -n networking --ignore-not-found || true
  when: manual

consul:
  stage: discovery
  environment:
    name: $ENVIRONMENT/networking/consul
    url: https://consul.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$CONSUL" = "true" ] || exit 0'
    - helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
    - |
      if [ "$ACTION" = "UNINSTALL" ]; then
        helm uninstall consul -n consul 2>/dev/null || true
      else
        REPLICAS=1; [ "$ENVIRONMENT" = "prod" ] && REPLICAS=3
        helm upgrade --install consul hashicorp/consul \
          --namespace consul --create-namespace \
          --set server.replicas=$REPLICAS \
          --set server.bootstrapExpect=$REPLICAS \
          --set connectInject.enabled=true \
          --set ui.enabled=true \
          --wait --timeout 8m
      fi
  needs: [traefik]

external-dns:
  stage: discovery
  environment:
    name: $ENVIRONMENT/networking/external-dns
  script:
    - '[ "$EXTERNAL_DNS" = "true" ] || exit 0'
    - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns --force-update
    - |
      if [ "$ACTION" = "UNINSTALL" ]; then
        helm uninstall external-dns -n networking 2>/dev/null || true
      else
        helm upgrade --install external-dns external-dns/external-dns \
          --namespace networking --create-namespace \
          --set policy=sync \
          --set txtOwnerId=shopos-$ENVIRONMENT \
          --wait --timeout 3m
      fi
  needs: [traefik]
