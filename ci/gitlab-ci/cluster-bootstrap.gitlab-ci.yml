# GitLab CI — Full Cluster Bootstrap with GitLab Environments
#
# GitLab CI role: orchestrate full cluster setup using GitLab's DAG (needs:)
# and GitLab environment: keyword for each phase. Each phase is tracked in
# GitLab's Deployments view with URLs and stop actions.
# Uses GitLab's native CI/CD variables — no .env files.

variables:
  ENVIRONMENT: dev
  SKIP_NETWORKING: "false"
  SKIP_SECURITY: "false"
  SKIP_OBSERVABILITY: "false"
  SKIP_MESSAGING: "false"
  SKIP_REGISTRY: "false"
  SKIP_GITOPS: "false"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - phase1-networking
  - phase2-security
  - phase3-observability
  - phase4-messaging
  - phase5-registry
  - phase6-gitops
  - summary

default:
  image: alpine/helm:3.16.1
  before_script:
    - apk add --no-cache curl bash
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

# ── Phase 1: Networking ────────────────────────────────────────────────────────
networking-cni:
  stage: phase1-networking
  environment:
    name: $ENVIRONMENT/bootstrap/networking-cni
  script:
    - '[ "$SKIP_NETWORKING" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add cilium https://helm.cilium.io --force-update
    - helm upgrade --install cilium cilium/cilium --namespace kube-system
        --set kubeProxyReplacement=true
        --set hubble.relay.enabled=true
        --set hubble.ui.enabled=true
        --set prometheus.enabled=true
        --wait --timeout 8m || true

networking-mesh-edge:
  stage: phase1-networking
  environment:
    name: $ENVIRONMENT/bootstrap/networking-mesh
    url: https://traefik.$ENVIRONMENT.shopos.internal/dashboard/
  script:
    - '[ "$SKIP_NETWORKING" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add istio   https://istio-release.storage.googleapis.com/charts --force-update
    - helm repo add traefik https://traefik.github.io/charts --force-update
    - helm upgrade --install istio-base istio/base --namespace istio-system --create-namespace --wait --timeout 3m
    - helm upgrade --install istiod istio/istiod --namespace istio-system
        --set telemetry.enabled=true --set pilot.traceSampling=1.0 --wait --timeout 5m
    - helm upgrade --install istio-ingressgateway istio/gateway --namespace istio-system --wait --timeout 3m
    - helm upgrade --install traefik traefik/traefik --namespace networking --create-namespace
        --set deployment.replicas=2
        --set ingressClass.enabled=true
        --set ingressClass.isDefaultClass=true
        --set metrics.prometheus.enabled=true
        --wait --timeout 5m
  needs: [networking-cni]

# ── Phase 2: Security ──────────────────────────────────────────────────────────
security-cert-manager:
  stage: phase2-security
  environment:
    name: $ENVIRONMENT/bootstrap/cert-manager
  script:
    - '[ "$SKIP_SECURITY" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add jetstack https://charts.jetstack.io --force-update
    - helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager --create-namespace
        --set installCRDs=true --set replicaCount=2 --wait --timeout 5m
  needs: [networking-cni, networking-mesh-edge]

security-vault-keycloak:
  stage: phase2-security
  environment:
    name: $ENVIRONMENT/bootstrap/vault-keycloak
    url: https://keycloak.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$SKIP_SECURITY" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
    - helm repo add bitnami   https://charts.bitnami.com/bitnami   --force-update
    - helm upgrade --install vault hashicorp/vault --namespace vault --create-namespace
        --set server.ha.enabled=true
        --set server.ha.raft.enabled=true
        --set server.ha.replicas=3
        --set ui.enabled=true
        --wait --timeout 10m
    - helm upgrade --install keycloak bitnami/keycloak --namespace keycloak --create-namespace
        --set replicaCount=2
        --set auth.adminPassword="$KEYCLOAK_ADMIN_PASSWORD"
        --set postgresql.enabled=true
        --wait --timeout 10m
  needs: [security-cert-manager]

security-policy-runtime:
  stage: phase2-security
  environment:
    name: $ENVIRONMENT/bootstrap/policy-runtime
  script:
    - '[ "$SKIP_SECURITY" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add kyverno       https://kyverno.github.io/kyverno        --force-update
    - helm repo add falcosecurity  https://falcosecurity.github.io/charts  --force-update
    - helm upgrade --install kyverno kyverno/kyverno --namespace kyverno --create-namespace
        --set admissionController.replicas=2 --wait --timeout 5m
    - kubectl apply -f security/kyverno/ 2>/dev/null || true
    - helm upgrade --install falco falcosecurity/falco --namespace falco --create-namespace
        --set driver.kind=ebpf
        --set falcosidekick.enabled=true
        --set falcosidekick.config.slack.webhookurl="$SLACK_WEBHOOK"
        --wait --timeout 8m
    - kubectl apply -f security/falco/ 2>/dev/null || true
  needs: [security-vault-keycloak]

# ── Phase 3: Observability ─────────────────────────────────────────────────────
observability:
  stage: phase3-observability
  environment:
    name: $ENVIRONMENT/bootstrap/observability
    url: https://grafana.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$SKIP_OBSERVABILITY" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
    - helm repo add grafana              https://grafana.github.io/helm-charts              --force-update
    - helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack
        --namespace observability --create-namespace
        --set prometheus.prometheusSpec.retention=30d
        --set grafana.enabled=false
        --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false
        --wait --timeout 10m
    - helm upgrade --install grafana grafana/grafana --namespace observability
        --set adminPassword="$GRAFANA_ADMIN_PASSWORD"
        --set persistence.enabled=true
        --set sidecar.dashboards.enabled=true
        --wait --timeout 5m
    - helm upgrade --install loki grafana/loki --namespace observability
        --set loki.auth_enabled=false
        --set loki.storage.type=s3
        --set loki.storage.s3.endpoint="$MINIO_ENDPOINT"
        --set loki.storage.s3.bucketnames=loki-chunks
        --set loki.storage.s3.access_key_id="$MINIO_ACCESS_KEY"
        --set loki.storage.s3.secret_access_key="$MINIO_SECRET_KEY"
        --set loki.storage.s3.s3ForcePathStyle=true
        --wait --timeout 8m
  needs: [security-policy-runtime]

# ── Phase 4: Messaging ─────────────────────────────────────────────────────────
messaging:
  stage: phase4-messaging
  environment:
    name: $ENVIRONMENT/bootstrap/messaging
    url: https://kafka-ui.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$SKIP_MESSAGING" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
    - helm repo add nats     https://nats-io.github.io/k8s/helm/charts --force-update
    - helm upgrade --install zookeeper bitnami/zookeeper --namespace messaging --create-namespace
        --set replicaCount=3 --wait --timeout 8m
    - helm upgrade --install kafka bitnami/kafka --namespace messaging
        --set replicaCount=3 --set zookeeper.enabled=false
        --set externalZookeeper.servers=zookeeper.messaging.svc:2181
        --set autoCreateTopicsEnable=false --set defaultReplicationFactor=3
        --wait --timeout 10m
    - helm upgrade --install rabbitmq bitnami/rabbitmq --namespace messaging
        --set replicaCount=3 --set auth.password="$RABBITMQ_PASSWORD"
        --set clustering.enabled=true --set metrics.enabled=true
        --wait --timeout 8m
    - helm upgrade --install nats nats/nats --namespace messaging
        --set nats.jetstream.enabled=true --set cluster.enabled=true --set cluster.replicas=3
        --wait --timeout 5m
  needs: [observability]

# ── Phase 5: Registry ──────────────────────────────────────────────────────────
registry:
  stage: phase5-registry
  environment:
    name: $ENVIRONMENT/bootstrap/registry
    url: https://harbor.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$SKIP_REGISTRY" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add harbor https://helm.goharbor.io --force-update
    - helm repo add minio  https://charts.min.io     --force-update
    - helm upgrade --install harbor harbor/harbor --namespace registry --create-namespace
        --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD"
        --set trivy.enabled=true
        --set persistence.enabled=true
        --set persistence.persistentVolumeClaim.registry.size=100Gi
        --wait --timeout 15m
    - helm upgrade --install minio minio/minio --namespace minio --create-namespace
        --set rootUser="$MINIO_ROOT_USER"
        --set rootPassword="$MINIO_ROOT_PASSWORD"
        --set replicas=4 --set persistence.enabled=true
        --set persistence.size=200Gi
        --wait --timeout 10m
  needs: [security-policy-runtime]

# ── Phase 6: GitOps ────────────────────────────────────────────────────────────
gitops:
  stage: phase6-gitops
  environment:
    name: $ENVIRONMENT/bootstrap/gitops
    url: https://argocd.$ENVIRONMENT.shopos.internal
  script:
    - '[ "$SKIP_GITOPS" = "true" ] && echo "Skipped" && exit 0'
    - helm repo add argo      https://argoproj.github.io/argo-helm --force-update
    - helm repo add kedacore  https://kedacore.github.io/charts     --force-update
    - helm upgrade --install argocd argo/argo-cd --namespace argocd --create-namespace
        --set server.replicas=2 --set redis-ha.enabled=false
        --set configs.secret.argocdServerAdminPassword="$ARGOCD_ADMIN_PASSWORD_HASH"
        --wait --timeout 10m
    - helm upgrade --install keda kedacore/keda --namespace keda --create-namespace
        --set metricsServer.replicaCount=2 --wait --timeout 5m
    - kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s || true
    - kubectl apply -f gitops/argocd/app-of-apps.yaml -n argocd 2>/dev/null || true
    - kubectl apply -f gitops/argocd/applicationsets/ -n argocd 2>/dev/null || true
  needs: [messaging, registry]

# ── Bootstrap summary ──────────────────────────────────────────────────────────
bootstrap-summary:
  stage: summary
  image: bitnami/kubectl:1.31
  environment:
    name: $ENVIRONMENT
    url: https://$ENVIRONMENT.shopos.internal
  script:
    - |
      echo "=== ShopOS Cluster Bootstrap Complete — $ENVIRONMENT ==="
      kubectl get nodes 2>/dev/null | head -10 || true
      kubectl get namespaces 2>/dev/null || true
      echo ""
      echo "=== Key Services ==="
      for ns in argocd observability messaging registry keda vault keycloak; do
        kubectl get deploy -n "$ns" --no-headers 2>/dev/null | \
          awk '{printf "%-40s %s/%s\n", "'$ns'/"$1, $2, $3}' | head -5 || true
      done
  needs: [gitops]
  when: always
