# GitLab CI — Deployment with GitLab Environments & MR Review
#
# GitLab CI role: structured promotion pipeline using GitLab native environments
# with protection rules. MR → dev auto-deploy, develop → staging auto, main →
# prod manual. Environment URLs visible in GitLab Deployments view.
#
# Required CI/CD variables:
#   HARBOR_REGISTRY, HARBOR_USER, HARBOR_PASSWORD
#   KUBECONFIG_CONTENT (base64)
#   SLACK_WEBHOOK

variables:
  SERVICE_NAME: api-gateway
  DOMAIN: platform
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY_PROJECT: shopos

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - build
  - test
  - deploy-dev
  - deploy-staging
  - deploy-prod
  - verify

# ── Docker build ──────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
    - IMAGE="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SERVICE_NAME:$IMAGE_TAG"
    - docker build -t "$IMAGE" "src/$DOMAIN/$SERVICE_NAME/"
    - docker push "$IMAGE"
    - echo "IMAGE_REF=$IMAGE" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1h
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Smoke test (build verification) ──────────────────────────────────────────
test:
  stage: test
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
    - IMAGE="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SERVICE_NAME:$IMAGE_TAG"
    - docker pull "$IMAGE"
    # Verify the image has a valid entrypoint and healthz endpoint concept
    - docker inspect "$IMAGE" --format '{{.Config.Cmd}}' || true
    - echo "Image verified: $IMAGE"
  needs: [build]

# ── Deploy to dev (MR / develop branch, auto) ────────────────────────────────
deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:1.31
  environment:
    name: dev
    url: https://dev.shopos.internal
    on_stop: stop-dev
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      helm upgrade --install "$SERVICE_NAME" "helm/charts/$SERVICE_NAME" \
        --namespace "$DOMAIN" --create-namespace \
        --set image.repository="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SERVICE_NAME" \
        --set image.tag="$IMAGE_TAG" \
        --set environment=dev \
        --set replicaCount=1 \
        --wait --timeout 5m
    - kubectl rollout status deploy/"$SERVICE_NAME" -n "$DOMAIN" --timeout=120s
  needs: [build, test]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success

stop-dev:
  stage: deploy-dev
  image: bitnami/kubectl:1.31
  environment:
    name: dev
    action: stop
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - helm uninstall "$SERVICE_NAME" -n "$DOMAIN" --ignore-not-found || true
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Deploy to staging (main branch, auto) ────────────────────────────────────
deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:1.31
  environment:
    name: staging
    url: https://staging.shopos.internal
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      helm upgrade --install "$SERVICE_NAME" "helm/charts/$SERVICE_NAME" \
        --namespace "$DOMAIN" --create-namespace \
        --set image.repository="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SERVICE_NAME" \
        --set image.tag="$IMAGE_TAG" \
        --set environment=staging \
        --set replicaCount=2 \
        --wait --timeout 5m
    - kubectl rollout status deploy/"$SERVICE_NAME" -n "$DOMAIN" --timeout=120s
  needs: [build, test]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success

# ── Deploy to production (release tag, manual approval) ──────────────────────
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:1.31
  environment:
    name: production
    url: https://shopos.io
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      helm upgrade --install "$SERVICE_NAME" "helm/charts/$SERVICE_NAME" \
        --namespace "$DOMAIN" --create-namespace \
        --set image.repository="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SERVICE_NAME" \
        --set image.tag="$IMAGE_TAG" \
        --set environment=production \
        --set replicaCount=3 \
        --wait --timeout 10m
    - kubectl rollout status deploy/"$SERVICE_NAME" -n "$DOMAIN" --timeout=300s
  needs: [build, test]
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
      when: manual

# ── Post-deploy healthz check ────────────────────────────────────────────────
verify-deploy:
  stage: verify
  image: bitnami/kubectl:1.31
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      # Determine which environment was just deployed
      if [ -n "$CI_COMMIT_TAG" ]; then ENV="production"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then ENV="staging"
      else ENV="dev"
      fi
      echo "Verifying $SERVICE_NAME in $DOMAIN ($ENV)"
      kubectl rollout status deploy/"$SERVICE_NAME" -n "$DOMAIN" --timeout=120s
      kubectl get pods -n "$DOMAIN" -l app="$SERVICE_NAME"
  needs: [deploy-staging]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Notify Slack ─────────────────────────────────────────────────────────────
notify:
  stage: verify
  image: curlimages/curl:latest
  script:
    - |
      curl -sf -X POST "$SLACK_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{\"text\":\"Deployed *$SERVICE_NAME* @ $IMAGE_TAG — pipeline #$CI_PIPELINE_ID\"}" || true
  needs: [verify-deploy]
  when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
