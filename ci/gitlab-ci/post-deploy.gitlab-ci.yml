# GitLab CI — Post-Deploy Validation with GitLab Environments
#
# GitLab CI role: post-deploy smoke tests and DAST using GitLab's environment:
# keyword. Results linked to the environment in GitLab's Deployments view.
# Uses GitLab's built-in DAST template for API scanning.

include:
  - template: Security/DAST.gitlab-ci.yml   # GitLab built-in DAST

variables:
  ENVIRONMENT: staging
  RUN_LOAD_TEST: "true"
  RUN_DAST: "false"
  RUN_K8S_AUDIT: "true"
  DAST_WEBSITE: "http://api-gateway.platform.svc.cluster.local:8080"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - health
  - load-test
  - dast
  - audit
  - notify

default:
  before_script:
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

# ── Health check — all namespaces ─────────────────────────────────────────────
health-check:
  stage: health
  image: bitnami/kubectl:1.31
  environment:
    name: $ENVIRONMENT
    url: https://$ENVIRONMENT.shopos.internal
  script:
    - mkdir -p reports
    - |
      DOMAINS=(platform identity catalog commerce supply-chain financial \
               customer-experience communications content analytics-ai b2b integrations affiliate)
      FAILED=0
      for ns in "${DOMAINS[@]}"; do
        echo "=== $ns ==="
        kubectl get deployments -n "$ns" --no-headers 2>/dev/null | \
          awk '$4 == "0" {print "WARN: "$1" has 0 available replicas in '$ns'"}' || true
      done

      for ns in messaging networking istio-system vault keycloak argocd observability registry keda; do
        kubectl rollout status deploy --namespace="$ns" --timeout=30s 2>/dev/null | tail -2 || true
      done

    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 6
    - HTTP=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/healthz 2>/dev/null || echo "000")
    - echo "API Gateway /healthz → $HTTP"
    - '[ "$HTTP" = "200" ] || echo "WARN: API Gateway not healthy (HTTP $HTTP)"'
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 7d

# ── k6 smoke test ─────────────────────────────────────────────────────────────
k6-smoke:
  stage: load-test
  image: grafana/k6:latest
  environment:
    name: $ENVIRONMENT/load-test
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_LOAD_TEST" = "true" ] || exit 0'
    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 6
    - mkdir -p reports
    - |
      BASE_URL=http://localhost:18080 k6 run load-testing/k6/scripts/smoke.js \
        --out json=reports/k6-smoke-$ENVIRONMENT.json \
        --summary-trend-stats="avg,p(95),p(99)" || true
  artifacts:
    paths: [reports/]
    expire_in: 7d
  needs: [health-check]
  rules:
    - if: $RUN_LOAD_TEST == "true"

# ── ZAP DAST (GitLab built-in template) ──────────────────────────────────────
# The included DAST template provides the dast job automatically.
# We override its variables here. Only runs on staging/prod.
dast:
  variables:
    DAST_WEBSITE: "https://$ENVIRONMENT.shopos.internal"
    DAST_FULL_SCAN_ENABLED: "false"
    DAST_BROWSER_SCAN: "false"
  environment:
    name: $ENVIRONMENT/dast
  needs: [health-check]
  rules:
    - if: $RUN_DAST == "true" && ($ENVIRONMENT == "staging" || $ENVIRONMENT == "prod")
      when: on_success
    - when: never
  allow_failure: true

# ── Nuclei CVE scan (supplement to ZAP) ──────────────────────────────────────
nuclei-scan:
  stage: dast
  image: projectdiscovery/nuclei:latest
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_DAST" = "true" ] || exit 0'
    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 6
    - mkdir -p reports/dast
    - |
      nuclei \
        -target http://localhost:18080 \
        -severity critical,high \
        -json-export reports/dast/nuclei-$ENVIRONMENT.json \
        -stats || true
  artifacts:
    paths: [reports/dast/]
    expire_in: 30d
  needs: [health-check]
  allow_failure: true
  rules:
    - if: $RUN_DAST == "true"

# ── kube-bench CIS audit ──────────────────────────────────────────────────────
kube-bench:
  stage: audit
  image: aquasec/kube-bench:latest
  before_script:
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_K8S_AUDIT" = "true" ] || exit 0'
    - mkdir -p reports/k8s-audit
    - kube-bench --json > reports/k8s-audit/kube-bench-$ENVIRONMENT.json 2>/dev/null || true
    - echo "kube-bench complete for $ENVIRONMENT"
  artifacts:
    paths: [reports/k8s-audit/]
    expire_in: 30d
  needs: [health-check]
  allow_failure: true
  rules:
    - if: $RUN_K8S_AUDIT == "true"

# ── Notify ────────────────────────────────────────────────────────────────────
notify-slack:
  stage: notify
  image: curlimages/curl:latest
  script:
    - |
      STATUS="passed"
      curl -sf -X POST "$SLACK_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{\"text\":\"Post-deploy validation *$STATUS* on *$ENVIRONMENT* — pipeline #$CI_PIPELINE_ID\"}" || true
  when: always
  needs: [health-check]
