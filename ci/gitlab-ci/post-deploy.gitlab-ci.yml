# Post-Deploy Validation — GitLab CI
# Variables: ENVIRONMENT, RUN_LOAD_TEST, RUN_DAST, RUN_K8S_AUDIT

variables:
  ENVIRONMENT: staging
  RUN_LOAD_TEST: "true"
  RUN_DAST: "false"
  RUN_K8S_AUDIT: "true"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - health
  - load-test
  - dast
  - audit
  - notify

default:
  before_script:
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

health-check:
  stage: health
  image: bitnami/kubectl:latest
  script:
    - mkdir -p reports
    - |
      DOMAINS=(platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate)
      for ns in "${DOMAINS[@]}"; do
        echo "=== $ns ==="
        kubectl get deployments -n "$ns" --no-headers 2>/dev/null | while read -r name ready uptodate available age; do
          [[ "$available" == "0" ]] && echo "FAIL: $name in $ns"
        done || true
      done
    - |
      for ns in messaging networking istio-system vault keycloak argocd observability registry keda; do
        kubectl rollout status deploy --namespace="$ns" --timeout=60s 2>/dev/null | tail -2 || true
      done
    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 5
    - HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/healthz || echo "000")
    - echo "API Gateway /healthz → $HTTP_CODE"
    - '[ "$HTTP_CODE" = "200" ] || { echo "FAIL: API Gateway not healthy"; exit 1; }'
  artifacts:
    when: always
    paths: [reports/]
    expire_in: 7d

k6-smoke:
  stage: load-test
  image: grafana/k6:latest
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_LOAD_TEST" = "true" ] || exit 0'
    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 5
    - mkdir -p reports
    - BASE_URL=http://localhost:18080 k6 run load-testing/k6/scripts/smoke.js
        --out json=reports/k6-smoke-$ENVIRONMENT.json || true
  artifacts:
    paths: [reports/]
    expire_in: 7d
  needs: [health-check]
  rules:
    - if: $RUN_LOAD_TEST == "true"

zap-scan:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  before_script:
    - apt-get update -qq && apt-get install -y curl --quiet
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_DAST" = "true" ] || exit 0'
    - kubectl port-forward svc/api-gateway 18080:8080 -n platform &
    - sleep 5
    - mkdir -p reports/dast
    - zap-baseline.py -t http://localhost:18080
        -J reports/dast/zap-$ENVIRONMENT.json
        -r reports/dast/zap-$ENVIRONMENT.html -I || true
  artifacts:
    paths: [reports/dast/]
    expire_in: 7d
  needs: [health-check]
  allow_failure: true
  rules:
    - if: $RUN_DAST == "true"

kube-bench:
  stage: audit
  image: aquasec/kube-bench:latest
  before_script:
    - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - '[ "$RUN_K8S_AUDIT" = "true" ] || exit 0'
    - mkdir -p reports/k8s-audit
    - kube-bench --json > reports/k8s-audit/kube-bench-$ENVIRONMENT.json || true
  artifacts:
    paths: [reports/k8s-audit/]
    expire_in: 7d
  needs: [health-check]
  allow_failure: true
  rules:
    - if: $RUN_K8S_AUDIT == "true"

notify-slack:
  stage: notify
  image: curlimages/curl:latest
  script:
    - |
      STATUS="$CI_JOB_STATUS"
      curl -sf -X POST "$SLACK_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{\"text\":\"Post-deploy validation on *$ENVIRONMENT* — pipeline #$CI_PIPELINE_ID — $STATUS\"}" || true
  when: always
  needs: [health-check]
