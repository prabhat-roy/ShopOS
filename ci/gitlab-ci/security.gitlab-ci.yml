# GitLab CI — Security Gate (Primary Security Pipeline)
#
# GitLab CI role: full SAST/DAST/SCA/secrets pipeline using GitLab's BUILT-IN
# security templates. This is the security gate that other platforms defer to.
# Results surface in GitLab's Security Dashboard and can block MR merges.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DEFECTDOJO_URL, DEFECTDOJO_TOKEN   — vulnerability management upload
#   HARBOR_REGISTRY, HARBOR_USER, HARBOR_PASSWORD

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml

variables:
  SAST_EXCLUDED_PATHS: spec,test,tests,tmp,vendor,node_modules
  DS_EXCLUDE_PATHS: spec,test,tests
  SECURE_LOG_LEVEL: info
  DAST_WEBSITE: $DAST_TARGET_URL
  CS_IMAGE: $HARBOR_REGISTRY/shopos/api-gateway:$CI_COMMIT_SHORT_SHA
  # Enable all SAST analyzers
  SAST_EXCLUDED_ANALYZERS: ""

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - test          # GitLab SAST, secrets, dependency scanning (from templates)
  - security      # DAST, container scanning
  - report        # Upload to DefectDojo, GitLab Security Dashboard

# ── Override Semgrep SAST to scan all ShopOS language rules ─────────────────
semgrep-sast:
  variables:
    SAST_SEMGREP_METRICS: "false"
    SEMGREP_RULES: >-
      p/security-audit
      p/owasp-top-ten
      p/golang
      p/java
      p/python
      p/nodejs
      p/kotlin
      p/rust
      p/docker
      p/kubernetes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── SonarQube quality gate (supplement to GitLab SAST) ─────────────────────
sonarqube-scan:
  stage: test
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - sonar-scanner
        -Dsonar.host.url="$SONAR_HOST_URL"
        -Dsonar.login="$SONAR_TOKEN"
        -Dsonar.projectKey=shopos
        -Dsonar.sources=src
        -Dsonar.qualitygate.wait=true || true
  cache:
    key: "${CI_JOB_NAME}"
    paths: [.sonar/cache]
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── GoSec for Go services ───────────────────────────────────────────────────
gosec-scan:
  stage: test
  image: securego/gosec:latest
  script:
    - mkdir -p reports/sast
    - |
      for dir in src/platform src/identity src/catalog src/commerce src/supply-chain \
                 src/financial src/customer-experience src/content src/b2b src/integrations src/affiliate; do
        gosec -fmt sarif -out "reports/sast/gosec-$(basename $dir).sarif" \
          "./${dir}/..." 2>/dev/null || true
      done
  artifacts:
    paths: [reports/sast/]
    reports:
      sast: reports/sast/gosec-platform.sarif
    expire_in: 30d
  allow_failure: true

# ── Bandit for Python services ──────────────────────────────────────────────
bandit-scan:
  stage: test
  image: python:3.12-alpine
  script:
    - pip install bandit -q
    - mkdir -p reports/sast
    - bandit -r src/ -f json -o reports/sast/bandit.json --severity-level medium || true
  artifacts:
    paths: [reports/sast/]
    expire_in: 30d
  allow_failure: true

# ── IaC scanning (Checkov + KICS) ───────────────────────────────────────────
checkov-scan:
  stage: test
  image: bridgecrew/checkov:latest
  script:
    - mkdir -p reports/iac
    - checkov -d . --framework terraform,helm,kubernetes,dockerfile \
        --output json --output-file-path reports/iac/ --soft-fail || true
  artifacts:
    paths: [reports/iac/]
    expire_in: 30d
  allow_failure: true

# ── SBOM generation ──────────────────────────────────────────────────────────
sbom-generate:
  stage: test
  image: anchore/syft:latest
  script:
    - mkdir -p reports/sbom
    - syft dir:src -o cyclonedx-json=reports/sbom/shopos.cyclonedx.json || true
    - syft dir:src -o spdx-json=reports/sbom/shopos.spdx.json || true
  artifacts:
    paths: [reports/sbom/]
    expire_in: 90d

# ── Upload to DefectDojo vulnerability management ────────────────────────────
upload-to-defectdojo:
  stage: report
  image: python:3.12-alpine
  script:
    - pip install requests -q
    - |
      python3 << 'PYEOF'
      import requests, os, json, glob, sys

      url   = os.environ.get('DEFECTDOJO_URL', '').rstrip('/')
      token = os.environ.get('DEFECTDOJO_TOKEN', '')

      if not url or not token:
          print("DefectDojo not configured — skipping upload")
          sys.exit(0)

      reports = {
          'gl-sast-report.json':                  'GitLab SAST Report',
          'gl-secret-detection-report.json':      'GitLab Secret Detection Report',
          'gl-dependency-scanning-report.json':   'Dependency Track Finding Packaging',
          'gl-container-scanning-report.json':    'GitLab Container Scan',
      }

      for filename, scan_type in reports.items():
          if not os.path.exists(filename):
              continue
          with open(filename, 'rb') as f:
              resp = requests.post(
                  f"{url}/api/v2/import-scan/",
                  headers={"Authorization": f"Token {token}"},
                  data={
                      "scan_type": scan_type,
                      "product_name": "ShopOS",
                      "engagement_name": f"GitLab-{os.environ.get('CI_COMMIT_SHORT_SHA','unknown')}",
                      "auto_create_context": "true",
                  },
                  files={"file": (filename, f, "application/json")},
              )
          print(f"Uploaded {filename}: HTTP {resp.status_code}")
      PYEOF
  artifacts:
    reports:
      sast: gl-sast-report.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# ── Security Dashboard summary ────────────────────────────────────────────────
security-summary:
  stage: report
  image: alpine:latest
  script:
    - |
      echo "=== ShopOS Security Scan Summary ==="
      echo "Pipeline:  $CI_PIPELINE_ID"
      echo "Commit:    $CI_COMMIT_SHORT_SHA"
      echo "Branch:    $CI_COMMIT_BRANCH"
      echo "Scanners:  SAST(semgrep,gosec,bandit) | Secrets | Deps | Container | IaC | SBOM"
      echo "Results:   Available in GitLab Security Dashboard"
  rules:
    - when: always
