# GitLab CI — Tool Verification via GitLab Native image: keyword
#
# GitLab CI role: verify all runtime images and tools using GitLab's image:
# keyword — each job runs in its own container. No manual installation needed.
# GitLab runners pull images directly; this validates image availability and
# confirms tool versions across all ShopOS language families.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - runtimes
  - cli-security
  - verify

# ── Language runtimes (each job uses a dedicated image) ──────────────────────
go-runtime:
  stage: runtimes
  image: golang:1.23-bookworm
  script:
    - go version
    - go env GOOS GOARCH

java-runtime:
  stage: runtimes
  image: eclipse-temurin:21-jdk
  script:
    - java -version
    - javac -version

kotlin-runtime:
  stage: runtimes
  image: gradle:8.10-jdk21
  script:
    - gradle --version
    - kotlin -version 2>/dev/null || true

nodejs-runtime:
  stage: runtimes
  image: node:20-alpine
  script:
    - node --version
    - npm --version

python-runtime:
  stage: runtimes
  image: python:3.12-slim
  script:
    - python --version
    - pip --version

dotnet-runtime:
  stage: runtimes
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet --version
    - dotnet --info | head -5

rust-runtime:
  stage: runtimes
  image: rust:1.82-slim
  script:
    - rustc --version
    - cargo --version

scala-runtime:
  stage: runtimes
  image: sbtscala/scala-sbt:eclipse-temurin-21_1.10.2_3.5.2
  script:
    - scala -version 2>&1 || true
    - sbt --version || true

# ── CLI and security tools ───────────────────────────────────────────────────
kubectl-helm:
  stage: cli-security
  image: alpine/helm:3.16.1
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
  script:
    - helm version --short
    - kubectl version --client --short 2>/dev/null || kubectl version --client

terraform:
  stage: cli-security
  image: hashicorp/terraform:1.9.0
  script:
    - terraform version

cosign-buf:
  stage: cli-security
  image: ubuntu:24.04
  script:
    - apt-get update -qq && apt-get install -y curl -qq
    - curl -fsSL "https://github.com/sigstore/cosign/releases/download/v2.4.0/cosign-linux-amd64" \
        -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
    - curl -fsSL "https://github.com/bufbuild/buf/releases/download/v1.35.1/buf-Linux-x86_64" \
        -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf
    - cosign version
    - buf --version

trivy-scanner:
  stage: cli-security
  image: aquasec/trivy:latest
  script:
    - trivy --version | head -1

gitleaks:
  stage: cli-security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks version

semgrep:
  stage: cli-security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --version

checkov:
  stage: cli-security
  image: bridgecrew/checkov:latest
  script:
    - checkov --version

k6:
  stage: cli-security
  image: grafana/k6:latest
  script:
    - k6 version

# ── All verified summary ──────────────────────────────────────────────────────
all-verified:
  stage: verify
  image: alpine:latest
  script:
    - echo "=== GitLab CI Tool Verification Complete ==="
    - echo "All language runtimes and security tools are accessible via GitLab image: keyword"
    - echo "No manual installation required — images pulled by GitLab runner"
  needs:
    - go-runtime
    - java-runtime
    - kotlin-runtime
    - nodejs-runtime
    - python-runtime
    - dotnet-runtime
    - rust-runtime
    - kubectl-helm
    - terraform
    - cosign-buf
    - trivy-scanner
    - gitleaks
    - semgrep
    - checkov
    - k6
