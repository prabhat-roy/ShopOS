# GitLab CI — K8s Infrastructure with GitLab Terraform Integration
#
# GitLab CI role: provision Kubernetes clusters using GitLab's BUILT-IN
# Terraform state management (Settings → Infrastructure → Terraform states).
# State is stored in GitLab — no external S3/GCS bucket required.
# Uses GitLab's Terraform MR widget to show plan diffs in merge requests.

include:
  - template: Terraform/Base.latest.gitlab-ci.yml   # GitLab managed TF state + MR widget

variables:
  TF_VERSION: "1.9.0"
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"
  # GitLab managed state — TF_STATE_NAME determines which state file to use
  TF_STATE_NAME: "$ENVIRONMENT-$CLOUD"
  ENVIRONMENT: dev
  CLOUD: aws   # aws | gcp | azure

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - validate
  - build      # terraform plan (GitLab template uses "build" stage)
  - deploy     # terraform apply (GitLab template uses "deploy" stage)
  - cleanup

# ── Validate all three clouds in parallel ─────────────────────────────────────
.tf-validate: &tf-validate-template
  image: hashicorp/terraform:$TF_VERSION
  stage: validate
  script:
    - cd "$TF_ROOT_DIR"
    - terraform init
        -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
        -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
        -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
        -backend-config="username=gitlab-ci-token"
        -backend-config="password=${CI_JOB_TOKEN}"
        -backend-config="lock_method=POST"
        -backend-config="unlock_method=DELETE"
        -backend-config="retry_wait_min=5"
    - terraform validate
    - terraform fmt -check -recursive || true

validate-aws:
  <<: *tf-validate-template
  variables:
    TF_ROOT_DIR: infra/terraform/aws/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-aws"
  environment:
    name: $ENVIRONMENT/aws
  rules:
    - if: $CLOUD == "aws" || $CLOUD == "all"

validate-gcp:
  <<: *tf-validate-template
  variables:
    TF_ROOT_DIR: infra/terraform/gcp/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-gcp"
  environment:
    name: $ENVIRONMENT/gcp
  rules:
    - if: $CLOUD == "gcp" || $CLOUD == "all"

validate-azure:
  <<: *tf-validate-template
  variables:
    TF_ROOT_DIR: infra/terraform/azure/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-azure"
  environment:
    name: $ENVIRONMENT/azure
  rules:
    - if: $CLOUD == "azure" || $CLOUD == "all"

# ── Terraform Plan (shown in MR widget via GitLab integration) ────────────────
.tf-plan: &tf-plan-template
  image: hashicorp/terraform:$TF_VERSION
  stage: build
  script:
    - cd "$TF_ROOT_DIR"
    - terraform plan
        -var="environment=$ENVIRONMENT"
        -out=tfplan.binary
        -detailed-exitcode
    - terraform show -no-color tfplan.binary > "$CI_PROJECT_DIR/terraform-plan-${CLOUD}.txt"
  artifacts:
    paths:
      - "$TF_ROOT_DIR/tfplan.binary"
      - "terraform-plan-${CLOUD}.txt"
    expire_in: 1d
    reports:
      terraform: "terraform-plan-${CLOUD}.txt"   # GitLab MR Terraform widget

plan-aws:
  <<: *tf-plan-template
  needs: [validate-aws]
  variables:
    TF_ROOT_DIR: infra/terraform/aws/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-aws"
  environment:
    name: $ENVIRONMENT/aws
  rules:
    - if: $CLOUD == "aws" || $CLOUD == "all"

plan-gcp:
  <<: *tf-plan-template
  needs: [validate-gcp]
  variables:
    TF_ROOT_DIR: infra/terraform/gcp/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-gcp"
  environment:
    name: $ENVIRONMENT/gcp
  rules:
    - if: $CLOUD == "gcp" || $CLOUD == "all"

plan-azure:
  <<: *tf-plan-template
  needs: [validate-azure]
  variables:
    TF_ROOT_DIR: infra/terraform/azure/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-azure"
  environment:
    name: $ENVIRONMENT/azure
  rules:
    - if: $CLOUD == "azure" || $CLOUD == "all"

# ── Terraform Apply (manual gate for all environments) ────────────────────────
.tf-apply: &tf-apply-template
  image: hashicorp/terraform:$TF_VERSION
  stage: deploy
  when: manual
  script:
    - cd "$TF_ROOT_DIR"
    - terraform apply -auto-approve tfplan.binary
    - terraform output -json > "$CI_PROJECT_DIR/tf-outputs-${CLOUD}.json"
  artifacts:
    paths: ["tf-outputs-${CLOUD}.json"]
    expire_in: 7d

apply-aws:
  <<: *tf-apply-template
  needs: [plan-aws]
  variables:
    TF_ROOT_DIR: infra/terraform/aws/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-aws"
  environment:
    name: $ENVIRONMENT/aws
    url: https://console.aws.amazon.com/eks/home
  rules:
    - if: ($CLOUD == "aws" || $CLOUD == "all") && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: manual

apply-gcp:
  <<: *tf-apply-template
  needs: [plan-gcp]
  variables:
    TF_ROOT_DIR: infra/terraform/gcp/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-gcp"
  environment:
    name: $ENVIRONMENT/gcp
    url: https://console.cloud.google.com/kubernetes
  rules:
    - if: ($CLOUD == "gcp" || $CLOUD == "all") && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: manual

apply-azure:
  <<: *tf-apply-template
  needs: [plan-azure]
  variables:
    TF_ROOT_DIR: infra/terraform/azure/app-k8s
    TF_STATE_NAME: "${ENVIRONMENT}-azure"
  environment:
    name: $ENVIRONMENT/azure
    url: https://portal.azure.com/#view/HubsExtension/BrowseResource/resourceType/Microsoft.ContainerService%2FmanagedClusters
  rules:
    - if: ($CLOUD == "azure" || $CLOUD == "all") && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: manual

# ── Terraform Destroy (separate manual safety gate) ───────────────────────────
destroy:
  image: hashicorp/terraform:$TF_VERSION
  stage: cleanup
  when: manual
  script:
    - |
      case "$CLOUD" in
        aws)   TF_ROOT_DIR=infra/terraform/aws/app-k8s ;;
        gcp)   TF_ROOT_DIR=infra/terraform/gcp/app-k8s ;;
        azure) TF_ROOT_DIR=infra/terraform/azure/app-k8s ;;
      esac
    - cd "$TF_ROOT_DIR"
    - terraform destroy -var="environment=$ENVIRONMENT" -auto-approve
  environment:
    name: $ENVIRONMENT/$CLOUD
    action: stop
  rules:
    - if: $ACTION == "DESTROY" && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: manual
