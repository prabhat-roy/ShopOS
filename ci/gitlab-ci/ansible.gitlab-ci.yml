# Ansible Playbooks — GitLab CI
# Variables: PLAYBOOK (jenkins|k8s-node|common), INVENTORY (aws|gcp|azure)
#   LIMIT, EXTRA_VARS, CHECK_MODE

variables:
  PLAYBOOK: k8s-node
  INVENTORY: aws
  LIMIT: ""
  EXTRA_VARS: ""
  CHECK_MODE: "false"
  ANSIBLE_DIR: infra/ansible
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "False"
  ANSIBLE_STDOUT_CALLBACK: yaml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"

stages:
  - lint
  - run

default:
  image: python:3.13

ansible-lint:
  stage: lint
  script:
    - pip install ansible ansible-lint --quiet
    - ansible-lint "$ANSIBLE_DIR/playbooks/$PLAYBOOK.yml" -c "$ANSIBLE_DIR/.ansible-lint" || true
  allow_failure: true

run-playbook:
  stage: run
  before_script:
    - pip install ansible boto3 botocore google-auth msrest msrestazure --quiet
    - ansible-galaxy collection install amazon.aws google.cloud azure.azcollection community.kubernetes --quiet
    - echo "$ANSIBLE_SSH_PRIVATE_KEY" > /tmp/ansible_key
    - chmod 600 /tmp/ansible_key
  script:
    - |
      LIMIT_ARG=""
      [ -n "$LIMIT" ] && LIMIT_ARG="--limit $LIMIT"
      EXTRA_VARS_ARG=""
      [ -n "$EXTRA_VARS" ] && EXTRA_VARS_ARG="--extra-vars '$EXTRA_VARS'"
      CHECK_ARG=""
      [ "$CHECK_MODE" = "true" ] && CHECK_ARG="--check --diff"

      eval ansible-playbook \
        -i "$ANSIBLE_DIR/inventories/$INVENTORY/hosts.yml" \
        "$ANSIBLE_DIR/playbooks/$PLAYBOOK.yml" \
        --private-key /tmp/ansible_key \
        --user "$ANSIBLE_SSH_USER" \
        $LIMIT_ARG \
        $EXTRA_VARS_ARG \
        $CHECK_ARG \
        -v
  after_script:
    - rm -f /tmp/ansible_key
  needs: [ansible-lint]
