# Ansible Playbooks Pipeline — GoCD
format_version: 10

pipelines:
  shopos-ansible:
    group: shopos-infra
    label_template: "ansible-${COUNT}"
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main

    environment_variables:
      INVENTORY: production
      CHECK_MODE: "false"

    stages:
      - lint:
          jobs:
            ansible-lint:
              elastic_profile_id: ansible-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        ansible-lint "infra/ansible/playbooks/$PLAYBOOK.yml" \
                          -c infra/ansible/.ansible-lint || true

      - run:
          approval:
            type: manual
          jobs:
            playbook:
              elastic_profile_id: ansible-agent
              environment_variables:
                ANSIBLE_FORCE_COLOR: "1"
                ANSIBLE_HOST_KEY_CHECKING: "False"
                ANSIBLE_STDOUT_CALLBACK: yaml
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        echo "$ANSIBLE_SSH_PRIVATE_KEY" > /tmp/ansible_key && chmod 600 /tmp/ansible_key
                        LIMIT_ARG="" && [ -n "$LIMIT" ] && LIMIT_ARG="--limit $LIMIT"
                        EXTRA_ARGS="" && [ -n "$EXTRA_VARS" ] && EXTRA_ARGS="--extra-vars '$EXTRA_VARS'"
                        CHECK_ARG="" && [ "$CHECK_MODE" = "true" ] && CHECK_ARG="--check --diff"
                        eval ansible-playbook \
                          -i "infra/ansible/inventories/$INVENTORY/hosts.yml" \
                          "infra/ansible/playbooks/$PLAYBOOK.yml" \
                          --private-key /tmp/ansible_key \
                          --user "$ANSIBLE_SSH_USER" \
                          $LIMIT_ARG $EXTRA_ARGS $CHECK_ARG -v
                        rm -f /tmp/ansible_key
