# GoCD — Networking Infrastructure Pipeline
# Role: Progressive networking stack install: CNI → service mesh → edge routing → [manual] configure.
#       Manual gate before applying routing rules.
# Credentials: KUBECONFIG_CONTENT, SLACK_WEBHOOK
format_version: 10

pipelines:
  shopos-networking:
    group: shopos-infra
    label_template: "networking-${COUNT}"
    lock_behavior: unlockWhenFinished
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main

    stages:
      - install-cni:
          approval:
            type: success
          jobs:
            cilium:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add cilium https://helm.cilium.io --force-update
                        helm upgrade --install cilium cilium/cilium \
                          --namespace kube-system \
                          --set hubble.enabled=true \
                          --set hubble.relay.enabled=true \
                          --set hubble.ui.enabled=true \
                          --set prometheus.enabled=true \
                          --wait --timeout 8m
                        echo "Cilium CNI installed"

      - install-service-mesh:
          approval:
            type: success
          jobs:
            istio:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
                        helm upgrade --install istio-base istio/base \
                          --namespace istio-system --create-namespace \
                          --wait --timeout 3m
                        helm upgrade --install istiod istio/istiod \
                          --namespace istio-system \
                          --set telemetry.enabled=true \
                          --set pilot.traceSampling=1.0 \
                          --wait --timeout 5m
                        helm upgrade --install istio-ingress istio/gateway \
                          --namespace istio-ingress --create-namespace \
                          --wait --timeout 5m
                        echo "Istio service mesh installed"

      - install-edge-routing:
          approval:
            type: success
          jobs:
            traefik:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add traefik https://traefik.github.io/charts --force-update
                        helm upgrade --install traefik traefik/traefik \
                          --namespace networking --create-namespace \
                          --set deployment.replicas=2 \
                          --set ingressClass.enabled=true \
                          --set ingressClass.isDefaultClass=true \
                          --set metrics.prometheus.enabled=true \
                          --wait --timeout 5m
                        echo "Traefik edge router installed"
            consul:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
                        helm upgrade --install consul hashicorp/consul \
                          --namespace consul --create-namespace \
                          --set global.datacenter=shopos-dc1 \
                          --set server.replicas=3 \
                          --set connectInject.enabled=true \
                          --wait --timeout 8m || echo "WARN Consul install failed (optional)"
                        echo "Consul service discovery installed"

      - configure-routing:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            apply-middlewares:
              elastic_profile_id: kubectl-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        kubectl apply -f networking/traefik/ 2>/dev/null || true
                        kubectl apply -f networking/istio/ 2>/dev/null || true
                        kubectl apply -f kubernetes/network-policies/ 2>/dev/null || true
                        echo "Routing rules and network policies applied"
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data '{"text":":globe_with_meridians: *Networking stack installed* — Cilium, Istio, Traefik, Consul — GoCD"}' || true
