# GoCD — Docker Build Pipeline
# Role: Build all 154 ShopOS images and push to Harbor with manual approval gate before push.
#       Part of VSM chain: shopos-build → shopos-deploy-dev → ... → shopos-deploy-prod
# Environment: shopos-env
# Credentials: HARBOR_REGISTRY, HARBOR_USERNAME, HARBOR_PASSWORD, SLACK_WEBHOOK
format_version: 10

pipelines:
  shopos-build:
    group: shopos-delivery
    label_template: "${git[:8]}"
    lock_behavior: unlockWhenFinished
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main
        shallow_clone: true
        auto_update: true

    environment_variables:
      REGISTRY_PROJECT: shopos

    stages:
      - build-images:
          approval:
            type: success
          jobs:
            build-platform:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        TAG="${GO_PIPELINE_LABEL}"
                        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
                        echo "=== Building platform domain ==="
                        for dir in src/platform/*/; do
                          [ -d "$dir" ] || continue
                          SVC=$(basename "$dir")
                          docker build --label "git.commit=$TAG" --label "domain=platform" \
                            -t "$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$TAG" "$dir" \
                            && echo "OK $SVC" || echo "WARN $SVC build failed"
                        done
            build-commerce-identity:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        TAG="${GO_PIPELINE_LABEL}"
                        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
                        for DOMAIN in identity commerce; do
                          echo "=== Building $DOMAIN domain ==="
                          for dir in src/$DOMAIN/*/; do
                            [ -d "$dir" ] || continue
                            SVC=$(basename "$dir")
                            docker build --label "git.commit=$TAG" --label "domain=$DOMAIN" \
                              -t "$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$TAG" "$dir" \
                              && echo "OK $SVC" || echo "WARN $SVC build failed"
                          done
                        done
            build-remaining:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        TAG="${GO_PIPELINE_LABEL}"
                        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
                        for DOMAIN in catalog supply-chain financial customer-experience \
                                      communications content analytics-ai b2b integrations affiliate; do
                          echo "=== Building $DOMAIN domain ==="
                          for dir in src/$DOMAIN/*/; do
                            [ -d "$dir" ] || continue
                            SVC=$(basename "$dir")
                            docker build --label "git.commit=$TAG" --label "domain=$DOMAIN" \
                              -t "$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$TAG" "$dir" \
                              && echo "OK $SVC" || echo "WARN $SVC build failed"
                          done
                        done

      - trivy-scan:
          approval:
            type: success
          jobs:
            scan-critical-services:
              elastic_profile_id: security-tools
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        TAG="${GO_PIPELINE_LABEL}"
                        mkdir -p reports/trivy
                        echo "=== Trivy scan: critical path services ==="
                        CRITS=0
                        for SVC in api-gateway auth-service payment-service order-service fraud-detection-service; do
                          IMG="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$TAG"
                          trivy image --severity CRITICAL --exit-code 0 \
                            --format json --output "reports/trivy/$SVC.json" \
                            "$IMG" 2>/dev/null || true
                          COUNT=$(grep -c '"Severity":"CRITICAL"' "reports/trivy/$SVC.json" 2>/dev/null || echo "0")
                          echo "$SVC: $COUNT CRITICAL CVEs"
                          CRITS=$((CRITS + COUNT))
                        done
                        echo "Total CRITICAL CVEs: $CRITS"
              artifacts:
                - build:
                    source: reports/trivy/
                    destination: trivy-reports/

      - push-images:
          approval:
            type: manual
          jobs:
            push-and-tag:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        TAG="${GO_PIPELINE_LABEL}"
                        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
                        ALL_DOMAINS="platform identity catalog commerce supply-chain financial \
                          customer-experience communications content analytics-ai b2b integrations affiliate"
                        PUSHED=0
                        FAILED=0
                        for DOMAIN in $ALL_DOMAINS; do
                          for dir in src/$DOMAIN/*/; do
                            [ -d "$dir" ] || continue
                            SVC=$(basename "$dir")
                            IMG="$HARBOR_REGISTRY/$REGISTRY_PROJECT/$SVC:$TAG"
                            docker push "$IMG" && PUSHED=$((PUSHED+1)) || FAILED=$((FAILED+1))
                          done
                        done
                        echo "Pushed: $PUSHED  Failed: $FAILED"
                        # tag latest on successful push
                        docker tag "$HARBOR_REGISTRY/$REGISTRY_PROJECT/api-gateway:$TAG" \
                          "$HARBOR_REGISTRY/$REGISTRY_PROJECT/api-gateway:latest" 2>/dev/null || true
                        docker push "$HARBOR_REGISTRY/$REGISTRY_PROJECT/api-gateway:latest" 2>/dev/null || true
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data "{\"text\":\":whale: *GoCD build complete* — $PUSHED images pushed to Harbor @ $TAG\"}" || true
