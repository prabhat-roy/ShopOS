# GoCD — Install Tools Verification Pipeline
# Role: Verify all elastic agent profiles have required tooling.
#       Staged verification: runtimes → CLI tools → security tools.
#       Not part of delivery VSM — runs independently in shopos-platform group.
format_version: 10

pipelines:
  shopos-install-tools:
    group: shopos-platform
    label_template: "tools-${COUNT}"
    lock_behavior: unlockWhenFinished
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main
        shallow_clone: true

    stages:
      - verify-runtimes:
          approval:
            type: success
          jobs:
            golang:
              elastic_profile_id: golang-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        go version
                        echo "GOPATH=$(go env GOPATH)"
            java:
              elastic_profile_id: java-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        java -version
                        mvn --version 2>/dev/null || echo "maven not in this profile"
            kotlin:
              elastic_profile_id: java-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        gradle --version 2>/dev/null || echo "gradle not in this profile"
                        kotlin -version 2>/dev/null || echo "kotlin not in this profile"
            nodejs:
              elastic_profile_id: nodejs-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        node --version
                        npm --version
            python:
              elastic_profile_id: python-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        python --version
                        pip --version
            dotnet:
              elastic_profile_id: dotnet-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        dotnet --version
                        dotnet --list-sdks
            rust:
              elastic_profile_id: rust-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        rustc --version
                        cargo --version

      - verify-cli-tools:
          approval:
            type: success
          jobs:
            helm-kubectl:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        helm version --short
                        kubectl version --client --short 2>/dev/null || echo "kubectl: client only check"
            terraform:
              elastic_profile_id: terraform-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        terraform version
            docker:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        docker version --format '{{.Server.Version}}' 2>/dev/null || echo "docker daemon not accessible"
                        docker info --format '{{.ServerVersion}}' 2>/dev/null || true

      - verify-security-tools:
          approval:
            type: success
          jobs:
            scanner-tools:
              elastic_profile_id: security-tools
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        echo "=== Security tool versions ==="
                        trivy --version | head -1
                        grype version | head -1
                        syft --version
                        cosign version
                        semgrep --version
                        gitleaks version
                        checkov --version
                        echo "All security tools verified"
              artifacts:
                - build:
                    source: /dev/null
                    destination: tool-verify/

      - verify-harbor-access:
          approval:
            type: success
          jobs:
            harbor-login:
              elastic_profile_id: docker-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" \
                          -u "$HARBOR_USERNAME" --password-stdin
                        echo "Harbor login: PASS"
                        docker logout "$HARBOR_REGISTRY"
