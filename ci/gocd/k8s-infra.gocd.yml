# GoCD — Kubernetes Infrastructure Pipeline
# Role: Terraform plan/apply/destroy for EKS, GKE, AKS.
#       Each cloud has its own pipeline with plan → [manual] apply stages.
#       Artifact: tfplan saved between stages via GoCD artifact store.
format_version: 10

pipelines:
  shopos-k8s-infra-aws:
    group: shopos-infra
    label_template: "eks-${COUNT}"
    lock_behavior: lockOnFailure
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main
    environment_variables:
      TF_ACTION: PLAN
      AWS_DEFAULT_REGION: us-east-1

    stages:
      - terraform-plan:
          approval:
            type: success
          jobs:
            plan:
              elastic_profile_id: terraform-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        cd infra/terraform/aws/app-k8s
                        terraform init \
                          -backend-config="bucket=shopos-tfstate" \
                          -backend-config="key=infra/terraform/aws/app-k8s/terraform.tfstate" \
                          -backend-config="region=$AWS_DEFAULT_REGION" \
                          -reconfigure
                        terraform plan -out=tfplan
              artifacts:
                - build:
                    source: infra/terraform/aws/app-k8s/tfplan
                    destination: tfplan/

      - terraform-apply:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            apply:
              elastic_profile_id: terraform-agent
              tasks:
                - fetch:
                    pipeline: shopos-k8s-infra-aws
                    stage: terraform-plan
                    job: plan
                    source: tfplan/
                    destination: infra/terraform/aws/app-k8s/
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        [ "$TF_ACTION" = "APPLY" ] || { echo "Skipped — set TF_ACTION=APPLY to proceed"; exit 0; }
                        cd infra/terraform/aws/app-k8s
                        terraform apply -auto-approve tfplan/tfplan
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data '{"text":":white_check_mark: *EKS Terraform apply complete* — GoCD"}' || true

      - terraform-destroy:
          approval:
            type: manual
          jobs:
            destroy:
              elastic_profile_id: terraform-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        [ "$TF_ACTION" = "DESTROY" ] || { echo "Skipped — set TF_ACTION=DESTROY"; exit 0; }
                        cd infra/terraform/aws/app-k8s
                        terraform destroy -auto-approve

  shopos-k8s-infra-gcp:
    group: shopos-infra
    label_template: "gke-${COUNT}"
    lock_behavior: lockOnFailure
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main
    environment_variables:
      TF_ACTION: PLAN

    stages:
      - terraform-plan:
          approval:
            type: success
          jobs:
            plan:
              elastic_profile_id: terraform-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
                        cd infra/opentofu/gcp/app-k8s
                        terraform init \
                          -backend-config="bucket=shopos-tfstate-gcp" \
                          -backend-config="prefix=infra/opentofu/gcp/app-k8s" \
                          -reconfigure
                        terraform plan -out=tfplan
                        rm -f /tmp/gcp-key.json
              artifacts:
                - build:
                    source: infra/opentofu/gcp/app-k8s/tfplan
                    destination: tfplan/

      - terraform-apply:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            apply:
              elastic_profile_id: terraform-agent
              tasks:
                - fetch:
                    pipeline: shopos-k8s-infra-gcp
                    stage: terraform-plan
                    job: plan
                    source: tfplan/
                    destination: infra/opentofu/gcp/app-k8s/
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        [ "$TF_ACTION" = "APPLY" ] || { echo "Skipped"; exit 0; }
                        echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
                        cd infra/opentofu/gcp/app-k8s
                        terraform apply -auto-approve tfplan/tfplan
                        rm -f /tmp/gcp-key.json
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data '{"text":":white_check_mark: *GKE Terraform apply complete* — GoCD"}' || true

  shopos-k8s-infra-azure:
    group: shopos-infra
    label_template: "aks-${COUNT}"
    lock_behavior: lockOnFailure
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main
    environment_variables:
      TF_ACTION: PLAN

    stages:
      - terraform-plan:
          approval:
            type: success
          jobs:
            plan:
              elastic_profile_id: terraform-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        cd infra/opentofu/azure/app-k8s
                        terraform init \
                          -backend-config="resource_group_name=shopos-tfstate-rg" \
                          -backend-config="storage_account_name=shoposterraform" \
                          -backend-config="container_name=tfstate" \
                          -backend-config="key=infra/opentofu/azure/app-k8s/terraform.tfstate" \
                          -reconfigure
                        terraform plan -out=tfplan
              artifacts:
                - build:
                    source: infra/opentofu/azure/app-k8s/tfplan
                    destination: tfplan/

      - terraform-apply:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            apply:
              elastic_profile_id: terraform-agent
              tasks:
                - fetch:
                    pipeline: shopos-k8s-infra-azure
                    stage: terraform-plan
                    job: plan
                    source: tfplan/
                    destination: infra/opentofu/azure/app-k8s/
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        [ "$TF_ACTION" = "APPLY" ] || { echo "Skipped"; exit 0; }
                        cd infra/opentofu/azure/app-k8s
                        terraform apply -auto-approve tfplan/tfplan
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data '{"text":":white_check_mark: *AKS Terraform apply complete* — GoCD"}' || true
