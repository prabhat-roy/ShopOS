# GoCD — Observability Stack Pipeline
# Role: Progressive install of the full observability stack with manual gate before dashboards.
#       metrics → [manual] dashboards+logs → tracing → configure
# Credentials: KUBECONFIG_CONTENT, GRAFANA_ADMIN_PASSWORD, MINIO_SECRET_KEY, SLACK_WEBHOOK
format_version: 10

pipelines:
  shopos-observability:
    group: shopos-infra
    label_template: "observability-${COUNT}"
    lock_behavior: unlockWhenFinished
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main

    stages:
      - install-metrics:
          approval:
            type: success
          jobs:
            prometheus-stack:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
                        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
                          --namespace observability --create-namespace \
                          --set prometheus.prometheusSpec.retention=30d \
                          --set prometheus.prometheusSpec.replicas=2 \
                          --set alertmanager.alertmanagerSpec.replicas=2 \
                          --set grafana.enabled=false \
                          --wait --timeout 10m
                        echo "Prometheus stack installed"

      - install-dashboards-logs:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            grafana:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add grafana https://grafana.github.io/helm-charts --force-update
                        helm upgrade --install grafana grafana/grafana \
                          --namespace observability \
                          --set adminPassword="$GRAFANA_ADMIN_PASSWORD" \
                          --set persistence.enabled=true --set replicas=2 \
                          --wait --timeout 5m
                        kubectl apply -f observability/grafana/ 2>/dev/null || true
                        echo "Grafana installed"
            loki:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add grafana https://grafana.github.io/helm-charts --force-update
                        helm upgrade --install loki grafana/loki \
                          --namespace observability \
                          --set loki.storage.type=s3 \
                          --set loki.storage.s3.endpoint="http://minio.registry.svc:9000" \
                          --set loki.storage.s3.bucketnames=loki-chunks \
                          --set loki.storage.s3.secretAccessKey="$MINIO_SECRET_KEY" \
                          --set loki.storage.s3.s3ForcePathStyle=true \
                          --set deploymentMode=SimpleScalable \
                          --wait --timeout 8m
                        helm upgrade --install promtail grafana/promtail \
                          --namespace observability \
                          --set config.lokiAddress=http://loki.observability.svc:3100/loki/api/v1/push \
                          --wait --timeout 5m || true
                        echo "Loki + Promtail installed"

      - install-tracing:
          approval:
            type: success
          jobs:
            jaeger:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
                        helm upgrade --install jaeger jaegertracing/jaeger \
                          --namespace observability \
                          --set provisionDataStore.cassandra=false \
                          --set allInOne.enabled=false \
                          --set collector.replicaCount=2 \
                          --set query.replicaCount=2 \
                          --wait --timeout 8m
                        echo "Jaeger installed"
            otel-collector:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
                        helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
                          --namespace observability \
                          --set mode=daemonset \
                          --set config.exporters.otlp.endpoint=jaeger-collector.observability.svc:4317 \
                          --wait --timeout 5m
                        echo "OTel Collector installed"

      - configure-and-verify:
          approval:
            type: success
          jobs:
            health-check:
              elastic_profile_id: curl-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        PASS=0
                        FAIL=0
                        check() {
                          local name=$1 url=$2
                          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
                          [ "$CODE" = "200" ] && { echo "PASS $name"; PASS=$((PASS+1)); } \
                            || { echo "WARN $name ($CODE)"; }
                        }
                        check "Prometheus" "http://kube-prometheus-stack-prometheus.observability.svc:9090/-/ready"
                        check "Grafana"    "http://grafana.observability.svc:3000/api/health"
                        check "Loki"       "http://loki.observability.svc:3100/ready"
                        check "Jaeger"     "http://jaeger-query.observability.svc:16686/"
                        echo "Observability: $PASS endpoints healthy"
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data "{\"text\":\":chart_with_upwards_trend: *Observability stack ready* — Prometheus, Grafana, Loki, Jaeger — GoCD\"}" || true
