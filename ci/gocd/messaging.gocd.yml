# GoCD — Messaging Infrastructure Pipeline
# Role: Install Kafka, RabbitMQ, NATS with manual gate before topic creation.
#       Part of shopos-infra group. Not in delivery VSM.
# Credentials: KUBECONFIG_CONTENT, RABBITMQ_PASSWORD, SLACK_WEBHOOK
format_version: 10

pipelines:
  shopos-messaging:
    group: shopos-infra
    label_template: "messaging-${COUNT}"
    lock_behavior: unlockWhenFinished
    materials:
      git:
        git: https://github.com/prabhat-roy/ShopOS.git
        branch: main

    stages:
      - install-coordination:
          approval:
            type: success
          jobs:
            kafka-kraft:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                        helm upgrade --install kafka bitnami/kafka \
                          --namespace messaging --create-namespace \
                          --set replicaCount=3 \
                          --set kraft.enabled=true \
                          --set defaultReplicationFactor=3 \
                          --set autoCreateTopicsEnable=false \
                          --wait --timeout 10m
                        echo "Kafka (KRaft) installed"

      - install-brokers:
          approval:
            type: success
          jobs:
            rabbitmq:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                        helm upgrade --install rabbitmq bitnami/rabbitmq \
                          --namespace messaging \
                          --set replicaCount=3 \
                          --set auth.password="$RABBITMQ_PASSWORD" \
                          --set clustering.enabled=true \
                          --wait --timeout 8m
                        echo "RabbitMQ installed"
            nats:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
                        helm upgrade --install nats nats/nats \
                          --namespace messaging \
                          --set config.jetstream.enabled=true \
                          --set cluster.enabled=true --set cluster.replicas=3 \
                          --wait --timeout 5m
                        echo "NATS JetStream installed"

      - install-tooling:
          approval:
            type: success
          jobs:
            kafka-ui-schema-registry:
              elastic_profile_id: helm-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        helm repo add kafka-ui https://provectus.github.io/kafka-ui-charts \
                          bitnami https://charts.bitnami.com/bitnami --force-update
                        helm upgrade --install kafka-ui kafka-ui/kafka-ui \
                          --namespace messaging \
                          --set envs.config.KAFKA_CLUSTERS_0_NAME=shopos \
                          --set envs.config.KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka.messaging.svc.cluster.local:9092 \
                          --wait --timeout 5m || true
                        helm upgrade --install schema-registry bitnami/schema-registry \
                          --namespace messaging \
                          --set kafka.bootstrapServers=kafka.messaging.svc.cluster.local:9092 \
                          --wait --timeout 5m || true
                        echo "Kafka UI and Schema Registry installed"

      - create-topics:
          approval:
            type: manual
          allow_only_on_success: true
          jobs:
            kafka-topics:
              elastic_profile_id: kubectl-agent
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                        KAFKA_BS="kafka.messaging.svc.cluster.local:9092"
                        for TOPIC in \
                          identity.user.registered identity.user.deleted \
                          commerce.order.placed commerce.order.cancelled commerce.order.fulfilled \
                          commerce.payment.processed commerce.payment.failed commerce.cart.abandoned \
                          supplychain.shipment.created supplychain.shipment.updated \
                          supplychain.inventory.low supplychain.inventory.restocked \
                          notification.email.requested notification.sms.requested notification.push.requested \
                          analytics.page.viewed analytics.product.clicked analytics.search.performed \
                          security.fraud.detected security.login.failed; do
                          kubectl exec -n messaging \
                            $(kubectl get pods -n messaging -l app.kubernetes.io/name=kafka \
                              -o jsonpath='{.items[0].metadata.name}') -- \
                            kafka-topics.sh --create --if-not-exists \
                            --bootstrap-server "$KAFKA_BS" \
                            --topic "$TOPIC" \
                            --partitions 12 --replication-factor 3 2>/dev/null || true
                          echo "Topic: $TOPIC"
                        done
                        echo "All 20 Kafka topics created"
                        curl -sf -X POST "$SLACK_WEBHOOK" \
                          -H 'Content-type: application/json' \
                          --data '{"text":":satellite: *Messaging infrastructure ready* — Kafka + RabbitMQ + NATS + 20 topics — GoCD"}' || true
