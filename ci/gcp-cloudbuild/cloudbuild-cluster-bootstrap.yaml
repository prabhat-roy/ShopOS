# GCP Cloud Build — Full GKE cluster bootstrap sequence
# All 6 infra phases; kubeconfig via gcloud container get-credentials
# Secrets from GCP Secret Manager; storage via GCS

substitutions:
  _ENVIRONMENT: dev
  _CLUSTER_NAME: shopos-dev
  _REGION: us-central1
  _PHASE: ALL
  _GCS_TF_STATE_BUCKET: shopos-tfstate-round-cable-405107
  _GCS_BUCKET_LOGS: shopos-loki-logs
  _GCS_BUCKET_TRACES: shopos-tempo-traces
  _GCS_VELERO_BUCKET: shopos-velero-backups
  _SKIP_NETWORKING: "false"
  _SKIP_SECURITY: "false"
  _SKIP_OBSERVABILITY: "false"
  _SKIP_MESSAGING: "false"
  _SKIP_REGISTRY: "false"
  _SKIP_GITOPS: "false"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  timeout: 7200s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/shopos-keycloak-admin-password/versions/latest
      env: KEYCLOAK_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/shopos-grafana-admin-password/versions/latest
      env: GRAFANA_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/shopos-rabbitmq-password/versions/latest
      env: RABBITMQ_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/shopos-harbor-admin-password/versions/latest
      env: HARBOR_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/shopos-argocd-admin-password-hash/versions/latest
      env: ARGOCD_ADMIN_PASSWORD_HASH
    - versionName: projects/$PROJECT_ID/secrets/shopos-minio-root-user/versions/latest
      env: MINIO_ROOT_USER
    - versionName: projects/$PROJECT_ID/secrets/shopos-minio-root-password/versions/latest
      env: MINIO_ROOT_PASSWORD

steps:
  - name: gcr.io/cloud-builders/gcloud
    id: get-credentials
    args:
      - container
      - clusters
      - get-credentials
      - ${_CLUSTER_NAME}
      - --region=${_REGION}
      - --project=${PROJECT_ID}

  - name: gcr.io/cloud-builders/kubectl
    id: verify-cluster
    args: [get, nodes, -o, wide]
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [get-credentials]

  # Phase 1: Networking
  - name: alpine/helm:3.16.0
    id: phase-networking
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "networking" ]) && [ "${_SKIP_NETWORKING}" != "true" ] || exit 0
        echo "=== Phase 1/6: Networking ==="

        helm repo add jetstack https://charts.jetstack.io --force-update
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set installCRDs=true --set replicaCount=2 \
          --wait --timeout 5m

        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
        helm upgrade --install istio-base istio/base \
          --namespace istio-system --create-namespace --wait --timeout 3m
        helm upgrade --install istiod istio/istiod \
          --namespace istio-system --set telemetry.enabled=true --wait --timeout 5m
        helm upgrade --install istio-ingressgateway istio/gateway \
          --namespace istio-system \
          --set service.annotations."cloud\.google\.com/load-balancer-type"=Internal \
          --wait --timeout 3m

        helm repo add traefik https://traefik.github.io/charts --force-update
        helm upgrade --install traefik traefik/traefik \
          --namespace networking --create-namespace \
          --set deployment.replicas=2 \
          --set ports.websecure.tls.enabled=true \
          --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
          --wait --timeout 5m

        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        helm upgrade --install consul hashicorp/consul \
          --namespace consul --create-namespace \
          --set server.replicas=3 --set server.bootstrapExpect=3 \
          --set connectInject.enabled=true --wait --timeout 8m

        echo "Phase 1 Networking — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [verify-cluster]

  # Phase 2: Security
  - name: alpine/helm:3.16.0
    id: phase-security
    secretEnv: [KEYCLOAK_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "security" ]) && [ "${_SKIP_SECURITY}" != "true" ] || exit 0
        echo "=== Phase 2/6: Security ==="

        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        # Vault with GCP KMS auto-unseal
        helm upgrade --install vault hashicorp/vault \
          --namespace vault --create-namespace \
          --set server.ha.enabled=true --set server.ha.raft.enabled=true \
          --set server.ha.replicas=3 --set ui.enabled=true \
          --set "server.extraEnvironmentVars.VAULT_SEAL_TYPE=gcpckms" \
          --set "server.extraEnvironmentVars.VAULT_GCPCKMS_SEAL_KEY_RING=shopos-vault" \
          --set "server.extraEnvironmentVars.VAULT_GCPCKMS_SEAL_CRYPTO_KEY=vault-unseal" \
          --set "server.extraEnvironmentVars.VAULT_GCPCKMS_SEAL_PROJECT=${PROJECT_ID}" \
          --set "server.extraEnvironmentVars.VAULT_GCPCKMS_SEAL_REGION=${_REGION}" \
          --wait --timeout 10m

        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm upgrade --install keycloak bitnami/keycloak \
          --namespace keycloak --create-namespace \
          --set replicaCount=2 \
          --set auth.adminPassword="$$KEYCLOAK_ADMIN_PASSWORD" \
          --set postgresql.enabled=true \
          --set postgresql.primary.persistence.storageClass=standard-rwo \
          --wait --timeout 10m

        helm repo add kyverno https://kyverno.github.io/kyverno --force-update
        helm upgrade --install kyverno kyverno/kyverno \
          --namespace kyverno --create-namespace \
          --set replicaCount=2 --wait --timeout 5m

        helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
        helm upgrade --install falco falcosecurity/falco \
          --namespace falco --create-namespace \
          --set driver.kind=ebpf --set falcosidekick.enabled=true \
          --wait --timeout 8m

        echo "Phase 2 Security — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-networking]

  # Phase 3: Observability
  - name: alpine/helm:3.16.0
    id: phase-observability
    secretEnv: [GRAFANA_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "observability" ]) && [ "${_SKIP_OBSERVABILITY}" != "true" ] || exit 0
        echo "=== Phase 3/6: Observability ==="

        # Ensure GCS buckets
        gcloud storage buckets create gs://${_GCS_BUCKET_LOGS} \
          --project=${PROJECT_ID} --location=${_REGION} 2>/dev/null || true
        gcloud storage buckets create gs://${_GCS_BUCKET_TRACES} \
          --project=${PROJECT_ID} --location=${_REGION} 2>/dev/null || true

        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
          --namespace observability --create-namespace \
          --set prometheus.prometheusSpec.retention=30d \
          --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName=standard-rwo \
          --set grafana.enabled=false \
          --wait --timeout 10m

        helm repo add grafana https://grafana.github.io/helm-charts --force-update
        helm upgrade --install grafana grafana/grafana \
          --namespace observability \
          --set adminPassword="$$GRAFANA_ADMIN_PASSWORD" \
          --set persistence.enabled=true \
          --set persistence.storageClassName=standard-rwo \
          --wait --timeout 5m

        # Loki backed by GCS
        helm upgrade --install loki grafana/loki \
          --namespace observability \
          --set loki.auth_enabled=false \
          --set loki.storage.type=gcs \
          --set loki.storage.gcs.bucket_name=${_GCS_BUCKET_LOGS} \
          --wait --timeout 8m

        echo "Phase 3 Observability — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-security]

  # Phase 4: Messaging
  - name: alpine/helm:3.16.0
    id: phase-messaging
    secretEnv: [RABBITMQ_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "messaging" ]) && [ "${_SKIP_MESSAGING}" != "true" ] || exit 0
        echo "=== Phase 4/6: Messaging ==="

        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm upgrade --install zookeeper bitnami/zookeeper \
          --namespace messaging --create-namespace \
          --set replicaCount=3 \
          --set persistence.storageClass=standard-rwo \
          --wait --timeout 8m

        helm upgrade --install kafka bitnami/kafka \
          --namespace messaging \
          --set replicaCount=3 \
          --set zookeeper.enabled=false \
          --set externalZookeeper.servers=zookeeper.messaging.svc:2181 \
          --set autoCreateTopicsEnable=false \
          --set defaultReplicationFactor=3 \
          --set persistence.storageClass=standard-rwo \
          --wait --timeout 10m

        helm upgrade --install rabbitmq bitnami/rabbitmq \
          --namespace messaging \
          --set replicaCount=3 \
          --set auth.password="$$RABBITMQ_PASSWORD" \
          --set clustering.enabled=true \
          --set persistence.storageClass=standard-rwo \
          --wait --timeout 8m

        helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
        helm upgrade --install nats nats/nats \
          --namespace messaging \
          --set nats.jetstream.enabled=true \
          --set cluster.enabled=true --set cluster.replicas=3 \
          --set nats.jetstream.fileStorage.storageClassName=standard-rwo \
          --wait --timeout 5m

        echo "Phase 4 Messaging — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-observability]

  # Phase 5: Registry
  - name: alpine/helm:3.16.0
    id: phase-registry
    secretEnv: [HARBOR_ADMIN_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "registry" ]) && [ "${_SKIP_REGISTRY}" != "true" ] || exit 0
        echo "=== Phase 5/6: Registry ==="

        # Ensure Artifact Registry repo
        gcloud artifacts repositories describe shopos \
          --repository-format=docker \
          --location=${_REGION} \
          --project=${PROJECT_ID} 2>/dev/null || \
          gcloud artifacts repositories create shopos \
            --repository-format=docker \
            --location=${_REGION} \
            --project=${PROJECT_ID}

        helm repo add harbor https://helm.goharbor.io --force-update
        helm upgrade --install harbor harbor/harbor \
          --namespace registry --create-namespace \
          --set harborAdminPassword="$$HARBOR_ADMIN_PASSWORD" \
          --set trivy.enabled=true \
          --set persistence.enabled=true \
          --set persistence.persistentVolumeClaim.registry.storageClass=standard-rwo \
          --wait --timeout 10m

        helm repo add minio https://charts.min.io --force-update
        helm upgrade --install minio minio/minio \
          --namespace registry \
          --set rootUser="$$MINIO_ROOT_USER" \
          --set rootPassword="$$MINIO_ROOT_PASSWORD" \
          --set replicas=4 --set persistence.enabled=true \
          --set persistence.size=100Gi \
          --set persistence.storageClass=standard-rwo \
          --wait --timeout 8m

        echo "Phase 5 Registry — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-messaging]

  # Phase 6: GitOps
  - name: alpine/helm:3.16.0
    id: phase-gitops
    secretEnv: [ARGOCD_ADMIN_PASSWORD_HASH]
    entrypoint: bash
    args:
      - -c
      - |
        ([ "${_PHASE}" = "ALL" ] || [ "${_PHASE}" = "gitops" ]) && [ "${_SKIP_GITOPS}" != "true" ] || exit 0
        echo "=== Phase 6/6: GitOps ==="

        gcloud storage buckets create gs://${_GCS_VELERO_BUCKET} \
          --project=${PROJECT_ID} --location=${_REGION} 2>/dev/null || true

        helm repo add argo https://argoproj.github.io/argo-helm --force-update
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --set server.replicas=2 \
          --set redis-ha.enabled=true \
          --set configs.secret.argocdServerAdminPassword="$$ARGOCD_ADMIN_PASSWORD_HASH" \
          --wait --timeout 10m

        helm repo add kedacore https://kedacore.github.io/charts --force-update
        helm upgrade --install keda kedacore/keda \
          --namespace keda --create-namespace \
          --wait --timeout 5m

        # Velero with GCS
        helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
        helm upgrade --install velero vmware-tanzu/velero \
          --namespace velero --create-namespace \
          --set configuration.backupStorageLocation[0].provider=gcp \
          --set configuration.backupStorageLocation[0].bucket=${_GCS_VELERO_BUCKET} \
          --set configuration.volumeSnapshotLocation[0].provider=gcp \
          --set configuration.volumeSnapshotLocation[0].config.project=${PROJECT_ID} \
          --set initContainers[0].name=velero-plugin-for-gcp \
          --set initContainers[0].image=velero/velero-plugin-for-gcp:v1.10.0 \
          --set initContainers[0].volumeMounts[0].mountPath=/target \
          --set initContainers[0].volumeMounts[0].name=plugins \
          --wait --timeout 5m

        # Bootstrap ArgoCD App-of-Apps
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s
        kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true

        echo "Phase 6 GitOps — DONE"
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-registry]

  - name: gcr.io/cloud-builders/kubectl
    id: final-status
    entrypoint: bash
    args:
      - -c
      - |
        echo "=== Cluster Bootstrap Complete — ${_ENVIRONMENT} ==="
        kubectl get nodes
        kubectl get namespaces
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [phase-gitops]
