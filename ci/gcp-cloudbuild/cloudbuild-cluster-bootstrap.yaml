# Cluster Bootstrap — GCP Cloud Build
# Mirrors .github/workflows/cluster-bootstrap.yml
# Orchestrates all 6 infrastructure phases sequentially.
# Substitutions: _ENVIRONMENT, _SKIP_NETWORKING, _SKIP_SECURITY,
#   _SKIP_OBSERVABILITY, _SKIP_MESSAGING, _SKIP_REGISTRY, _SKIP_GITOPS

substitutions:
  _ENVIRONMENT: dev
  _SKIP_NETWORKING: "false"
  _SKIP_SECURITY: "false"
  _SKIP_OBSERVABILITY: "false"
  _SKIP_MESSAGING: "false"
  _SKIP_REGISTRY: "false"
  _SKIP_GITOPS: "false"
  _GCP_REGION: us-central1
  _GCS_VELERO_BUCKET: shopos-velero-backups

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/kubeconfig-content/versions/latest
      env: KUBECONFIG_CONTENT
    - versionName: projects/$PROJECT_ID/secrets/keycloak-admin-password/versions/latest
      env: KEYCLOAK_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/grafana-admin-password/versions/latest
      env: GRAFANA_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/rabbitmq-password/versions/latest
      env: RABBITMQ_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/harbor-admin-password/versions/latest
      env: HARBOR_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/minio-root-user/versions/latest
      env: MINIO_ROOT_USER
    - versionName: projects/$PROJECT_ID/secrets/minio-root-password/versions/latest
      env: MINIO_ROOT_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/argocd-admin-password-hash/versions/latest
      env: ARGOCD_ADMIN_PASSWORD_HASH
    - versionName: projects/$PROJECT_ID/secrets/slack-webhook/versions/latest
      env: SLACK_WEBHOOK

steps:
  # ── Phase 1: Networking ────────────────────────────────────────────────────
  - name: alpine/helm
    id: phase1-networking
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_NETWORKING" = "true" ] && echo "Skipping networking" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 1/6: Networking ==="

        helm repo add cilium https://helm.cilium.io --force-update
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --set kubeProxyReplacement=true \
          --set hubble.relay.enabled=true --set hubble.ui.enabled=true \
          --wait --timeout 8m || true

        helm repo add jetstack https://charts.jetstack.io --force-update
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set installCRDs=true --set replicaCount=2 --wait --timeout 5m

        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
        helm upgrade --install istio-base istio/base \
          --namespace istio-system --create-namespace --wait --timeout 3m
        helm upgrade --install istiod istio/istiod \
          --namespace istio-system --set telemetry.enabled=true --wait --timeout 5m
        helm upgrade --install istio-ingressgateway istio/gateway \
          --namespace istio-system --wait --timeout 3m

        helm repo add traefik https://traefik.github.io/charts --force-update
        helm upgrade --install traefik traefik/traefik \
          --namespace networking --create-namespace \
          --set deployment.replicas=2 \
          --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
          --wait --timeout 5m

        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        helm upgrade --install consul hashicorp/consul \
          --namespace consul --create-namespace \
          --set server.replicas=3 --set server.bootstrapExpect=3 \
          --set connectInject.enabled=true --wait --timeout 8m

        echo "Phase 1 Networking — DONE"

  # ── Phase 2: Security ──────────────────────────────────────────────────────
  - name: alpine/helm
    id: phase2-security
    secretEnv: [KUBECONFIG_CONTENT, KEYCLOAK_ADMIN_PASSWORD, SLACK_WEBHOOK]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_SECURITY" = "true" ] && echo "Skipping security" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 2/6: Security ==="

        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        helm upgrade --install vault hashicorp/vault \
          --namespace vault --create-namespace \
          --set server.ha.enabled=true --set server.ha.raft.enabled=true \
          --set server.ha.replicas=3 --set ui.enabled=true \
          --wait --timeout 10m

        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm upgrade --install keycloak bitnami/keycloak \
          --namespace keycloak --create-namespace \
          --set replicaCount=2 \
          --set auth.adminPassword="$$KEYCLOAK_ADMIN_PASSWORD" \
          --set postgresql.enabled=true --wait --timeout 10m

        helm repo add kyverno https://kyverno.github.io/kyverno --force-update
        helm upgrade --install kyverno kyverno/kyverno \
          --namespace kyverno --create-namespace \
          --set replicaCount=2 --wait --timeout 5m

        helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
        helm upgrade --install falco falcosecurity/falco \
          --namespace falco --create-namespace \
          --set driver.kind=ebpf \
          --set falcosidekick.enabled=true \
          --set falcosidekick.config.slack.webhookurl="$$SLACK_WEBHOOK" \
          --wait --timeout 8m

        helm repo add aqua https://aquasecurity.github.io/helm-charts --force-update
        helm upgrade --install trivy-operator aqua/trivy-operator \
          --namespace trivy-system --create-namespace \
          --set trivy.ignoreUnfixed=true --wait --timeout 5m

        echo "Phase 2 Security — DONE"
    waitFor: [phase1-networking]

  # ── Phase 3: Observability ────────────────────────────────────────────────
  - name: alpine/helm
    id: phase3-observability
    secretEnv: [KUBECONFIG_CONTENT, GRAFANA_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_OBSERVABILITY" = "true" ] && echo "Skipping observability" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 3/6: Observability ==="

        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
          --namespace observability --create-namespace \
          --set prometheus.prometheusSpec.retention=30d \
          --set grafana.enabled=false --wait --timeout 10m

        helm repo add grafana https://grafana.github.io/helm-charts --force-update
        helm upgrade --install grafana grafana/grafana \
          --namespace observability \
          --set adminPassword="$$GRAFANA_ADMIN_PASSWORD" \
          --set persistence.enabled=true --wait --timeout 5m

        helm upgrade --install loki grafana/loki \
          --namespace observability \
          --set loki.auth_enabled=false \
          --set loki.storage.type=gcs \
          --set loki.storage.gcs.bucketname=shopos-loki-chunks-$_ENVIRONMENT \
          --wait --timeout 8m

        helm repo add fluent https://fluent.github.io/helm-charts --force-update
        helm upgrade --install fluent-bit fluent/fluent-bit \
          --namespace observability --wait --timeout 5m

        helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
        helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
          --namespace observability \
          --set mode=deployment --set replicaCount=2 \
          -f observability/otel-collector/values.yaml \
          --wait --timeout 5m

        echo "Phase 3 Observability — DONE"
    waitFor: [phase2-security]

  # ── Phase 4: Messaging ────────────────────────────────────────────────────
  - name: alpine/helm
    id: phase4-messaging
    secretEnv: [KUBECONFIG_CONTENT, RABBITMQ_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_MESSAGING" = "true" ] && echo "Skipping messaging" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 4/6: Messaging ==="

        helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
        helm upgrade --install zookeeper bitnami/zookeeper \
          --namespace messaging --create-namespace \
          --set replicaCount=3 --wait --timeout 8m

        helm upgrade --install kafka bitnami/kafka \
          --namespace messaging \
          --set replicaCount=3 \
          --set zookeeper.enabled=false \
          --set externalZookeeper.servers=zookeeper.messaging.svc:2181 \
          --set autoCreateTopicsEnable=false \
          --set defaultReplicationFactor=3 \
          --wait --timeout 10m

        helm upgrade --install rabbitmq bitnami/rabbitmq \
          --namespace messaging \
          --set replicaCount=3 \
          --set auth.password="$$RABBITMQ_PASSWORD" \
          --set clustering.enabled=true --wait --timeout 8m

        helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
        helm upgrade --install nats nats/nats \
          --namespace messaging \
          --set nats.jetstream.enabled=true \
          --set cluster.enabled=true --set cluster.replicas=3 \
          --wait --timeout 5m

        echo "Phase 4 Messaging — DONE"
    waitFor: [phase3-observability]

  # ── Phase 5: Registry ─────────────────────────────────────────────────────
  - name: alpine/helm
    id: phase5-registry
    secretEnv: [KUBECONFIG_CONTENT, HARBOR_ADMIN_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_REGISTRY" = "true" ] && echo "Skipping registry" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 5/6: Registry ==="

        helm repo add harbor https://helm.goharbor.io --force-update
        helm upgrade --install harbor harbor/harbor \
          --namespace registry --create-namespace \
          --set harborAdminPassword="$$HARBOR_ADMIN_PASSWORD" \
          --set trivy.enabled=true --set persistence.enabled=true \
          --wait --timeout 10m

        helm repo add minio https://charts.min.io --force-update
        helm upgrade --install minio minio/minio \
          --namespace registry \
          --set rootUser="$$MINIO_ROOT_USER" \
          --set rootPassword="$$MINIO_ROOT_PASSWORD" \
          --set replicas=4 --set persistence.enabled=true \
          --set persistence.size=100Gi --wait --timeout 8m

        echo "Phase 5 Registry — DONE"
    waitFor: [phase2-security]

  # ── Phase 6: GitOps ───────────────────────────────────────────────────────
  - name: alpine/helm
    id: phase6-gitops
    secretEnv: [KUBECONFIG_CONTENT, ARGOCD_ADMIN_PASSWORD_HASH]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_SKIP_GITOPS" = "true" ] && echo "Skipping gitops" && exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== Phase 6/6: GitOps ==="

        helm repo add argo https://argoproj.github.io/argo-helm --force-update
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --set server.replicas=2 \
          --set redis-ha.enabled=true \
          --set configs.secret.argocdServerAdminPassword="$$ARGOCD_ADMIN_PASSWORD_HASH" \
          --wait --timeout 10m

        helm repo add kedacore https://kedacore.github.io/charts --force-update
        helm upgrade --install keda kedacore/keda \
          --namespace keda --create-namespace --wait --timeout 5m

        helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts --force-update
        helm upgrade --install velero vmware-tanzu/velero \
          --namespace velero --create-namespace \
          --set configuration.backupStorageLocation[0].provider=gcp \
          --set configuration.backupStorageLocation[0].bucket=$_GCS_VELERO_BUCKET \
          --wait --timeout 5m

        # Bootstrap ArgoCD
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
        kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true

        echo "Phase 6 GitOps — DONE"
    waitFor: [phase4-messaging, phase5-registry]

  # ── Summary ───────────────────────────────────────────────────────────────
  - name: bitnami/kubectl
    id: bootstrap-summary
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        echo "=== ShopOS Cluster Bootstrap Complete — $_ENVIRONMENT ==="
        kubectl get nodes
        echo ""
        kubectl get namespaces
    waitFor: [phase6-gitops]
