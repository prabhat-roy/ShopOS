# Ansible Playbooks — GCP Cloud Build
# Mirrors .github/workflows/ansible.yml
# Substitutions: _PLAYBOOK, _INVENTORY, _LIMIT, _EXTRA_VARS, _CHECK_MODE

substitutions:
  _PLAYBOOK: k8s-node
  _INVENTORY: gcp
  _LIMIT: ""
  _EXTRA_VARS: ""
  _CHECK_MODE: "false"
  _ANSIBLE_DIR: infra/ansible

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_STANDARD_4
  env:
    - ANSIBLE_FORCE_COLOR=1
    - ANSIBLE_HOST_KEY_CHECKING=False
    - ANSIBLE_STDOUT_CALLBACK=yaml

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ansible-ssh-private-key/versions/latest
      env: ANSIBLE_SSH_PRIVATE_KEY
    - versionName: projects/$PROJECT_ID/secrets/ansible-ssh-user/versions/latest
      env: ANSIBLE_SSH_USER
    - versionName: projects/$PROJECT_ID/secrets/aws-access-key-id/versions/latest
      env: AWS_ACCESS_KEY_ID
    - versionName: projects/$PROJECT_ID/secrets/aws-secret-access-key/versions/latest
      env: AWS_SECRET_ACCESS_KEY
    - versionName: projects/$PROJECT_ID/secrets/azure-client-id/versions/latest
      env: AZURE_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/azure-client-secret/versions/latest
      env: AZURE_SECRET
    - versionName: projects/$PROJECT_ID/secrets/azure-tenant-id/versions/latest
      env: AZURE_TENANT

steps:
  - name: python:3.13
    id: install-ansible
    entrypoint: bash
    args:
      - -c
      - |
        pip install ansible ansible-lint boto3 botocore google-auth msrest msrestazure --quiet
        ansible-galaxy collection install \
          amazon.aws google.cloud azure.azcollection community.kubernetes --quiet
        ansible --version | head -1

  - name: python:3.13
    id: ansible-lint
    entrypoint: bash
    args:
      - -c
      - |
        pip install ansible ansible-lint --quiet
        ansible-lint "$_ANSIBLE_DIR/playbooks/$_PLAYBOOK.yml" \
          -c "$_ANSIBLE_DIR/.ansible-lint" || true
    waitFor: [install-ansible]

  - name: python:3.13
    id: run-playbook
    secretEnv:
      - ANSIBLE_SSH_PRIVATE_KEY
      - ANSIBLE_SSH_USER
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AZURE_CLIENT_ID
      - AZURE_SECRET
      - AZURE_TENANT
    entrypoint: bash
    args:
      - -c
      - |
        pip install ansible boto3 botocore google-auth msrest msrestazure --quiet

        # Write SSH key
        echo "$$ANSIBLE_SSH_PRIVATE_KEY" > /tmp/ansible_key
        chmod 600 /tmp/ansible_key

        # GCP: use Workload Identity (no extra auth needed in Cloud Build)
        # AWS: set env vars
        export AWS_ACCESS_KEY_ID="$$AWS_ACCESS_KEY_ID"
        export AWS_SECRET_ACCESS_KEY="$$AWS_SECRET_ACCESS_KEY"
        # Azure: set env vars
        export AZURE_CLIENT_ID="$$AZURE_CLIENT_ID"
        export AZURE_SECRET="$$AZURE_SECRET"
        export AZURE_TENANT="$$AZURE_TENANT"

        LIMIT_ARG=""
        if [ -n "$_LIMIT" ]; then
          LIMIT_ARG="--limit $_LIMIT"
        fi
        EXTRA_VARS_ARG=""
        if [ -n "$_EXTRA_VARS" ]; then
          EXTRA_VARS_ARG="--extra-vars '$_EXTRA_VARS'"
        fi
        CHECK_ARG=""
        if [ "$_CHECK_MODE" = "true" ]; then
          CHECK_ARG="--check --diff"
        fi

        eval ansible-playbook \
          -i "$_ANSIBLE_DIR/inventories/$_INVENTORY/hosts.yml" \
          "$_ANSIBLE_DIR/playbooks/$_PLAYBOOK.yml" \
          --private-key /tmp/ansible_key \
          --user "$$ANSIBLE_SSH_USER" \
          $LIMIT_ARG \
          $EXTRA_VARS_ARG \
          $CHECK_ARG \
          -v

        rm -f /tmp/ansible_key
    waitFor: [ansible-lint]
