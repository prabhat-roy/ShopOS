# Networking Infrastructure — GCP Cloud Build
# Mirrors .github/workflows/networking.yml
# Substitutions: _ENVIRONMENT, _ACTION, _CILIUM, _ISTIO, _TRAEFIK, _CONSUL, _EXTERNAL_DNS

substitutions:
  _ENVIRONMENT: dev
  _ACTION: INSTALL
  _CILIUM: "false"
  _ISTIO: "true"
  _TRAEFIK: "true"
  _CONSUL: "true"
  _EXTERNAL_DNS: "true"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_STANDARD_4

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/kubeconfig-content/versions/latest
      env: KUBECONFIG_CONTENT

steps:
  - name: alpine/helm
    id: cilium
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_CILIUM" = "true" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add cilium https://helm.cilium.io --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall cilium -n kube-system 2>/dev/null || true
        else
          helm upgrade --install cilium cilium/cilium \
            --namespace kube-system \
            --set kubeProxyReplacement=true \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true \
            --set loadBalancer.algorithm=maglev \
            --wait --timeout 8m
        fi

  - name: alpine/helm
    id: istio
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_ISTIO" = "true" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall istio-ingressgateway -n istio-system 2>/dev/null || true
          helm uninstall istiod -n istio-system 2>/dev/null || true
          helm uninstall istio-base -n istio-system 2>/dev/null || true
        else
          helm upgrade --install istio-base istio/base \
            --namespace istio-system --create-namespace --wait --timeout 3m
          helm upgrade --install istiod istio/istiod \
            --namespace istio-system \
            --set telemetry.enabled=true \
            --set pilot.traceSampling=1.0 \
            --wait --timeout 5m
          helm upgrade --install istio-ingressgateway istio/gateway \
            --namespace istio-system --wait --timeout 3m
        fi
    waitFor: [cilium]

  - name: alpine/helm
    id: traefik
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_TRAEFIK" = "true" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add traefik https://traefik.github.io/charts --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall traefik -n networking 2>/dev/null || true
        else
          helm upgrade --install traefik traefik/traefik \
            --namespace networking --create-namespace \
            --set deployment.replicas=2 \
            --set ports.websecure.tls.enabled=true \
            --set ingressClass.enabled=true \
            --set ingressClass.isDefaultClass=true \
            --set metrics.prometheus.enabled=true \
            --wait --timeout 5m
        fi
    waitFor: [istio]

  - name: alpine/helm
    id: consul
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_CONSUL" = "true" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall consul -n consul 2>/dev/null || true
        else
          helm upgrade --install consul hashicorp/consul \
            --namespace consul --create-namespace \
            --set server.replicas=3 \
            --set server.bootstrapExpect=3 \
            --set connectInject.enabled=true \
            --set ui.enabled=true \
            --wait --timeout 8m
        fi
    waitFor: [traefik]

  - name: alpine/helm
    id: external-dns
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_EXTERNAL_DNS" = "true" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add external-dns https://kubernetes-sigs.github.io/external-dns --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall external-dns -n networking 2>/dev/null || true
        else
          helm upgrade --install external-dns external-dns/external-dns \
            --namespace networking --create-namespace \
            --set provider=google \
            --set google.project=$PROJECT_ID \
            --set policy=sync \
            --set txtOwnerId=shopos \
            --wait --timeout 3m
        fi
    waitFor: [consul]
