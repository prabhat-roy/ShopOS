# GCP Cloud Build — GKE cluster provisioning via Terraform
# Uses GCP-native: Terraform remote state in GCS, kubeconfig via gcloud, secrets in Secret Manager

substitutions:
  _PROJECT_ID: round-cable-405107
  _REGION: us-central1
  _ENVIRONMENT: dev
  _CLUSTER_NAME: shopos-${_ENVIRONMENT}
  _TF_STATE_BUCKET: shopos-tfstate-${_PROJECT_ID}
  _ACTION: APPLY

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  env:
    - TF_IN_AUTOMATION=true
    - TF_CLI_ARGS=-no-color

steps:
  - name: hashicorp/terraform:1.9.8
    id: tf-init
    entrypoint: sh
    args:
      - -c
      - |
        cd infra/terraform/gcp/gke
        terraform init \
          -backend-config="bucket=${_TF_STATE_BUCKET}" \
          -backend-config="prefix=gke/${_ENVIRONMENT}"
        terraform validate

  - name: hashicorp/terraform:1.9.8
    id: tf-plan
    entrypoint: sh
    args:
      - -c
      - |
        cd infra/terraform/gcp/gke
        terraform plan \
          -var="project_id=${PROJECT_ID}" \
          -var="region=${_REGION}" \
          -var="environment=${_ENVIRONMENT}" \
          -out=tfplan
        terraform show -no-color tfplan > /workspace/tfplan-gke.txt
    waitFor: [tf-init]

  - name: hashicorp/terraform:1.9.8
    id: tf-apply
    entrypoint: sh
    args:
      - -c
      - |
        [ "${_ACTION}" = "APPLY" ] || exit 0
        cd infra/terraform/gcp/gke
        terraform apply tfplan
        terraform output -json > /workspace/gke-outputs.json
    waitFor: [tf-plan]

  - name: hashicorp/terraform:1.9.8
    id: tf-destroy
    entrypoint: sh
    args:
      - -c
      - |
        [ "${_ACTION}" = "DESTROY" ] || exit 0
        cd infra/terraform/gcp/gke
        terraform destroy -auto-approve \
          -var="project_id=${PROJECT_ID}" \
          -var="region=${_REGION}" \
          -var="environment=${_ENVIRONMENT}"
    waitFor: [tf-plan]

  - name: gcr.io/cloud-builders/gcloud
    id: get-credentials
    args:
      - container
      - clusters
      - get-credentials
      - ${_CLUSTER_NAME}
      - --region=${_REGION}
      - --project=${PROJECT_ID}
    waitFor: [tf-apply]

  - name: gcr.io/cloud-builders/kubectl
    id: verify-nodes
    args: [get, nodes, -o, wide]
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [get-credentials]

  - name: gcr.io/cloud-builders/gcloud
    id: store-kubeconfig
    entrypoint: bash
    args:
      - -c
      - |
        KUBECONFIG_B64=$(cat ~/.kube/config | base64 -w 0)
        echo "$KUBECONFIG_B64" | \
          gcloud secrets create shopos-kubeconfig-${_ENVIRONMENT} --data-file=- 2>/dev/null || \
          echo "$KUBECONFIG_B64" | \
          gcloud secrets versions add shopos-kubeconfig-${_ENVIRONMENT} --data-file=-
        # Store cluster name for downstream pipelines
        echo -n "${_CLUSTER_NAME}" | \
          gcloud secrets create shopos-gke-cluster-name-${_ENVIRONMENT} --data-file=- 2>/dev/null || \
          echo -n "${_CLUSTER_NAME}" | \
          gcloud secrets versions add shopos-gke-cluster-name-${_ENVIRONMENT} --data-file=-
    waitFor: [verify-nodes]

artifacts:
  objects:
    location: gs://${_TF_STATE_BUCKET}/plans/${BUILD_ID}/
    paths:
      - /workspace/tfplan-gke.txt
      - /workspace/gke-outputs.json
