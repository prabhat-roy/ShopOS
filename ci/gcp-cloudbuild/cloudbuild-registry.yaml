# Registry Tools — GCP Cloud Build
# Mirrors .github/workflows/registry.yml
# Substitutions: _ENVIRONMENT, _ACTION, _HARBOR, _NEXUS, _GITEA, _MINIO

substitutions:
  _ENVIRONMENT: dev
  _ACTION: INSTALL
  _HARBOR: "true"
  _NEXUS: "true"
  _GITEA: "true"
  _MINIO: "true"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_STANDARD_4

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/kubeconfig-content/versions/latest
      env: KUBECONFIG_CONTENT
    - versionName: projects/$PROJECT_ID/secrets/harbor-admin-password/versions/latest
      env: HARBOR_ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/minio-root-user/versions/latest
      env: MINIO_ROOT_USER
    - versionName: projects/$PROJECT_ID/secrets/minio-root-password/versions/latest
      env: MINIO_ROOT_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/gitea-admin-password/versions/latest
      env: GITEA_ADMIN_PASSWORD

steps:
  - name: alpine/helm
    id: harbor
    secretEnv: [KUBECONFIG_CONTENT, HARBOR_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_HARBOR" = "true" ] && [ "$_ACTION" != "CONFIGURE" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add harbor https://helm.goharbor.io --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall harbor -n registry 2>/dev/null || true
        else
          helm upgrade --install harbor harbor/harbor \
            --namespace registry --create-namespace \
            --set expose.type=ingress \
            --set expose.ingress.className=traefik \
            --set expose.ingress.hosts.core=harbor.shopos.internal \
            --set externalURL=https://harbor.shopos.internal \
            --set harborAdminPassword="$$HARBOR_ADMIN_PASSWORD" \
            --set trivy.enabled=true \
            --set notary.enabled=true \
            --set persistence.enabled=true \
            --wait --timeout 10m
        fi

  - name: alpine/helm
    id: minio
    secretEnv: [KUBECONFIG_CONTENT, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_MINIO" = "true" ] && [ "$_ACTION" != "CONFIGURE" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add minio https://charts.min.io --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall minio -n registry 2>/dev/null || true
        else
          helm upgrade --install minio minio/minio \
            --namespace registry --create-namespace \
            --set rootUser="$$MINIO_ROOT_USER" \
            --set rootPassword="$$MINIO_ROOT_PASSWORD" \
            --set replicas=4 \
            --set persistence.enabled=true \
            --set persistence.size=100Gi \
            --wait --timeout 8m
        fi
    waitFor: [harbor]

  - name: alpine/helm
    id: gitea
    secretEnv: [KUBECONFIG_CONTENT, GITEA_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_GITEA" = "true" ] && [ "$_ACTION" != "CONFIGURE" ] || exit 0
        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm repo add gitea-charts https://dl.gitea.io/charts --force-update
        if [ "$_ACTION" = "UNINSTALL" ]; then
          helm uninstall gitea -n registry 2>/dev/null || true
        else
          helm upgrade --install gitea gitea-charts/gitea \
            --namespace registry --create-namespace \
            --set gitea.admin.username=gitea-admin \
            --set gitea.admin.password="$$GITEA_ADMIN_PASSWORD" \
            --set gitea.admin.email=admin@shopos.internal \
            --set persistence.enabled=true \
            --set postgresql.enabled=true \
            --wait --timeout 8m
        fi
    waitFor: [minio]

  # Configure: MinIO buckets + Harbor projects
  - name: gcr.io/cloud-builders/curl
    id: configure-minio
    secretEnv: [KUBECONFIG_CONTENT, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_ACTION" = "CONFIGURE" ] || exit 0
        # Install kubectl and mc
        curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
        curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc

        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        kubectl port-forward svc/minio 9000:9000 -n registry &
        PF_PID=$!; sleep 5

        mc alias set shopos http://localhost:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for BUCKET in harbor-registry velero-backups loki-chunks tempo-traces thanos mlflow artifacts backups media-assets; do
          mc mb --ignore-existing "shopos/$BUCKET" || true
        done
        kill $PF_PID 2>/dev/null || true
    waitFor: [gitea]

  - name: gcr.io/cloud-builders/curl
    id: configure-harbor
    secretEnv: [KUBECONFIG_CONTENT, HARBOR_ADMIN_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        [ "$_ACTION" = "CONFIGURE" ] || exit 0
        curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

        mkdir -p ~/.kube && echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        kubectl port-forward svc/harbor-core 18080:80 -n registry &
        PF_PID=$!; sleep 5

        for PROJECT in platform identity catalog commerce supply-chain financial customer-experience; do
          curl -sf -u "admin:$$HARBOR_ADMIN_PASSWORD" -X POST "http://localhost:18080/api/v2.0/projects" \
            -H "Content-Type: application/json" \
            -d "{\"project_name\":\"$PROJECT\",\"public\":false,\"metadata\":{\"auto_scan\":\"true\",\"prevent_vul\":\"true\",\"severity\":\"high\"}}" || true
        done
        kill $PF_PID 2>/dev/null || true
    waitFor: [configure-minio]
