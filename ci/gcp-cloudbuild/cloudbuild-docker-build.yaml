# GCP Cloud Build — Build all ShopOS images, scan with Trivy, push to Artifact Registry
# Set _DOMAIN to build one domain; leave default "all" to build all 13 domains

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  _DOMAIN: all

options:
  machineType: E2_HIGHCPU_32
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/gcloud
    id: ensure-repo
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe shopos \
          --repository-format=docker \
          --location=${_REGION} \
          --project=${PROJECT_ID} 2>/dev/null || \
          gcloud artifacts repositories create shopos \
            --repository-format=docker \
            --location=${_REGION} \
            --project=${PROJECT_ID} \
            --description="ShopOS microservices container registry"
        gcloud auth configure-docker ${_REGION}-docker.pkg.dev --quiet

  - name: gcr.io/cloud-builders/docker
    id: build-and-push
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_TAG="${BUILD_ID:0:8}"
        REGISTRY="${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos"
        ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
        SCOPE="${_DOMAIN}"
        [ "${SCOPE}" = "all" ] && SCOPE="${ALL_DOMAINS}"
        FAILED=0
        for domain in ${SCOPE}; do
          for dir in src/${domain}/*/; do
            [ -d "${dir}" ] || continue
            SVC=$(basename ${dir})
            IMAGE="${REGISTRY}/${SVC}:${IMAGE_TAG}"
            echo "=== Building ${IMAGE} ==="
            docker build \
              --label "build.id=${BUILD_ID}" \
              --label "commit.sha=${COMMIT_SHA}" \
              --label "domain=${domain}" \
              -t "${IMAGE}" \
              -t "${REGISTRY}/${SVC}:latest" \
              "${dir}" || { echo "WARN: ${SVC} build failed"; FAILED=$((FAILED+1)); continue; }
            docker push "${IMAGE}" || { echo "WARN: ${SVC} push failed"; FAILED=$((FAILED+1)); }
          done
        done
        echo "${IMAGE_TAG}" > /workspace/image_tag
        echo "Build complete. Failures: ${FAILED}"
    waitFor: [ensure-repo]

  - name: aquasec/trivy:latest
    id: trivy-scan
    entrypoint: sh
    args:
      - -c
      - |
        IMAGE_TAG=$(cat /workspace/image_tag)
        REGISTRY="${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos"
        # Scan representative services (api-gateway, order-service, payment-service)
        for SVC in api-gateway order-service payment-service fraud-detection-service auth-service; do
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format json \
            --output /workspace/trivy-${SVC}.json \
            "${REGISTRY}/${SVC}:${IMAGE_TAG}" 2>/dev/null || true
        done
    waitFor: [build-and-push]

  - name: gcr.io/cloud-builders/gcloud
    id: store-image-tag
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_TAG=$(cat /workspace/image_tag)
        echo -n "${IMAGE_TAG}" | \
          gcloud secrets create shopos-image-tag --data-file=- 2>/dev/null || \
          echo -n "${IMAGE_TAG}" | \
          gcloud secrets versions add shopos-image-tag --data-file=-
        echo "Image tag ${IMAGE_TAG} stored in Secret Manager"
    waitFor: [build-and-push]

artifacts:
  objects:
    location: gs://${PROJECT_ID}-build-artifacts/${BUILD_ID}/
    paths:
      - /workspace/trivy-*.json
      - /workspace/image_tag
