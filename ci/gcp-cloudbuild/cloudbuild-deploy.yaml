# Deploy Service — GCP Cloud Build
# Mirrors ci/jenkins/deploy.Jenkinsfile
# Substitutions (set via trigger or --substitutions flag):
#   _SERVICE_NAME, _DOMAIN, _IMAGE_TAG, _ENVIRONMENT, _SKIP_TESTS, _SCAN_SEVERITY

substitutions:
  _SERVICE_NAME: api-gateway
  _DOMAIN: platform
  _IMAGE_TAG: latest
  _ENVIRONMENT: dev
  _SKIP_TESTS: "false"
  _SCAN_SEVERITY: HIGH,CRITICAL
  _HARBOR_REGISTRY: harbor.shopos.internal
  _SONAR_HOST_URL: http://sonarqube.shopos.internal

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/harbor-password/versions/latest
      env: HARBOR_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/harbor-user/versions/latest
      env: HARBOR_USER
    - versionName: projects/$PROJECT_ID/secrets/sonar-token/versions/latest
      env: SONAR_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/kubeconfig-content/versions/latest
      env: KUBECONFIG_CONTENT
    - versionName: projects/$PROJECT_ID/secrets/slack-webhook/versions/latest
      env: SLACK_WEBHOOK

steps:
  # ── Secret scan ────────────────────────────────────────────────────────────
  - name: zricethezav/gitleaks
    id: secret-scan
    args:
      - detect
      - --source=.
      - --no-git
      - --exit-code=0
      - --report-format=json
      - --report-path=/workspace/reports/gitleaks.json

  # ── SAST: Semgrep ──────────────────────────────────────────────────────────
  - name: returntocorp/semgrep
    id: sast
    args:
      - --config=auto
      - --json
      - --output=/workspace/reports/semgrep.json
      - --error
      - --severity=ERROR
      - src/$_DOMAIN/$_SERVICE_NAME
    waitFor: [secret-scan]

  # ── Build + Test ───────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: setup
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p reports
        # language-aware build & test
        SERVICE_DIR="src/$_DOMAIN/$_SERVICE_NAME"
        cd "$$SERVICE_DIR"
        if [ -f "go.mod" ]; then
          go test ./... -coverprofile=/workspace/reports/coverage.out 2>&1 | tee /workspace/reports/test.txt || [ "$_SKIP_TESTS" = "true" ]
        elif [ -f "pom.xml" ]; then
          mvn test -q 2>&1 | tee /workspace/reports/test.txt || [ "$_SKIP_TESTS" = "true" ]
        elif [ -f "package.json" ]; then
          npm ci --quiet && npm test 2>&1 | tee /workspace/reports/test.txt || [ "$_SKIP_TESTS" = "true" ]
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt --quiet
          python -m pytest --tb=short 2>&1 | tee /workspace/reports/test.txt || [ "$_SKIP_TESTS" = "true" ]
        fi
    waitFor: [secret-scan]

  # ── Docker build ───────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: docker-build
    secretEnv: [HARBOR_USER, HARBOR_PASSWORD]
    args:
      - build
      - -t
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG
      - -t
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:latest
      - src/$_DOMAIN/$_SERVICE_NAME
    waitFor: [setup]

  # ── Trivy image scan ───────────────────────────────────────────────────────
  - name: aquasec/trivy
    id: trivy-scan
    args:
      - image
      - --exit-code=0
      - --severity=$_SCAN_SEVERITY
      - --format=json
      - --output=/workspace/reports/trivy-$_SERVICE_NAME.json
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG
    waitFor: [docker-build]

  # ── Syft SBOM ─────────────────────────────────────────────────────────────
  - name: anchore/syft
    id: sbom
    args:
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG
      - -o
      - cyclonedx-json
      - --file=/workspace/reports/sbom-$_SERVICE_NAME.json
    waitFor: [docker-build]

  # ── Push to Harbor ─────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    secretEnv: [HARBOR_USER, HARBOR_PASSWORD]
    entrypoint: bash
    args:
      - -c
      - |
        echo "$$HARBOR_PASSWORD" | docker login "$_HARBOR_REGISTRY" -u "$$HARBOR_USER" --password-stdin
        docker push "$_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG"
        docker push "$_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:latest"
    waitFor: [trivy-scan, sbom]

  # ── Cosign keyless sign ───────────────────────────────────────────────────
  - name: gcr.io/projectsigstore/cosign
    id: sign
    args:
      - sign
      - --yes
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG
    waitFor: [push]

  # ── Cosign attest SBOM ────────────────────────────────────────────────────
  - name: gcr.io/projectsigstore/cosign
    id: attest
    args:
      - attest
      - --yes
      - --predicate=/workspace/reports/sbom-$_SERVICE_NAME.json
      - --type=cyclonedx
      - $_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME:$_IMAGE_TAG
    waitFor: [sign]

  # ── Deploy via Helm ────────────────────────────────────────────────────────
  - name: alpine/helm
    id: deploy
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p ~/.kube
        echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        helm upgrade --install "$_SERVICE_NAME" "helm/charts/$_SERVICE_NAME" \
          --namespace "$_DOMAIN" \
          --set image.repository="$_HARBOR_REGISTRY/$_DOMAIN/$_SERVICE_NAME" \
          --set image.tag="$_IMAGE_TAG" \
          --set environment="$_ENVIRONMENT" \
          -f "helm/charts/$_SERVICE_NAME/values-$_ENVIRONMENT.yaml" \
          --wait --timeout 5m
    waitFor: [attest]

  # ── Notify ─────────────────────────────────────────────────────────────────
  - name: curlimages/curl
    id: notify
    secretEnv: [SLACK_WEBHOOK]
    entrypoint: sh
    args:
      - -c
      - |
        curl -sf -X POST "$$SLACK_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{\"text\":\"Deployed *$_SERVICE_NAME* @ $_IMAGE_TAG to *$_ENVIRONMENT*\"}" || true
    waitFor: [deploy]

artifacts:
  objects:
    location: gs://$PROJECT_ID-build-artifacts/$BUILD_ID/
    paths:
      - /workspace/reports/**
