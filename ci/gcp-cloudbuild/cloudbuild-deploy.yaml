# GCP Cloud Build — Build service image, push to Artifact Registry, deploy to GKE via Helm
# Uses GCP-native: Artifact Registry, gcloud container get-credentials, Secret Manager

substitutions:
  _SERVICE_NAME: api-gateway
  _DOMAIN: platform
  _ENVIRONMENT: dev
  _REGION: us-central1
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  _CLUSTER_NAME: shopos-dev

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/shopos-kubeconfig-${_ENVIRONMENT}/versions/latest
      env: KUBECONFIG_CONTENT

steps:
  - name: gcr.io/cloud-builders/gcloud
    id: ensure-repo
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe shopos \
          --repository-format=docker \
          --location=${_REGION} \
          --project=${PROJECT_ID} 2>/dev/null || \
          gcloud artifacts repositories create shopos \
            --repository-format=docker \
            --location=${_REGION} \
            --project=${PROJECT_ID}
        gcloud auth configure-docker ${_REGION}-docker.pkg.dev --quiet

  - name: gcr.io/cloud-builders/docker
    id: docker-build
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}:${BUILD_ID:0:8}"
        docker build \
          --label "build.id=${BUILD_ID}" \
          --label "commit.sha=${COMMIT_SHA}" \
          --label "domain=${_DOMAIN}" \
          -t "${IMAGE}" \
          -t "${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}:latest" \
          "src/${_DOMAIN}/${_SERVICE_NAME}/"
        echo "${BUILD_ID:0:8}" > /workspace/image_tag
    waitFor: [ensure-repo]

  - name: gcr.io/cloud-builders/docker
    id: docker-push
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_TAG=$(cat /workspace/image_tag)
        docker push "${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}:${IMAGE_TAG}"
        docker push "${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}:latest"
    waitFor: [docker-build]

  - name: aquasec/trivy:latest
    id: trivy-scan
    entrypoint: sh
    args:
      - -c
      - |
        IMAGE_TAG=$(cat /workspace/image_tag)
        trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          --format json \
          --output /workspace/trivy-${_SERVICE_NAME}.json \
          "${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}:${IMAGE_TAG}" || true
    waitFor: [docker-push]

  - name: gcr.io/cloud-builders/gcloud
    id: get-credentials
    args:
      - container
      - clusters
      - get-credentials
      - ${_CLUSTER_NAME}
      - --region=${_REGION}
      - --project=${PROJECT_ID}
    waitFor: [docker-push]

  - name: alpine/helm:3.16.0
    id: helm-deploy
    secretEnv: [KUBECONFIG_CONTENT]
    entrypoint: sh
    args:
      - -c
      - |
        mkdir -p ~/.kube
        echo "$$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        IMAGE_TAG=$(cat /workspace/image_tag)
        helm upgrade --install ${_SERVICE_NAME} helm/charts/${_SERVICE_NAME} \
          --namespace ${_DOMAIN} --create-namespace \
          --set image.repository="${_ARTIFACT_REGISTRY}/${PROJECT_ID}/shopos/${_SERVICE_NAME}" \
          --set image.tag="${IMAGE_TAG}" \
          --set environment="${_ENVIRONMENT}" \
          --set persistence.storageClass=standard-rwo \
          -f helm/charts/${_SERVICE_NAME}/values-${_ENVIRONMENT}.yaml \
          --wait --timeout 10m
    waitFor: [get-credentials, trivy-scan]

  - name: gcr.io/cloud-builders/kubectl
    id: verify-rollout
    entrypoint: bash
    args:
      - -c
      - |
        kubectl rollout status deployment/${_SERVICE_NAME} \
          -n ${_DOMAIN} --timeout=5m
        kubectl get pods -n ${_DOMAIN} -l app=${_SERVICE_NAME}
    env:
      - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}
      - CLOUDSDK_COMPUTE_REGION=${_REGION}
    waitFor: [helm-deploy]

artifacts:
  objects:
    location: gs://${PROJECT_ID}-build-artifacts/${BUILD_ID}/
    paths:
      - /workspace/trivy-*.json
