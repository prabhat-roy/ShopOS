name: Verify GitHub Actions Toolchain

# GitHub Actions role: verify that all language runtimes and GitHub-specific
# CLI tools (gh CLI, act for local testing) are available on runners.
# Unlike other CI platforms, GitHub Actions provides most tools natively via
# setup-* actions rather than manual installation.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC

jobs:
  verify-runtimes:
    name: Verify language runtimes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Print runtime versions
        run: |
          echo "=== Runtime Versions ==="
          go version
          java -version 2>&1 | head -1
          node --version
          npm --version
          python3 --version
          pip --version
          dotnet --version
          rustc --version
          cargo --version

  verify-github-tools:
    name: Verify GitHub-specific tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gh CLI (pre-installed on GitHub-hosted runners)
        run: |
          gh --version
          echo "gh CLI: OK"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install act (local GitHub Actions runner)
        run: |
          curl -s https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin
          act --version
          echo "act: OK"

      - name: Install Cosign (Sigstore)
        uses: sigstore/cosign-installer@v3

      - name: Install Buf (Protobuf toolchain)
        run: |
          BUF_VERSION=1.35.1
          curl -fsSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf
          buf --version

      - name: Install Helm + kubectl
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version --short
          # kubectl is pre-installed on ubuntu-latest
          kubectl version --client --short 2>/dev/null || kubectl version --client

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Install k6 (load testing)
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 2>/dev/null || true
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y -qq
          k6 version

      - name: Print GitHub Actions context
        run: |
          echo "=== GitHub Actions Environment ==="
          echo "Runner: ${{ runner.os }} / ${{ runner.arch }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Event: ${{ github.event_name }}"
          echo "All tools verified successfully."
