name: Cluster Bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target cluster environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      skip_networking:
        description: 'Skip networking (CNI + Ingress + Mesh) — use if already installed'
        type: boolean
        default: false
      skip_security:
        description: 'Skip security (Vault + Keycloak + Kyverno + Falco)'
        type: boolean
        default: false
      skip_observability:
        description: 'Skip observability stack'
        type: boolean
        default: false
      skip_messaging:
        description: 'Skip messaging (Kafka + RabbitMQ + NATS)'
        type: boolean
        default: false
      skip_gitops:
        description: 'Skip GitOps tools (ArgoCD + Argo Rollouts + KEDA)'
        type: boolean
        default: false
      skip_registry:
        description: 'Skip registry tools (Harbor + MinIO)'
        type: boolean
        default: false

jobs:
  # ── Step 1: Networking ────────────────────────────────────────────────────
  networking-cni:
    name: "1/6 — Networking: CNI"
    uses: ./.github/workflows/networking.yml
    if: ${{ inputs.skip_networking != true }}
    with:
      action: INSTALL
      cilium: true
    secrets: inherit

  networking-ingress-mesh:
    name: "1/6 — Networking: Ingress + Mesh"
    uses: ./.github/workflows/networking.yml
    needs: [networking-cni, security-cert-manager]
    if: ${{ inputs.skip_networking != true }}
    with:
      action: INSTALL
      istio: true
      traefik: true
      consul: true
      external_dns: true
    secrets: inherit

  # ── Step 2: Security ──────────────────────────────────────────────────────
  security-cert-manager:
    name: "2/6 — Security: cert-manager (prerequisite)"
    uses: ./.github/workflows/security.yml
    needs: [networking-cni]
    if: ${{ inputs.skip_security != true }}
    with:
      action: INSTALL
      cert_manager: true
    secrets: inherit

  security-core:
    name: "2/6 — Security: Vault + Keycloak + Policy + Runtime"
    uses: ./.github/workflows/security.yml
    needs: [security-cert-manager]
    if: ${{ inputs.skip_security != true }}
    with:
      action: INSTALL
      vault: true
      keycloak: true
      spire: true
      opa: true
      kyverno: true
      kubewarden: true
      falco: true
      tetragon: true
      rekor: true
      fulcio: true
      trivy_operator: true
      kubescape: true
      wazuh: true
    secrets: inherit

  # ── Step 3: Observability ─────────────────────────────────────────────────
  observability:
    name: "3/6 — Observability Stack"
    uses: ./.github/workflows/observability.yml
    needs: [security-core]
    if: ${{ inputs.skip_observability != true }}
    with:
      action: INSTALL
      prometheus: true
      grafana: true
      loki: true
      jaeger: true
      tempo: true
      otel_collector: true
      thanos: true
      pyroscope: true
      opensearch: true
      fluent_bit: true
      metrics_server: true
    secrets: inherit

  # ── Step 4: Messaging ─────────────────────────────────────────────────────
  messaging:
    name: "4/6 — Messaging: Kafka + RabbitMQ + NATS"
    uses: ./.github/workflows/messaging.yml
    needs: [observability]
    if: ${{ inputs.skip_messaging != true }}
    with:
      action: INSTALL
      zookeeper: true
      kafka: true
      schema_registry: true
      kafka_connect: true
      rabbitmq: true
      nats: true
      kafka_ui: true
      debezium: true
      flink: true
    secrets: inherit

  messaging-configure:
    name: "4/6 — Messaging: Create Kafka topics"
    uses: ./.github/workflows/messaging.yml
    needs: [messaging]
    if: ${{ inputs.skip_messaging != true }}
    with:
      action: CONFIGURE
      kafka: true
    secrets: inherit

  # ── Step 5: Registry ──────────────────────────────────────────────────────
  registry:
    name: "5/6 — Registry: Harbor + MinIO + Gitea"
    uses: ./.github/workflows/registry.yml
    needs: [security-core]
    if: ${{ inputs.skip_registry != true }}
    with:
      action: INSTALL
      harbor: true
      nexus: true
      gitea: true
      minio: true
    secrets: inherit

  registry-configure:
    name: "5/6 — Registry: Configure Harbor + MinIO buckets"
    uses: ./.github/workflows/registry.yml
    needs: [registry]
    if: ${{ inputs.skip_registry != true }}
    with:
      action: CONFIGURE
      harbor: true
      minio: true
    secrets: inherit

  # ── Step 6: GitOps ────────────────────────────────────────────────────────
  gitops:
    name: "6/6 — GitOps: ArgoCD + KEDA + Velero + ESO"
    uses: ./.github/workflows/gitops.yml
    needs: [messaging-configure, registry-configure]
    if: ${{ inputs.skip_gitops != true }}
    with:
      action: INSTALL
      argocd: true
      argo_rollouts: true
      argo_workflows: true
      argo_events: true
      fluxcd: true
      sealed_secrets: true
      external_secrets: true
      keda: true
      velero: true
    secrets: inherit

  gitops-configure:
    name: "6/6 — GitOps: Bootstrap ArgoCD App-of-Apps"
    uses: ./.github/workflows/gitops.yml
    needs: [gitops]
    if: ${{ inputs.skip_gitops != true }}
    with:
      action: CONFIGURE
      argocd: true
    secrets: inherit

  bootstrap-summary:
    name: Bootstrap Complete
    runs-on: ubuntu-latest
    needs: [networking-ingress-mesh, security-core, observability, messaging-configure, registry-configure, gitops-configure]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## ShopOS Cluster Bootstrap — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 1. Networking (Cilium + Istio + Traefik) | ${{ needs.networking-ingress-mesh.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2. Security (Vault + Keycloak + Falco)   | ${{ needs.security-core.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 3. Observability (Prometheus + Grafana)  | ${{ needs.observability.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 4. Messaging (Kafka + RabbitMQ + NATS)   | ${{ needs.messaging-configure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 5. Registry (Harbor + MinIO)             | ${{ needs.registry-configure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 6. GitOps (ArgoCD + KEDA + Velero)       | ${{ needs.gitops-configure.result }} |" >> "$GITHUB_STEP_SUMMARY"
