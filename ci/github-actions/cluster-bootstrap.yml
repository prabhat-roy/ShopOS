name: Cluster Bootstrap — Cloud-native

# GitHub Actions role: full cluster bootstrap using cloud-provider GitHub Actions
# for kubeconfig retrieval (aws-actions/amazon-eks-update-kubeconfig,
# google-github-actions/get-gke-credentials, azure/aks-set-context).
# Chains workflows via workflow_call with cloud-specific auth at each phase.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target cluster environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      cloud_provider:
        description: 'Cloud provider (used for kubeconfig auth)'
        required: true
        default: 'aws'
        type: choice
        options: [aws, gcp, azure]
      skip_networking:
        description: 'Skip networking (Cilium + Istio + Traefik)'
        type: boolean
        default: false
      skip_security:
        description: 'Skip security (Vault + Keycloak + Falco)'
        type: boolean
        default: false
      skip_observability:
        description: 'Skip observability stack'
        type: boolean
        default: false
      skip_messaging:
        description: 'Skip messaging (Kafka + RabbitMQ + NATS)'
        type: boolean
        default: false
      skip_registry:
        description: 'Skip registry (Harbor + MinIO)'
        type: boolean
        default: false
      skip_gitops:
        description: 'Skip GitOps (ArgoCD + KEDA + Velero)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # OIDC for cloud auth

jobs:
  # ── Authenticate to cloud and get kubeconfig ───────────────────────────────
  get-kubeconfig:
    name: Authenticate to ${{ inputs.cloud_provider }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      # AWS EKS
      - name: Configure AWS credentials (OIDC)
        if: inputs.cloud_provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EKS kubeconfig
        if: inputs.cloud_provider == 'aws'
        uses: aws-actions/amazon-eks-update-kubeconfig@v1
        with:
          cluster-name: shopos-${{ inputs.environment }}
          region: ${{ secrets.AWS_REGION }}

      # GCP GKE
      - name: Authenticate to GCP (WIF)
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Get GKE kubeconfig
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: shopos-${{ inputs.environment }}
          location: ${{ secrets.GCP_CLUSTER_ZONE }}

      # Azure AKS
      - name: Login to Azure (OIDC)
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS kubeconfig
        if: inputs.cloud_provider == 'azure'
        uses: azure/aks-set-context@v4
        with:
          resource-group: shopos-rg-${{ inputs.environment }}
          cluster-name: shopos-${{ inputs.environment }}

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
          echo "Cluster access verified for ${{ inputs.cloud_provider }}/${{ inputs.environment }}"

  # ── Phase 1: Networking ───────────────────────────────────────────────────
  phase1-networking:
    name: "1/6 — Networking"
    needs: get-kubeconfig
    if: inputs.skip_networking != true
    uses: ./.github/workflows/networking.yml
    with:
      environment: ${{ inputs.environment }}
      action: INSTALL
    secrets: inherit

  # ── Phase 2: Security ─────────────────────────────────────────────────────
  phase2-security:
    name: "2/6 — Security"
    needs: phase1-networking
    if: always() && inputs.skip_security != true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Deploy security stack
        run: |
          helm repo add jetstack      https://charts.jetstack.io
          helm repo add hashicorp     https://helm.releases.hashicorp.com
          helm repo add bitnami       https://charts.bitnami.com/bitnami
          helm repo add kyverno       https://kyverno.github.io/kyverno/
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update

          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set installCRDs=true --set replicaCount=2 --wait --timeout 5m

          helm upgrade --install vault hashicorp/vault \
            --namespace vault --create-namespace \
            --set server.ha.enabled=true --set server.ha.raft.enabled=true \
            --set server.ha.replicas=3 --set ui.enabled=true --wait --timeout 10m

          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak --create-namespace \
            --set replicaCount=2 \
            --set auth.adminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --set postgresql.enabled=true --wait --timeout 10m

          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno --create-namespace \
            --set admissionController.replicas=2 --wait --timeout 5m

          helm upgrade --install falco falcosecurity/falco \
            --namespace falco --create-namespace \
            --set driver.kind=ebpf \
            --set falcosidekick.enabled=true \
            --set falcosidekick.config.slack.webhookurl="${{ secrets.SLACK_WEBHOOK }}" \
            --wait --timeout 10m

  # ── Phase 3: Observability ────────────────────────────────────────────────
  phase3-observability:
    name: "3/6 — Observability"
    needs: phase2-security
    if: always() && inputs.skip_observability != true
    uses: ./.github/workflows/observability.yml
    with:
      environment: ${{ inputs.environment }}
      action: INSTALL
    secrets: inherit

  # ── Phase 4: Messaging ────────────────────────────────────────────────────
  phase4-messaging:
    name: "4/6 — Messaging"
    needs: phase3-observability
    if: always() && inputs.skip_messaging != true
    uses: ./.github/workflows/messaging.yml
    with:
      environment: ${{ inputs.environment }}
      action: INSTALL
    secrets: inherit

  # ── Phase 5: Registry ─────────────────────────────────────────────────────
  phase5-registry:
    name: "5/6 — Registry"
    needs: phase2-security
    if: always() && inputs.skip_registry != true
    uses: ./.github/workflows/registry.yml
    with:
      environment: ${{ inputs.environment }}
      action: INSTALL
    secrets: inherit

  # ── Phase 6: GitOps ───────────────────────────────────────────────────────
  phase6-gitops:
    name: "6/6 — GitOps"
    needs: [phase4-messaging, phase5-registry]
    if: always() && inputs.skip_gitops != true
    uses: ./.github/workflows/gitops.yml
    with:
      environment: ${{ inputs.environment }}
      action: INSTALL
    secrets: inherit

  # ── Bootstrap summary ─────────────────────────────────────────────────────
  bootstrap-summary:
    name: Bootstrap Complete
    runs-on: ubuntu-latest
    needs: [phase1-networking, phase2-security, phase3-observability, phase4-messaging, phase5-registry, phase6-gitops]
    if: always()
    steps:
      - name: Write GitHub Step Summary
        run: |
          echo "## ShopOS Cluster Bootstrap — ${{ inputs.environment }} (${{ inputs.cloud_provider }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 1. Networking (Cilium + Istio + Traefik) | ${{ needs.phase1-networking.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2. Security (Vault + Keycloak + Falco)   | ${{ needs.phase2-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 3. Observability (Prometheus + Grafana)  | ${{ needs.phase3-observability.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 4. Messaging (Kafka + RabbitMQ + NATS)   | ${{ needs.phase4-messaging.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 5. Registry (Harbor + MinIO)             | ${{ needs.phase5-registry.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 6. GitOps (ArgoCD + KEDA + Velero)       | ${{ needs.phase6-gitops.result }} |" >> "$GITHUB_STEP_SUMMARY"
