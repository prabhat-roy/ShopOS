name: Observability — Environment Deploy

# GitHub Actions role: deploy observability stack to named environments.
# dev deploys automatically on changes to observability/, staging and prod
# require environment protection approval in GitHub Settings.

on:
  push:
    branches: [develop, main]
    paths:
      - 'observability/**'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, UNINSTALL]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  deploy-observability:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
      url: https://grafana.${{ needs.resolve-environment.outputs.environment }}.shopos.internal
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana              https://grafana.github.io/helm-charts
          helm repo add jaegertracing        https://jaegertracing.github.io/helm-charts
          helm repo add open-telemetry       https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

      - name: Deploy observability stack
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          ACTION="${{ inputs.action || 'INSTALL' }}"

          if [ "$ACTION" = "UNINSTALL" ]; then
            helm uninstall kube-prometheus-stack -n observability --ignore-not-found || true
            helm uninstall grafana               -n observability --ignore-not-found || true
            helm uninstall loki                  -n observability --ignore-not-found || true
            helm uninstall jaeger                -n observability --ignore-not-found || true
            helm uninstall otel-collector        -n observability --ignore-not-found || true
            exit 0
          fi

          PROM_RETENTION="15d"
          PROM_REPLICAS=1
          [ "$ENV" = "staging" ] && PROM_RETENTION="30d" && PROM_REPLICAS=2
          [ "$ENV" = "prod" ]    && PROM_RETENTION="90d" && PROM_REPLICAS=2

          # Prometheus + Alertmanager
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace observability --create-namespace \
            --set prometheus.prometheusSpec.retention=$PROM_RETENTION \
            --set prometheus.prometheusSpec.replicas=$PROM_REPLICAS \
            --set alertmanager.alertmanagerSpec.replicas=$PROM_REPLICAS \
            --set grafana.enabled=false \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --wait --timeout 15m

          # Grafana (standalone)
          helm upgrade --install grafana grafana/grafana \
            --namespace observability \
            --set adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --set persistence.enabled=true \
            --set sidecar.dashboards.enabled=true \
            --set sidecar.datasources.enabled=true \
            --wait --timeout 5m

          # Loki (log aggregation)
          helm upgrade --install loki grafana/loki \
            --namespace observability \
            --set loki.auth_enabled=false \
            --set loki.storage.type=s3 \
            --set loki.storage.s3.endpoint="${{ secrets.MINIO_ENDPOINT }}" \
            --set loki.storage.s3.bucketnames=loki-chunks \
            --set loki.storage.s3.access_key_id="${{ secrets.MINIO_ACCESS_KEY }}" \
            --set loki.storage.s3.secret_access_key="${{ secrets.MINIO_SECRET_KEY }}" \
            --set loki.storage.s3.s3ForcePathStyle=true \
            --wait --timeout 10m

          # Jaeger (tracing)
          helm upgrade --install jaeger jaegertracing/jaeger \
            --namespace observability \
            --set provisionDataStore.cassandra=false \
            --set storage.type=memory \
            --wait --timeout 8m

          # OpenTelemetry Collector
          helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
            --namespace observability \
            --set mode=daemonset \
            --wait --timeout 5m

      - name: Verify observability health
        run: |
          kubectl rollout status deployment/grafana -n observability --timeout=60s || true
          echo "Observability deployed to ${{ needs.resolve-environment.outputs.environment }}"
