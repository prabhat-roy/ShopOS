name: Networking Tools

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'INSTALL, UNINSTALL, or CONFIGURE networking tools'
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, UNINSTALL, CONFIGURE]
      cilium:         { description: 'Cilium — eBPF CNI + Hubble observability',             type: boolean, default: false }
      calico:         { description: 'Calico — CNI with BGP routing',                        type: boolean, default: false }
      istio:          { description: 'Istio — service mesh with mTLS',                       type: boolean, default: false }
      linkerd:        { description: 'Linkerd — lightweight service mesh',                   type: boolean, default: false }
      traefik:        { description: 'Traefik — cloud-native edge router',                   type: boolean, default: false }
      nginx_ingress:  { description: 'NGINX Ingress Controller',                             type: boolean, default: false }
      consul:         { description: 'Consul — service discovery + connect',                 type: boolean, default: false }
      external_dns:   { description: 'ExternalDNS — automatic DNS management',               type: boolean, default: false }
      metallb:        { description: 'MetalLB — bare-metal load balancer',                   type: boolean, default: false }
      coredns:        { description: 'CoreDNS — Kubernetes DNS server',                      type: boolean, default: false }
      kong:           { description: 'Kong Gateway — API gateway',                           type: boolean, default: false }

jobs:
  networking-tools:
    name: ${{ inputs.action }} Networking Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add cilium         https://helm.cilium.io
          helm repo add projectcalico  https://docs.tigera.io/calico/charts
          helm repo add istio          https://istio-release.storage.googleapis.com/charts
          helm repo add linkerd        https://helm.linkerd.io/stable
          helm repo add traefik        https://helm.traefik.io/traefik
          helm repo add ingress-nginx  https://kubernetes.github.io/ingress-nginx
          helm repo add hashicorp      https://helm.releases.hashicorp.com
          helm repo add external-dns   https://kubernetes-sigs.github.io/external-dns/
          helm repo add metallb        https://metallb.github.io/metallb
          helm repo add kong           https://charts.konghq.com
          helm repo update

      # ── INSTALL ────────────────────────────────────────────────────────
      - name: Install — Cilium (kube-proxy replacement + Hubble)
        if: ${{ inputs.action == 'INSTALL' && inputs.cilium == true }}
        run: |
          helm upgrade --install cilium cilium/cilium \
            --namespace kube-system \
            --set kubeProxyReplacement=true \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true \
            --set hubble.metrics.enabled="{dns,drop,tcp,flow,port-distribution,icmp,http}" \
            --set prometheus.enabled=true \
            --set operator.prometheus.enabled=true \
            --set bandwidthManager.enabled=true \
            --set l7Proxy=true \
            --set maglev.enabled=true \
            --wait --timeout 10m
          kubectl -n kube-system rollout status daemonset/cilium --timeout=120s

      - name: Install — Istio (3-chart install: base → istiod → gateway)
        if: ${{ inputs.action == 'INSTALL' && inputs.istio == true }}
        run: |
          helm upgrade --install istio-base istio/base \
            --namespace istio-system --create-namespace \
            --set defaultRevision=default --wait --timeout 5m
          helm upgrade --install istiod istio/istiod \
            --namespace istio-system \
            --set pilot.traceSampling=1.0 \
            --set meshConfig.enableTracing=true \
            --set meshConfig.accessLogFile=/dev/stdout \
            --set meshConfig.defaultConfig.tracing.zipkin.address=jaeger-collector.observability:9411 \
            --wait --timeout 10m
          helm upgrade --install istio-ingressgateway istio/gateway \
            --namespace istio-system \
            --set autoscaling.minReplicas=2 \
            --set autoscaling.maxReplicas=5 \
            --wait --timeout 5m

      - name: Install — Linkerd (CRDs + control-plane + viz)
        if: ${{ inputs.action == 'INSTALL' && inputs.linkerd == true }}
        run: |
          helm upgrade --install linkerd-crds linkerd/linkerd-crds \
            --namespace linkerd --create-namespace --wait --timeout 5m
          helm upgrade --install linkerd-control-plane linkerd/linkerd-control-plane \
            --namespace linkerd \
            --set-file identityTrustAnchorsPEM=security/linkerd/ca.crt \
            --set identity.issuer.scheme=kubernetes.io/tls \
            --wait --timeout 10m || \
          helm upgrade --install linkerd-control-plane linkerd/linkerd-control-plane \
            --namespace linkerd --wait --timeout 10m
          helm upgrade --install linkerd-viz linkerd/linkerd-viz \
            --namespace linkerd-viz --create-namespace \
            --set dashboard.enforcedHostRegexp="" \
            --wait --timeout 10m

      - name: Install — Traefik (with dashboard + Prometheus metrics)
        if: ${{ inputs.action == 'INSTALL' && inputs.traefik == true }}
        run: |
          helm upgrade --install traefik traefik/traefik \
            --namespace networking --create-namespace \
            --set ingressClass.enabled=true \
            --set ingressClass.isDefaultClass=true \
            --set dashboard.enabled=true \
            --set metrics.prometheus.enabled=true \
            --set metrics.prometheus.addEntryPointsLabels=true \
            --set metrics.prometheus.addRoutersLabels=true \
            --set metrics.prometheus.addServicesLabels=true \
            --set logs.access.enabled=true \
            --wait --timeout 10m

      - name: Install — Consul (HA 3 replicas + Connect)
        if: ${{ inputs.action == 'INSTALL' && inputs.consul == true }}
        run: |
          helm upgrade --install consul hashicorp/consul \
            --namespace consul --create-namespace \
            --set global.datacenter=shopos-dc1 \
            --set global.tls.enabled=true \
            --set global.tls.enableAutoEncrypt=true \
            --set global.acls.manageSystemACLs=true \
            --set server.replicas=3 \
            --set server.connect=true \
            --set connectInject.enabled=true \
            --set dns.enabled=true \
            --wait --timeout 10m

      - name: Install — ExternalDNS
        if: ${{ inputs.action == 'INSTALL' && inputs.external_dns == true }}
        run: |
          PROVIDER=$(grep '^DNS_PROVIDER=' infra.env 2>/dev/null | cut -d= -f2 || echo "aws")
          helm upgrade --install external-dns external-dns/external-dns \
            --namespace networking \
            --set provider="$PROVIDER" \
            --set policy=upsert-only \
            --set sources="{service,ingress,istio-gateway,istio-virtualservice}" \
            --set txtOwnerId=shopos-cluster \
            --wait --timeout 10m

      - name: Install — MetalLB (bare metal LB)
        if: ${{ inputs.action == 'INSTALL' && inputs.metallb == true }}
        run: |
          helm upgrade --install metallb metallb/metallb \
            --namespace metallb-system --create-namespace --wait --timeout 10m

      # ── UNINSTALL ──────────────────────────────────────────────────────
      - name: Uninstall tools
        if: ${{ inputs.action == 'UNINSTALL' }}
        run: |
          ${{ inputs.cilium        && 'helm uninstall cilium               -n kube-system   --ignore-not-found || true' || '' }}
          ${{ inputs.istio         && 'helm uninstall istio-ingressgateway istiod istio-base -n istio-system --ignore-not-found || true' || '' }}
          ${{ inputs.linkerd       && 'helm uninstall linkerd-viz linkerd-control-plane linkerd-crds -n linkerd --ignore-not-found || true' || '' }}
          ${{ inputs.traefik       && 'helm uninstall traefik              -n networking    --ignore-not-found || true' || '' }}
          ${{ inputs.consul        && 'helm uninstall consul               -n consul        --ignore-not-found || true' || '' }}
          ${{ inputs.external_dns  && 'helm uninstall external-dns         -n networking    --ignore-not-found || true' || '' }}
          ${{ inputs.metallb       && 'helm uninstall metallb              -n metallb-system --ignore-not-found || true' || '' }}
          echo "Uninstall complete."
