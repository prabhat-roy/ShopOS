name: Networking — Environment Deploy

# GitHub Actions role: deploy networking stack to named environments with
# GitHub environment protection rules. dev auto-deploys, staging/prod require
# manual approval via GitHub environment protection rules.

on:
  push:
    branches: [develop, main]
    paths:
      - 'networking/**'
      - 'helm/charts/traefik/**'
      - 'helm/charts/istio/**'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, UNINSTALL]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  deploy-networking:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
      url: https://traefik.${{ needs.resolve-environment.outputs.environment }}.shopos.internal
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add cilium      https://helm.cilium.io
          helm repo add istio       https://istio-release.storage.googleapis.com/charts
          helm repo add traefik     https://helm.traefik.io/traefik
          helm repo add hashicorp   https://helm.releases.hashicorp.com
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
          helm repo update

      - name: Deploy networking stack
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          ACTION="${{ inputs.action || 'INSTALL' }}"

          if [ "$ACTION" = "UNINSTALL" ]; then
            helm uninstall traefik       -n networking    --ignore-not-found || true
            helm uninstall consul        -n consul        --ignore-not-found || true
            helm uninstall external-dns  -n networking    --ignore-not-found || true
            exit 0
          fi

          TRAEFIK_REPLICAS=1
          [ "$ENV" = "staging" ] && TRAEFIK_REPLICAS=2
          [ "$ENV" = "prod" ]    && TRAEFIK_REPLICAS=3

          # Istio service mesh
          helm upgrade --install istio-base istio/base \
            --namespace istio-system --create-namespace \
            --set defaultRevision=default --wait --timeout 5m

          helm upgrade --install istiod istio/istiod \
            --namespace istio-system \
            --set pilot.traceSampling=1.0 \
            --set meshConfig.enableTracing=true \
            --set meshConfig.accessLogFile=/dev/stdout \
            --wait --timeout 10m

          helm upgrade --install istio-ingressgateway istio/gateway \
            --namespace istio-system \
            --set autoscaling.minReplicas=$TRAEFIK_REPLICAS \
            --wait --timeout 5m

          # Traefik edge router
          helm upgrade --install traefik traefik/traefik \
            --namespace networking --create-namespace \
            --set ingressClass.enabled=true \
            --set ingressClass.isDefaultClass=true \
            --set deployment.replicas=$TRAEFIK_REPLICAS \
            --set metrics.prometheus.enabled=true \
            --set logs.access.enabled=true \
            --wait --timeout 10m

          # Consul service discovery
          helm upgrade --install consul hashicorp/consul \
            --namespace consul --create-namespace \
            --set global.datacenter=shopos-${ENV} \
            --set server.replicas=1 \
            --set connectInject.enabled=true \
            --wait --timeout 10m || true

      - name: Verify networking health
        run: |
          kubectl rollout status deployment/traefik -n networking --timeout=60s || true
          kubectl rollout status deployment/istiod -n istio-system --timeout=60s || true
          echo "Networking deployed to ${{ needs.resolve-environment.outputs.environment }}"
