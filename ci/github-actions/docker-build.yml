name: Docker Build & Push

# GitHub Actions role: build and push images to Harbor on main/release.
# Uses domain-level matrix (13 domains) with per-service loop inside each job.
# Triggered on push to main or tags — never on PRs.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      domain:
        description: 'Single domain to build (empty = all 13)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - platform
          - identity
          - catalog
          - commerce
          - supply-chain
          - financial
          - customer-experience
          - communications
          - content
          - analytics-ai
          - b2b
          - integrations
          - affiliate
      push_image:
        description: 'Push images to Harbor'
        type: boolean
        default: true

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  REGISTRY_PROJECT: shopos

permissions:
  contents: read
  packages: write
  id-token: write   # for Cosign keyless signing

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        domain:
          - platform
          - identity
          - catalog
          - commerce
          - supply-chain
          - financial
          - customer-experience
          - communications
          - content
          - analytics-ai
          - b2b
          - integrations
          - affiliate
    steps:
      - uses: actions/checkout@v4

      - name: Skip domain if filtered
        id: check
        run: |
          FILTER="${{ inputs.domain }}"
          if [ -n "$FILTER" ] && [ "$FILTER" != "${{ matrix.domain }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Compute image tag
        if: steps.check.outputs.skip != 'true'
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          REF="${GITHUB_REF_NAME}"
          echo "tag=${REF}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build & push all services in domain
        if: steps.check.outputs.skip != 'true'
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          PUSH="${{ inputs.push_image != 'false' && 'true' || 'false' }}"
          # On push events, always push
          [ "${{ github.event_name }}" = "push" ] && PUSH=true

          for svc_dir in src/${{ matrix.domain }}/*/; do
            [ -d "$svc_dir" ] || continue
            SVC=$(basename "$svc_dir")
            IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${SVC}:${IMAGE_TAG}"
            echo "=== Building: $IMAGE ==="
            docker build \
              --label "git.commit=${{ github.sha }}" \
              --label "build.number=${{ github.run_number }}" \
              --label "domain=${{ matrix.domain }}" \
              --cache-from "type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${SVC}:cache" \
              --cache-to "type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${SVC}:cache,mode=max" \
              -t "$IMAGE" \
              "$svc_dir" || { echo "WARNING: $SVC build failed"; continue; }

            if [ "$PUSH" = "true" ]; then
              docker push "$IMAGE" || echo "WARNING: $SVC push failed"
            fi
          done

  # ── Cosign keyless sign after push ────────────────────────────────────────
  sign-images:
    runs-on: ubuntu-latest
    needs: build-matrix
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign images (keyless via OIDC)
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"
          for d in $ALL_DOMAINS; do
            for svc_dir in src/$d/*/; do
              [ -d "$svc_dir" ] || continue
              SVC=$(basename "$svc_dir")
              IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${SVC}:${IMAGE_TAG}"
              cosign sign --yes "$IMAGE" 2>/dev/null || true
            done
          done
