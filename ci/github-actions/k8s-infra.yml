name: K8s Infrastructure — Cloud-native Auth

# GitHub Actions role: provision Kubernetes clusters using cloud-provider
# GitHub Actions (OIDC, no long-lived keys). Uses aws-actions, google-github-actions,
# and azure/* actions — the native integrations unavailable on other CI platforms.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'CREATE or DESTROY the Kubernetes cluster'
        required: true
        default: 'CREATE'
        type: choice
        options: [CREATE, DESTROY]
      cloud_provider:
        description: 'Cloud provider to target'
        required: true
        default: 'aws'
        type: choice
        options: [aws, gcp, azure]
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  TF_DIR_AWS:   infra/terraform/aws/app-k8s
  TF_DIR_GCP:   infra/terraform/gcp/app-k8s
  TF_DIR_AZURE: infra/terraform/azure/app-k8s

permissions:
  contents: read
  id-token: write   # required for OIDC auth to all clouds

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} — ${{ inputs.cloud_provider }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set TF_DIR
        run: |
          case "${{ inputs.cloud_provider }}" in
            aws)   echo "TF_DIR=${{ env.TF_DIR_AWS }}"   >> "$GITHUB_ENV" ;;
            gcp)   echo "TF_DIR=${{ env.TF_DIR_GCP }}"   >> "$GITHUB_ENV" ;;
            azure) echo "TF_DIR=${{ env.TF_DIR_AZURE }}" >> "$GITHUB_ENV" ;;
          esac

      # ── AWS: OIDC via aws-actions (no static credentials) ────────────────
      - name: Configure AWS credentials (OIDC)
        if: inputs.cloud_provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform

      # ── GCP: OIDC via google-github-actions (no JSON key) ────────────────
      - name: Authenticate to GCP (Workload Identity Federation)
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Set up gcloud CLI
        if: inputs.cloud_provider == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      # ── Azure: OIDC via azure/login (no client secret) ───────────────────
      - name: Login to Azure (OIDC / Federated credential)
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Terraform Init
        run: |
          terraform -chdir="$TF_DIR" init \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform Validate + Format check
        run: |
          terraform -chdir="$TF_DIR" validate
          terraform -chdir="$TF_DIR" fmt -check -recursive || true

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir="$TF_DIR" plan \
            -var="environment=${{ inputs.environment }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.cloud_provider }}-${{ inputs.environment }}-${{ github.run_number }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'CREATE'
        run: terraform -chdir="$TF_DIR" apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'DESTROY'
        run: |
          terraform -chdir="$TF_DIR" destroy \
            -var="environment=${{ inputs.environment }}" \
            -auto-approve

      # ── Update kubeconfig after cluster creation ──────────────────────────
      - name: Get EKS credentials
        if: inputs.action == 'CREATE' && inputs.cloud_provider == 'aws'
        uses: aws-actions/amazon-eks-update-kubeconfig@v1
        with:
          cluster-name: shopos-${{ inputs.environment }}
          region: ${{ secrets.AWS_REGION }}
        continue-on-error: true

      - name: Get GKE credentials
        if: inputs.action == 'CREATE' && inputs.cloud_provider == 'gcp'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: shopos-${{ inputs.environment }}
          location: ${{ secrets.GCP_CLUSTER_ZONE }}
        continue-on-error: true

      - name: Get AKS credentials
        if: inputs.action == 'CREATE' && inputs.cloud_provider == 'azure'
        uses: azure/app-k8s-set-context@v4
        with:
          resource-group: shopos-rg-${{ inputs.environment }}
          cluster-name: shopos-${{ inputs.environment }}
        continue-on-error: true

      - name: Verify cluster connectivity
        if: inputs.action == 'CREATE'
        run: |
          kubectl cluster-info || echo "Cluster info not available yet"
          kubectl get nodes || echo "Nodes not ready yet"
