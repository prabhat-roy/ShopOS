name: GitOps — Environment Deploy

# GitHub Actions role: deploy ArgoCD, Flux, KEDA, Velero to named environments.
# Leverages GitHub environment protection rules so prod requires manual approval.
# On main branch, deploys to staging automatically.
# On release tags (v*), deploys to prod (approval required via env protection).

on:
  push:
    branches: [develop, main]
    paths:
      - 'gitops/**'
      - 'kubernetes/keda/**'
      - 'kubernetes/velero/**'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, CONFIGURE, UNINSTALL]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  deploy-gitops:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
      url: https://argocd.${{ needs.resolve-environment.outputs.environment }}.shopos.internal
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add argo             https://argoproj.github.io/argo-helm
          helm repo add kedacore         https://kedacore.github.io/charts
          helm repo add vmware-tanzu     https://vmware-tanzu.github.io/helm-charts
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

      - name: Deploy GitOps tools
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          ACTION="${{ inputs.action || 'INSTALL' }}"

          if [ "$ACTION" = "UNINSTALL" ]; then
            helm uninstall argocd          -n argocd          --ignore-not-found || true
            helm uninstall argo-rollouts   -n argo-rollouts   --ignore-not-found || true
            helm uninstall keda            -n keda            --ignore-not-found || true
            helm uninstall velero          -n velero          --ignore-not-found || true
            helm uninstall external-secrets -n external-secrets --ignore-not-found || true
            exit 0
          fi

          if [ "$ACTION" = "CONFIGURE" ]; then
            kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s || true
            kubectl apply -f gitops/argocd/app-of-apps.yaml -n argocd || true
            kubectl apply -f gitops/argocd/applicationsets/ -n argocd || true
            echo "ArgoCD App-of-Apps bootstrapped."
            exit 0
          fi

          ARGOCD_REPLICAS=1
          [ "$ENV" = "staging" ] && ARGOCD_REPLICAS=2
          [ "$ENV" = "prod" ]    && ARGOCD_REPLICAS=2

          # ArgoCD (GitOps engine)
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd --create-namespace \
            --set server.replicas=$ARGOCD_REPLICAS \
            --set repoServer.replicas=$ARGOCD_REPLICAS \
            --set applicationSet.replicaCount=$ARGOCD_REPLICAS \
            --set redis-ha.enabled=false \
            --set server.metrics.enabled=true \
            --wait --timeout 15m

          # Argo Rollouts (canary/blue-green)
          helm upgrade --install argo-rollouts argo/argo-rollouts \
            --namespace argo-rollouts --create-namespace \
            --set installCRDs=true \
            --set dashboard.enabled=true \
            --wait --timeout 10m

          # KEDA (event-driven autoscaling)
          helm upgrade --install keda kedacore/keda \
            --namespace keda --create-namespace \
            --set metricsServer.replicaCount=$ARGOCD_REPLICAS \
            --wait --timeout 10m
          kubectl apply -f kubernetes/keda/ 2>/dev/null || true

          # External Secrets Operator
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets --create-namespace \
            --set installCRDs=true \
            --set replicaCount=$ARGOCD_REPLICAS \
            --wait --timeout 10m

          # Velero (cluster backup)
          helm upgrade --install velero vmware-tanzu/velero \
            --namespace velero --create-namespace \
            --set configuration.backupStorageLocation[0].name=minio \
            --set configuration.backupStorageLocation[0].provider=aws \
            --set configuration.backupStorageLocation[0].bucket=velero-backups \
            --set "configuration.backupStorageLocation[0].config.s3Url=${{ secrets.MINIO_ENDPOINT }}" \
            --set configuration.backupStorageLocation[0].config.s3ForcePathStyle=true \
            --wait --timeout 10m || true
          kubectl apply -f kubernetes/velero/ 2>/dev/null || true

      - name: Bootstrap ArgoCD App-of-Apps
        if: inputs.action != 'UNINSTALL'
        run: |
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=180s || true
          kubectl apply -f gitops/argocd/app-of-apps.yaml -n argocd 2>/dev/null || true
          echo "GitOps tools deployed to ${{ needs.resolve-environment.outputs.environment }}"
