name: Messaging — Environment Deploy

# GitHub Actions role: deploy messaging infrastructure to named environments
# (dev on develop branch, staging on main, prod on release tags) using
# GitHub environment protection rules and approval gates.

on:
  push:
    branches: [develop, main]
    paths:
      - 'messaging/**'
      - 'helm/charts/kafka/**'
      - 'helm/charts/rabbitmq/**'
      - 'helm/charts/nats/**'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'INSTALL, CONFIGURE, or UNINSTALL'
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, CONFIGURE, UNINSTALL]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  deploy-messaging:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
      url: https://kafka-ui.${{ needs.resolve-environment.outputs.environment }}.shopos.internal
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add bitnami   https://charts.bitnami.com/bitnami
          helm repo add nats      https://nats-io.github.io/k8s/helm/charts/
          helm repo add kafka-ui  https://provectus.github.io/kafka-ui-charts
          helm repo add strimzi   https://strimzi.io/charts/
          helm repo update

      - name: Deploy messaging stack
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          ACTION="${{ inputs.action || 'INSTALL' }}"

          if [ "$ACTION" = "UNINSTALL" ]; then
            helm uninstall kafka     -n messaging --ignore-not-found || true
            helm uninstall zookeeper -n messaging --ignore-not-found || true
            helm uninstall rabbitmq  -n messaging --ignore-not-found || true
            helm uninstall nats      -n messaging --ignore-not-found || true
            exit 0
          fi

          REPLICAS=1
          [ "$ENV" = "staging" ] && REPLICAS=2
          [ "$ENV" = "prod" ]    && REPLICAS=3

          helm upgrade --install zookeeper bitnami/zookeeper \
            --namespace messaging --create-namespace \
            --set replicaCount=$REPLICAS \
            --wait --timeout 8m

          helm upgrade --install kafka bitnami/kafka \
            --namespace messaging \
            --set replicaCount=$REPLICAS \
            --set zookeeper.enabled=false \
            --set externalZookeeper.servers=zookeeper.messaging.svc.cluster.local \
            --set autoCreateTopicsEnable=false \
            --set defaultReplicationFactor=$REPLICAS \
            --wait --timeout 10m

          helm upgrade --install rabbitmq bitnami/rabbitmq \
            --namespace messaging \
            --set replicaCount=$REPLICAS \
            --set auth.password="${{ secrets.RABBITMQ_PASSWORD }}" \
            --set metrics.enabled=true \
            --wait --timeout 8m

          helm upgrade --install nats nats/nats \
            --namespace messaging \
            --set nats.jetstream.enabled=true \
            --set cluster.enabled=true \
            --set cluster.replicas=$REPLICAS \
            --wait --timeout 5m

      - name: Create Kafka topics (all environments)
        run: |
          KAFKA_POD=$(kubectl get pod -n messaging -l app.kubernetes.io/name=kafka \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          [ -z "$KAFKA_POD" ] && echo "Kafka pod not found — skipping topic creation" && exit 0

          create_topic() {
            kubectl exec -n messaging "$KAFKA_POD" -- \
              kafka-topics.sh --create --if-not-exists \
              --bootstrap-server localhost:9092 \
              --topic "$1" --partitions "$2" --replication-factor "$3" 2>/dev/null || true
          }

          create_topic identity.user.registered       3 1
          create_topic identity.user.deleted          3 1
          create_topic commerce.order.placed          6 1
          create_topic commerce.payment.processed     6 1
          create_topic commerce.cart.abandoned        3 1
          create_topic supplychain.shipment.created   3 1
          create_topic notification.email.requested   3 1
          create_topic analytics.page.viewed          6 1
          create_topic security.fraud.detected        3 1
          echo "Kafka topics created."
