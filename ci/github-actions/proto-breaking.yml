# GitHub Actions — protobuf breaking change detection on every PR. Required check.
name: proto-breaking
on:
  pull_request:
    paths: ['proto/**']
permissions: { contents: read, pull-requests: read }
jobs:
  buf-breaking:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: bufbuild/buf-setup-action@v1
      - name: buf format
        run: cd proto && buf format --diff --exit-code
      - name: buf lint
        run: cd proto && buf lint
      - name: buf breaking
        run: |
          cd proto
          buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"
      - name: Push to BSR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env: { BUF_TOKEN: ${{ secrets.BUF_TOKEN }} }
        run: cd proto && buf push
