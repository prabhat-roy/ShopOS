name: Security — Secret Scan, Dependency Review, Trivy FS

# GitHub Actions role: scheduled + PR security scanning using GitHub-native
# tools (Gitleaks, dependency-review-action, Trivy SARIF → GitHub Security tab).
# Results feed GitHub's own Security Advisories and Dependabot alerts.

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main, develop, 'release/**']

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ── Secret scanning via Gitleaks ──────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Dependency review on PRs (GitHub-native) ──────────────────────────────
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0

  # ── Trivy filesystem scan → GitHub Security tab ───────────────────────────
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — full filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

  # ── IaC scan (Checkov) → GitHub Security tab ─────────────────────────────
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform, Helm, K8s, Dockerfile
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,helm,kubernetes,dockerfile
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
        if: always()

  # ── SBOM generation (Syft → GitHub artifact) ──────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./src
          format: cyclonedx-json
          output-file: sbom-shopos.cyclonedx.json
          artifact-name: sbom-${{ github.sha }}.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-shopos.cyclonedx.json
          retention-days: 90
