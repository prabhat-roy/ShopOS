name: Post-Deploy — Smoke Tests & Nuclei Scan

# GitHub Actions role: automated post-deploy validation triggered by workflow_run
# completion. Runs k6 smoke tests and Nuclei CVE scans against the deployed
# environment. Results posted to GitHub Step Summary and Slack.

on:
  workflow_run:
    workflows: ['Service CI — Build, Test, Lint, SAST']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to validate'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
      run_nuclei:
        description: 'Run Nuclei CVE scan (slow)'
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write   # for uploading Nuclei SARIF

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ── Health checks ─────────────────────────────────────────────────────────
  health-check:
    needs: resolve-environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Check all service namespaces
        run: |
          DOMAINS=(platform identity catalog commerce supply-chain financial \
                   customer-experience communications content analytics-ai b2b integrations affiliate)
          for ns in "${DOMAINS[@]}"; do
            echo "=== $ns ==="
            kubectl get deployments -n "$ns" --no-headers 2>/dev/null \
              | awk '$4 == "0" {print "WARN: "$1" has 0 available replicas"}' || true
          done

      - name: API Gateway health check
        run: |
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          PF_PID=$!
          sleep 6
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/healthz 2>/dev/null || echo "000")
          kill $PF_PID 2>/dev/null || true
          echo "API Gateway /healthz → $HTTP"
          [ "$HTTP" = "200" ] || echo "WARNING: API Gateway health check failed (status=$HTTP)"

  # ── k6 smoke test ─────────────────────────────────────────────────────────
  smoke-test:
    needs: [resolve-environment, health-check]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 2>/dev/null || true
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y -qq

      - name: Set kubeconfig + port-forward
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          echo $! > /tmp/pf.pid
          sleep 6

      - name: Run k6 smoke test
        run: |
          BASE_URL=http://localhost:18080 \
            k6 run load-testing/k6/scripts/smoke.js \
            --out json=k6-smoke-results.json \
            --summary-trend-stats="avg,p(95),p(99)" || true

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-${{ needs.resolve-environment.outputs.environment }}-${{ github.run_number }}
          path: k6-smoke-results.json
          retention-days: 14

  # ── Nuclei CVE scan ───────────────────────────────────────────────────────
  nuclei-scan:
    needs: [resolve-environment, health-check]
    runs-on: ubuntu-latest
    if: inputs.run_nuclei == true || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig + port-forward
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          echo $! > /tmp/pf.pid
          sleep 6

      - name: Nuclei CVE template scan
        run: |
          mkdir -p nuclei-results
          docker run --rm --network=host \
            -v "$PWD/nuclei-results:/output" \
            projectdiscovery/nuclei:latest \
            -target http://localhost:18080 \
            -severity critical,high \
            -json-export /output/nuclei-${{ needs.resolve-environment.outputs.environment }}.json \
            -stats || true
        continue-on-error: true

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true

      - name: Upload Nuclei results
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-${{ needs.resolve-environment.outputs.environment }}-${{ github.run_number }}
          path: nuclei-results/
          retention-days: 30

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [health-check, smoke-test]
    if: always()
    steps:
      - name: Write GitHub Step Summary
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment || 'staging' }}"
          echo "## Post-Deploy Validation — ${ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service health checks | ${{ needs.health-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| k6 smoke test         | ${{ needs.smoke-test.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Slack notification on failure
        if: needs.health-check.result == 'failure' || needs.smoke-test.result == 'failure'
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Post-deploy check FAILED on *${{ needs.resolve-environment.outputs.environment }}* — run #${{ github.run_number }}\"}" || true
