name: Post-Deploy Validation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to validate'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
      run_load_test:
        description: 'Run k6 smoke test against deployed services'
        type: boolean
        default: true
      run_dast:
        description: 'Run OWASP ZAP + Nuclei DAST scan'
        type: boolean
        default: false
      run_k8s_audit:
        description: 'Run kube-bench + Kubescape audit'
        type: boolean
        default: true

  workflow_run:
    workflows: [Deploy Service]
    types: [completed]
    branches: [main]

jobs:
  health-check:
    name: Service Health Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Check all namespace deployments
        run: |
          DOMAINS=(platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate)
          FAILED=0
          for ns in "${DOMAINS[@]}"; do
            echo "=== Checking namespace: $ns ==="
            kubectl get deployments -n "$ns" --no-headers 2>/dev/null | while read -r name ready uptodate available age; do
              if [[ "$available" == "0" ]]; then
                echo "FAIL: $name in $ns has 0 available replicas"
                FAILED=$((FAILED+1))
              fi
            done || true
          done

      - name: Check infrastructure namespaces
        run: |
          INFRA_NS=(messaging networking istio-system vault keycloak argocd observability registry keda)
          for ns in "${INFRA_NS[@]}"; do
            kubectl rollout status deploy --namespace="$ns" --timeout=60s 2>/dev/null | tail -3 || true
          done

      - name: Check API Gateway health
        run: |
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          PF_PID=$!; sleep 5
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/healthz 2>/dev/null || echo "000")
          kill $PF_PID 2>/dev/null || true
          echo "API Gateway /healthz → $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "FAIL: API Gateway not healthy"; exit 1; }

  load-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    if: ${{ inputs.run_load_test != false }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y -qq

      - name: Decode kubeconfig + port-forward API gateway
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          echo $! > /tmp/pf.pid
          sleep 5

      - name: Run smoke test
        run: |
          BASE_URL=http://localhost:18080 k6 run load-testing/k6/scripts/smoke.js \
            --out json=reports/k6-smoke-${{ inputs.environment }}.json || true

      - name: Stop port-forward
        if: always()
        run: kill $(cat /tmp/pf.pid) 2>/dev/null || true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-${{ inputs.environment }}-${{ github.run_number }}
          path: reports/k6-smoke-*.json

  dast:
    name: DAST (ZAP + Nuclei)
    runs-on: ubuntu-latest
    if: ${{ inputs.run_dast == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: OWASP ZAP baseline scan
        run: |
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          PF_PID=$!; sleep 5
          mkdir -p reports/dast
          docker run --rm --network=host -v "$PWD/reports/dast:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:18080 \
            -J /zap/wrk/zap-${{ inputs.environment }}.json \
            -r /zap/wrk/zap-${{ inputs.environment }}.html \
            -I || true
          kill $PF_PID 2>/dev/null || true
        continue-on-error: true

      - name: Nuclei CVE template scan
        run: |
          kubectl port-forward svc/api-gateway 18080:8080 -n platform &
          PF_PID=$!; sleep 5
          docker run --rm --network=host \
            -v "$PWD/reports/dast:/output" \
            projectdiscovery/nuclei:latest \
            -target http://localhost:18080 \
            -severity critical,high \
            -json-export /output/nuclei-${{ inputs.environment }}.json || true
          kill $PF_PID 2>/dev/null || true
        continue-on-error: true

      - name: Upload DAST results
        uses: actions/upload-artifact@v4
        with:
          name: dast-${{ inputs.environment }}-${{ github.run_number }}
          path: reports/dast/

  k8s-audit:
    name: K8s Security Audit
    runs-on: ubuntu-latest
    if: ${{ inputs.run_k8s_audit != false }}
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: kube-bench — CIS Benchmark
        run: |
          mkdir -p reports/k8s-audit
          docker run --rm --pid=host \
            -v /etc:/etc:ro -v /var:/var:ro \
            -v ~/.kube:/root/.kube:ro \
            aquasec/kube-bench:latest --json \
            > reports/k8s-audit/kube-bench-${{ inputs.environment }}.json || true
        continue-on-error: true

      - name: Kubescape — NSA/MITRE ATT&CK
        run: |
          docker run --rm -v ~/.kube:/root/.kube \
            quay.io/armosec/kubescape:latest scan \
            framework nsa,mitre \
            --format json \
            --output reports/k8s-audit/kubescape-${{ inputs.environment }}.json || true
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: k8s-audit-${{ inputs.environment }}-${{ github.run_number }}
          path: reports/k8s-audit/

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [health-check, load-test, dast, k8s-audit]
    if: always()
    steps:
      - name: Post summary to GitHub Step Summary
        run: |
          echo "## Post-Deploy Validation — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service health checks | ${{ needs.health-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| k6 smoke test         | ${{ needs.load-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DAST (ZAP + Nuclei)   | ${{ needs.dast.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| K8s audit             | ${{ needs.k8s-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: ${{ needs.health-check.result == 'failure' }}
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ Post-deploy health check FAILED on *${{ inputs.environment }}* — run #${{ github.run_number }}\"}" || true
