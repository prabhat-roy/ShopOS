name: Registry — Environment Deploy

# GitHub Actions role: deploy Harbor, Nexus, MinIO to named environments.
# Uses GitHub environment protection rules for staging/prod gates.

on:
  push:
    branches: [develop, main]
    paths:
      - 'registry/**'
      - 'helm/infra/registry/harbor/**'
      - 'helm/infra/registry/minio/**'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, CONFIGURE, UNINSTALL]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  deploy-registry:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-environment.outputs.environment }}
      url: https://harbor.${{ needs.resolve-environment.outputs.environment }}.shopos.internal
    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add harbor    https://helm.goharbor.io
          helm repo add sonatype  https://sonatype.github.io/helm3-charts/
          helm repo add minio     https://charts.min.io/
          helm repo update

      - name: Deploy registry stack
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          ACTION="${{ inputs.action || 'INSTALL' }}"

          if [ "$ACTION" = "UNINSTALL" ]; then
            helm uninstall harbor -n registry --ignore-not-found || true
            helm uninstall minio  -n minio    --ignore-not-found || true
            helm uninstall nexus  -n registry --ignore-not-found || true
            exit 0
          fi

          if [ "$ACTION" = "CONFIGURE" ]; then
            # Configure Harbor projects for each domain
            kubectl port-forward svc/harbor-core 18080:80 -n registry &
            sleep 8
            for PROJECT in platform identity catalog commerce supply-chain financial \
                           customer-experience communications content analytics-ai b2b integrations affiliate; do
              curl -sf -u "admin:${{ secrets.HARBOR_ADMIN_PASSWORD }}" \
                -X POST "http://localhost:18080/api/v2.0/projects" \
                -H "Content-Type: application/json" \
                -d "{\"project_name\":\"${PROJECT}\",\"public\":false,\"metadata\":{\"auto_scan\":\"true\"}}" || true
            done
            exit 0
          fi

          MINIO_REPLICAS=1
          [ "$ENV" = "prod" ] && MINIO_REPLICAS=4

          # Harbor container registry
          helm upgrade --install harbor harbor/harbor \
            --namespace registry --create-namespace \
            --set harborAdminPassword="${{ secrets.HARBOR_ADMIN_PASSWORD }}" \
            --set expose.type=ingress \
            --set "expose.ingress.hosts.core=harbor.${ENV}.shopos.internal" \
            --set "externalURL=https://harbor.${ENV}.shopos.internal" \
            --set trivy.enabled=true \
            --set persistence.persistentVolumeClaim.registry.size=100Gi \
            --wait --timeout 15m

          # MinIO object storage
          helm upgrade --install minio minio/minio \
            --namespace minio --create-namespace \
            --set rootUser="${{ secrets.MINIO_ROOT_USER }}" \
            --set rootPassword="${{ secrets.MINIO_ROOT_PASSWORD }}" \
            --set replicas=$MINIO_REPLICAS \
            --set persistence.size=200Gi \
            --wait --timeout 10m

      - name: Create MinIO buckets
        run: |
          MINIO_POD=$(kubectl get pod -n minio -l app=minio -o name 2>/dev/null | head -1)
          if [ -z "$MINIO_POD" ]; then echo "MinIO pod not ready yet"; exit 0; fi
          for BUCKET in velero-backups loki-chunks thanos-metrics tempo-traces harbor-data media-assets mlflow artifacts; do
            kubectl exec -n minio "$MINIO_POD" -- \
              mc mb "local/$BUCKET" --ignore-existing 2>/dev/null || true
          done
          echo "MinIO buckets created."
