# Woodpecker CI — Secondary Image Builder + Integration Smoke Tests
# Role: parallel builder (connected to Forgejo) — builds images domain-by-domain
#       using Woodpecker's native matrix syntax, then runs smoke tests after Drone.
# Secrets: harbor_registry, harbor_user, harbor_password, slack_webhook

when:
  event: push
  branch:
    - main
    - "release/*"

matrix:
  DOMAIN:
    - platform
    - identity
    - catalog
    - commerce
    - supply-chain
    - financial
    - customer-experience
    - communications
    - content
    - analytics-ai
    - b2b
    - integrations
    - affiliate

steps:
  - name: build-domain-images
    image: woodpeckerci/plugin-docker-buildx
    settings:
      username:
        from_secret: harbor_user
      password:
        from_secret: harbor_password
      registry:
        from_secret: harbor_registry
      tags:
        - ${CI_COMMIT_SHA:0:8}
        - latest
      platforms:
        - linux/amd64
    commands:
      - |
        HARBOR_REG="${CI_REGISTRY}"
        IMAGE_TAG="${CI_COMMIT_SHA:0:8}"
        echo "=== Building domain: ${DOMAIN} ==="
        for dir in src/${DOMAIN}/*/; do
          [ -d "$dir" ] || continue
          SVC=$(basename "$dir")
          echo "--- Building $SVC ---"
          docker buildx build \
            --platform linux/amd64 \
            --tag "$HARBOR_REG/shopos/$SVC:$IMAGE_TAG" \
            --tag "$HARBOR_REG/shopos/$SVC:latest" \
            --push \
            "$dir" || echo "WARN $SVC failed — continuing"
        done
    when:
      event: push

  - name: trivy-spot-check
    image: aquasec/trivy:latest
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
    commands:
      - IMAGE_TAG="${CI_COMMIT_SHA:0:8}"
      - |
        # Spot-check one representative service per domain matrix cell
        case "${DOMAIN}" in
          platform)         SVC="api-gateway" ;;
          identity)         SVC="auth-service" ;;
          catalog)          SVC="product-catalog-service" ;;
          commerce)         SVC="order-service" ;;
          supply-chain)     SVC="fulfillment-service" ;;
          financial)        SVC="payment-service" ;;
          *)                SVC="" ;;
        esac
        [ -z "$SVC" ] && echo "No spot-check for $DOMAIN" && exit 0
        trivy image --severity HIGH,CRITICAL --exit-code 0 \
          "$HARBOR_REGISTRY/shopos/$SVC:$IMAGE_TAG" || true
    depends_on:
      - build-domain-images
