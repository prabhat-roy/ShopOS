# Registry Tools — Woodpecker CI
# Secrets: kubeconfig_content, harbor_admin_password, minio_root_user, minio_root_password, gitea_admin_password
# Env vars: ENVIRONMENT, ACTION (INSTALL|UPGRADE|UNINSTALL|CONFIGURE)

when:
  event: [custom, manual]

steps:
  harbor:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT: { from_secret: kubeconfig_content }
      HARBOR_ADMIN_PASSWORD: { from_secret: harbor_admin_password }
    commands:
      - '[ "$HARBOR" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add harbor https://helm.goharbor.io --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall harbor -n registry 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install harbor harbor/harbor \
          --namespace registry --create-namespace \
          --set expose.type=ingress --set expose.ingress.className=traefik \
          --set expose.ingress.hosts.core=harbor.shopos.internal \
          --set externalURL=https://harbor.shopos.internal \
          --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD" \
          --set trivy.enabled=true --set persistence.enabled=true --wait --timeout 10m

  minio:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT: { from_secret: kubeconfig_content }
      MINIO_ROOT_USER: { from_secret: minio_root_user }
      MINIO_ROOT_PASSWORD: { from_secret: minio_root_password }
    commands:
      - '[ "$MINIO" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add minio https://charts.min.io --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall minio -n registry 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install minio minio/minio \
          --namespace registry --create-namespace \
          --set rootUser="$MINIO_ROOT_USER" --set rootPassword="$MINIO_ROOT_PASSWORD" \
          --set replicas=4 --set persistence.enabled=true --set persistence.size=100Gi \
          --wait --timeout 8m
    depends_on: [harbor]

  configure:
    image: minio/mc:latest
    environment:
      KUBECONFIG_CONTENT: { from_secret: kubeconfig_content }
      MINIO_ROOT_USER: { from_secret: minio_root_user }
      MINIO_ROOT_PASSWORD: { from_secret: minio_root_password }
      HARBOR_ADMIN_PASSWORD: { from_secret: harbor_admin_password }
    commands:
      - '[ "$ACTION" = "CONFIGURE" ] || exit 0'
      - apk add --no-cache curl
      - curl -fsSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - kubectl port-forward svc/minio 9000:9000 -n registry & sleep 5
      - mc alias set shopos http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
      - |
        for BUCKET in harbor-registry velero-backups loki-chunks tempo-traces thanos mlflow artifacts media-assets; do
          mc mb --ignore-existing "shopos/$BUCKET" || true
        done
    depends_on: [harbor, minio]
