# Woodpecker CI — Registry Tools + Access Smoke Tests
# Role: install Harbor/MinIO registry tools AND smoke-test accessibility.
# Secrets: kubeconfig_content, harbor_admin_password, minio_root_user, minio_root_password

when:
  event: [custom, manual]

steps:
  setup-kubeconfig:
    image: alpine:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

  harbor:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
      HARBOR_ADMIN_PASSWORD:
        from_secret: harbor_admin_password
    commands:
      - '[ "$HARBOR" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add harbor https://helm.goharbor.io --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall harbor -n registry 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install harbor harbor/harbor \
          --namespace registry --create-namespace \
          --set expose.type=ingress \
          --set expose.ingress.className=traefik \
          --set expose.ingress.hosts.core=harbor.shopos.internal \
          --set externalURL=https://harbor.shopos.internal \
          --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD" \
          --set trivy.enabled=true \
          --set persistence.enabled=true \
          --wait --timeout 10m || true
    depends_on: [setup-kubeconfig]

  minio:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
      MINIO_ROOT_USER:
        from_secret: minio_root_user
      MINIO_ROOT_PASSWORD:
        from_secret: minio_root_password
    commands:
      - '[ "$MINIO" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add minio https://charts.min.io --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall minio -n registry 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install minio minio/minio \
          --namespace registry --create-namespace \
          --set rootUser="$MINIO_ROOT_USER" \
          --set rootPassword="$MINIO_ROOT_PASSWORD" \
          --set replicas=4 \
          --set persistence.enabled=true \
          --set persistence.size=100Gi \
          --wait --timeout 8m || true
    depends_on: [harbor]

  configure-minio-buckets:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER:
        from_secret: minio_root_user
      MINIO_ROOT_PASSWORD:
        from_secret: minio_root_password
    commands:
      - '[ "$ACTION" = "CONFIGURE" ] || exit 0'
      - MINIO_ENDPOINT="http://minio.registry.svc.cluster.local:9000"
      - mc alias set shopos "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" || true
      - |
        for bucket in harbor-registry velero-backups loki-chunks tempo-traces \
                      thanos mlflow artifacts media-assets; do
          mc mb --ignore-existing "shopos/$bucket" || true
          echo "Bucket ready: $bucket"
        done
    depends_on: [harbor, minio]

  smoke-registry-access:
    image: curlimages/curl:latest
    environment:
      HARBOR_ADMIN_PASSWORD:
        from_secret: harbor_admin_password
    commands:
      - '[ "${ACTION:-INSTALL}" != "UNINSTALL" ] || exit 0'
      - |
        echo "=== Registry access smoke tests ==="
        HARBOR_API="http://harbor.registry.svc.cluster.local/api/v2.0/ping"
        CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$HARBOR_API" 2>/dev/null || echo "000")
        echo "Harbor API ping → $CODE"
        MINIO_API="http://minio.registry.svc.cluster.local:9000/minio/health/live"
        CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$MINIO_API" 2>/dev/null || echo "000")
        echo "MinIO health → $CODE"
    depends_on: [harbor, minio]
