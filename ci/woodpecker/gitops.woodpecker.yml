# Woodpecker CI — GitOps Tools + ArgoCD App Smoke Tests
# Role: install ArgoCD, Argo Rollouts, KEDA, Velero AND smoke-test app sync status.
# Secrets: kubeconfig_content, argocd_admin_password_hash, minio_secret_key

when:
  event: [custom, manual]

steps:
  setup-kubeconfig:
    image: alpine:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

  argocd:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
      ARGOCD_ADMIN_PASSWORD_HASH:
        from_secret: argocd_admin_password_hash
    commands:
      - '[ "$ARGOCD" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall argocd -n argocd 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --set server.replicas=2 \
          --set redis-ha.enabled=true \
          --set controller.replicas=1 \
          --set repoServer.replicas=2 \
          --set configs.secret.argocdServerAdminPassword="$ARGOCD_ADMIN_PASSWORD_HASH" \
          --wait --timeout 10m || true
    depends_on: [setup-kubeconfig]

  argo-rollouts:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$ARGO_ROLLOUTS" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - |
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install argo-rollouts argo/argo-rollouts \
          --namespace argo-rollouts --create-namespace \
          --set dashboard.enabled=true \
          --wait --timeout 5m || true
    depends_on: [argocd]

  keda:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$KEDA" = "true" ] && [ "$ACTION" != "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add kedacore https://kedacore.github.io/charts --force-update
      - |
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install keda kedacore/keda \
          --namespace keda --create-namespace \
          --set metricsServer.replicaCount=2 \
          --wait --timeout 5m || true
      - kubectl apply -f kubernetes/keda/ 2>/dev/null || true
    depends_on: [argocd]

  argocd-bootstrap:
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$ACTION" = "CONFIGURE" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s || true
      - kubectl apply -f gitops/argocd/app-of-apps.yaml 2>/dev/null || true
      - kubectl apply -f gitops/argocd/applicationsets/ 2>/dev/null || true
    depends_on: [argocd, argo-rollouts, keda]

  smoke-argocd:
    image: curlimages/curl:latest
    commands:
      - '[ "${ACTION:-INSTALL}" != "UNINSTALL" ] || exit 0'
      - |
        echo "=== ArgoCD API smoke test ==="
        CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
          "http://argocd-server.argocd.svc.cluster.local/api/v1/applications" 2>/dev/null || echo "000")
        echo "ArgoCD API → $CODE"
    depends_on: [argocd-bootstrap]
