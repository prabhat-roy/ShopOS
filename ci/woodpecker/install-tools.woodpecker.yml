# Woodpecker CI — Verify Tool Images (secondary builder role)
# Role: validate that all container images used as CI tool runners are accessible
#       from the Woodpecker runner connected to Forgejo.
# Secrets: harbor_registry, harbor_user, harbor_password

when:
  event: [custom, manual]

steps:
  verify-build-images:
    image: docker:26-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - |
        echo "=== Verifying build tool images ==="
        for img in \
          woodpeckerci/plugin-docker-buildx \
          docker:26-cli \
          alpine/helm:3.16.0 \
          alpine:3.21 \
          bitnami/kubectl:latest \
          curlimages/curl:latest \
          grafana/k6:latest \
          aquasec/trivy:latest; do
          docker pull "$img" --quiet && echo "OK  $img" || echo "WARN $img unavailable"
        done

  verify-language-images:
    image: docker:26-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - |
        echo "=== Verifying language runtime images ==="
        for img in \
          golang:1.24-alpine \
          maven:3.9-eclipse-temurin-21 \
          gradle:8.10-jdk21 \
          python:3.13-slim \
          node:22-alpine \
          rust:1.82-alpine \
          mcr.microsoft.com/dotnet/sdk:8.0; do
          docker pull "$img" --quiet && echo "OK  $img" || echo "WARN $img unavailable"
        done
    depends_on: [verify-build-images]

  verify-harbor-access:
    image: docker:26-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HARBOR_REGISTRY:
        from_secret: harbor_registry
      HARBOR_USER:
        from_secret: harbor_user
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
      - echo "Harbor login verified from Woodpecker runner"
      - docker logout "$HARBOR_REGISTRY" || true
    depends_on: [verify-language-images]

  verify-forgejo-webhook:
    image: curlimages/curl:latest
    commands:
      - |
        echo "=== Forgejo connectivity check ==="
        # Verify Woodpecker can reach Forgejo (CI_FORGE_URL is set by Woodpecker)
        FORGE="${CI_FORGE_URL:-http://forgejo.gitea.svc.cluster.local:3000}"
        CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$FORGE" 2>/dev/null || echo "000")
        echo "Forgejo $FORGE → $CODE"
    depends_on: [verify-harbor-access]
