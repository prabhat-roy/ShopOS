# Woodpecker CI — Observability Stack + Health Smoke Tests
# Role: install observability tools AND run connectivity smoke checks
#       (Woodpecker's integration test specialisation applies here too).
# Secrets: kubeconfig_content, grafana_admin_password, minio_secret_key

when:
  event: [custom, manual]

steps:
  setup-kubeconfig:
    image: alpine:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - mkdir -p ~/.kube
      - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config

  prometheus:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$PROMETHEUS" = "true" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall kube-prometheus-stack -n observability 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install kube-prometheus-stack \
          prometheus-community/kube-prometheus-stack \
          --namespace observability --create-namespace \
          --set prometheus.prometheusSpec.retention=30d \
          --set grafana.enabled=false \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --wait --timeout 10m || true
    depends_on: [setup-kubeconfig]

  grafana:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
      GRAFANA_ADMIN_PASSWORD:
        from_secret: grafana_admin_password
    commands:
      - '[ "$GRAFANA" = "true" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add grafana https://grafana.github.io/helm-charts --force-update
      - |
        [ "$ACTION" = "UNINSTALL" ] && helm uninstall grafana -n observability 2>/dev/null || true
        [ "$ACTION" != "UNINSTALL" ] && helm upgrade --install grafana grafana/grafana \
          --namespace observability --create-namespace \
          --set adminPassword="$GRAFANA_ADMIN_PASSWORD" \
          --set persistence.enabled=true \
          --set sidecar.dashboards.enabled=true \
          --wait --timeout 5m || true
    depends_on: [prometheus]

  loki-tempo:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$LOKI" = "true" ] || [ "$TEMPO" = "true" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - helm repo add grafana https://grafana.github.io/helm-charts --force-update
      - |
        [ "$LOKI" = "true" ] && [ "$ACTION" != "UNINSTALL" ] && \
          helm upgrade --install loki grafana/loki \
            --namespace observability --create-namespace \
            --set loki.auth_enabled=false \
            --set loki.storage.type=filesystem \
            --wait --timeout 8m || true
        [ "$TEMPO" = "true" ] && [ "$ACTION" != "UNINSTALL" ] && \
          helm upgrade --install tempo grafana/tempo \
            --namespace observability --create-namespace \
            --wait --timeout 5m || true
    depends_on: [grafana]

  jaeger-otel:
    image: alpine/helm:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$JAEGER" = "true" ] || [ "$OTEL_COLLECTOR" = "true" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - |
        [ "$JAEGER" = "true" ] && [ "$ACTION" != "UNINSTALL" ] && {
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts --force-update
          helm upgrade --install jaeger jaegertracing/jaeger \
            --namespace observability --create-namespace --wait --timeout 8m || true
        }
        [ "$OTEL_COLLECTOR" = "true" ] && [ "$ACTION" != "UNINSTALL" ] && {
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts --force-update
          helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
            --namespace observability --create-namespace \
            --set mode=deployment --set replicaCount=2 \
            --wait --timeout 5m || true
        }
    depends_on: [prometheus]

  smoke-observability-stack:
    image: curlimages/curl:latest
    commands:
      - '[ "${ACTION:-INSTALL}" != "UNINSTALL" ] || exit 0'
      - |
        echo "=== Observability stack smoke tests ==="
        for endpoint in \
          "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/-/ready" \
          "http://grafana.observability.svc.cluster.local:3000/api/health" \
          "http://loki.observability.svc.cluster.local:3100/ready" \
          "http://jaeger-query.observability.svc.cluster.local:16686/"; do
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$endpoint" 2>/dev/null || echo "000")
          echo "$endpoint → $CODE"
        done
    depends_on: [loki-tempo, jaeger-otel]
