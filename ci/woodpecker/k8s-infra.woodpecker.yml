# Woodpecker CI — K8s Infrastructure (Terraform) — secondary builder role
# Role: provision EKS/GKE/AKS using Terraform containers.
#       Woodpecker variant runs Terraform plan/apply with rollback support.
# Secrets: aws_access_key_id, aws_secret_access_key, gcp_service_account_key,
#          azure_client_id, azure_client_secret, azure_tenant_id, azure_subscription_id
# Params: CLOUD=aws|gcp|azure|all, ACTION=PLAN|APPLY|DESTROY

when:
  event: [custom, manual]

steps:
  tf-aws:
    image: hashicorp/terraform:1.9.0
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: aws_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: aws_secret_access_key
    commands:
      - '[ "$CLOUD" = "aws" ] || [ "$CLOUD" = "all" ] || exit 0'
      - cd infra/terraform/aws/eks
      - terraform init -input=false
      - terraform validate
      - terraform plan -out=tfplan-aws.bin -input=false
      - '[ "$ACTION" = "APPLY" ] && terraform apply -auto-approve tfplan-aws.bin || true'
      - '[ "$ACTION" = "DESTROY" ] && terraform destroy -auto-approve -input=false || true'

  tf-gcp:
    image: hashicorp/terraform:1.9.0
    environment:
      GCP_SERVICE_ACCOUNT_KEY:
        from_secret: gcp_service_account_key
    commands:
      - '[ "$CLOUD" = "gcp" ] || [ "$CLOUD" = "all" ] || exit 0'
      - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
      - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
      - cd infra/terraform/gcp/gke
      - terraform init -input=false
      - terraform plan -out=tfplan-gcp.bin -input=false
      - '[ "$ACTION" = "APPLY" ] && terraform apply -auto-approve tfplan-gcp.bin || true'
      - rm -f /tmp/gcp-key.json

  tf-azure:
    image: hashicorp/terraform:1.9.0
    environment:
      ARM_CLIENT_ID:
        from_secret: azure_client_id
      ARM_CLIENT_SECRET:
        from_secret: azure_client_secret
      ARM_TENANT_ID:
        from_secret: azure_tenant_id
      ARM_SUBSCRIPTION_ID:
        from_secret: azure_subscription_id
    commands:
      - '[ "$CLOUD" = "azure" ] || [ "$CLOUD" = "all" ] || exit 0'
      - cd infra/terraform/azure/aks
      - terraform init -input=false
      - terraform plan -out=tfplan-azure.bin -input=false
      - '[ "$ACTION" = "APPLY" ] && terraform apply -auto-approve tfplan-azure.bin || true'

  verify-cluster:
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG_CONTENT:
        from_secret: kubeconfig_content
    commands:
      - '[ "$ACTION" = "APPLY" ] || exit 0'
      - mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
      - kubectl cluster-info || echo "WARN cluster not reachable yet"
      - kubectl get nodes -o wide || true
    depends_on: [tf-aws, tf-gcp, tf-azure]
