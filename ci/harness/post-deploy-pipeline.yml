# Post-Deploy Pipeline — Harness CI/CD
# Role: Runs k6 load tests after successful deployments.
#       Uses Harness failure strategies to abort on SLO breaches.
#       Sends results to Grafana Cloud via InfluxDB output.
pipeline:
  name: shopos-post-deploy-validation
  identifier: shopos_post_deploy_validation
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: testing

  stages:
    - stage:
        name: Health Verification
        identifier: Health_Verification
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Health Check All Critical Services
                  identifier: health_check_all
                  type: Run
                  spec:
                    image: curlimages/curl:8.10.1
                    shell: Sh
                    envVariables:
                      BASE_URL: <+pipeline.variables.BASE_URL>
                    command: |
                      FAILED=0
                      ENDPOINTS="/healthz /api/v1/products /api/v1/categories"
                      for ENDPOINT in $ENDPOINTS; do
                        STATUS=$(curl -sf --max-time 15 "$BASE_URL$ENDPOINT" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
                        if [ "$STATUS" = "200" ]; then
                          echo "[PASS] $BASE_URL$ENDPOINT → $STATUS"
                        else
                          echo "[FAIL] $BASE_URL$ENDPOINT → $STATUS"
                          FAILED=1
                        fi
                      done
                      [ $FAILED -eq 1 ] && exit 1 || echo "All health checks passed"
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort

    - stage:
        name: k6 Smoke Test
        identifier: k6_Smoke_Test
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: k6 Smoke Test
                  identifier: k6_smoke
                  type: Run
                  spec:
                    image: grafana/k6:0.55.0
                    shell: Sh
                    envVariables:
                      BASE_URL: <+pipeline.variables.BASE_URL>
                      INFLUXDB_URL: <+pipeline.variables.INFLUXDB_URL>
                    command: |
                      echo "==> k6 smoke test against $BASE_URL"
                      k6 run \
                        --env BASE_URL="$BASE_URL" \
                        --vus 10 \
                        --duration 60s \
                        --out influxdb="$INFLUXDB_URL" \
                        --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
                        --thresholds '{"http_req_duration":["p(99)<1000"],"http_req_failed":["rate<0.01"]}' \
                        load-testing/k6/smoke.js
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort

    - stage:
        name: k6 Load Test
        identifier: k6_Load_Test
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: k6 Load Test Checkout Flow
                  identifier: k6_load_checkout
                  type: Run
                  spec:
                    image: grafana/k6:0.55.0
                    shell: Sh
                    envVariables:
                      BASE_URL: <+pipeline.variables.BASE_URL>
                      INFLUXDB_URL: <+pipeline.variables.INFLUXDB_URL>
                    command: |
                      echo "==> k6 load test: checkout flow"
                      k6 run \
                        --env BASE_URL="$BASE_URL" \
                        --vus 50 \
                        --duration 5m \
                        --out influxdb="$INFLUXDB_URL" \
                        --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
                        --thresholds '{"http_req_duration":["p(95)<2000"],"http_req_failed":["rate<0.05"]}' \
                        load-testing/k6/checkout-flow.js
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: ManualIntervention
                          spec:
                            timeout: 30m
                            onTimeout:
                              action:
                                type: Abort

              - step:
                  name: k6 Browse Load Test
                  identifier: k6_load_browse
                  type: Run
                  spec:
                    image: grafana/k6:0.55.0
                    shell: Sh
                    envVariables:
                      BASE_URL: <+pipeline.variables.BASE_URL>
                    command: |
                      k6 run \
                        --env BASE_URL="$BASE_URL" \
                        --vus 100 \
                        --duration 3m \
                        --thresholds '{"http_req_duration":["p(99)<3000"],"http_req_failed":["rate<0.02"]}' \
                        load-testing/k6/browse.js || true
                      echo "Browse load test complete"

    - stage:
        name: k6 Spike Test
        identifier: k6_Spike_Test
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: k6 Spike Test
                  identifier: k6_spike
                  type: Run
                  spec:
                    image: grafana/k6:0.55.0
                    shell: Sh
                    envVariables:
                      BASE_URL: <+pipeline.variables.BASE_URL>
                    command: |
                      k6 run \
                        --env BASE_URL="$BASE_URL" \
                        load-testing/k6/spike.js || true
                      echo "Spike test complete (non-blocking)"
        when:
          stageStatus: Success
          condition: <+pipeline.variables.RUN_SPIKE_TEST> == "true"

  variables:
    - name: BASE_URL
      type: String
      value: http://api-gateway.default.svc.cluster.local:8080
    - name: INFLUXDB_URL
      type: String
      value: http://influxdb.observability.svc.cluster.local:8086/k6
    - name: RUN_SPIKE_TEST
      type: String
      value: "false"
    - name: SERVICE_NAME
      type: String
      value: api-gateway

  notificationRules:
    - name: load-test-failure
      identifier: load_test_failure_notify
      pipelineEvents:
        - type: PipelineFailed
        - type: PipelineSuccess
      notificationMethod:
        type: Slack
        spec:
          webhookUrl: <+secrets.getValue("slack_webhook")>

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
