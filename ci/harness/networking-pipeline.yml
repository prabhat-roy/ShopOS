# Networking Infrastructure Pipeline — Harness CI
pipeline:
  identifier: shopos_networking
  name: ShopOS Networking Infrastructure
  projectIdentifier: shopos
  orgIdentifier: default

  variables:
    - name: ACTION
      type: String
      value: INSTALL
    - name: CILIUM
      type: String
      value: "true"
    - name: ISTIO
      type: String
      value: "true"
    - name: TRAEFIK
      type: String
      value: "true"
    - name: CONSUL
      type: String
      value: "false"

  stages:
    - stage:
        identifier: cni
        name: CNI — Cilium
        type: CI
        spec:
          cloneCodebase: false
          execution:
            steps:
              - step:
                  identifier: cilium
                  name: Install Cilium
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.CILIUM>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add cilium https://helm.cilium.io --force-update
                      helm upgrade --install cilium cilium/cilium \
                        --namespace kube-system \
                        --set hubble.enabled=true --set hubble.relay.enabled=true \
                        --set hubble.ui.enabled=true --set prometheus.enabled=true \
                        --wait --timeout 8m

    - stage:
        identifier: service_mesh
        name: Service Mesh — Istio
        type: CI
        spec:
          cloneCodebase: false
          execution:
            steps:
              - step:
                  identifier: istio
                  name: Install Istio
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.ISTIO>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
                      helm upgrade --install istio-base istio/base \
                        --namespace istio-system --create-namespace --wait --timeout 3m
                      helm upgrade --install istiod istio/istiod \
                        --namespace istio-system \
                        --set telemetry.enabled=true --wait --timeout 5m
                      helm upgrade --install istio-ingress istio/gateway \
                        --namespace istio-ingress --create-namespace --wait --timeout 5m

    - stage:
        identifier: edge_routing
        name: Edge Routing — Traefik + Consul
        type: CI
        spec:
          cloneCodebase: false
          execution:
            steps:
              - step:
                  identifier: traefik
                  name: Install Traefik
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add traefik https://traefik.github.io/charts --force-update
                      helm upgrade --install traefik traefik/traefik \
                        --namespace networking --create-namespace \
                        --set deployment.replicas=2 \
                        --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
                        --set metrics.prometheus.enabled=true \
                        --wait --timeout 5m
              - step:
                  identifier: consul
                  name: Install Consul
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.CONSUL>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
                      helm upgrade --install consul hashicorp/consul \
                        --namespace consul --create-namespace \
                        --set global.datacenter=shopos-dc1 \
                        --set server.replicas=3 \
                        --set connectInject.enabled=true \
                        --wait --timeout 8m
