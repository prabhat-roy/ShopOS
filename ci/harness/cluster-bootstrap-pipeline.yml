# Cluster Bootstrap Pipeline — Harness CI/CD
# Role: Full cluster bootstrap using Harness CD Deployment stages with approval gates.
#       Each phase is gated by the previous phase's success + an approval checkpoint.
#       Supports blue/green cluster migration via parallel staging cluster validation.
pipeline:
  name: shopos-cluster-bootstrap
  identifier: shopos_cluster_bootstrap
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: bootstrap

  stages:
    - stage:
        name: Bootstrap Preflight
        identifier: Bootstrap_Preflight
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Verify Cluster Connectivity
                  identifier: verify_cluster
                  type: Run
                  spec:
                    image: bitnami/kubectl:1.31.0
                    shell: Sh
                    command: |
                      kubectl cluster-info
                      kubectl get nodes -o wide
                      NODES=$(kubectl get nodes --no-headers | wc -l)
                      echo "Cluster nodes: $NODES"
                      [ "$NODES" -gt 0 ] || (echo "ERROR: No cluster nodes" && exit 1)
                      echo "Preflight passed"
              - step:
                  name: Apply K8s Base Manifests
                  identifier: apply_base_manifests
                  type: Run
                  spec:
                    image: bitnami/kubectl:1.31.0
                    shell: Sh
                    command: |
                      kubectl apply -f kubernetes/namespaces/ --server-side
                      kubectl apply -f kubernetes/rbac/ --server-side
                      kubectl apply -f kubernetes/network-policies/ --server-side
                      kubectl apply -f kubernetes/resource-quotas/ --server-side
                      kubectl apply -f kubernetes/pod-disruption-budgets/ --server-side
                      echo "Base K8s manifests applied"

    - stage:
        name: Approve Bootstrap Phase 1
        identifier: Approve_Phase1
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve Infrastructure Layer
                  identifier: approve_infra_layer
                  timeout: 4h
                  spec:
                    approvalMessage: |
                      Cluster preflight passed. Approve Phase 1 infrastructure installation:
                      - cert-manager, KEDA, External Secrets Operator
                      - Traefik edge router
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account.sre_team
                      minimumCount: 1

    - stage:
        name: Phase 1 Core Infrastructure
        identifier: Phase1_Core_Infra
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - parallel:
                  - step:
                      name: Install cert-manager
                      identifier: install_cert_manager
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        command: |
                          helm repo add jetstack https://charts.jetstack.io --force-update
                          helm upgrade --install cert-manager jetstack/cert-manager \
                            --namespace cert-manager --create-namespace \
                            --version v1.16.2 --set crds.enabled=true \
                            --wait --timeout 8m
                          echo "cert-manager installed"

                  - step:
                      name: Install KEDA
                      identifier: install_keda
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        command: |
                          helm repo add kedacore https://kedacore.github.io/charts --force-update
                          helm upgrade --install keda kedacore/keda \
                            --namespace keda --create-namespace \
                            --version 2.16.0 \
                            --wait --timeout 8m
                          echo "KEDA installed"

                  - step:
                      name: Install External Secrets Operator
                      identifier: install_eso
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        command: |
                          helm repo add external-secrets https://charts.external-secrets.io --force-update
                          helm upgrade --install external-secrets external-secrets/external-secrets \
                            --namespace external-secrets --create-namespace \
                            --version 0.10.5 --set installCRDs=true \
                            --wait --timeout 8m
                          echo "External Secrets Operator installed"

    - stage:
        name: Phase 2 Messaging and Observability
        identifier: Phase2_Messaging_Observability
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - parallel:
                  - step:
                      name: Install Kafka
                      identifier: install_kafka_bootstrap
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        command: |
                          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                          helm upgrade --install kafka bitnami/kafka \
                            --namespace messaging --create-namespace \
                            --version 29.3.4 \
                            --set replicaCount=3 --set kraft.enabled=true \
                            --wait --timeout 15m
                          echo "Kafka installed"

                  - step:
                      name: Install Prometheus Stack
                      identifier: install_prometheus_bootstrap
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        envVariables:
                          GRAFANA_PASS: <+secrets.getValue("grafana_admin_password")>
                        command: |
                          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
                          helm upgrade --install kube-prometheus-stack \
                            prometheus-community/kube-prometheus-stack \
                            --namespace observability --create-namespace \
                            --version 65.8.1 \
                            --set grafana.adminPassword="$GRAFANA_PASS" \
                            --wait --timeout 15m
                          echo "Prometheus stack installed"

    - stage:
        name: Bootstrap Complete Notification
        identifier: Bootstrap_Complete_Notify
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Send Bootstrap Complete Notification
                  identifier: notify_bootstrap_complete
                  type: Run
                  spec:
                    image: curlimages/curl:8.10.1
                    shell: Sh
                    envVariables:
                      SLACK_WEBHOOK: <+secrets.getValue("slack_webhook")>
                    command: |
                      curl -sf -X POST "$SLACK_WEBHOOK" \
                        -H 'Content-type: application/json' \
                        -d "{\"text\":\":rocket: ShopOS cluster bootstrap complete via Harness CI/CD. Execution: <+pipeline.executionId>\"}" || true
                      echo "Bootstrap complete. Execution: <+pipeline.executionId>"

  variables:
    - name: CLUSTER_NAME
      type: String
      value: shopos-production
    - name: TARGET_ENV
      type: String
      value: production

  notificationRules:
    - name: bootstrap-failure-alert
      identifier: bootstrap_failure_alert
      pipelineEvents:
        - type: PipelineFailed
        - type: StageFailed
      notificationMethod:
        type: Slack
        spec:
          webhookUrl: <+secrets.getValue("slack_webhook")>
          userGroups:
            - account.sre_team

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
