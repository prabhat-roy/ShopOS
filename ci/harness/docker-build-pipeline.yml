# Docker Build Pipeline — Harness CI
# Role: Builds and pushes Docker images using Harness BuildAndPushDockerRegistry step.
#       Parallel builds for multiple services with Harness matrix strategy.
# Connectors: account.harbor_connector, account.github_connector
pipeline:
  name: shopos-docker-build
  identifier: shopos_docker_build
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: build

  stages:
    - stage:
        name: Build All Services
        identifier: Build_All_Services
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
              automountServiceAccountToken: true
          execution:
            steps:
              - parallel:
                  - step:
                      name: Build API Gateway
                      identifier: build_api_gateway
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: account.harbor_connector
                        repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/api-gateway
                        tags:
                          - <+pipeline.executionId>
                          - latest
                        dockerfile: src/platform/api-gateway/Dockerfile
                        context: src/platform/api-gateway
                        caching: true

                  - step:
                      name: Build Order Service
                      identifier: build_order_service
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: account.harbor_connector
                        repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/order-service
                        tags:
                          - <+pipeline.executionId>
                          - latest
                        dockerfile: src/commerce/order-service/Dockerfile
                        context: src/commerce/order-service
                        caching: true

                  - step:
                      name: Build Payment Service
                      identifier: build_payment_service
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: account.harbor_connector
                        repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/payment-service
                        tags:
                          - <+pipeline.executionId>
                          - latest
                        dockerfile: src/commerce/payment-service/Dockerfile
                        context: src/commerce/payment-service
                        caching: true

                  - step:
                      name: Build Auth Service
                      identifier: build_auth_service
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: account.harbor_connector
                        repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/auth-service
                        tags:
                          - <+pipeline.executionId>
                          - latest
                        dockerfile: src/identity/auth-service/Dockerfile
                        context: src/identity/auth-service
                        caching: true

                  - step:
                      name: Build Product Catalog Service
                      identifier: build_product_catalog
                      type: BuildAndPushDockerRegistry
                      spec:
                        connectorRef: account.harbor_connector
                        repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/product-catalog-service
                        tags:
                          - <+pipeline.executionId>
                          - latest
                        dockerfile: src/catalog/product-catalog-service/Dockerfile
                        context: src/catalog/product-catalog-service
                        caching: true

              - step:
                  name: Trivy Scan All Built Images
                  identifier: trivy_scan_all
                  type: Run
                  spec:
                    connectorRef: account.harbor_connector
                    image: aquasec/trivy:0.57.1
                    shell: Sh
                    command: |
                      IMAGES="api-gateway order-service payment-service auth-service product-catalog-service"
                      REGISTRY="<+pipeline.variables.HARBOR_REGISTRY>/shopos"
                      TAG="<+pipeline.executionId>"
                      FAILED=0
                      for SVC in $IMAGES; do
                        echo "==> Scanning $REGISTRY/$SVC:$TAG"
                        trivy image \
                          --exit-code 0 \
                          --severity HIGH,CRITICAL \
                          --format table \
                          --no-progress \
                          "$REGISTRY/$SVC:$TAG" || FAILED=1
                      done
                      [ $FAILED -eq 1 ] && echo "WARN: Some images have HIGH/CRITICAL vulnerabilities"
                      exit 0

    - stage:
        name: Trigger Deploy
        identifier: Trigger_Deploy
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Notify Build Complete
                  identifier: notify_build
                  type: Run
                  spec:
                    image: curlimages/curl:8.10.1
                    shell: Sh
                    command: |
                      echo "Build complete. Execution: <+pipeline.executionId>"
                      echo "Images pushed to <+pipeline.variables.HARBOR_REGISTRY>/shopos/*:<+pipeline.executionId>"
                      if [ -n "<+secrets.getValue('slack_webhook')>" ]; then
                        curl -sf -X POST "<+secrets.getValue('slack_webhook')>" \
                          -H 'Content-type: application/json' \
                          -d '{"text":":hammer: ShopOS build <+pipeline.executionId> complete - images pushed to Harbor"}'
                      fi

  variables:
    - name: HARBOR_REGISTRY
      type: Secret
      value: harbor_registry_url

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
