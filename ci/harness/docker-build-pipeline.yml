# Docker-Build Pipeline — Harness CI (Open Source / Self-Hosted)
# Builds, scans (Trivy), and pushes ShopOS images to Harbor.
# Secrets: harbor_password, slack_webhook
pipeline:
  identifier: shopos_docker_build
  name: ShopOS Docker Build
  projectIdentifier: shopos
  orgIdentifier: default
  tags:
    domain: delivery
    type: docker-build

  variables:
    - name: SERVICE_NAME
      type: String
      value: <+input>
      description: "Single service name. Empty = all services in DOMAIN or all 154."
    - name: DOMAIN
      type: String
      value: <+input>
      description: "Domain filter. Empty = all 13 domains (154 services)."
    - name: IMAGE_TAG
      type: String
      value: <+input>
      description: "Docker image tag. Defaults to pipeline sequence ID."
    - name: REGISTRY_PROJECT
      type: String
      value: shopos
    - name: PUSH_IMAGE
      type: String
      value: "true"
    - name: SCAN_IMAGE
      type: String
      value: "true"
    - name: HARBOR_REGISTRY
      type: String
      value: harbor.shopos.internal

  stages:
    - stage:
        identifier: docker_build
        name: Docker Build
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: resolve_tag
                  name: Resolve Image Tag
                  type: Run
                  spec:
                    image: alpine/git:latest
                    command: |
                      GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
                      TAG="<+pipeline.variables.IMAGE_TAG>"
                      if [ -z "$TAG" ]; then
                        TAG="dev-${GIT_SHA}-<+pipeline.sequenceId>"
                      fi
                      echo "IMAGE_TAG=${TAG}" > /harness/.build.env
                      echo "Resolved tag: ${TAG}"

              - step:
                  identifier: docker_build_step
                  name: Build All Service Images
                  type: Run
                  spec:
                    image: docker:27-dind
                    privileged: true
                    envVariables:
                      HARBOR_PASSWORD: <+secrets.getValue("harbor_password")>
                    command: |
                      source /harness/.build.env
                      echo "$HARBOR_PASSWORD" | docker login "<+pipeline.variables.HARBOR_REGISTRY>" \
                        -u admin --password-stdin

                      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

                      build_svc() {
                        local domain=$1 svc=$2
                        local image="<+pipeline.variables.HARBOR_REGISTRY>/<+pipeline.variables.REGISTRY_PROJECT>/$svc:$IMAGE_TAG"
                        echo "=== Building: $image ==="
                        docker build \
                          --label "git.commit=$IMAGE_TAG" \
                          --label "domain=$domain" \
                          -t "$image" \
                          "src/$domain/$svc/" || echo "WARN build failed for $svc"
                      }

                      SVC="<+pipeline.variables.SERVICE_NAME>"
                      DOM="<+pipeline.variables.DOMAIN>"

                      if [ -n "$SVC" ] && [ -n "$DOM" ]; then
                        build_svc "$DOM" "$SVC"
                      elif [ -n "$DOM" ]; then
                        for svc_path in src/$DOM/*/; do
                          [ -d "$svc_path" ] || continue
                          build_svc "$DOM" "$(basename $svc_path)"
                        done
                      else
                        for d in $ALL_DOMAINS; do
                          for svc_path in src/$d/*/; do
                            [ -d "$svc_path" ] || continue
                            build_svc "$d" "$(basename $svc_path)"
                          done
                        done
                      fi

    - stage:
        identifier: trivy_scan
        name: Trivy Image Scan
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: trivy_scan_step
                  name: Scan Images
                  type: Run
                  spec:
                    image: aquasec/trivy:latest
                    command: |
                      if [ "<+pipeline.variables.SCAN_IMAGE>" != "true" ]; then
                        echo "Skipping Trivy scan"
                        exit 0
                      fi
                      mkdir -p /harness/reports/image-scan
                      TAG="dev-unknown-<+pipeline.sequenceId>"
                      [ -f /harness/.build.env ] && source /harness/.build.env

                      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

                      scan_svc() {
                        local svc=$1
                        local image="<+pipeline.variables.HARBOR_REGISTRY>/<+pipeline.variables.REGISTRY_PROJECT>/$svc:$IMAGE_TAG"
                        echo "=== Trivy: $image ==="
                        trivy image \
                          --exit-code 0 \
                          --severity HIGH,CRITICAL \
                          --format json \
                          --output "/harness/reports/image-scan/trivy-${svc}.json" \
                          "$image" || true
                      }

                      SVC="<+pipeline.variables.SERVICE_NAME>"
                      DOM="<+pipeline.variables.DOMAIN>"

                      if [ -n "$SVC" ]; then
                        scan_svc "$SVC"
                      elif [ -n "$DOM" ]; then
                        for svc_path in src/$DOM/*/; do
                          [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
                        done
                      else
                        for d in $ALL_DOMAINS; do
                          for svc_path in src/$d/*/; do
                            [ -d "$svc_path" ] && scan_svc "$(basename $svc_path)"
                          done
                        done
                      fi

    - stage:
        identifier: docker_push
        name: Push to Harbor
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: push_step
                  name: Push Images
                  type: Run
                  spec:
                    image: docker:27-dind
                    privileged: true
                    envVariables:
                      HARBOR_PASSWORD: <+secrets.getValue("harbor_password")>
                      SLACK_WEBHOOK: <+secrets.getValue("slack_webhook")>
                    command: |
                      if [ "<+pipeline.variables.PUSH_IMAGE>" != "true" ]; then
                        echo "Skipping push"
                        exit 0
                      fi
                      TAG="dev-unknown-<+pipeline.sequenceId>"
                      [ -f /harness/.build.env ] && source /harness/.build.env

                      echo "$HARBOR_PASSWORD" | docker login "<+pipeline.variables.HARBOR_REGISTRY>" \
                        -u admin --password-stdin

                      ALL_DOMAINS="platform identity catalog commerce supply-chain financial customer-experience communications content analytics-ai b2b integrations affiliate"

                      push_svc() {
                        local svc=$1
                        local image="<+pipeline.variables.HARBOR_REGISTRY>/<+pipeline.variables.REGISTRY_PROJECT>/$svc:$IMAGE_TAG"
                        echo "=== Pushing: $image ==="
                        docker push "$image" || echo "WARN push failed for $svc"
                      }

                      SVC="<+pipeline.variables.SERVICE_NAME>"
                      DOM="<+pipeline.variables.DOMAIN>"

                      if [ -n "$SVC" ]; then
                        push_svc "$SVC"
                      elif [ -n "$DOM" ]; then
                        for svc_path in src/$DOM/*/; do
                          [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
                        done
                      else
                        for d in $ALL_DOMAINS; do
                          for svc_path in src/$d/*/; do
                            [ -d "$svc_path" ] && push_svc "$(basename $svc_path)"
                          done
                        done
                      fi
                      docker logout "<+pipeline.variables.HARBOR_REGISTRY>" || true

                      curl -sf -X POST "$SLACK_WEBHOOK" \
                        -H 'Content-type: application/json' \
                        --data "{\"text\":\":whale: *Docker Build complete* — images pushed to <+pipeline.variables.HARBOR_REGISTRY> @ tag=$IMAGE_TAG\"}" || true
