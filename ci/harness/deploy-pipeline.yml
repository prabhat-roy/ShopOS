# Deploy Pipeline — Harness CI/CD
# Role: Blue/green and canary deployments using Harness-native deployment stages.
#       Dev → rolling, Staging → canary 20% with approval, Prod → blue/green.
# Connectors: account.k8s_connector, account.harbor_connector
# Variables: SERVICE_NAME, DOMAIN, HARBOR_REGISTRY (secret)
pipeline:
  name: shopos-advanced-deploy
  identifier: shopos_advanced_deploy
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: deployment

  stages:
    - stage:
        name: Build
        identifier: Build
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: tekton-pipelines
          execution:
            steps:
              - step:
                  name: Docker Build and Push
                  identifier: docker_build
                  type: BuildAndPushDockerRegistry
                  spec:
                    connectorRef: account.harbor_connector
                    repo: <+pipeline.variables.HARBOR_REGISTRY>/shopos/<+pipeline.variables.SERVICE_NAME>
                    tags:
                      - <+pipeline.executionId>
                      - latest
                    dockerfile: src/<+pipeline.variables.DOMAIN>/<+pipeline.variables.SERVICE_NAME>/Dockerfile
                    context: src/<+pipeline.variables.DOMAIN>/<+pipeline.variables.SERVICE_NAME>
                    buildArgs:
                      BUILD_VERSION: <+pipeline.executionId>
                      BUILD_DATE: <+currentDate>

    - stage:
        name: Deploy Dev
        identifier: Deploy_Dev
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+pipeline.variables.SERVICE_NAME>
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources:
                        - identifier: harbor_image
                          spec:
                            connectorRef: account.harbor_connector
                            imagePath: shopos/<+pipeline.variables.SERVICE_NAME>
                            tag: <+pipeline.executionId>
                          type: DockerRegistry
          environment:
            environmentRef: dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: dev_k8s
          execution:
            steps:
              - step:
                  name: Rolling Deploy to Dev
                  identifier: rolling_deploy_dev
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  name: Rolling Rollback Dev
                  identifier: rolling_rollback_dev
                  type: K8sRollingRollback
                  timeout: 5m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

    - stage:
        name: Canary Deploy Staging
        identifier: Canary_Staging
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+pipeline.variables.SERVICE_NAME>
          environment:
            environmentRef: staging
            deployToAll: false
            infrastructureDefinitions:
              - identifier: staging_k8s
          execution:
            steps:
              - step:
                  name: Canary Deploy 20%
                  identifier: canary_20
                  type: K8sCanaryDeploy
                  timeout: 10m
                  spec:
                    instanceSelection:
                      type: Percentage
                      spec:
                        percentage: 20
                    skipDryRun: false
              - step:
                  type: HarnessApproval
                  name: Approve Canary Promotion to 100%
                  identifier: approve_canary_staging
                  timeout: 1d
                  spec:
                    approvalMessage: |
                      Review canary 20% metrics in Grafana before promoting.
                      Error rate, P99 latency, and throughput must be within SLO thresholds.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account.platform_team
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs:
                      - name: error_rate_ok
                        defaultValue: "true"
                      - name: latency_ok
                        defaultValue: "true"
              - step:
                  name: Promote Canary 100%
                  identifier: canary_100_staging
                  type: K8sCanaryDelete
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

    - stage:
        name: Blue/Green Deploy Production
        identifier: BlueGreen_Production
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+pipeline.variables.SERVICE_NAME>
          environment:
            environmentRef: production
            deployToAll: false
            infrastructureDefinitions:
              - identifier: production_k8s
          execution:
            steps:
              - step:
                  type: HarnessApproval
                  name: Approve Production Deployment
                  identifier: approve_production
                  timeout: 4h
                  spec:
                    approvalMessage: |
                      Approve blue/green production deployment for <+pipeline.variables.SERVICE_NAME>.
                      Staging canary passed. Review production readiness checklist.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account.platform_team
                        - account.sre_team
                      minimumCount: 2
                      disallowPipelineExecutor: true
              - step:
                  name: Blue/Green Deploy Production
                  identifier: bg_deploy_production
                  type: K8sBlueGreenDeploy
                  timeout: 15m
                  spec:
                    skipDryRun: false
                    pruneResources: true
              - step:
                  type: HarnessApproval
                  name: Approve Blue/Green Traffic Switch
                  identifier: approve_traffic_switch
                  timeout: 30m
                  spec:
                    approvalMessage: |
                      Green environment is deployed. Approve traffic switch from Blue to Green.
                      Verify green health in Grafana before approving.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account.sre_team
                      minimumCount: 1
              - step:
                  name: Blue/Green Traffic Switch
                  identifier: bg_swap_production
                  type: K8sSwapServiceSelectors
                  timeout: 5m
              - step:
                  name: Delete Blue Environment
                  identifier: delete_blue
                  type: K8sBlueGreenStageScaleDown
                  timeout: 5m
            rollbackSteps:
              - step:
                  name: Blue/Green Rollback
                  identifier: bg_rollback
                  type: K8sBlueGreenRollback
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

  variables:
    - name: SERVICE_NAME
      type: String
      value: api-gateway
    - name: DOMAIN
      type: String
      value: platform
    - name: HARBOR_REGISTRY
      type: Secret
      value: harbor_registry_url
    - name: CANARY_WEIGHT_PERCENT
      type: Number
      value: 20

  notificationRules:
    - name: on-failure
      identifier: on_failure_slack
      pipelineEvents:
        - type: PipelineFailed
        - type: StageRollback
      notificationMethod:
        type: Slack
        spec:
          userGroups:
            - account.platform_team
          webhookUrl: <+secrets.getValue("slack_webhook")>

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
