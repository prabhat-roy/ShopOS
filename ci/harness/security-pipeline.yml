# Security Infrastructure Pipeline — Harness CI
pipeline:
  identifier: shopos_security
  name: ShopOS Security Infrastructure
  projectIdentifier: shopos
  orgIdentifier: default

  variables:
    - name: ACTION
      type: String
      value: INSTALL
    - name: CERT_MANAGER
      type: String
      value: "true"
    - name: VAULT
      type: String
      value: "true"
    - name: KEYCLOAK
      type: String
      value: "true"
    - name: KYVERNO
      type: String
      value: "true"
    - name: FALCO
      type: String
      value: "true"

  stages:
    - stage:
        identifier: cert_manager
        name: cert-manager
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: install
                  name: Install cert-manager
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.CERT_MANAGER>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add jetstack https://charts.jetstack.io --force-update
                      helm upgrade --install cert-manager jetstack/cert-manager \
                        --namespace cert-manager --create-namespace \
                        --set installCRDs=true --set replicaCount=2 --wait --timeout 5m

    - stage:
        identifier: vault_keycloak
        name: Vault + Keycloak
        type: CI
        spec:
          cloneCodebase: false
          execution:
            steps:
              - step:
                  identifier: vault
                  name: Install Vault HA
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.VAULT>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
                      helm upgrade --install vault hashicorp/vault \
                        --namespace vault --create-namespace \
                        --set server.ha.enabled=true --set server.ha.raft.enabled=true \
                        --set server.ha.replicas=3 --wait --timeout 10m
              - step:
                  identifier: keycloak
                  name: Install Keycloak
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                      KEYCLOAK_ADMIN_PASSWORD: <+secrets.getValue("keycloak_admin_password")>
                    command: |
                      [ "<+pipeline.variables.KEYCLOAK>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                      helm upgrade --install keycloak bitnami/keycloak \
                        --namespace keycloak --create-namespace \
                        --set replicaCount=2 \
                        --set auth.adminPassword="$KEYCLOAK_ADMIN_PASSWORD" \
                        --set postgresql.enabled=true --wait --timeout 10m

    - stage:
        identifier: policy_runtime
        name: Policy + Runtime Security
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: kyverno
                  name: Install Kyverno
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                    command: |
                      [ "<+pipeline.variables.KYVERNO>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add kyverno https://kyverno.github.io/kyverno --force-update
                      helm upgrade --install kyverno kyverno/kyverno \
                        --namespace kyverno --create-namespace \
                        --set replicaCount=3 --wait --timeout 5m
                      kubectl apply -f security/kyverno/ 2>/dev/null || true
              - step:
                  identifier: falco
                  name: Install Falco
                  type: Run
                  spec:
                    image: alpine/helm:latest
                    envVariables:
                      KUBECONFIG_CONTENT: <+secrets.getValue("kubeconfig_content")>
                      SLACK_WEBHOOK: <+secrets.getValue("slack_webhook")>
                    command: |
                      [ "<+pipeline.variables.FALCO>" = "true" ] || { echo "Skipped"; exit 0; }
                      mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                      helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
                      helm upgrade --install falco falcosecurity/falco \
                        --namespace falco --create-namespace \
                        --set driver.kind=ebpf \
                        --set falcosidekick.enabled=true \
                        --set falcosidekick.config.slack.webhookurl="$SLACK_WEBHOOK" \
                        --wait --timeout 8m
