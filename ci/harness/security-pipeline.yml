# Security Pipeline — Harness CI/CD
# Role: SAST, container scanning (Trivy/OWASP), and security gate with
#       Harness failure strategies. Blocks deployment on CRITICAL findings.
# Uses Harness-native Run steps with custom security images.
pipeline:
  name: shopos-security-scan
  identifier: shopos_security_scan
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: security

  stages:
    - stage:
        name: SAST Scanning
        identifier: SAST_Scanning
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - parallel:
                  - step:
                      name: Semgrep SAST
                      identifier: semgrep_sast
                      type: Run
                      spec:
                        image: returntocorp/semgrep:1.94.0
                        shell: Sh
                        command: |
                          echo "==> Semgrep SAST scan"
                          semgrep --config=auto \
                            --json \
                            --output=/tmp/semgrep-report.json \
                            --no-git-ignore \
                            src/ 2>&1 | tail -20
                          FINDINGS=$(python3 -c "import json; d=json.load(open('/tmp/semgrep-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "0")
                          echo "SAST findings: $FINDINGS"
                          # Custom rules
                          if [ -d "security/semgrep" ]; then
                            semgrep --config=security/semgrep --json --output=/tmp/semgrep-custom.json src/ 2>&1 || true
                          fi

                  - step:
                      name: Gitleaks Secret Scan
                      identifier: gitleaks_scan
                      type: Run
                      spec:
                        image: zricethezav/gitleaks:latest
                        shell: Sh
                        command: |
                          gitleaks detect \
                            --source . \
                            --report-format json \
                            --report-path /tmp/gitleaks-report.json \
                            --exit-code 0 2>&1 || true
                          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/gitleaks-report.json')); print(len(d))" 2>/dev/null || echo "0")
                          echo "Potential secrets found: $COUNT"
                          [ "$COUNT" -gt 0 ] && echo "WARNING: Review /tmp/gitleaks-report.json"

                  - step:
                      name: Checkov IaC Scan
                      identifier: checkov_iac
                      type: Run
                      spec:
                        image: bridgecrew/checkov:latest
                        shell: Sh
                        command: |
                          checkov -d infra/ \
                            --output json \
                            --output-file-path /tmp/checkov-report \
                            --soft-fail 2>&1 | tail -20
                          checkov -d kubernetes/ \
                            --output json \
                            --output-file-path /tmp/checkov-k8s-report \
                            --soft-fail 2>&1 | tail -10 || true
                          echo "IaC scan complete"

    - stage:
        name: Container Image Scanning
        identifier: Container_Scanning
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Trivy Critical CVE Gate
                  identifier: trivy_critical_gate
                  type: Run
                  spec:
                    image: aquasec/trivy:0.57.1
                    shell: Sh
                    envVariables:
                      IMAGE_REF: <+pipeline.variables.HARBOR_REGISTRY>/shopos/<+pipeline.variables.SERVICE_NAME>:<+pipeline.variables.IMAGE_TAG>
                    command: |
                      echo "==> Trivy scan: $IMAGE_REF"
                      trivy image \
                        --exit-code 1 \
                        --severity CRITICAL \
                        --format table \
                        --no-progress \
                        "$IMAGE_REF" 2>&1
                      EXIT=$?
                      if [ $EXIT -ne 0 ]; then
                        echo "CRITICAL CVEs found! Blocking deployment."
                        exit 1
                      fi
                      echo "No CRITICAL CVEs found. Gate passed."
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort

              - step:
                  name: Trivy HIGH CVE Report
                  identifier: trivy_high_report
                  type: Run
                  spec:
                    image: aquasec/trivy:0.57.1
                    shell: Sh
                    envVariables:
                      IMAGE_REF: <+pipeline.variables.HARBOR_REGISTRY>/shopos/<+pipeline.variables.SERVICE_NAME>:<+pipeline.variables.IMAGE_TAG>
                    command: |
                      trivy image \
                        --exit-code 0 \
                        --severity HIGH \
                        --format json \
                        --output /tmp/trivy-high-report.json \
                        --no-progress \
                        "$IMAGE_REF" 2>&1 || true
                      echo "HIGH CVE report generated (non-blocking)"

              - step:
                  name: Generate SBOM
                  identifier: generate_sbom
                  type: Run
                  spec:
                    image: aquasec/trivy:0.57.1
                    shell: Sh
                    envVariables:
                      IMAGE_REF: <+pipeline.variables.HARBOR_REGISTRY>/shopos/<+pipeline.variables.SERVICE_NAME>:<+pipeline.variables.IMAGE_TAG>
                    command: |
                      trivy image \
                        --format cyclonedx \
                        --output /tmp/sbom-<+pipeline.variables.SERVICE_NAME>.json \
                        --no-progress \
                        "$IMAGE_REF" || true
                      echo "SBOM generated for $IMAGE_REF"

    - stage:
        name: OWASP ZAP DAST
        identifier: OWASP_ZAP_DAST
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: ZAP Baseline Scan
                  identifier: zap_baseline
                  type: Run
                  spec:
                    image: ghcr.io/zaproxy/zaproxy:stable
                    shell: Sh
                    envVariables:
                      TARGET_URL: <+pipeline.variables.TARGET_URL>
                    command: |
                      if [ -z "$TARGET_URL" ]; then
                        echo "TARGET_URL not set, skipping DAST"
                        exit 0
                      fi
                      zap-baseline.py \
                        -t "$TARGET_URL" \
                        -r /tmp/zap-report.html \
                        -J /tmp/zap-report.json \
                        -I 2>&1 | tail -30 || true
                      echo "ZAP baseline scan complete"
        when:
          stageStatus: Success
          condition: <+pipeline.variables.RUN_DAST> == "true"

  variables:
    - name: SERVICE_NAME
      type: String
      value: api-gateway
    - name: IMAGE_TAG
      type: String
      value: latest
    - name: HARBOR_REGISTRY
      type: Secret
      value: harbor_registry_url
    - name: TARGET_URL
      type: String
      value: ""
    - name: RUN_DAST
      type: String
      value: "false"

  notificationRules:
    - name: security-critical-failure
      identifier: security_critical_notify
      pipelineEvents:
        - type: PipelineFailed
        - type: StageSuccess
      notificationMethod:
        type: Slack
        spec:
          webhookUrl: <+secrets.getValue("slack_webhook")>

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
