# Install Tools Pipeline — Harness CI/CD
# Role: Verifies tool availability and installs prerequisites using Harness Run steps.
#       Acts as preflight for all other Harness pipelines.
pipeline:
  name: shopos-install-tools
  identifier: shopos_install_tools
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: tooling

  stages:
    - stage:
        name: Verify CI Tools
        identifier: Verify_CI_Tools
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - parallel:
                  - step:
                      name: Verify kubectl and Helm
                      identifier: verify_kubectl_helm
                      type: Run
                      spec:
                        image: alpine/helm:3.16.2
                        shell: Sh
                        command: |
                          helm version --short
                          kubectl version --client --short 2>/dev/null || kubectl version --client
                          echo "kubectl and Helm verified"

                  - step:
                      name: Verify Terraform
                      identifier: verify_terraform
                      type: Run
                      spec:
                        image: hashicorp/terraform:1.9.8
                        shell: Sh
                        command: |
                          terraform version
                          echo "Terraform verified"

                  - step:
                      name: Verify Trivy
                      identifier: verify_trivy
                      type: Run
                      spec:
                        image: aquasec/trivy:0.57.1
                        shell: Sh
                        command: |
                          trivy version
                          echo "Trivy verified"

                  - step:
                      name: Verify k6
                      identifier: verify_k6
                      type: Run
                      spec:
                        image: grafana/k6:0.55.0
                        shell: Sh
                        command: |
                          k6 version
                          echo "k6 verified"

                  - step:
                      name: Verify Semgrep
                      identifier: verify_semgrep
                      type: Run
                      spec:
                        image: returntocorp/semgrep:1.94.0
                        shell: Sh
                        command: |
                          semgrep --version
                          echo "Semgrep verified"

                  - step:
                      name: Verify ArgoCD CLI
                      identifier: verify_argocd
                      type: Run
                      spec:
                        image: argoproj/argocd:v2.13.0
                        shell: Sh
                        command: |
                          argocd version --client
                          echo "ArgoCD CLI verified"

    - stage:
        name: Verify Cluster Access
        identifier: Verify_Cluster_Access
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Check Cluster Connectivity and Resources
                  identifier: check_cluster
                  type: Run
                  spec:
                    image: bitnami/kubectl:1.31.0
                    shell: Sh
                    command: |
                      echo "==> Cluster Info"
                      kubectl cluster-info
                      echo ""
                      echo "==> Nodes"
                      kubectl get nodes -o wide
                      echo ""
                      echo "==> Namespaces"
                      kubectl get namespaces
                      echo ""
                      echo "==> Storage Classes"
                      kubectl get storageclass
                      echo ""
                      echo "==> Existing Helm Releases"
                      helm list -A 2>/dev/null || true

              - step:
                  name: Verify Harbor Connectivity
                  identifier: verify_harbor
                  type: Run
                  spec:
                    image: curlimages/curl:8.10.1
                    shell: Sh
                    envVariables:
                      HARBOR_URL: http://harbor.harbor.svc.cluster.local:80
                    command: |
                      STATUS=$(curl -sf --max-time 10 "$HARBOR_URL/api/v2.0/ping" \
                        -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
                      echo "Harbor API: $STATUS"
                      [ "$STATUS" = "200" ] \
                        && echo "Harbor reachable" \
                        || echo "WARN: Harbor not yet deployed (expected before registry-pipeline runs)"
                      exit 0

  variables:
    - name: CLUSTER_NAME
      type: String
      value: shopos-cluster

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
