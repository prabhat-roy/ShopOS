# GitOps Pipeline — Harness CI/CD
# Role: ArgoCD sync and Flux reconciliation via Harness CD stages.
#       Uses Harness GitOps agent for cluster-level sync operations.
pipeline:
  name: shopos-gitops-sync
  identifier: shopos_gitops_sync
  projectIdentifier: ShopOS
  orgIdentifier: default
  tags:
    app: shopos
    role: gitops

  stages:
    - stage:
        name: Update GitOps Manifests
        identifier: Update_GitOps_Manifests
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Update Image Tag in Helm Values
                  identifier: update_helm_values
                  type: Run
                  spec:
                    image: alpine/git:2.47.0
                    shell: Sh
                    envVariables:
                      SERVICE_NAME: <+pipeline.variables.SERVICE_NAME>
                      IMAGE_TAG: <+pipeline.variables.IMAGE_TAG>
                      GITOPS_REPO: <+pipeline.variables.GITOPS_REPO>
                      GIT_TOKEN: <+secrets.getValue("github_token")>
                    command: |
                      git config --global user.email "harness-ci@shopos.internal"
                      git config --global user.name "Harness CI"
                      git clone "https://$GIT_TOKEN@$GITOPS_REPO" /tmp/gitops-repo
                      cd /tmp/gitops-repo
                      # Update image tag in ArgoCD app values
                      VALUES_FILE="gitops/argocd/apps/$SERVICE_NAME/values.yaml"
                      if [ -f "$VALUES_FILE" ]; then
                        sed -i "s|tag:.*|tag: \"$IMAGE_TAG\"|g" "$VALUES_FILE"
                        git add "$VALUES_FILE"
                        git commit -m "chore: update $SERVICE_NAME to $IMAGE_TAG [skip ci]"
                        git push origin main
                        echo "Updated $VALUES_FILE with tag $IMAGE_TAG"
                      else
                        echo "Values file not found: $VALUES_FILE (non-blocking)"
                      fi

    - stage:
        name: ArgoCD Sync
        identifier: ArgoCD_Sync
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: <+pipeline.variables.SERVICE_NAME>
          environment:
            environmentRef: <+pipeline.variables.TARGET_ENV>
          execution:
            steps:
              - step:
                  name: ArgoCD Sync via Harness GitOps
                  identifier: argocd_sync_harness
                  type: GitOpsSync
                  timeout: 10m
                  spec:
                    prune: true
                    dryRun: false
                    applyOnly: false
                    forceApply: false
            rollbackSteps:
              - step:
                  name: ArgoCD Rollback
                  identifier: argocd_rollback
                  type: GitOpsSync
                  spec:
                    prune: false
                    dryRun: false

    - stage:
        name: Verify GitOps Sync
        identifier: Verify_GitOps_Sync
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s_connector
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Verify ArgoCD App Health
                  identifier: verify_argocd_health
                  type: Run
                  spec:
                    image: argoproj/argocd:v2.13.0
                    shell: Sh
                    envVariables:
                      ARGOCD_SERVER: argocd-server.argocd.svc.cluster.local
                      ARGOCD_USERNAME: <+secrets.getValue("argocd_username")>
                      ARGOCD_PASSWORD: <+secrets.getValue("argocd_password")>
                      APP_NAME: <+pipeline.variables.SERVICE_NAME>
                    command: |
                      argocd login $ARGOCD_SERVER \
                        --username $ARGOCD_USERNAME \
                        --password $ARGOCD_PASSWORD \
                        --insecure --grpc-web
                      argocd app wait $APP_NAME \
                        --health \
                        --timeout 300
                      echo "ArgoCD app $APP_NAME is healthy"
                      argocd app get $APP_NAME

  variables:
    - name: SERVICE_NAME
      type: String
      value: api-gateway
    - name: IMAGE_TAG
      type: String
      value: latest
    - name: TARGET_ENV
      type: String
      value: production
    - name: GITOPS_REPO
      type: String
      value: github.com/shopos/shopos.git

  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: shopos/shopos
        build: <+input>
