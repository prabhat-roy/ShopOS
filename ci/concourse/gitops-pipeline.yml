# Concourse CI — GitOps Health Check Pipeline (resource-based)
# Role: Periodically verify ArgoCD, Argo Rollouts, and KEDA health.
#       Nightly sync-status check across all ArgoCD applications.
#       App-of-apps bootstrap is manual-trigger only.
# Credentials: ((kubeconfig.content)), ((argocd.password)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: gitops-check
    type: time
    source:
      interval: 15m

  - name: nightly-sync-check
    type: time
    source:
      interval: 24h
      start: 5:00 AM
      stop: 6:00 AM
      location: UTC

  - name: trigger-manual
    type: time
    source:
      interval: 8760h

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: check-argocd-health
    plan:
      - get: gitops-check
        trigger: true
      - task: argocd-api-health
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          params:
            ARGOCD_PASSWORD: ((argocd.password))
          run:
            path: sh
            args:
              - -c
              - |
                ARGOCD_URL="http://argocd-server.argocd.svc:80"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$ARGOCD_URL/healthz" || echo "000")
                echo "ArgoCD /healthz → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || { echo "FAIL"; exit 1; }
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *ArgoCD server unhealthy* — /healthz failed (Concourse health check)"

  - name: check-keda-ready
    plan:
      - get: gitops-check
        trigger: true
      - task: keda-metrics-server
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kubectl
              tag: latest
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube
                echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                READY=$(kubectl get deployment keda-operator -n keda \
                  -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                echo "KEDA operator ready replicas: $READY"
                [ "${READY:-0}" -gt 0 ] && echo "PASS" || echo "WARN KEDA operator not ready"

  - name: nightly-argocd-sync-report
    plan:
      - get: nightly-sync-check
        trigger: true
      - task: argocd-app-sync-status
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: argoproj/argocd
              tag: latest
          params:
            ARGOCD_SERVER: argocd-server.argocd.svc
            ARGOCD_AUTH_TOKEN: ((argocd.auth_token))
          run:
            path: sh
            args:
              - -c
              - |
                echo "=== Nightly ArgoCD Sync Status Report ==="
                export ARGOCD_SERVER ARGOCD_AUTH_TOKEN
                APPS=$(argocd app list --grpc-web -o name 2>/dev/null || echo "")
                if [ -z "$APPS" ]; then
                  echo "WARN no apps found or ArgoCD unreachable"
                  exit 0
                fi
                OUT_OF_SYNC=0
                DEGRADED=0
                for APP in $APPS; do
                  SYNC=$(argocd app get "$APP" --grpc-web -o json 2>/dev/null | \
                    grep -o '"syncStatus":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "Unknown")
                  HEALTH=$(argocd app get "$APP" --grpc-web -o json 2>/dev/null | \
                    grep -o '"healthStatus":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "Unknown")
                  if [ "$SYNC" != "Synced" ]; then
                    echo "OUT-OF-SYNC  $APP (sync=$SYNC, health=$HEALTH)"
                    OUT_OF_SYNC=$((OUT_OF_SYNC + 1))
                  elif [ "$HEALTH" != "Healthy" ]; then
                    echo "DEGRADED     $APP (health=$HEALTH)"
                    DEGRADED=$((DEGRADED + 1))
                  else
                    echo "OK           $APP"
                  fi
                done
                echo ""
                echo "Summary: $OUT_OF_SYNC out-of-sync, $DEGRADED degraded"
                [ "$OUT_OF_SYNC" -eq 0 ] && [ "$DEGRADED" -eq 0 ] || exit 1
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *ArgoCD sync report: apps out-of-sync or degraded* — check ArgoCD dashboard (Concourse nightly)"
        on_success:
          put: slack-alert
          params:
            text: ":white_check_mark: *ArgoCD nightly sync report: all apps Synced+Healthy* (Concourse)"

  - name: argocd-bootstrap
    plan:
      - get: shopos-repo
      - get: trigger-manual
        trigger: false
      - task: apply-app-of-apps
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kubectl
              tag: latest
          inputs:
            - name: shopos-repo
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube
                echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                echo "=== ArgoCD Bootstrap ==="
                kubectl wait --for=condition=available deployment/argocd-server \
                  -n argocd --timeout=120s
                kubectl apply -f shopos-repo/gitops/argocd/app-of-apps.yaml
                kubectl apply -f shopos-repo/gitops/argocd/applicationsets/ 2>/dev/null || true
                echo "App-of-apps applied"
        on_failure:
          put: slack-alert
          params:
            text: ":x: *ArgoCD bootstrap FAILED* — app-of-apps not applied (Concourse)"
        on_success:
          put: slack-alert
          params:
            text: ":rocket: *ArgoCD bootstrap complete* — app-of-apps syncing (Concourse)"
