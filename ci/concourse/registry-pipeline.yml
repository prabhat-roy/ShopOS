# Registry Tools Pipeline — Concourse CI
# Credentials: kubeconfig, harbor-credentials, minio-credentials
---
resources:
  - name: trigger-manual
    type: time
    source:
      interval: 8760h

jobs:
  - name: install-harbor
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            HARBOR_ADMIN_PASSWORD: ((harbor.admin_password))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall harbor -n registry 2>/dev/null || true; exit 0
                fi
                helm repo add harbor https://helm.goharbor.io --force-update
                helm upgrade --install harbor harbor/harbor \
                  --namespace registry --create-namespace \
                  --set expose.type=ingress \
                  --set expose.ingress.className=traefik \
                  --set expose.ingress.hosts.core=harbor.shopos.internal \
                  --set externalURL=https://harbor.shopos.internal \
                  --set harborAdminPassword="$HARBOR_ADMIN_PASSWORD" \
                  --set trivy.enabled=true --set persistence.enabled=true \
                  --wait --timeout 10m

  - name: install-minio
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            MINIO_ROOT_USER: ((minio.root_user))
            MINIO_ROOT_PASSWORD: ((minio.root_password))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall minio -n registry 2>/dev/null || true; exit 0
                fi
                helm repo add minio https://charts.min.io --force-update
                helm upgrade --install minio minio/minio \
                  --namespace registry \
                  --set rootUser="$MINIO_ROOT_USER" \
                  --set rootPassword="$MINIO_ROOT_PASSWORD" \
                  --set replicas=4 \
                  --set persistence.enabled=true --set persistence.size=100Gi \
                  --wait --timeout 8m

  - name: install-nexus
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
            NEXUS_ENABLED: ((nexus_enabled))
          run:
            path: sh
            args:
              - -c
              - |
                [ "$NEXUS_ENABLED" = "true" ] || { echo "Skipped"; exit 0; }
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall nexus -n registry 2>/dev/null || true; exit 0
                fi
                helm repo add sonatype https://sonatype.github.io/helm3-charts --force-update
                helm upgrade --install nexus sonatype/nexus-repository-manager \
                  --namespace registry \
                  --set persistence.enabled=true --set persistence.storageSize=200Gi \
                  --wait --timeout 8m

  - name: configure-buckets
    plan:
      - get: trigger-manual
        trigger: false
        passed: [install-harbor, install-minio]
      - task: create-buckets
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: minio/mc}
          params:
            MINIO_ROOT_USER: ((minio.root_user))
            MINIO_ROOT_PASSWORD: ((minio.root_password))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                [ "$ACTION" = "CONFIGURE" ] || { echo "Skipped"; exit 0; }
                mc alias set shopos http://minio.registry.svc:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
                for BUCKET in harbor-registry velero-backups loki-chunks tempo-traces thanos mlflow artifacts media-assets; do
                  mc mb --ignore-existing "shopos/$BUCKET" || true
                  echo "Bucket ready: $BUCKET"
                done
