# Concourse CI — Docker Build Pipeline (resource-based)
# Role: build images using Concourse's OCI build task resource model.
# Credentials: ((harbor.registry)), ((harbor.username)), ((harbor.password)),
#              ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: harbor-api-gateway
    type: registry-image
    source:
      repository: ((harbor.registry))/shopos/api-gateway
      username: ((harbor.username))
      password: ((harbor.password))

  - name: harbor-order-service
    type: registry-image
    source:
      repository: ((harbor.registry))/shopos/order-service
      username: ((harbor.username))
      password: ((harbor.password))

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: build-api-gateway
    plan:
      - get: shopos-repo
        trigger: true
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: shopos-repo
          outputs:
            - name: image
          params:
            CONTEXT: shopos-repo/src/platform/api-gateway
            DOCKERFILE: shopos-repo/src/platform/api-gateway/Dockerfile
          run:
            path: build
      - task: trivy-scan
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: aquasec/trivy
          inputs:
            - name: image
          run:
            path: sh
            args:
              - -c
              - |
                trivy image --severity HIGH,CRITICAL --exit-code 0 \
                  --input image/image.tar || true
      - put: harbor-api-gateway
        params:
          image: image/image.tar
          additional_tags: shopos-repo/.git/short_ref

  - name: build-order-service
    plan:
      - get: shopos-repo
        trigger: true
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: shopos-repo
          outputs:
            - name: image
          params:
            CONTEXT: shopos-repo/src/commerce/order-service
            DOCKERFILE: shopos-repo/src/commerce/order-service/Dockerfile
          run:
            path: build
      - put: harbor-order-service
        params:
          image: image/image.tar
          additional_tags: shopos-repo/.git/short_ref

  - name: build-remaining-batch
    plan:
      - get: shopos-repo
        passed: [build-api-gateway, build-order-service]
        trigger: true
      - task: batch-build-push
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: docker
              tag: 26-cli
          inputs:
            - name: shopos-repo
          params:
            HARBOR_REGISTRY: ((harbor.registry))
            HARBOR_USER: ((harbor.username))
            HARBOR_PASSWORD: ((harbor.password))
          run:
            path: sh
            args:
              - -c
              - |
                echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
                IMAGE_TAG=$(cat shopos-repo/.git/short_ref 2>/dev/null || echo "latest")
                for domain in platform identity catalog commerce supply-chain financial \
                              customer-experience communications content analytics-ai \
                              b2b integrations affiliate; do
                  for dir in shopos-repo/src/$domain/*/; do
                    [ -d "$dir" ] || continue
                    SVC=$(basename "$dir")
                    docker build -t "$HARBOR_REGISTRY/shopos/$SVC:$IMAGE_TAG" "$dir" \
                      && docker push "$HARBOR_REGISTRY/shopos/$SVC:$IMAGE_TAG" \
                      || echo "WARN $SVC build/push failed"
                  done
                done
        on_success:
          put: slack-alert
          params:
            text: ":whale: *Concourse batch build complete* — all images pushed"
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Concourse batch build FAILED*"
