# Concourse CI — Messaging Infrastructure + Health Check Resources
# Role: install messaging tools AND continuously monitor topic/broker health via time resource.
# Credentials: ((kubeconfig.content)), ((rabbitmq.password)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: trigger-manual
    type: time
    source:
      interval: 8760h

  - name: messaging-health-check
    type: time
    source:
      interval: 15m

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: install-kafka
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install-kafka
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine/helm
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                [ "$ACTION" = "UNINSTALL" ] && helm uninstall kafka -n messaging 2>/dev/null || true && exit 0
                helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                helm upgrade --install kafka bitnami/kafka \
                  --namespace messaging --create-namespace \
                  --set replicaCount=3 --set kraft.enabled=true \
                  --set defaultReplicationFactor=3 \
                  --wait --timeout 10m

  - name: install-rabbitmq
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install-rabbitmq
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine/helm
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            RABBITMQ_PASSWORD: ((rabbitmq.password))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                [ "$ACTION" = "UNINSTALL" ] && helm uninstall rabbitmq -n messaging 2>/dev/null || true && exit 0
                helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
                helm upgrade --install rabbitmq bitnami/rabbitmq \
                  --namespace messaging \
                  --set replicaCount=3 --set auth.password="$RABBITMQ_PASSWORD" \
                  --set clustering.enabled=true --wait --timeout 8m

  - name: install-nats
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install-nats
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine/helm
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                [ "$ACTION" = "UNINSTALL" ] && helm uninstall nats -n messaging 2>/dev/null || true && exit 0
                helm repo add nats https://nats-io.github.io/k8s/helm/charts --force-update
                helm upgrade --install nats nats/nats \
                  --namespace messaging \
                  --set config.jetstream.enabled=true \
                  --set cluster.enabled=true --set cluster.replicas=3 \
                  --wait --timeout 5m

  - name: create-kafka-topics
    plan:
      - get: trigger-manual
        trigger: false
        passed: [install-kafka]
      - task: create-topics
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kafka
          params:
            KAFKA_BOOTSTRAP: ((kafka.bootstrap_servers))
          run:
            path: sh
            args:
              - -c
              - |
                KAFKA_BS="${KAFKA_BOOTSTRAP:-kafka.messaging.svc.cluster.local:9092}"
                for topic in \
                  identity.user.registered identity.user.deleted \
                  commerce.order.placed commerce.order.cancelled commerce.order.fulfilled \
                  commerce.payment.processed commerce.payment.failed commerce.cart.abandoned \
                  supplychain.shipment.created supplychain.shipment.updated \
                  supplychain.inventory.low supplychain.inventory.restocked \
                  notification.email.requested notification.sms.requested notification.push.requested \
                  analytics.page.viewed analytics.product.clicked analytics.search.performed \
                  security.fraud.detected security.login.failed; do
                  kafka-topics.sh --bootstrap-server "$KAFKA_BS" \
                    --create --if-not-exists --topic "$topic" \
                    --partitions 12 --replication-factor 3 2>/dev/null || true
                  echo "Topic: $topic"
                done

  - name: periodic-messaging-health-check
    plan:
      - get: messaging-health-check
        trigger: true
      - task: check-kafka-health
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kafka
          params:
            KAFKA_BOOTSTRAP: ((kafka.bootstrap_servers))
          run:
            path: sh
            args:
              - -c
              - |
                KAFKA_BS="${KAFKA_BOOTSTRAP:-kafka.messaging.svc.cluster.local:9092}"
                TOPICS=$(kafka-topics.sh --bootstrap-server "$KAFKA_BS" --list 2>/dev/null | wc -l || echo "0")
                echo "Kafka topics available: $TOPICS"
                [ "$TOPICS" -lt 10 ] && echo "WARN fewer than expected topics" || echo "PASS"
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *Kafka health check degraded* — fewer topics than expected"
