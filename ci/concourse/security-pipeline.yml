# Concourse CI — Security Scan Pipeline (resource-based)
# Role: Trivy vulnerability scan on Harbor images using Concourse resource model.
#       Runs on a time resource (nightly) and on manual trigger.
# Credentials: ((harbor.registry)), ((harbor.username)), ((harbor.password)),
#              ((kubeconfig.content)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: nightly-scan
    type: time
    source:
      interval: 24h
      start: 1:00 AM
      stop: 2:00 AM
      location: UTC

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: trivy-scan-critical-services
    plan:
      - get: nightly-scan
        trigger: true
      - get: shopos-repo
      - task: scan-gateway-auth-payment
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: aquasec/trivy
          params:
            HARBOR_REGISTRY: ((harbor.registry))
            HARBOR_USER: ((harbor.username))
            HARBOR_PASSWORD: ((harbor.password))
            IMAGE_TAG: ((image_tag))
          run:
            path: sh
            args:
              - -c
              - |
                echo "=== Trivy scan: critical path services ==="
                TAG="${IMAGE_TAG:-latest}"
                FAILED=0
                for SVC in api-gateway auth-service payment-service order-service fraud-detection-service; do
                  IMG="$HARBOR_REGISTRY/shopos/$SVC:$TAG"
                  echo "--- Scanning $IMG ---"
                  RESULT=$(trivy image \
                    --username "$HARBOR_USER" \
                    --password "$HARBOR_PASSWORD" \
                    --severity CRITICAL \
                    --exit-code 0 \
                    --format json \
                    "$IMG" 2>/dev/null || echo '{}')
                  CRITS=$(echo "$RESULT" | grep -c '"Severity":"CRITICAL"' 2>/dev/null || echo "0")
                  echo "$SVC: $CRITS CRITICAL CVEs"
                  [ "$CRITS" -gt 0 ] && FAILED=$((FAILED + CRITS))
                done
                echo "Total CRITICAL CVEs across critical services: $FAILED"
        on_failure:
          put: slack-alert
          params:
            text: ":rotating_light: *Trivy: CRITICAL CVEs found* in critical services — Concourse nightly scan"

  - name: grype-scan-platform
    plan:
      - get: nightly-scan
        trigger: true
        passed: [trivy-scan-critical-services]
      - get: shopos-repo
      - task: grype-platform-domain
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: anchore/grype
          params:
            HARBOR_REGISTRY: ((harbor.registry))
            IMAGE_TAG: ((image_tag))
          run:
            path: sh
            args:
              - -c
              - |
                TAG="${IMAGE_TAG:-latest}"
                echo "=== Grype scan: platform domain ==="
                for SVC in api-gateway web-bff mobile-bff graphql-gateway; do
                  IMG="$HARBOR_REGISTRY/shopos/$SVC:$TAG"
                  echo "--- Grype: $IMG ---"
                  grype "$IMG" --only-fixed -o table 2>/dev/null | head -20 || true
                done

  - name: kube-bench-cluster-audit
    plan:
      - get: nightly-scan
        trigger: true
      - task: run-kube-bench
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: aquasec/kube-bench
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                kube-bench run --targets node,policies --json > /tmp/kube-bench.json 2>/dev/null || true
                FAILS=$(grep -c '"status":"FAIL"' /tmp/kube-bench.json 2>/dev/null || echo "0")
                echo "kube-bench FAIL count: $FAILS"
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *kube-bench* audit found failures — Concourse nightly"

  - name: notify-scan-complete
    plan:
      - get: nightly-scan
        trigger: true
        passed: [trivy-scan-critical-services, grype-scan-platform, kube-bench-cluster-audit]
      - put: slack-alert
        params:
          text: ":mag: *Nightly security scans complete* — Trivy + Grype + kube-bench — Concourse"
