# Concourse CI — Observability Stack Health Check Pipeline (resource-based)
# Role: Periodically verify Prometheus, Grafana, Loki, Jaeger, and OTel Collector
#       health endpoints. Nightly full-stack health report with Slack alert on failure.
# Credentials: ((kubeconfig.content)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: observability-check
    type: time
    source:
      interval: 30m

  - name: nightly-report
    type: time
    source:
      interval: 24h
      start: 3:00 AM
      stop: 4:00 AM
      location: UTC

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: check-prometheus
    plan:
      - get: observability-check
        trigger: true
      - task: prometheus-ready
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                PROM_URL="http://kube-prometheus-stack-prometheus.observability.svc:9090"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$PROM_URL/-/ready" || echo "000")
                echo "Prometheus /-/ready → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || { echo "FAIL"; exit 1; }
        on_failure:
          put: slack-alert
          params:
            text: ":fire: *Prometheus not ready* — health check failed (Concourse)"

  - name: check-grafana
    plan:
      - get: observability-check
        trigger: true
      - task: grafana-health
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          run:
            path: sh
            args:
              - -c
              - |
                GRAFANA_URL="http://grafana.observability.svc:3000"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$GRAFANA_URL/api/health" || echo "000")
                echo "Grafana /api/health → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || { echo "FAIL"; exit 1; }
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *Grafana unhealthy* — /api/health returned non-200 (Concourse)"

  - name: check-loki
    plan:
      - get: observability-check
        trigger: true
      - task: loki-ready
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          run:
            path: sh
            args:
              - -c
              - |
                LOKI_URL="http://loki.observability.svc:3100"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$LOKI_URL/ready" || echo "000")
                echo "Loki /ready → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || { echo "WARN (non-critical)"; }

  - name: check-jaeger
    plan:
      - get: observability-check
        trigger: true
      - task: jaeger-health
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          run:
            path: sh
            args:
              - -c
              - |
                JAEGER_URL="http://jaeger-query.observability.svc:16686"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$JAEGER_URL/" || echo "000")
                echo "Jaeger query UI → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || echo "WARN Jaeger query returned $CODE"

  - name: nightly-observability-report
    plan:
      - get: nightly-report
        trigger: true
      - get: shopos-repo
      - task: full-stack-health
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                echo "=== Nightly Observability Stack Health Report ==="
                PASS=0
                FAIL=0

                check() {
                  local name=$1 url=$2
                  CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
                  if [ "$CODE" = "200" ]; then
                    echo "PASS  $name ($CODE)"
                    PASS=$((PASS + 1))
                  else
                    echo "FAIL  $name ($CODE)"
                    FAIL=$((FAIL + 1))
                  fi
                }

                check "Prometheus ready"    "http://kube-prometheus-stack-prometheus.observability.svc:9090/-/ready"
                check "Alertmanager ready"  "http://kube-prometheus-stack-alertmanager.observability.svc:9093/-/ready"
                check "Grafana health"      "http://grafana.observability.svc:3000/api/health"
                check "Loki ready"          "http://loki.observability.svc:3100/ready"
                check "Jaeger query"        "http://jaeger-query.observability.svc:16686/"
                check "OTel metrics"        "http://otel-collector.observability.svc:8888/metrics"

                echo ""
                echo "Summary: $PASS PASS / $FAIL FAIL"
                [ "$FAIL" -eq 0 ] && echo "All observability endpoints healthy" || exit 1
        on_failure:
          put: slack-alert
          params:
            text: ":rotating_light: *Nightly observability health check FAILED* — one or more endpoints down (Concourse)"
        on_success:
          put: slack-alert
          params:
            text: ":white_check_mark: *Nightly observability health: all endpoints healthy* — Prometheus, Grafana, Loki, Jaeger, OTel (Concourse)"
