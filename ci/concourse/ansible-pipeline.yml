# Ansible Playbooks Pipeline — Concourse CI
# Credentials: ansible-ssh-key, ansible-credentials, aws-credentials
---
resources:
  - name: source-code
    type: git
    source:
      uri: ((git.uri))
      branch: ((git.branch))
      private_key: ((git.private_key))

  - name: trigger-manual
    type: time
    source:
      interval: 8760h

jobs:
  - name: ansible-lint
    plan:
      - get: source-code
      - get: trigger-manual
        trigger: false
      - task: lint
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: python, tag: "3.13"}
          inputs:
            - name: source-code
          params:
            PLAYBOOK: ((playbook))
          run:
            path: sh
            args:
              - -c
              - |
                pip install ansible ansible-lint --quiet
                ansible-lint "source-code/infra/ansible/playbooks/$PLAYBOOK.yml" \
                  -c source-code/infra/ansible/.ansible-lint || true

  - name: run-playbook
    plan:
      - get: source-code
      - get: trigger-manual
        trigger: false
        passed: [ansible-lint]
      - task: run
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: python, tag: "3.13"}
          inputs:
            - name: source-code
          params:
            ANSIBLE_SSH_PRIVATE_KEY: ((ansible.ssh_private_key))
            ANSIBLE_SSH_USER: ((ansible.ssh_user))
            AWS_ACCESS_KEY_ID: ((aws.access_key_id))
            AWS_SECRET_ACCESS_KEY: ((aws.secret_access_key))
            ANSIBLE_FORCE_COLOR: "1"
            ANSIBLE_HOST_KEY_CHECKING: "False"
            ANSIBLE_STDOUT_CALLBACK: yaml
            PLAYBOOK: ((playbook))
            INVENTORY: ((inventory))
            LIMIT: ((limit))
            EXTRA_VARS: ((extra_vars))
            CHECK_MODE: ((check_mode))
          run:
            path: sh
            args:
              - -c
              - |
                pip install ansible boto3 botocore google-auth --quiet
                ansible-galaxy collection install amazon.aws google.cloud community.kubernetes --quiet
                echo "$ANSIBLE_SSH_PRIVATE_KEY" > /tmp/ansible_key && chmod 600 /tmp/ansible_key
                LIMIT_ARG="" && [ -n "$LIMIT" ] && LIMIT_ARG="--limit $LIMIT"
                EXTRA_ARGS="" && [ -n "$EXTRA_VARS" ] && EXTRA_ARGS="--extra-vars '$EXTRA_VARS'"
                CHECK_ARG="" && [ "$CHECK_MODE" = "true" ] && CHECK_ARG="--check --diff"
                eval ansible-playbook \
                  -i "source-code/infra/ansible/inventories/$INVENTORY/hosts.yml" \
                  "source-code/infra/ansible/playbooks/$PLAYBOOK.yml" \
                  --private-key /tmp/ansible_key \
                  --user "$ANSIBLE_SSH_USER" \
                  $LIMIT_ARG $EXTRA_ARGS $CHECK_ARG -v
                rm -f /tmp/ansible_key
