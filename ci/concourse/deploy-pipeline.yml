# Concourse CI — Deploy Pipeline (resource-based)
# Role: deploy services using git + helm resources; verify via k8s rollout check.
# Credentials: ((harbor.registry)), ((harbor.username)), ((harbor.password)),
#              ((kubeconfig.content)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: harbor-image
    type: registry-image
    source:
      repository: ((harbor.registry))/shopos/((service_name))
      username: ((harbor.username))
      password: ((harbor.password))

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: deploy-to-namespace
    plan:
      - get: shopos-repo
        trigger: true
      - get: harbor-image
        passed: []
      - task: helm-deploy
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine/helm
              tag: "3.16.0"
          inputs:
            - name: shopos-repo
            - name: harbor-image
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            HARBOR_REGISTRY: ((harbor.registry))
            SERVICE_NAME: ((service_name))
            NAMESPACE: ((kubernetes.namespace))
            ENVIRONMENT: ((environment))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube
                echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                IMAGE_TAG=$(cat harbor-image/digest | cut -c8-15 2>/dev/null || echo "latest")
                echo "=== Deploying $SERVICE_NAME → $NAMESPACE ($ENVIRONMENT) ==="
                helm upgrade --install "$SERVICE_NAME" \
                  "shopos-repo/helm/services/$SERVICE_NAME" \
                  --namespace "$NAMESPACE" --create-namespace \
                  --set image.repository="$HARBOR_REGISTRY/shopos/$SERVICE_NAME" \
                  --set image.tag="$IMAGE_TAG" \
                  --set environment="$ENVIRONMENT" \
                  --wait --timeout 5m
        on_failure:
          put: slack-alert
          params:
            text: ":x: Deploy FAILED for *((service_name))* in *((environment))*"

  - name: verify-rollout
    plan:
      - get: shopos-repo
        passed: [deploy-to-namespace]
        trigger: true
      - task: check-rollout-status
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kubectl
              tag: latest
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            SERVICE_NAME: ((service_name))
            NAMESPACE: ((kubernetes.namespace))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube
                echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                kubectl rollout status deployment/"$SERVICE_NAME" -n "$NAMESPACE" --timeout=120s
                READY=$(kubectl get deployment "$SERVICE_NAME" -n "$NAMESPACE" \
                  -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                DESIRED=$(kubectl get deployment "$SERVICE_NAME" -n "$NAMESPACE" \
                  -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
                echo "Ready: $READY / $DESIRED"
                [ "$READY" -ge "$DESIRED" ] && echo "PASS" || exit 1

  - name: smoke-after-deploy
    plan:
      - get: shopos-repo
        passed: [verify-rollout]
        trigger: true
      - task: healthz-check
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: curlimages/curl
              tag: latest
          params:
            SERVICE_NAME: ((service_name))
            NAMESPACE: ((kubernetes.namespace))
          run:
            path: sh
            args:
              - -c
              - |
                SVC_URL="http://$SERVICE_NAME.$NAMESPACE.svc.cluster.local/healthz"
                CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$SVC_URL" || echo "000")
                echo "$SVC_URL → $CODE"
                [ "$CODE" = "200" ] && echo "PASS" || echo "WARN non-200 but continuing"
        on_success:
          put: slack-alert
          params:
            text: ":rocket: Deployed *((service_name))* to *((environment))* — smoke passed"
        on_failure:
          put: slack-alert
          params:
            text: ":warning: Deployed *((service_name))* but smoke check returned non-200"
