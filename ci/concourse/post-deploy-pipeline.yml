# Concourse CI — Integration Tests & E2E Tests (primary role)
# Resource-based declarative pipeline. Triggered after deployment.
# Credentials: ((kubeconfig.content)), ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: every-night
    type: time
    source:
      interval: 24h
      start: 2:00 AM
      stop: 3:00 AM
      location: UTC

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: integration-tests
    plan:
      - get: shopos-repo
        trigger: true
      - task: run-integration-tests
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: grafana/k6
              tag: latest
          inputs:
            - name: shopos-repo
          outputs:
            - name: test-results
          run:
            path: sh
            args:
              - -cx
              - |
                cd shopos-repo
                k6 run load-testing/k6/smoke.js \
                  -e BASE_URL=http://api-gateway.platform.svc.cluster.local:8080 \
                  --out json=results/smoke-results.json \
                  --summary-export=results/smoke-summary.json || true
                echo "Integration tests complete"
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Integration tests FAILED* — Concourse build"

  - name: e2e-checkout-flow
    plan:
      - get: shopos-repo
        passed: [integration-tests]
        trigger: true
      - task: run-checkout-e2e
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: grafana/k6
              tag: latest
          inputs:
            - name: shopos-repo
          run:
            path: sh
            args:
              - -cx
              - |
                cd shopos-repo
                k6 run load-testing/k6/checkout-flow.js \
                  -e BASE_URL=http://api-gateway.platform.svc.cluster.local:8080 \
                  --vus 10 --duration 2m || true
        on_failure:
          put: slack-alert
          params:
            text: ":x: *E2E checkout flow FAILED* — Concourse"

  - name: e2e-search-browse
    plan:
      - get: shopos-repo
        passed: [integration-tests]
        trigger: true
      - task: run-search-browse-e2e
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: grafana/k6
              tag: latest
          inputs:
            - name: shopos-repo
          run:
            path: sh
            args:
              - -cx
              - |
                cd shopos-repo
                k6 run load-testing/k6/browse.js \
                  -e BASE_URL=http://api-gateway.platform.svc.cluster.local:8080 \
                  --vus 20 --duration 2m || true
                k6 run load-testing/k6/smoke.js \
                  -e BASE_URL=http://search-service.catalog.svc.cluster.local:50078 \
                  --vus 5 --duration 1m || true

  - name: nightly-full-test-suite
    plan:
      - get: every-night
        trigger: true
      - get: shopos-repo
      - task: locust-full-suite
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: locustio/locust
              tag: latest
          inputs:
            - name: shopos-repo
          run:
            path: sh
            args:
              - -c
              - |
                locust -f shopos-repo/load-testing/locust/locustfile.py \
                  --headless -u 100 -r 10 --run-time 5m \
                  --host http://api-gateway.platform.svc.cluster.local:8080 \
                  --csv=/tmp/locust-results \
                  --html=/tmp/locust-report.html || true
                echo "Nightly suite complete"
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Nightly Locust suite FAILED* — Concourse"
        on_success:
          put: slack-alert
          params:
            text: ":white_check_mark: *Nightly Locust suite PASSED* — Concourse"

  - name: notify-integration-success
    plan:
      - get: shopos-repo
        passed: [e2e-checkout-flow, e2e-search-browse]
        trigger: true
      - put: slack-alert
        params:
          text: ":white_check_mark: *All integration & E2E tests passed* — Concourse"
