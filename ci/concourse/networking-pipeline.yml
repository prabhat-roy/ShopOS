# Networking Infrastructure Pipeline — Concourse CI
# Credentials: kubeconfig
---
resources:
  - name: trigger-manual
    type: time
    source:
      interval: 8760h

jobs:
  - name: install-cilium
    plan:
      - get: trigger-manual
        trigger: false
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall cilium -n kube-system 2>/dev/null || true; exit 0
                fi
                helm repo add cilium https://helm.cilium.io --force-update
                helm upgrade --install cilium cilium/cilium \
                  --namespace kube-system \
                  --set hubble.enabled=true --set hubble.relay.enabled=true \
                  --set hubble.ui.enabled=true --set prometheus.enabled=true \
                  --wait --timeout 8m

  - name: install-istio
    plan:
      - get: trigger-manual
        trigger: false
        passed: [install-cilium]
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall istio-ingress istiod istio-base -n istio-system 2>/dev/null || true; exit 0
                fi
                helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
                helm upgrade --install istio-base istio/base \
                  --namespace istio-system --create-namespace --wait --timeout 3m
                helm upgrade --install istiod istio/istiod \
                  --namespace istio-system \
                  --set telemetry.enabled=true --set pilot.traceSampling=1.0 \
                  --wait --timeout 5m
                helm upgrade --install istio-ingress istio/gateway \
                  --namespace istio-ingress --create-namespace --wait --timeout 5m

  - name: install-traefik
    plan:
      - get: trigger-manual
        trigger: false
        passed: [install-cilium]
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall traefik -n networking 2>/dev/null || true; exit 0
                fi
                helm repo add traefik https://traefik.github.io/charts --force-update
                helm upgrade --install traefik traefik/traefik \
                  --namespace networking --create-namespace \
                  --set deployment.replicas=2 \
                  --set ingressClass.enabled=true --set ingressClass.isDefaultClass=true \
                  --set metrics.prometheus.enabled=true \
                  --wait --timeout 5m

  - name: install-consul
    plan:
      - get: trigger-manual
        trigger: false
        passed: [install-istio, install-traefik]
      - task: helm-install
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: alpine/helm}
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
            ACTION: ((action))
            CONSUL_ENABLED: ((consul_enabled))
          run:
            path: sh
            args:
              - -c
              - |
                [ "$CONSUL_ENABLED" = "true" ] || { echo "Skipped"; exit 0; }
                mkdir -p ~/.kube && echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                if [ "$ACTION" = "UNINSTALL" ]; then
                  helm uninstall consul -n consul 2>/dev/null || true; exit 0
                fi
                helm repo add hashicorp https://helm.releases.hashicorp.com --force-update
                helm upgrade --install consul hashicorp/consul \
                  --namespace consul --create-namespace \
                  --set global.datacenter=shopos-dc1 \
                  --set server.replicas=3 \
                  --set connectInject.enabled=true \
                  --wait --timeout 8m
