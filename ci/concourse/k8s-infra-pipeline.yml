# Kubernetes Infrastructure (Terraform) Pipeline — Concourse CI
# Credentials: aws-credentials, gcp-sa-key, azure-credentials
---
resources:
  - name: source-code
    type: git
    source:
      uri: ((git.uri))
      branch: ((git.branch))
      private_key: ((git.private_key))

  - name: trigger-manual
    type: time
    source:
      interval: 8760h

jobs:
  - name: terraform-eks
    plan:
      - get: source-code
      - get: trigger-manual
        trigger: false
      - task: tf-plan-apply
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: hashicorp/terraform, tag: "1.9.0"}
          inputs:
            - name: source-code
          params:
            AWS_ACCESS_KEY_ID: ((aws.access_key_id))
            AWS_SECRET_ACCESS_KEY: ((aws.secret_access_key))
            AWS_DEFAULT_REGION: us-east-1
            TF_ACTION: ((action))
            TF_DIR: infra/terraform/aws/eks
          run:
            path: sh
            args:
              - -c
              - |
                cd source-code/$TF_DIR
                terraform init \
                  -backend-config="bucket=shopos-tfstate" \
                  -backend-config="key=$TF_DIR/terraform.tfstate" \
                  -backend-config="region=$AWS_DEFAULT_REGION"
                if [ "$TF_ACTION" = "PLAN" ]; then
                  terraform plan
                elif [ "$TF_ACTION" = "APPLY" ]; then
                  terraform apply -auto-approve
                elif [ "$TF_ACTION" = "DESTROY" ]; then
                  terraform destroy -auto-approve
                fi

  - name: terraform-gke
    plan:
      - get: source-code
      - get: trigger-manual
        trigger: false
      - task: tf-plan-apply
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: hashicorp/terraform, tag: "1.9.0"}
          inputs:
            - name: source-code
          params:
            GCP_SA_KEY: ((gcp.sa_key))
            TF_ACTION: ((action))
            TF_DIR: infra/opentofu/gcp/gke
          run:
            path: sh
            args:
              - -c
              - |
                echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
                cd source-code/$TF_DIR
                terraform init \
                  -backend-config="bucket=shopos-tfstate-gcp" \
                  -backend-config="prefix=$TF_DIR"
                if [ "$TF_ACTION" = "PLAN" ]; then
                  terraform plan
                elif [ "$TF_ACTION" = "APPLY" ]; then
                  terraform apply -auto-approve
                elif [ "$TF_ACTION" = "DESTROY" ]; then
                  terraform destroy -auto-approve
                fi
                rm -f /tmp/gcp-key.json

  - name: terraform-aks
    plan:
      - get: source-code
      - get: trigger-manual
        trigger: false
      - task: tf-plan-apply
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: {repository: hashicorp/terraform, tag: "1.9.0"}
          inputs:
            - name: source-code
          params:
            ARM_CLIENT_ID: ((azure.client_id))
            ARM_CLIENT_SECRET: ((azure.client_secret))
            ARM_SUBSCRIPTION_ID: ((azure.subscription_id))
            ARM_TENANT_ID: ((azure.tenant_id))
            TF_ACTION: ((action))
            TF_DIR: infra/opentofu/azure/aks
          run:
            path: sh
            args:
              - -c
              - |
                cd source-code/$TF_DIR
                terraform init \
                  -backend-config="resource_group_name=shopos-tfstate-rg" \
                  -backend-config="storage_account_name=shoposterraform" \
                  -backend-config="container_name=tfstate" \
                  -backend-config="key=$TF_DIR/terraform.tfstate"
                if [ "$TF_ACTION" = "PLAN" ]; then
                  terraform plan
                elif [ "$TF_ACTION" = "APPLY" ]; then
                  terraform apply -auto-approve
                elif [ "$TF_ACTION" = "DESTROY" ]; then
                  terraform destroy -auto-approve
                fi
