# Concourse CI — Kubernetes Infrastructure Pipeline (resource-based)
# Role: Terraform plan/apply/destroy for EKS, GKE, and AKS clusters.
#       Uses git resource for source and time resource for manual-equivalent trigger.
#       Manual gate: set ((action)) to PLAN (default), APPLY, or DESTROY.
# Credentials: ((aws.access_key_id)), ((aws.secret_access_key)),
#              ((gcp.sa_key)), ((azure.client_id)), ((azure.client_secret)),
#              ((azure.subscription_id)), ((azure.tenant_id)),
#              ((slack.webhook_url))
---
resource_types:
  - name: slack-notification
    type: docker-image
    source:
      repository: cfcommunity/slack-notification-resource

resources:
  - name: shopos-repo
    type: git
    source:
      uri: https://github.com/prabhat-roy/ShopOS.git
      branch: main

  - name: trigger-manual
    type: time
    source:
      interval: 8760h

  - name: slack-alert
    type: slack-notification
    source:
      url: ((slack.webhook_url))

jobs:
  - name: terraform-eks
    plan:
      - get: shopos-repo
      - get: trigger-manual
        trigger: false
      - task: tf-eks
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: "1.9.0"
          inputs:
            - name: shopos-repo
          params:
            AWS_ACCESS_KEY_ID: ((aws.access_key_id))
            AWS_SECRET_ACCESS_KEY: ((aws.secret_access_key))
            AWS_DEFAULT_REGION: us-east-1
            TF_ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                TF_DIR="shopos-repo/infra/terraform/aws/eks"
                cd "$TF_DIR"
                echo "=== EKS Terraform: $TF_ACTION ==="
                terraform init \
                  -backend-config="bucket=shopos-tfstate" \
                  -backend-config="key=infra/terraform/aws/eks/terraform.tfstate" \
                  -backend-config="region=$AWS_DEFAULT_REGION" \
                  -reconfigure
                case "$TF_ACTION" in
                  PLAN)    terraform plan ;;
                  APPLY)   terraform apply -auto-approve ;;
                  DESTROY) terraform destroy -auto-approve ;;
                  *)       echo "Unknown TF_ACTION=$TF_ACTION (use PLAN/APPLY/DESTROY)"; exit 1 ;;
                esac
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Terraform EKS FAILED* — action: ((action)) (Concourse)"
        on_success:
          put: slack-alert
          params:
            text: ":white_check_mark: *Terraform EKS succeeded* — action: ((action)) (Concourse)"

  - name: terraform-gke
    plan:
      - get: shopos-repo
      - get: trigger-manual
        trigger: false
      - task: tf-gke
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: "1.9.0"
          inputs:
            - name: shopos-repo
          params:
            GCP_SA_KEY: ((gcp.sa_key))
            TF_ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
                TF_DIR="shopos-repo/infra/opentofu/gcp/gke"
                cd "$TF_DIR"
                echo "=== GKE Terraform: $TF_ACTION ==="
                terraform init \
                  -backend-config="bucket=shopos-tfstate-gcp" \
                  -backend-config="prefix=infra/opentofu/gcp/gke" \
                  -reconfigure
                case "$TF_ACTION" in
                  PLAN)    terraform plan ;;
                  APPLY)   terraform apply -auto-approve ;;
                  DESTROY) terraform destroy -auto-approve ;;
                  *)       echo "Unknown TF_ACTION=$TF_ACTION"; exit 1 ;;
                esac
                rm -f /tmp/gcp-key.json
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Terraform GKE FAILED* — action: ((action)) (Concourse)"

  - name: terraform-aks
    plan:
      - get: shopos-repo
      - get: trigger-manual
        trigger: false
      - task: tf-aks
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: "1.9.0"
          inputs:
            - name: shopos-repo
          params:
            ARM_CLIENT_ID: ((azure.client_id))
            ARM_CLIENT_SECRET: ((azure.client_secret))
            ARM_SUBSCRIPTION_ID: ((azure.subscription_id))
            ARM_TENANT_ID: ((azure.tenant_id))
            TF_ACTION: ((action))
          run:
            path: sh
            args:
              - -c
              - |
                TF_DIR="shopos-repo/infra/opentofu/azure/aks"
                cd "$TF_DIR"
                echo "=== AKS Terraform: $TF_ACTION ==="
                terraform init \
                  -backend-config="resource_group_name=shopos-tfstate-rg" \
                  -backend-config="storage_account_name=shoposterraform" \
                  -backend-config="container_name=tfstate" \
                  -backend-config="key=infra/opentofu/azure/aks/terraform.tfstate" \
                  -reconfigure
                case "$TF_ACTION" in
                  PLAN)    terraform plan ;;
                  APPLY)   terraform apply -auto-approve ;;
                  DESTROY) terraform destroy -auto-approve ;;
                  *)       echo "Unknown TF_ACTION=$TF_ACTION"; exit 1 ;;
                esac
        on_failure:
          put: slack-alert
          params:
            text: ":x: *Terraform AKS FAILED* — action: ((action)) (Concourse)"

  - name: verify-cluster-connectivity
    plan:
      - get: trigger-manual
        trigger: false
        passed: [terraform-eks]
      - task: kubectl-verify
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bitnami/kubectl
              tag: latest
          params:
            KUBECONFIG_CONTENT: ((kubeconfig.content))
          run:
            path: sh
            args:
              - -c
              - |
                mkdir -p ~/.kube
                echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
                echo "=== Cluster connectivity check ==="
                kubectl cluster-info
                kubectl get nodes -o wide
                READY=$(kubectl get nodes --no-headers | grep -c " Ready" || echo "0")
                echo "Ready nodes: $READY"
                [ "$READY" -gt 0 ] && echo "PASS" || exit 1
        on_failure:
          put: slack-alert
          params:
            text: ":warning: *Cluster connectivity check FAILED* — nodes not ready (Concourse)"
