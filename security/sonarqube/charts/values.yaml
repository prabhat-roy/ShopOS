replicaCount: 1

image:
  repository: sonarqube
  tag: "10.6-community"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9000
  targetPort: 9000

persistence:
  enabled: true
  storageClass: "standard-rwo"
  size: 20Gi
  accessMode: ReadWriteOnce
  mountPath: /opt/sonarqube/data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
