issuer: http://dex:5556/dex

storage:
  type: postgres
  config:
    host: postgres
    port: 5432
    database: dex
    user: postgres
    password: postgres
    ssl:
      mode: disable

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  responseTypes: ["code"]
  grantTypes: ["authorization_code", "refresh_token"]

connectors:
  - type: github
    id: github
    name: GitHub
    config:
      clientID: $GITHUB_CLIENT_ID
      clientSecret: $GITHUB_CLIENT_SECRET
      redirectURI: http://dex:5556/dex/callback

  - type: ldap
    id: ldap
    name: Corporate LDAP
    config:
      host: ldap:389
      insecureNoSSL: true
      bindDN: cn=admin,dc=shopos,dc=io
      bindPW: $LDAP_BIND_PASSWORD
      usernamePrompt: Email Address
      userSearch:
        baseDN: ou=users,dc=shopos,dc=io
        filter: "(objectClass=person)"
        username: mail
        idAttr: uid
        emailAttr: mail
        nameAttr: cn

staticClients:
  - id: shopos-admin-portal
    redirectURIs:
      - http://admin-portal:8085/callback
    name: ShopOS Admin Portal
    secret: shopos-admin-secret

  - id: shopos-backstage
    redirectURIs:
      - http://backstage:3000/api/auth/oidc/handler/frame
    name: Backstage Developer Portal
    secret: backstage-secret
