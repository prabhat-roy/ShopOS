replicaCount: 1

image:
  repository: quay.io/jetstack/cert-manager-controller
  tag: "v1.16.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9402
  targetPort: 9402

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
