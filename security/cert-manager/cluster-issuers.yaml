# cert-manager ClusterIssuers — production + staging Let's Encrypt + Vault PKI.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: letsencrypt-prod }
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@shopos.example.com
    privateKeySecretRef: { name: letsencrypt-prod-account }
    solvers:
      - dns01:
          route53: { region: us-east-1 }
        selector: { dnsZones: ["shopos.example.com"] }
      - http01:
          ingress: { ingressClassName: istio }
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: letsencrypt-staging }
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform@shopos.example.com
    privateKeySecretRef: { name: letsencrypt-staging-account }
    solvers: [{ http01: { ingress: { ingressClassName: istio } } }]
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: vault-internal-pki }
spec:
  vault:
    server: https://vault.infra.svc:8200
    path: pki_int/sign/service-cert
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        secretRef: { name: cert-manager-token, key: token }
