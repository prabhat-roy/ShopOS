replicaCount: 1

image:
  repository: aquasec/tracee
  tag: "v0.21.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3366
  targetPort: 3366

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
