# Source: security/external-secrets/external-secrets.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: '0.10.4'
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        replicaCount: 2
        serviceMonitor: { enabled: true }
        webhook: { replicaCount: 2 }
        certController: { replicaCount: 2 }
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
