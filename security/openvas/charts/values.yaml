replicaCount: 1

image:
  repository: greenbone/gvmd
  tag: "22.9"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9390
  targetPort: 9390

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
