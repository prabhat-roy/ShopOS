replicaCount: 1

image:
  repository: zeekurity/zeek
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 47761
  targetPort: 47761

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
