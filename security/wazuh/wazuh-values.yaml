# Helm values override for Wazuh production deployment
manager:
  replicaCount: 1
  image:
    repository: wazuh/wazuh-manager
    tag: "4.9.0"
  storage:
    size: 50Gi
    storageClass: standard

dashboard:
  replicaCount: 1
  image:
    repository: wazuh/wazuh-dashboard
    tag: "4.9.0"
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: wazuh.shopos.internal
        paths:
          - path: /
            pathType: Prefix

indexer:
  image:
    repository: wazuh/wazuh-indexer
    tag: "4.9.0"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
