replicaCount: 1

image:
  repository: ghcr.io/kyverno/kyverno
  tag: "v1.13.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9443
  targetPort: 9443

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
