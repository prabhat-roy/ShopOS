name: K8s Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'CREATE or DESTROY the Kubernetes cluster infrastructure'
        required: true
        default: 'CREATE'
        type: choice
        options: [CREATE, DESTROY]
      cloud_provider:
        description: 'Cloud provider to target'
        required: true
        default: 'aws'
        type: choice
        options: [aws, gcp, azure]
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      tf_var_file:
        description: 'Path to Terraform .tfvars file (relative to TF_DIR). Leave blank to use defaults.'
        required: false
        default: ''

env:
  TF_DIR_AWS:   infra/terraform/aws/eks
  TF_DIR_GCP:   infra/terraform/gcp/gke
  TF_DIR_AZURE: infra/terraform/azure/aks

permissions:
  contents: read
  id-token: write   # OIDC for cloud auth

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.cloud_provider }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set TF_DIR
        run: |
          case "${{ inputs.cloud_provider }}" in
            aws)   echo "TF_DIR=${{ env.TF_DIR_AWS }}"   >> "$GITHUB_ENV" ;;
            gcp)   echo "TF_DIR=${{ env.TF_DIR_GCP }}"   >> "$GITHUB_ENV" ;;
            azure) echo "TF_DIR=${{ env.TF_DIR_AZURE }}" >> "$GITHUB_ENV" ;;
          esac

      # ── Cloud auth (OIDC, no long-lived keys) ──────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.cloud_provider == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Authenticate to GCP (OIDC)
        if: ${{ inputs.cloud_provider == 'gcp' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Login to Azure (OIDC)
        if: ${{ inputs.cloud_provider == 'azure' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Terraform Format Check
        run: terraform -chdir="$TF_DIR" fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform -chdir="$TF_DIR" init \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform Validate
        run: terraform -chdir="$TF_DIR" validate

      - name: Terraform Plan
        id: plan
        run: |
          VAR_FILE_ARG=""
          if [ -n "${{ inputs.tf_var_file }}" ]; then
            VAR_FILE_ARG="-var-file=${{ inputs.tf_var_file }}"
          fi
          terraform -chdir="$TF_DIR" plan \
            -var="environment=${{ inputs.environment }}" \
            $VAR_FILE_ARG \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.cloud_provider }}-${{ inputs.environment }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Terraform Apply — Create
        if: ${{ inputs.action == 'CREATE' }}
        run: terraform -chdir="$TF_DIR" apply -auto-approve tfplan

      - name: Terraform Destroy
        if: ${{ inputs.action == 'DESTROY' }}
        run: |
          VAR_FILE_ARG=""
          if [ -n "${{ inputs.tf_var_file }}" ]; then
            VAR_FILE_ARG="-var-file=${{ inputs.tf_var_file }}"
          fi
          terraform -chdir="$TF_DIR" destroy \
            -var="environment=${{ inputs.environment }}" \
            $VAR_FILE_ARG \
            -auto-approve

      - name: Save kubeconfig output
        if: ${{ inputs.action == 'CREATE' }}
        run: |
          case "${{ inputs.cloud_provider }}" in
            aws)
              CLUSTER=$(terraform -chdir="$TF_DIR" output -raw cluster_name 2>/dev/null || echo "shopos-${{ inputs.environment }}")
              REGION=$(terraform -chdir="$TF_DIR" output -raw region 2>/dev/null || echo "${{ secrets.AWS_REGION }}")
              aws eks update-kubeconfig --name "$CLUSTER" --region "$REGION"
              ;;
            gcp)
              CLUSTER=$(terraform -chdir="$TF_DIR" output -raw cluster_name 2>/dev/null || echo "shopos-${{ inputs.environment }}")
              ZONE=$(terraform -chdir="$TF_DIR" output -raw zone 2>/dev/null || echo "us-central1-a")
              gcloud container clusters get-credentials "$CLUSTER" --zone "$ZONE"
              ;;
            azure)
              CLUSTER=$(terraform -chdir="$TF_DIR" output -raw cluster_name 2>/dev/null || echo "shopos-${{ inputs.environment }}")
              RG=$(terraform -chdir="$TF_DIR" output -raw resource_group 2>/dev/null || echo "shopos-rg")
              az aks get-credentials --name "$CLUSTER" --resource-group "$RG"
              ;;
          esac
          mkdir -p ~/.kube
          echo "Kubeconfig updated."
          kubectl cluster-info
