name: Registry Tools

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'INSTALL, UNINSTALL, or CONFIGURE registry tools'
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, UNINSTALL, CONFIGURE]
      harbor:     { description: 'Harbor — enterprise container registry + RBAC + scanning', type: boolean, default: false }
      nexus:      { description: 'Nexus Repository — Maven, npm, PyPI, Go, Docker artifacts', type: boolean, default: false }
      gitea:      { description: 'Gitea — self-hosted Git server for GitOps',                type: boolean, default: false }
      chartmuseum: { description: 'ChartMuseum — Helm chart repository',                    type: boolean, default: false }
      zot:        { description: 'Zot — OCI-native container registry',                      type: boolean, default: false }
      minio:      { description: 'MinIO — S3-compatible object storage',                     type: boolean, default: false }

jobs:
  registry-tools:
    name: ${{ inputs.action }} Registry Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add harbor       https://helm.goharbor.io
          helm repo add sonatype     https://sonatype.github.io/helm3-charts/
          helm repo add gitea        https://dl.gitea.com/charts/
          helm repo add chartmuseum  https://chartmuseum.github.io/charts
          helm repo add project-zot  https://zotregistry.dev/helm-charts/
          helm repo add minio        https://charts.min.io/
          helm repo update

      - name: Install — Harbor (enterprise registry)
        if: ${{ inputs.action == 'INSTALL' && inputs.harbor == true }}
        run: |
          helm upgrade --install harbor harbor/harbor \
            --namespace registry --create-namespace \
            --set harborAdminPassword="${{ secrets.HARBOR_ADMIN_PASSWORD }}" \
            --set expose.type=ingress \
            --set expose.ingress.hosts.core="${{ secrets.HARBOR_HOSTNAME }}" \
            --set externalURL="https://${{ secrets.HARBOR_HOSTNAME }}" \
            --set persistence.persistentVolumeClaim.registry.size=100Gi \
            --set persistence.persistentVolumeClaim.chartmuseum.size=20Gi \
            --set trivy.enabled=true \
            --set notary.enabled=true \
            --set database.type=internal \
            --wait --timeout 15m

      - name: Install — Nexus Repository
        if: ${{ inputs.action == 'INSTALL' && inputs.nexus == true }}
        run: |
          helm upgrade --install nexus sonatype/nexus-repository-manager \
            --namespace registry --create-namespace \
            --set nexus.resources.requests.memory=4Gi \
            --set persistence.storageSize=100Gi \
            --set nexus.adminPassword="${{ secrets.NEXUS_ADMIN_PASSWORD }}" \
            --wait --timeout 15m

      - name: Install — Gitea
        if: ${{ inputs.action == 'INSTALL' && inputs.gitea == true }}
        run: |
          helm upgrade --install gitea gitea/gitea \
            --namespace registry --create-namespace \
            --set gitea.admin.username=shopos-admin \
            --set gitea.admin.password="${{ secrets.GITEA_ADMIN_PASSWORD }}" \
            --set gitea.admin.email="admin@shopos.local" \
            --set persistence.size=20Gi \
            --set postgresql.enabled=true \
            --wait --timeout 10m

      - name: Install — MinIO (S3-compatible object storage)
        if: ${{ inputs.action == 'INSTALL' && inputs.minio == true }}
        run: |
          helm upgrade --install minio minio/minio \
            --namespace minio --create-namespace \
            --set rootUser="${{ secrets.MINIO_ROOT_USER }}" \
            --set rootPassword="${{ secrets.MINIO_ROOT_PASSWORD }}" \
            --set replicas=4 \
            --set persistence.size=200Gi \
            --set metrics.serviceMonitor.enabled=true \
            --wait --timeout 15m

      - name: Configure — Create MinIO buckets
        if: ${{ inputs.action == 'CONFIGURE' && inputs.minio == true }}
        run: |
          MINIO_POD=$(kubectl get pod -n minio -l app=minio -o name | head -1)
          for BUCKET in velero-backups loki-chunks thanos-metrics tempo-traces harbor-data media-assets; do
            kubectl exec -n minio "$MINIO_POD" -- \
              mc mb "local/$BUCKET" --ignore-existing || true
          done

      - name: Configure — Harbor: create project + enable Trivy scanning
        if: ${{ inputs.action == 'CONFIGURE' && inputs.harbor == true }}
        run: |
          HARBOR_URL="https://${{ secrets.HARBOR_HOSTNAME }}"
          AUTH="admin:${{ secrets.HARBOR_ADMIN_PASSWORD }}"
          # Create shopos project
          curl -sf -u "$AUTH" -X POST "$HARBOR_URL/api/v2.0/projects" \
            -H "Content-Type: application/json" \
            -d '{"project_name":"shopos","public":false,"metadata":{"auto_scan":"true","reuse_sys_cve_allowlist":"true"}}' || true
          # Enable content trust
          curl -sf -u "$AUTH" -X PUT "$HARBOR_URL/api/v2.0/projects/shopos" \
            -H "Content-Type: application/json" \
            -d '{"metadata":{"enable_content_trust":"true"}}' || true

      # ── UNINSTALL ──────────────────────────────────────────────────────
      - name: Uninstall tools
        if: ${{ inputs.action == 'UNINSTALL' }}
        run: |
          ${{ inputs.harbor      && 'helm uninstall harbor      -n registry --ignore-not-found || true' || '' }}
          ${{ inputs.nexus       && 'helm uninstall nexus        -n registry --ignore-not-found || true' || '' }}
          ${{ inputs.gitea       && 'helm uninstall gitea        -n registry --ignore-not-found || true' || '' }}
          ${{ inputs.chartmuseum && 'helm uninstall chartmuseum  -n registry --ignore-not-found || true' || '' }}
          ${{ inputs.zot         && 'helm uninstall zot          -n registry --ignore-not-found || true' || '' }}
          ${{ inputs.minio       && 'helm uninstall minio        -n minio    --ignore-not-found || true' || '' }}
          echo "Uninstall complete."
