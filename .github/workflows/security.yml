name: Security Tools

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'INSTALL, UNINSTALL, or CONFIGURE security tools on Kubernetes'
        required: true
        default: 'INSTALL'
        type: choice
        options: [INSTALL, UNINSTALL, CONFIGURE]
      # Identity & Access
      keycloak:       { description: 'Keycloak — IAM, SSO/OIDC/SAML',                        type: boolean, default: false }
      dex:            { description: 'Dex — OIDC federation',                                 type: boolean, default: false }
      authentik:      { description: 'Authentik — open source IdP',                           type: boolean, default: false }
      spire:          { description: 'SPIRE — SPIFFE workload identity',                       type: boolean, default: false }
      # Secrets
      vault:          { description: 'HashiCorp Vault — secrets & dynamic creds',             type: boolean, default: false }
      # Policy
      opa:            { description: 'OPA/Gatekeeper — admission policy engine',              type: boolean, default: false }
      kyverno:        { description: 'Kyverno — Kubernetes-native policy engine',             type: boolean, default: false }
      kubewarden:     { description: 'Kubewarden — Wasm-based policy engine',                 type: boolean, default: false }
      openfga:        { description: 'OpenFGA — relationship-based authorisation',            type: boolean, default: false }
      # Runtime
      falco:          { description: 'Falco — eBPF runtime threat detection',                type: boolean, default: false }
      tetragon:       { description: 'Tetragon — eBPF runtime enforcement',                  type: boolean, default: false }
      tracee:         { description: 'Tracee — eBPF event collection',                       type: boolean, default: false }
      wazuh:          { description: 'Wazuh — XDR/SIEM platform',                            type: boolean, default: false }
      # Certs & WAF
      cert_manager:   { description: 'cert-manager — automated TLS certificate management',  type: boolean, default: false }
      coraza_waf:     { description: 'Coraza WAF — OWASP Core Rule Set',                     type: boolean, default: false }
      # Supply Chain
      rekor:          { description: 'Rekor — Sigstore transparency log',                    type: boolean, default: false }
      fulcio:         { description: 'Fulcio — Sigstore certificate authority',               type: boolean, default: false }
      # Scanning servers
      sonarqube:      { description: 'SonarQube — SAST server',                              type: boolean, default: false }
      trivy_operator: { description: 'Trivy Operator — continuous in-cluster scanning',      type: boolean, default: false }
      kubescape:      { description: 'Kubescape — NSA/MITRE compliance',                     type: boolean, default: false }
      dependency_track: { description: 'Dependency Track — SBOM vulnerability management',  type: boolean, default: false }
      defectdojo:     { description: 'DefectDojo — vulnerability management platform',       type: boolean, default: false }

jobs:
  security-tools:
    name: ${{ inputs.action }} Security Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos
        run: |
          helm repo add bitnami        https://charts.bitnami.com/bitnami
          helm repo add hashicorp      https://helm.releases.hashicorp.com
          helm repo add jetstack       https://charts.jetstack.io
          helm repo add falcosecurity  https://falcosecurity.github.io/charts
          helm repo add cilium         https://helm.cilium.io
          helm repo add istio          https://istio-release.storage.googleapis.com/charts
          helm repo add kyverno        https://kyverno.github.io/kyverno/
          helm repo add open-policy-agent https://open-policy-agent.github.io/gatekeeper/charts
          helm repo add kubewarden     https://charts.kubewarden.io
          helm repo add sigstore       https://sigstore.github.io/helm-charts
          helm repo add wazuh          https://wazuh.github.io/wazuh-kubernetes
          helm repo add sonarqube      https://SonarSource.github.io/helm-chart-sonarqube
          helm repo add aquasecurity   https://aquasecurity.github.io/helm-charts/
          helm repo add dependency-track https://dependencytrack.github.io/helm-charts
          helm repo add DefectDojo     https://raw.githubusercontent.com/DefectDojo/django-DefectDojo/helm-charts
          helm repo add spire          https://spiffe.github.io/helm-charts/
          helm repo update

      # ── INSTALL ────────────────────────────────────────────────────────
      - name: Install — Keycloak
        if: ${{ inputs.action == 'INSTALL' && inputs.keycloak == true }}
        run: |
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace keycloak --create-namespace \
            --set auth.adminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --set replicaCount=2 \
            --set postgresql.enabled=true \
            --set metrics.enabled=true \
            --set extraEnvVars[0].name=KC_FEATURES \
            --set extraEnvVars[0].value=token-exchange \
            --wait --timeout 10m

      - name: Install — Vault (HA Raft, 3 replicas)
        if: ${{ inputs.action == 'INSTALL' && inputs.vault == true }}
        run: |
          helm upgrade --install vault hashicorp/vault \
            --namespace vault --create-namespace \
            --set server.ha.enabled=true \
            --set server.ha.raft.enabled=true \
            --set server.ha.replicas=3 \
            --set server.auditStorage.enabled=true \
            --set server.dataStorage.enabled=true \
            --set server.dataStorage.size=10Gi \
            --set injector.replicas=2 \
            --set csi.enabled=true \
            --set ui.enabled=true \
            --wait --timeout 10m

      - name: Install — cert-manager (with CRDs)
        if: ${{ inputs.action == 'INSTALL' && inputs.cert_manager == true }}
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set installCRDs=true \
            --set replicaCount=2 \
            --set webhook.replicaCount=2 \
            --set cainjector.replicaCount=2 \
            --set prometheus.enabled=true \
            --wait --timeout 10m
          # Post-install: create self-signed ClusterIssuer
          kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-issuer
          spec:
            selfSigned: {}
          EOF

      - name: Install — Falco (eBPF driver + Falcosidekick)
        if: ${{ inputs.action == 'INSTALL' && inputs.falco == true }}
        run: |
          helm upgrade --install falco falcosecurity/falco \
            --namespace falco --create-namespace \
            --set driver.kind=ebpf \
            --set collectors.kubernetes.enabled=true \
            --set falcosidekick.enabled=true \
            --set falcosidekick.config.slack.webhookurl="${{ secrets.SLACK_WEBHOOK }}" \
            --set falcosidekick.config.pagerduty.routingKey="${{ secrets.PAGERDUTY_ROUTING_KEY }}" \
            --set falcosidekick.webui.enabled=true \
            --set falcosidekick.config.prometheus.enabled=true \
            --wait --timeout 10m

      - name: Install — OPA/Gatekeeper (3 replicas)
        if: ${{ inputs.action == 'INSTALL' && inputs.opa == true }}
        run: |
          helm upgrade --install gatekeeper open-policy-agent/gatekeeper \
            --namespace gatekeeper-system --create-namespace \
            --set replicaCount=3 \
            --set auditInterval=60 \
            --set metricsBackend=prometheus \
            --set enableExternalData=true \
            --wait --timeout 10m

      - name: Install — Kyverno (HA, 3 replicas)
        if: ${{ inputs.action == 'INSTALL' && inputs.kyverno == true }}
        run: |
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno --create-namespace \
            --set admissionController.replicas=3 \
            --set backgroundController.replicas=2 \
            --set cleanupController.replicas=2 \
            --set reportsController.replicas=2 \
            --wait --timeout 10m

      - name: Install — Kubewarden (CRDs + controller + defaults)
        if: ${{ inputs.action == 'INSTALL' && inputs.kubewarden == true }}
        run: |
          helm upgrade --install kubewarden-crds kubewarden/kubewarden-crds \
            --namespace kubewarden --create-namespace --wait --timeout 5m
          helm upgrade --install kubewarden-controller kubewarden/kubewarden-controller \
            --namespace kubewarden --wait --timeout 5m
          helm upgrade --install kubewarden-defaults kubewarden/kubewarden-defaults \
            --namespace kubewarden \
            --set recommendedPolicies.enabled=true \
            --set recommendedPolicies.defaultPoliciesMode=monitor \
            --wait --timeout 10m

      - name: Install — SPIRE (trust domain shopos.cluster.local)
        if: ${{ inputs.action == 'INSTALL' && inputs.spire == true }}
        run: |
          helm upgrade --install spire spire/spire \
            --namespace spire --create-namespace \
            --set global.spire.trustDomain=shopos.cluster.local \
            --set spire-server.replicaCount=3 \
            --set spire-server.ha.enabled=true \
            --set spiffe-csi-driver.enabled=true \
            --set spiffe-oidc-discovery-provider.enabled=true \
            --wait --timeout 10m

      - name: Install — Wazuh SIEM
        if: ${{ inputs.action == 'INSTALL' && inputs.wazuh == true }}
        run: |
          helm upgrade --install wazuh wazuh/wazuh \
            --namespace wazuh --create-namespace \
            --set wazuh.manager.persistence.size=10Gi \
            --set wazuh.indexer.persistence.size=20Gi \
            --wait --timeout 15m

      - name: Install — Rekor (Sigstore transparency log)
        if: ${{ inputs.action == 'INSTALL' && inputs.rekor == true }}
        run: |
          helm upgrade --install rekor sigstore/rekor \
            --namespace sigstore-system --create-namespace \
            --set mysql.persistence.size=10Gi \
            --set redis.persistence.enabled=true \
            --set server.rekorConfig.treeID="" \
            --wait --timeout 10m

      - name: Install — Fulcio (Sigstore CA)
        if: ${{ inputs.action == 'INSTALL' && inputs.fulcio == true }}
        run: |
          helm upgrade --install fulcio sigstore/fulcio \
            --namespace sigstore-system --create-namespace \
            --set config.OIDCIssuers.keycloak.IssuerURL="${{ secrets.KEYCLOAK_URL }}/realms/shopos" \
            --set config.OIDCIssuers.keycloak.ClientID=sigstore \
            --set config.OIDCIssuers.keycloak.Type=email \
            --wait --timeout 10m

      - name: Install — SonarQube
        if: ${{ inputs.action == 'INSTALL' && inputs.sonarqube == true }}
        run: |
          helm upgrade --install sonarqube sonarqube/sonarqube \
            --namespace sonarqube --create-namespace \
            --set postgresql.enabled=true \
            --set postgresql.postgresqlPassword="${{ secrets.SONARQUBE_DB_PASSWORD }}" \
            --set monitoringPasscode="${{ secrets.SONARQUBE_MONITORING_PASSCODE }}" \
            --wait --timeout 15m

      - name: Install — Trivy Operator
        if: ${{ inputs.action == 'INSTALL' && inputs.trivy_operator == true }}
        run: |
          helm upgrade --install trivy-operator aquasecurity/trivy-operator \
            --namespace trivy-system --create-namespace \
            --set trivy.ignoreUnfixed=true \
            --set trivy.severity=CRITICAL,HIGH \
            --set operator.vulnerabilityScannerEnabled=true \
            --set operator.configAuditScannerEnabled=true \
            --wait --timeout 10m

      - name: Install — Kubescape
        if: ${{ inputs.action == 'INSTALL' && inputs.kubescape == true }}
        run: |
          helm upgrade --install kubescape kubescape/kubescape-operator \
            --namespace kubescape --create-namespace \
            --set capabilities.continuousScan=enable \
            --set capabilities.relevancy=enable \
            --set capabilities.networkPolicyService=enable \
            --set capabilities.runtimeObservability=enable \
            --wait --timeout 10m

      - name: Install — Dependency Track
        if: ${{ inputs.action == 'INSTALL' && inputs.dependency_track == true }}
        run: |
          helm upgrade --install dependency-track dependency-track/dependency-track \
            --namespace dependency-track --create-namespace \
            --set apiServer.resources.requests.memory=4Gi \
            --set frontend.enabled=true \
            --wait --timeout 15m

      - name: Install — DefectDojo
        if: ${{ inputs.action == 'INSTALL' && inputs.defectdojo == true }}
        run: |
          helm upgrade --install defectdojo DefectDojo/defectdojo \
            --namespace defectdojo --create-namespace \
            --set django.adminPassword="${{ secrets.DEFECTDOJO_ADMIN_PASSWORD }}" \
            --set postgresql.enabled=true \
            --wait --timeout 15m

      # ── UNINSTALL ──────────────────────────────────────────────────────
      - name: Uninstall tools
        if: ${{ inputs.action == 'UNINSTALL' }}
        run: |
          ${{ inputs.keycloak       && 'helm uninstall keycloak         -n keycloak         --ignore-not-found || true' || '' }}
          ${{ inputs.vault          && 'helm uninstall vault            -n vault            --ignore-not-found || true' || '' }}
          ${{ inputs.cert_manager   && 'helm uninstall cert-manager     -n cert-manager     --ignore-not-found || true' || '' }}
          ${{ inputs.falco          && 'helm uninstall falco            -n falco            --ignore-not-found || true' || '' }}
          ${{ inputs.opa            && 'helm uninstall gatekeeper       -n gatekeeper-system --ignore-not-found || true' || '' }}
          ${{ inputs.kyverno        && 'helm uninstall kyverno          -n kyverno          --ignore-not-found || true' || '' }}
          ${{ inputs.kubewarden     && 'helm uninstall kubewarden-defaults kubewarden-controller kubewarden-crds -n kubewarden --ignore-not-found || true' || '' }}
          ${{ inputs.spire          && 'helm uninstall spire            -n spire            --ignore-not-found || true' || '' }}
          ${{ inputs.wazuh          && 'helm uninstall wazuh            -n wazuh            --ignore-not-found || true' || '' }}
          ${{ inputs.rekor          && 'helm uninstall rekor            -n sigstore-system  --ignore-not-found || true' || '' }}
          ${{ inputs.fulcio         && 'helm uninstall fulcio           -n sigstore-system  --ignore-not-found || true' || '' }}
          ${{ inputs.sonarqube      && 'helm uninstall sonarqube        -n sonarqube        --ignore-not-found || true' || '' }}
          ${{ inputs.trivy_operator && 'helm uninstall trivy-operator   -n trivy-system     --ignore-not-found || true' || '' }}
          ${{ inputs.kubescape      && 'helm uninstall kubescape        -n kubescape        --ignore-not-found || true' || '' }}
          ${{ inputs.dependency_track && 'helm uninstall dependency-track -n dependency-track --ignore-not-found || true' || '' }}
          ${{ inputs.defectdojo     && 'helm uninstall defectdojo       -n defectdojo       --ignore-not-found || true' || '' }}
          echo "Uninstall complete."
