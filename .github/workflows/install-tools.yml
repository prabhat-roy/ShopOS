name: Install Agent Tools

on:
  workflow_dispatch:

jobs:
  install-tools:
    name: Install CI Agent Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install additional CLI tools
        run: |
          # Buf (Protobuf toolchain)
          BUF_VERSION=1.35.1
          curl -fsSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

          # Kustomize
          curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          mv kustomize /usr/local/bin/

          # Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          # Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

          # Syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          # Gitleaks
          GITLEAKS_VER=8.21.0
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks

          # Semgrep
          pip install semgrep --quiet

          # Checkov
          pip install checkov --quiet

          # Ansible
          pip install ansible ansible-lint --quiet

          # k6
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install k6 -y -qq

          echo "=== Tool versions ==="
          kubectl version --client --short 2>/dev/null || kubectl version --client
          helm version --short
          terraform version
          go version
          java -version 2>&1 | head -1
          node --version
          python3 --version
          dotnet --version
          rustc --version
          cosign version
          buf --version
          trivy --version | head -1
          grype version | head -1
          syft --version
          gitleaks version
          semgrep --version
          checkov --version
          ansible --version | head -1
          k6 version
