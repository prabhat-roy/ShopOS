## RabbitMQ Configuration — ShopOS Enterprise Platform
## Docs: https://www.rabbitmq.com/configure.html

# ─── Networking ───────────────────────────────────────────────────────────────
listeners.tcp.default = 5672
management.listener.port = 15672

# ─── Default Virtual Host & Credentials ───────────────────────────────────────
default_vhost = /
default_user = shopos
default_pass = shopos

# ─── Logging ──────────────────────────────────────────────────────────────────
log.console = true
log.console.level = info
log.file = false

# ─── Consumer / Publisher Timeouts ────────────────────────────────────────────
# 1 hour — allows long-running batch consumers without disconnect
consumer_timeout = 3600000

# ─── Memory & Disk Alarms ─────────────────────────────────────────────────────
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 2.0

# ─── Message Persistence ──────────────────────────────────────────────────────
# Force all queues to durable by default (overridable per-queue in definitions)
queue_master_locator = min-masters

# ─── Heartbeat ────────────────────────────────────────────────────────────────
heartbeat = 60

# ─── Management Plugin ────────────────────────────────────────────────────────
management.path_prefix = /
management.cors.allow_origins.1 = *
management.load_definitions = /etc/rabbitmq/definitions.json

# ─── Prometheus Plugin ────────────────────────────────────────────────────────
# Expose metrics at http://host:15692/metrics (Phase 4)
# prometheus.path = /metrics
# prometheus.tcp.port = 15692
