replicaCount: 1

image:
  repository: rabbitmq
  tag: "4.0-management"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5672
  targetPort: 5672

persistence:
  enabled: true
  storageClass: """"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/rabbitmq

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
