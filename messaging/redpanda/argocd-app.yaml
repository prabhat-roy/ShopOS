# Source: messaging/redpanda/redpanda.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://charts.redpanda.com
    chart: redpanda
    targetRevision: '5.9.5'
    helm:
      releaseName: redpanda
      values: |
        statefulset:
          replicas: 3
        resources:
          cpu: { cores: 4 }
          memory: { container: { max: 8Gi } }
        storage:
          persistentVolume:
            enabled: true
            size: 100Gi
            storageClass: fast-ssd
        tls: { enabled: true, certs: { default: { caEnabled: true } } }
        auth: { sasl: { enabled: true, mechanism: SCRAM-SHA-512 } }
        monitoring: { enabled: true }
        console:
          enabled: true
          console: { config: { kafka: { brokers: ["redpanda-0.redpanda.streaming.svc:9093"] } } }
  destination:
    server: https://kubernetes.default.svc
    namespace: streaming
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
