replicaCount: 1

image:
  repository: docker.redpanda.com/redpandadata/redpanda
  tag: "v26.1.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9092
  targetPort: 9092

persistence:
  enabled: true
  storageClass: "standard-rwo"
  size: 20Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/redpanda/data

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
