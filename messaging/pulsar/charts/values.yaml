replicaCount: 1

image:
  repository: apachepulsar/pulsar
  tag: "3.3.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6650
  targetPort: 6650

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
