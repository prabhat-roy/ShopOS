replicaCount: 1

image:
  repository: apachepulsar/pulsar
  tag: "3.3.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6650
  targetPort: 6650

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

env:
  PULSAR_MEM: "-Xms1g -Xmx2g -XX:MaxDirectMemorySize=1g"

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
