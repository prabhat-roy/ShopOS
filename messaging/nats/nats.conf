## NATS JetStream Configuration — ShopOS Enterprise Platform
## Docs: https://docs.nats.io/running-a-nats-service/configuration

# ─── Core Networking ──────────────────────────────────────────────────────────
port: 4222
http_port: 8222

# ─── JetStream ────────────────────────────────────────────────────────────────
jetstream {
  store_dir: "/data"
  max_memory_store: 1GB
  max_file_store: 10GB
  # domain: shopos   # uncomment for JetStream domain isolation in multi-cluster
}

# ─── Authentication ───────────────────────────────────────────────────────────
# Production: replace with NKeys or JWT-based auth (nsc toolchain)
authorization {
  users = [
    {
      user: "shopos"
      password: "shopos"
      permissions: {
        publish:   { allow: [">"] }
        subscribe: { allow: [">", "_INBOX.>"] }
      }
    },
    {
      user: "shopos-readonly"
      password: "shopos-readonly"
      permissions: {
        publish:   { deny: [">"] }
        subscribe: { allow: ["realtime.>", "notify.>", "chat.>"] }
      }
    }
  ]
}

# ─── Cluster ──────────────────────────────────────────────────────────────────
# Single-node for local dev; enable routes for 3-node cluster in production
cluster {
  name: "shopos-nats"
  # listen: 0.0.0.0:6222
  # routes: [
  #   nats://nats-1:6222
  #   nats://nats-2:6222
  #   nats://nats-3:6222
  # ]
}

# ─── Logging ──────────────────────────────────────────────────────────────────
debug: false
trace: false
logtime: true
log_size_limit: 10MB

# ─── Limits ───────────────────────────────────────────────────────────────────
max_connections: 65536
max_subscriptions: 0          # unlimited
max_payload: 1MB
max_pending: 67108864         # 64MB pending bytes per connection
ping_interval: 20s
ping_max: 2
write_deadline: 10s

