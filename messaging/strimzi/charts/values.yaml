replicaCount: 1

image:
  repository: quay.io/strimzi/operator
  tag: "0.51.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

persistence:
  enabled: false
  storageClass: "standard-rwo"
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 768Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
