replicaCount: 1

image:
  repository: confluentinc/cp-zookeeper
  tag: "7.8.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 2181
  targetPort: 2181

persistence:
  enabled: true
  storageClass: "standard-rwo"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
