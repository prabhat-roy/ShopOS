apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      initContainers:
        {{- if .Values.persistence.enabled }}
        - name: fix-data-dir
          image: busybox:1.36
          command: ['sh', '-c', 'rm -rf {{ .Values.persistence.mountPath }}/lost+found && chown -R 1000:1000 {{ .Values.persistence.mountPath }}']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        - name: fix-ipv6-localhost
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command: ['sh', '-c', 'grep -v "^::1.*localhost" /etc/hosts > /tmp/hosts.new && cp /tmp/hosts.new /etc/hosts && echo "127.0.0.1 localhost" >> /etc/hosts && echo "Fixed /etc/hosts:" && cat /etc/hosts']
      containers:
        - name: memphis-metadata
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: memphis
            - name: POSTGRES_PASSWORD
              value: memphis
            - name: POSTGRES_DB
              value: memphis
            - name: PGPORT
              value: "5005"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "memphis", "-p", "5005"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: ROOT_PASSWORD
              value: memphis
            - name: MEMPHIS_METADATA_DB_HOST
              value: "127.0.0.1"
            - name: MEMPHIS_METADATA_DB_PORT
              value: "5005"
            - name: MEMPHIS_METADATA_DB_USER
              value: memphis
            - name: MEMPHIS_METADATA_DB_PASS
              value: memphis
            - name: MEMPHIS_METADATA_DB_DBNAME
              value: memphis
          {{- if .Values.env }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "app.fullname" . }}-pvc
      {{- end }}