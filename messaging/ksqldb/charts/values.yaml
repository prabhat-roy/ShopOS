replicaCount: 1

image:
  repository: confluentinc/cp-ksqldb-server
  tag: "7.8.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8088
  targetPort: 8088

persistence:
  enabled: false
  storageClass: "standard-rwo"
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
