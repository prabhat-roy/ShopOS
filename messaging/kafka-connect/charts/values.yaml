replicaCount: 1

image:
  repository: confluentinc/cp-kafka-connect
  tag: "7.8.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8083
  targetPort: 8083

persistence:
  enabled: false
  storageClass: """"
  size: 5Gi
  accessMode: ReadWriteOnce
  mountPath: /var/lib/data

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
