# Anubis — proof-of-work-based anti-bot/anti-AI-scraper for storefront. Sits in front of Istio gateway.
apiVersion: apps/v1
kind: Deployment
metadata: { name: anubis, namespace: networking }
spec:
  replicas: 3
  selector: { matchLabels: { app: anubis } }
  template:
    metadata: { labels: { app: anubis } }
    spec:
      containers:
        - name: anubis
          image: ghcr.io/techarohq/anubis:v1.10.0
          ports: [{ containerPort: 8080 }]
          env:
            - { name: BIND, value: ":8080" }
            - { name: TARGET, value: "http://istio-ingressgateway.istio-system.svc:80" }
            - { name: DIFFICULTY, value: "4" }
            - { name: METRICS_BIND, value: ":9090" }
            - { name: COOKIE_DOMAIN, value: "shop.example.com" }
            - { name: COOKIE_PARTITION_KEY, valueFrom: { secretKeyRef: { name: anubis-key, key: cookie-key } } }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1, memory: 512Mi }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 } }
---
apiVersion: v1
kind: Service
metadata: { name: anubis, namespace: networking }
spec:
  selector: { app: anubis }
  ports: [{ port: 80, targetPort: 8080 }]
