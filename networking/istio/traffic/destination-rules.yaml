# DestinationRules — outlier detection + connection pool limits for tier-0 services.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata: { name: cart-service, namespace: commerce }
spec:
  host: cart-service.commerce.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp: { maxConnections: 200 }
      http: { http1MaxPendingRequests: 100, http2MaxRequests: 1000, maxRequestsPerConnection: 100 }
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata: { name: checkout-service, namespace: commerce }
spec:
  host: checkout-service.commerce.svc.cluster.local
  trafficPolicy:
    connectionPool: { tcp: { maxConnections: 200 }, http: { http1MaxPendingRequests: 100 } }
    outlierDetection: { consecutive5xxErrors: 3, interval: 15s, baseEjectionTime: 30s }
---
