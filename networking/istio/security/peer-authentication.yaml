# Mesh-wide STRICT mTLS — every pod-to-pod call must be mTLS.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata: { name: default, namespace: istio-system }
spec: { mtls: { mode: STRICT } }
---
