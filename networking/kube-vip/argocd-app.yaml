# Source: networking/kube-vip/kube-vip.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-vip
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://kube-vip.github.io/helm-charts
    chart: kube-vip-cloud-provider
    targetRevision: '0.0.10'
    helm:
      releaseName: kube-vip
      values: |
        image: { repository: ghcr.io/kube-vip/kube-vip-cloud-provider, tag: v0.0.10 }
        config:
          address: 10.10.10.50
          interface: eth0
          enableServicesElection: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
