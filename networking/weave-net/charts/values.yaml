replicaCount: 1

image:
  repository: ghcr.io/weaveworks/weave-kube
  tag: "2.8.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6782
  targetPort: 6782

persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
