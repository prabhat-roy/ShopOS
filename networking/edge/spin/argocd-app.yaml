# Source: networking/edge/spin/spin.yaml
# This Application installs the same Helm chart on any K8s cluster (not just k3s).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spin-operator
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: shopos-infra
  source:
    repoURL: https://spinkube.github.io/charts
    chart: spin-operator
    targetRevision: '0.4.0'
    helm:
      releaseName: spin-operator
      values: |
        runtimeClass: wasmtime-spin-v2
        controller: { replicas: 2 }
  destination:
    server: https://kubernetes.default.svc
    namespace: spin-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry: { limit: 5, backoff: { duration: 30s, maxDuration: 5m, factor: 2 } }
