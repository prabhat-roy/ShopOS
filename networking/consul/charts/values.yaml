replicaCount: 1

image:
  repository: hashicorp/consul
  tag: "1.19.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8500
  targetPort: 8500

persistence:
  enabled: true
  storageClass: """"
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /consul/data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
