replicaCount: 1

image:
  repository: registry.k8s.io/external-dns/external-dns
  tag: "v0.14.2"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7979
  targetPort: 7979

persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

env: {}

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
