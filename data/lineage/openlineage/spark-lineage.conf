# =============================================================================
# ShopOS — Apache Spark OpenLineage listener configuration
#
# Reference:
#   https://openlineage.io/docs/integrations/spark/
#
# Include these properties in your SparkSession builder or spark-submit command:
#
#   spark-submit \
#     --properties-file data-lineage/openlineage/spark-lineage.conf \
#     ...
#
# Or merge into your application's spark-defaults.conf.
# =============================================================================

# ── OpenLineage Spark listener ────────────────────────────────────────────────
# Registers the OpenLineage listener that captures Spark job start/complete/fail
# and Spark SQL plan lineage (input/output datasets with column-level detail).
spark.extraListeners=io.openlineage.spark.agent.OpenLineageSparkListener

# ── Marquez backend ───────────────────────────────────────────────────────────
# URL of the OpenLineage-compatible backend (Marquez)
spark.openlineage.transport.type=http
spark.openlineage.transport.url=http://marquez:5000
spark.openlineage.transport.endpoint=/api/v1/lineage
spark.openlineage.transport.timeoutInMillis=5000

# Optional API key (leave empty for unauthenticated Marquez)
# spark.openlineage.transport.auth.type=api_key
# spark.openlineage.transport.auth.apiKey=${OPENLINEAGE_API_KEY}

# ── Namespace and application identity ───────────────────────────────────────
spark.openlineage.namespace=shopos
spark.openlineage.appName=shopos-spark

# ── Dataset facets to capture ─────────────────────────────────────────────────
# Include schema, statistics, and data source facets in lineage events
spark.openlineage.facets.disabled=[]

# ── Column-level lineage ──────────────────────────────────────────────────────
# Enable fine-grained column-level lineage tracking (requires Spark 3.x)
spark.openlineage.columnLineage.enabled=true

# ── Kafka transport alternative ───────────────────────────────────────────────
# To emit lineage events to Kafka instead of HTTP, replace the transport above:
# spark.openlineage.transport.type=kafka
# spark.openlineage.transport.topicName=openlineage.events
# spark.openlineage.transport.kafkaProperties.bootstrap.servers=kafka:9092
# spark.openlineage.transport.kafkaProperties.compression.type=snappy

# ── Spark-specific settings for ShopOS jobs ───────────────────────────────────

# order-analytics Flink/Spark streaming job
spark.app.name=shopos-order-analytics

# Capture datasource facets for JDBC (Postgres → ClickHouse ETL)
spark.openlineage.datasource.facets.sourceCode=true

# Retry on transient transport errors
spark.openlineage.transport.retryCount=3
spark.openlineage.transport.retryBackoffMultiplier=1.5

# ── Package coordinates (for spark-submit --packages) ────────────────────────
# Add to spark-submit or pom.xml/build.gradle.kts:
#
#   --packages io.openlineage:openlineage-spark_2.12:1.23.0
#
# Maven:
#   <dependency>
#     <groupId>io.openlineage</groupId>
#     <artifactId>openlineage-spark_2.12</artifactId>
#     <version>1.23.0</version>
#   </dependency>
