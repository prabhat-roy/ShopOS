# Rook-Ceph — provides RWX/RWO block, file, and S3-compatible object storage.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata: { name: rook-ceph, namespace: rook-ceph }
spec:
  repo: https://charts.rook.io/release
  chart: rook-ceph
  version: v1.15.2
  targetNamespace: rook-ceph
  valuesContent: |-
    monitoring: { enabled: true }
    csi:
      enableRbdSnapshotter: true
      enableCephfsSnapshotter: true
      provisionerReplicas: 2
---
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata: { name: rook-ceph, namespace: rook-ceph }
spec:
  cephVersion: { image: quay.io/ceph/ceph:v18.2.4 }
  dataDirHostPath: /var/lib/rook
  mon: { count: 3, allowMultiplePerNode: false }
  mgr: { count: 2 }
  dashboard: { enabled: true, ssl: true }
  storage:
    useAllNodes: true
    useAllDevices: true
