apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pact-broker.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pact-broker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.database.url }}
  database-url: {{ .Values.database.url | quote }}
  {{- else }}
  database-username: {{ .Values.database.username | quote }}
  database-password: {{ .Values.database.password | quote }}
  {{- end }}
  {{- if .Values.basicAuth.enabled }}
  basic-auth-username: {{ .Values.basicAuth.username | quote }}
  basic-auth-password: {{ .Values.basicAuth.password | quote }}
  {{- end }}
