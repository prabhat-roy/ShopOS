apiVersion: v1
kind: Service
metadata:
  name: {{ include "toxiproxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toxiproxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.apiPort }}
      targetPort: api
      protocol: TCP
      name: api
    - port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      protocol: TCP
      name: proxy
  selector:
    {{- include "toxiproxy.selectorLabels" . | nindent 4 }}
