apiVersion: v1
kind: Secret
metadata:
  name: {{ include "unleash.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unleash.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ printf "postgresql://%s:%s@%s/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "unleash.fullname" .) .Values.postgresql.auth.database | quote }}
  secret-key: "changeme-replace-with-real-secret"
