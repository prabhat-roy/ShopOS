replicaCount: 1

image:
  repository: marquezproject/marquez
  tag: "0.47.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  # API port
  port: 5000
  # Admin / health port
  adminPort: 5001

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: marquez.shopos.local
  path: /
  pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# PostgreSQL connection for Marquez metadata
database:
  host: "postgres"
  port: 5432
  name: "marquez"
  username: "marquez"
  password: "marquez"

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nameOverride: ""
fullnameOverride: ""
