apiVersion: v1
kind: Secret
metadata:
  name: {{ include "marquez.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "marquez.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-username: {{ .Values.database.username | quote }}
  db-password: {{ .Values.database.password | quote }}
