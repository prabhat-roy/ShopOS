apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apache-atlas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apache-atlas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "apache-atlas.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "apache-atlas.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: apache-atlas
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 21000
              protocol: TCP
          env:
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.javaOptions | quote }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: atlas-data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/atlas/admin/status
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/atlas/admin/status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: atlas-data
          persistentVolumeClaim:
            claimName: {{ include "apache-atlas.fullname" . }}-pvc
        {{- end }}
