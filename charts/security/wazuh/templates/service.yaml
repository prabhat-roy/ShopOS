apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    component: manager
spec:
  type: {{ .Values.manager.service.type }}
  ports:
    {{- range .Values.manager.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "wazuh.selectorLabels" . | nindent 4 }}
    component: manager
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-manager-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 1514
      name: agent
  selector:
    {{- include "wazuh.selectorLabels" . | nindent 4 }}
    component: manager
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wazuh.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wazuh.selectorLabels" . | nindent 4 }}
    component: dashboard
