replicaCount: 1

image:
  repository: bitnami/sealed-secrets-controller
  tag: "v0.27.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Operator — no ingress needed
ingress:
  enabled: false

# Port for the certificate rotation webhook
certRotation: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
