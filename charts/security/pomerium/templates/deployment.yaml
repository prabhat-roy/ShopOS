apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pomerium.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pomerium.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pomerium.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pomerium
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          env:
            - name: SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pomerium.fullname" . }}-secret
                  key: shared-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pomerium.fullname" . }}-secret
                  key: cookie-secret
            - name: IDP_CLIENT_ID
              value: {{ .Values.config.idpClientId | quote }}
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pomerium.fullname" . }}-secret
                  key: idp-client-secret
            - name: IDP_PROVIDER
              value: {{ .Values.config.idpProvider | quote }}
            - name: IDP_PROVIDER_URL
              value: {{ .Values.config.idpProviderUrl | quote }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
