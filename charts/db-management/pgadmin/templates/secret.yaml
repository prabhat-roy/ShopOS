apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgadmin.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgadmin.labels" . | nindent 4 }}
type: Opaque
stringData:
  email: {{ .Values.auth.email | quote }}
  password: {{ .Values.auth.password | quote }}
