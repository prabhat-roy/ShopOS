apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis-commander.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-commander.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.redis.password }}
  redis-password: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- if .Values.basicAuth.enabled }}
  basicauth-username: {{ .Values.basicAuth.username | quote }}
  basicauth-password: {{ .Values.basicAuth.password | quote }}
  {{- end }}
