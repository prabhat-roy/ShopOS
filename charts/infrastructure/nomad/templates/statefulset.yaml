apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nomad.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nomad.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nomad.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nomad.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nomad.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nomad
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - nomad
            - agent
            - -config=/etc/nomad.d/nomad.hcl
          ports:
            - name: http
              containerPort: 4646
              protocol: TCP
            - name: rpc
              containerPort: 4647
              protocol: TCP
            - name: serf
              containerPort: 4648
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.storage.storageClass }}
        storageClassName: {{ .Values.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
