replicaCount: 1

image:
  repository: ghcr.io/runatlantis/atlantis
  tag: "v0.30.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4141

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: atlantis.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

storage:
  size: 5Gi
  storageClass: standard
  mountPath: /atlantis

config:
  repoAllowlist: "github.com/shopos/*"
  logLevel: "info"

vcs:
  githubUser: ""
  githubToken: ""
  webhookSecret: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "false"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
