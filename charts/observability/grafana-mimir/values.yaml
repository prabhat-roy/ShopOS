replicaCount: 3

image:
  repository: grafana/mimir
  tag: "2.14.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9009

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: mimir.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

storage:
  size: 50Gi
  storageClass: standard
  mountPath: /data

config:
  multitenancyEnabled: false
  alertmanager:
    enabled: true
  ruler:
    enabled: true

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9009"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
