apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hasura.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hasura.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: "postgresql://hasura:changeme@postgres:5432/hasura"
  admin-secret: "changeme-replace-in-production"
