replicaCount: 1

image:
  repository: prefecthq/prefect
  tag: "3-python3.12"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4200

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: prefect.shopos.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

storage:
  size: 10Gi
  storageClass: standard
  mountPath: /root/.prefect

env:
  PREFECT_SERVER_API_HOST: "0.0.0.0"
  PREFECT_SERVER_API_PORT: "4200"
  PREFECT_UI_ENABLED: "true"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "4200"
  prometheus.io/path: "/api/metrics"

podSecurityContext:
  runAsNonRoot: false

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
