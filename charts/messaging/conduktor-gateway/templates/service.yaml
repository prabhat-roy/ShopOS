apiVersion: v1
kind: Service
metadata:
  name: {{ include "conduktor-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduktor-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
      name: admin
    - port: {{ .Values.service.kafkaPort }}
      targetPort: kafka-proxy
      protocol: TCP
      name: kafka-proxy
  selector:
    {{- include "conduktor-gateway.selectorLabels" . | nindent 4 }}
