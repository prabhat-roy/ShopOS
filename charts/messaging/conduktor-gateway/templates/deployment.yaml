apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conduktor-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conduktor-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "conduktor-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "conduktor-gateway.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: conduktor-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: admin
              containerPort: 8888
              protocol: TCP
            - name: kafka-proxy
              containerPort: 9099
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: GATEWAY_ADVERTISED_HOST
              value: {{ .Values.gateway.advertisedHost | quote }}
            - name: GATEWAY_PORT
              value: "9099"
            - name: GATEWAY_ADMIN_API_PORT
              value: "8888"
            - name: GATEWAY_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "conduktor-gateway.fullname" . }}-secret
                  key: admin-username
            - name: GATEWAY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "conduktor-gateway.fullname" . }}-secret
                  key: admin-password
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
