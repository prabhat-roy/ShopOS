apiVersion: v1
kind: Service
metadata:
  name: {{ include "manticore-search.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "manticore-search.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- range .Values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "manticore-search.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "manticore-search.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "manticore-search.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 9306
      name: mysql
    - port: 9308
      name: http
  selector:
    {{- include "manticore-search.selectorLabels" . | nindent 4 }}
