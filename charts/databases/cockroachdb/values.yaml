replicaCount: 3

image:
  repository: cockroachdb/cockroach
  tag: "v24.2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080

storage:
  size: 20Gi
  storageClass: standard

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/_status/vars"

podSecurityContext:
  runAsNonRoot: false

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
