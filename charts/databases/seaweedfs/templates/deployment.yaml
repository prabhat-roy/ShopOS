apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seaweedfs.fullname" . }}-master
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    component: master
spec:
  replicas: {{ .Values.master.replicaCount }}
  selector:
    matchLabels:
      {{- include "seaweedfs.selectorLabels" . | nindent 6 }}
      component: master
  template:
    metadata:
      labels:
        {{- include "seaweedfs.selectorLabels" . | nindent 8 }}
        component: master
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seaweedfs-master
          image: "{{ .Values.master.image.repository }}:{{ .Values.master.image.tag }}"
          imagePullPolicy: {{ .Values.master.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /usr/bin/weed
            - master
            - -port=9333
            - -mdir=/data
          ports:
            - name: http
              containerPort: 9333
              protocol: TCP
            - name: grpc
              containerPort: 19333
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /cluster/status
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /cluster/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "seaweedfs.fullname" . }}-volume
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    component: volume
spec:
  serviceName: {{ include "seaweedfs.fullname" . }}-volume-headless
  replicas: {{ .Values.volume.replicaCount }}
  selector:
    matchLabels:
      {{- include "seaweedfs.selectorLabels" . | nindent 6 }}
      component: volume
  template:
    metadata:
      labels:
        {{- include "seaweedfs.selectorLabels" . | nindent 8 }}
        component: volume
    spec:
      containers:
        - name: seaweedfs-volume
          image: "{{ .Values.volume.image.repository }}:{{ .Values.volume.image.tag }}"
          imagePullPolicy: {{ .Values.volume.image.pullPolicy }}
          command:
            - /usr/bin/weed
            - volume
            - -port=8080
            - -mserver={{ include "seaweedfs.fullname" . }}-master:9333
            - -dir=/data
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 18080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: {{ .Values.volume.storage.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.volume.storage.storageClass }}
        storageClassName: {{ .Values.volume.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.volume.storage.size }}
