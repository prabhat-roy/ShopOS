apiVersion: v1
kind: Service
metadata:
  name: {{ include "seaweedfs.fullname" . }}-master
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    component: master
spec:
  type: {{ .Values.master.service.type }}
  ports:
    {{- range .Values.master.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "seaweedfs.selectorLabels" . | nindent 4 }}
    component: master
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seaweedfs.fullname" . }}-volume
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    component: volume
spec:
  type: {{ .Values.volume.service.type }}
  ports:
    {{- range .Values.volume.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "seaweedfs.selectorLabels" . | nindent 4 }}
    component: volume
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seaweedfs.fullname" . }}-volume-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 8080
      name: http
  selector:
    {{- include "seaweedfs.selectorLabels" . | nindent 4 }}
    component: volume
