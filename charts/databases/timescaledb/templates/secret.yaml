apiVersion: v1
kind: Secret
metadata:
  name: {{ include "timescaledb.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "timescaledb.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.auth.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
  POSTGRES_USER: postgres
  DATA_SOURCE_NAME: "postgresql://postgres:{{ .Values.auth.postgresPassword }}@localhost:5432/{{ .Values.auth.database }}?sslmode=disable"
